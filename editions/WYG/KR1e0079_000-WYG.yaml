body:
  text: 春秋明志録春秋類提要臣等謹案春秋明志録十二卷明熊過撰過字叔仁富順人嘉靖己丑進士官至禮部祠祭司郎中過嘗注周易専以明象數為事論者與來知徳並稱葢不主先儒舊説者此書亦多採撮舊解各加辨駁大㫖在於信經不信傳自序謂道存乎志志明諸言故以明志為名其中於公榖及胡安國傳俱有所糾正而左氏傳為尤多如以邢遷於夷儀為邢自遷非桓公遷之以城楚丘為魯備戎而城非桓公城以封衛以晉人執虞公為存於其國制之使不得他去而非執以歸以寗母之㑹齊辭子華為不實以洮之盟謀王室為誣説以用鄫子為出自邾人非宋公之命以晉懐公為卓子之諡文公未嘗殺子圉以趙盾並未使先蔑逆公子雍於秦以衛石惡為孫氏黨非甯氏黨以楚殺慶封非以罪討無負斧鉞狥軍之事俱不免鑿空立説屢見牴牾又如以郭公為鳥名謂紀異如螟蜮之類以梁亡為魯大夫㑹盟所聞歸而言之不由赴告故不著其亡之由亦多出於臆斷有用思太過之失然其得解之處往往詞㫖平允大義炳然究非他家摭拾空談者可比故卓爾康謂其頗出新裁時多微中亦春秋之警䇿者視所作易注近實多矣乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:3f69727848f1b0d330920cb894b43a7f0ff72c6107632b2da5af836784781f22
