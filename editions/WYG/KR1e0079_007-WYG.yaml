body:
  text: 春秋明志録卷七明熊過撰宣公名倭一名接文公妾敬嬴子在位十八年諡法善問周逹曰宣元年春王正月公即位榖梁傳曰繼故言即位與聞乎故也公子遂如齊逆女三月遂以夫人婦姜至自齊姜氏齊姜也惠公女敬嬴欲結齊惠懼為出姜所愬故廢䘮紀以行嘉禮遂不稱公子謂一事再見而卒名榖梁曰䘮未畢故略之非也逆女稱婦姜榖梁謂縁姑言之辭也胡子云責敬嬴夫禮家之言曰其夫屬乎子道者妻皆婦道也宣公親敬嬴之子何止子道其稱婦姜何所不可而曰因婦姜見義亦過求矣夫人去氏啖叔佐便文義是杜氏謂史缺文葢求之不得爾公榖以為貶胡子從之矣女出由父母嫁從夫䘮娶父母之咎何以貶夫人之號而徒去氏氏不尊於夫人之號也存其所重而去其所輕春秋之褒貶有是乎夫人以氏去氏稱姜于辭不逹乃至舉氏而去姜則夫人為何氏也謂逹於辭乎而胡以詩之義責之彼夫强暴無禮者淫而已視諸齊姜同乎不同乎夏季孫行父如齊胡康侯曰下書公㑹齊侯于平州則知此㑹行父請之也又書齊人取濟西田則知其請葢以賂也晉放其大夫胥甲父于衛胥氏甲父胥臣子放者志其專也榖梁傳放猶屏也髙抑崇曰晉衛同為列國而放其有罪之臣于衛是鄙衛也衛人受晉之逐臣而不辭廹于勢也趙企明曰河曲之戰於今七年豈有不用命之誅至八年而後討哉必胥甲父以他事取惡于趙盾而逐之也公㑹齊侯于平州平州齊地後漢志瑯琊陽都有牟䑓註云平州在縣西杜元凱註以為泰山牟縣不知何㨿公子遂如齊六月齊人取濟西田濟西僖公三十一年所取詩人頌以為復周公之宇者而今以賂齊矣秋邾子來朝畏齊故也楚子鄭人侵陳遂侵宋楚征伐中國而稱爵執伯權矣鄭稱人將卑師少非貶書遂急後事之辭意初不在陳也鄭陳宋皆新城從晉之國而鄭獨改事楚矣趙企明曰楚莊滅庸首結秦巴以侵中國之西今侵陳宋又結鄭以侵中國之東秦鄭既服東西勢合而後趨中國耳陳君舉言南北之勢于是始後五十年而晉趙武楚屈建同盟于宋諸夏之君分為晉楚之從矣晉趙盾帥師救陳楚伐宋必越陳而後及宋故經曰楚子鄭人侵陳遂侵宋者此兵家邀歸之説故救陳則宋自觧亦勢然也左氏縁經有伐宋之文意為分兵兩救不知傳稱宋者本羨文也杜氏反謂經有缺文誤矣于是盾威行于國而思外立功葢有其志矣宋公陳侯衛侯曹伯㑹晉師于棐林伐鄭盟新城之國皆在焉獨許不與為志乎楚矣靈公之㑹諸侯不序晉不競也楚莊之起中國倐而爭鄭以是慗中國大之也趙盾而稱師一事再見從略之恒辭也公羊乃云君不㑹大夫之辭趙伯循曰春秋諸侯㑹大夫者非一何故於此生義乎棐林鄭地在新城東地古宛陵林鄉晉師先在故四國㑹之而後伐榖梁謂地以著其美趙伯循曰春秋未有師書地為褒之例是也冬晉趙穿帥師侵崇此盾之謀專兵也傳言穿欲侵崇以求秦成非所以治情寔矣崇秦之所服屬今西安府鄠縣去晉遠矣是時秦已自秦遷雍晉渡河必道雍而後及崇非重兵不可深入欲以求成何其迂哉季明徳謂陽使立功雪憤以搆兵靈公益疑則穿由此懼于得罪而盾由此可以為謀則亦察而未精也穿好勇而狂士㑹久䇿知之矣彼豈懼得罪者以君壻有側室之庇而擁重兵于外隂有先人奪志之心孰敢無忌而相圖哉故曰盾之謀專兵也晉人宋人伐鄭二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元此宋鄭大夫帥師之始大棘宋地今歸徳府寜陵縣界古陳留襄邑地趙伯循曰縁師先敗績身乃見獲依次第書之無褒貶秦師伐晉以報崇也夏晉人宋人衛人陳人侵鄭人微者侵淺事報大棘之役也左氏言趙盾救焦遂自隂地率諸侯之師侵鄭恐非寔也盾方有異志豈以遠君側爲事哉秋九月乙丑晉趙盾弑其君夷皋盾以帥中軍其君之廢置其僚之生殺其屬之放棄無不擅其成命外之盟㑹侵伐儼然抗于列國之君士㑹曰盾夏日之日無不畏之矣而穿又新得兵則弑成之豈必桃園哉董狐蔽獄之詞曰亡不越境反不討賊其知雖不先事幾亦有億而時獲者但左氏既不得其詞之意而説左氏者又癖焉而莫之理耳按榖梁傳史狐曰子爲正卿入諌不聴出亡不遠君弑而左氏第曰亡不越境夫亡不遠而君弑謂其聞乎故也豈謂越境乃免哉越境乃免此非孔子之意也穿盾之族子穿之弑盾成之也越境寧得免乎䟽家至引檀弓舊君反復之禮以證申鮮虞䘮齊莊之義夫君臣之義無所逃于天地之間越境可自諉乎彼謂越境而後君弑則其故無嫌于身遂不反國猶得免罪至其反國必當討賊是史狐尚以二詞爲一用耳故曰惜也越境乃免是惜狐之言恐讀者支離其辭以誣世豈爲盾惜哉季明徳謂狐言不切事寔恐亦未盡然也至曰春秋書弑悉非國史之舊晉之乘楚之檮杌皆賢者所爲聖人周流列國遍交賢士大夫必有見其直書者考得其寔故首惡者無所逃則亦不爲無見者春秋之書非盡從所赴也季父黒臋文公庶子立是爲成公冬十月乙亥天王崩諡匡弟瑜嗣是爲定王三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望魯之郊非禮也聖人因事以見義若曰郊牛口傷天之示戒明矣魯曷因是反省乎而又奚改卜爲也牛死乃不郊幸之也猶三望憾之也然則廢王䘮而致禮也者無譏乎郊之祭也䘮者不敢哭㓙服不敢入國門謂民間之䘮也禮王制䘮三年不祭惟祭天地社稷越紼而行事曽子問天子崩未殯五祀不行既殯而祭自啟至于及哭五祀之祭不行已𦵏而祭謂嗣天子也諸侯于王䘮斬衰苴絰杖絞帶冠繩纓菅屦祭社稷爼豆既陳聞天子崩后之䘮皆廢其禮况可聞䘮而猶治祭祀乎然不以卑廢尊聖人所爲權禮之變耳胡子䘮祭之譏可爲近厚而非經義矣𦵏匡王楚子伐陸渾之戎陸渾戎允姓君陸渾在秦晉西北僖二十二年秦晉遷于伊川遂從戎號今河南府嵩縣界夷狄相伐不書此以近王都書陳君舉曰窺周室也夏楚人侵鄭秋赤狄侵齊隗姓别種今潞以北其東界古黎國地譜潞州也宋師圍曹冬十月丙戌鄭伯蘭卒𦵏鄭穆公子夷嗣是爲靈公四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向郯已姓國今兖州郯城縣在莒南沂東莒大郯小疆埸相連魯有伯姬之親故宣公爲是平及者内爲志焉耳髙抑崇曰公欲爲郯平莒而挟齊以爲重義不足以服莒曰莒人則不肯者非特其君是也莒人不肯吾有不義焉故曰伐莒强也取向利也向國在莒魯之間隠二年莒人入向遂滅地屬莒秦伯稻卒諡共子雍嗣是爲桓公夏六月乙酉鄭公子歸生弑其君夷趙企明疑左氏食鼋之誣吳幼清因言其事蹟猥陋不可信也今按夷之弑言歸生者經言宋者傳也而胡氏信傳信如傳之言歸生視宋不在末减乎以末减爲首誅聖人垂事立法安在耶傳有可疑則棄傳而從經耳其後鄭人討幽公之亂斵歸生之棺而逐其族則鄭人當時已蔽獄于歸生矣歸生得國兵柄自大棘已然矣何畏于宋之譖盖必恃功見忌宋謀寔倡于歸生而左氏傳聞失真耳弟嗣是爲襄公赤狄侵齊秋公如齊公至自齊冬楚子伐鄭髙抑崇曰楚自去年至十年侵伐鄭者凡五至十一年盟鄭辰陵而鄭又徼事晉於是明年圍鄭遂敗鄭于邲而後鄭服楚晉之不振有自來矣五年春公如齊夏公至自齊秋九月齊髙固來逆子叔姬髙氏固名傒鲁孫齊世卿也子叔姬文公少女趙伯循云時君女胡氏因之考其年非也榖梁傳諸侯之嫁子于大夫主大夫以與之來者接内也公自爲之主罪公也於是公如齊固方當國用事使齊侯止公請叔姬焉則髙固伉也啖叔佐言執鄰國之君而爲大夫求婚不近人理而疑左氏之妄不知宣公身爲不義假齊以定其位朝而見留歴時不返屈于人下而不恥勢宜有之矣胡氏祗以禮幹守身責其毁列亦失所爲探本也哉叔孫得臣卒月䝉上間無事也不日公弗臨也公羊家以爲知賊不言聖人削之非也即欲削之何以不先東門氏乎或曰得臣與仲遂如齊之後竟不經見者不在其位冬齊髙固及子叔姬來大夫非公事與妻出境行反馬之禮非也留車妻之道反馬壻之義反馬不親至歸寧無並行惠公之許髙固之來胡氏交罪之是也楚人伐鄭將卑師少曰人傳謂楚子在行間妄也趙子常言楚比伐鄭不能服于是楚子再見故略之亦不應經義六年春晉趙盾衛孫免侵陳此晉楚侵陳之始伯主不能自反又不能大合諸侯以振中國之威而用諸侵掠或者謂晉成力弱事淺無主諸侯之權然則晉成之失伯趙盾爲之也夏四月秋八月螽冬十月七年春衛侯使孫良夫來盟謀㑹晉也夏公㑹齊侯伐萊秋公至自伐萊萊子爵國今萊州府黄縣地近于齊伐萊齊志也故不書及胡子曰以伐致師行之危也大旱冬公㑹晉侯宋公衛侯鄭伯曹伯于黒壤諸侯復序晉成初立自將有志于諸侯也左氏言春秋諱黒壤之盟啖叔佐曰經但言㑹傳作盟不與經合又説公見止近誣也而胡子不省仍左氏之舊趙企明曰陽榖之㑹齊不肯盟季孫則以齊侯不及盟書之以爲不與盟者春秋未嘗諱也夫趙氏豈不辨哉然猶曰臣不諱也昭十三年平丘之㑹書曰公不與盟則春秋于公之㑹盟初未嘗諱今不信經而信傳乃以一言蔽之曰止公不盟以例言之何以通于沙隨平丘乎且晉成初求諸侯春方因衛而來請也乃復止之于冬宣子爲國乃謂筭不遺䇿擯魯以失諸侯之心人情事理而有是乎胡氏雖巧爲之辭而不逹棄傳以就經此之類也八年公至自㑹夏六月公子遂如齊至黄乃復趙子常曰人臣不以死心貳君命無以疾還之地也禮賓入境有疾而死遂也若賓死未得將命則既殮于棺造于朝介將命朝聘而終以尸將命禮也黄齊境也以疾還非禮也辛巳有事于太廟仲遂卒于垂有事禘也昭十五年禘于武宫經曰有事是也趙子常曰太廟曰大事群公曰有事雖太廟也爲君事言曰大事爲臣事言曰有事譏不在用禘故不言禘也遂不稱公子還間無事從省文稱字録異恩生而賜氏也有事太廟重䘮可以不訃而仲遂之訃不敢後期必宣公有命如衛太史栁莊耶垂齊地壬午猶繹萬入去籥猶者可已之辭天子諸侯曰繹祭之明日煖其祭食以燕尸于夏謂之復胙不灌地降神也繹祭于祊在廟門之西則先求神而告以將享之意萬者舞之搃名籥吹以節舞者萬入去籥其始未去内樂也古者謂終事而聞則不繹以全始終之恩况于爲之徒去籥也何居戊子夫人嬴氏薨以夫人之禮䘮妾母也晉師白狄伐秦楚人滅舒蓼釋例土地名有舒群舒舒蓼舒庸舒鳩爲五舒盖舒即群舒群舒即舒蓼舒庸舒鳩誤三爲五也唐孔氏曰舒蓼二國名者傳冩誤當云一國名是也今按武徳四年爲蓼州領霍丘七年廢入壽州盟㑹圖云在光州則俱中國南門趙子常以爲東夷國則誤矣夷狄相滅不書此書見楚莊之熾而中國失南藩病日􅁄矣秋七月甲子日有食之既姜岌云十月甲子􅃋食大衍同授時推十月甲子􅃋加時在晝食九分八十一杪杜預言甲子晦食課之不得葢十誤爲七文在秋下正與冬十月己丑連行今先天厯新法推得十月甲子􅃋二十六日七千九百空六五强然則經文豈真誤耶冬十月己丑𦵏我小君敬嬴雨不克𦵏庚寅日中而克𦵏左氏傳曰雨不克𦵏禮也禮卜𦵏先逺日辟不懐也周禮遂人天子用六紼䘮大記君𦵏用四紼葢執紼凡五百人遣車七乗其物備其事嚴不可冒雨而𦵏也非謂不能如士䘮禮潦車載簑笠也庶人縣窆不封不樹不爲雨止則大夫以上𦵏爲雨止矣然則禮𦵏不爲雨止送𦵏不避塗潦固爲庶人言耳孫明復謂譏無備誠有備矣而雨甚渴𦵏將母有慊於信信夫城平陽杜云泰山有平陽縣在魯北鄙或曰備晉或曰偹根牟書不時也而左氏曰書時趙企明曰水昏正而栽夏之十月也今見書十月遂謂之時是不識夏周正􅃋之異也疑左氏不學而踈非丘明矣楚師伐陳楚猶未得志于中國也晉莫能救故即楚耳九年春王正月公如齊公至自齊夏仲孫蔑如京師蔑敖子慶父孫獻子也庶長不先嫡曰仲其後因氏焉屬辭比事于如齊之後胡子所謂不待貶絶者也齊侯伐萊秋取根牟根牟屬魯小國故昭八年紅之蒐得言自根牟至於商衛葢泰山郡有故牟國也曹姓子杜預謂瑯琊陽都之牟鄉城樂史云根牟國即宻之安丘隨之牟山縣漢志東萊縣有牟平東牟是齊地也根牟趙企明約千里而逺以齊侯伐萊而取根牟即東牟非也八月滕子卒諡昭子夀嗣是爲文公史佚其名卒不書𦵏不訃䘮也其書卒滕昭以文十二年朝魯魯人因其䘮而弔恤之也自是而宋師圍伐繼書矣九月晉侯宋公衛侯鄭伯曹伯㑹于扈晉荀林父帥師伐陳扈在滎陽卷縣西北則鄭地也晉成黒壤服鄭扈以謀陳庶幾乎有志矣陳鄭連壤鄭居檜地在豫州外方之北陳在孟諸之西轅濤塗曰師出于陳鄭之間必甚病是也今合五國之君于陳之近境不能親行而屬師于大夫以爲不競矣胡子顧曰衆輯可矣乎李琪謂晉成無主諸侯之權意謂是矣胡邦成曰成公再合諸侯而以林父帥師大夫其專也然哉然哉辛酉晉侯黒臋卒于扈九月無辛酉日杜云誤矣不𦵏魯不㑹也黒臋卒諡成子儒嗣是爲景公不言㑹諸侯於是已散矣冬十月癸酉衛侯鄭卒謚成子速嗣是爲穆公不㑹不書𦵏宋人圍滕楚子伐鄭晉郤缺帥師救鄭晉楚自是交伐鄭鄭于晉楚玉帛以待于境惟其强者從之子良曰與其來者可也楚以君將而晉次卿行晉伯之不競有由然矣趙企明曰左氏謂鄭伯敗楚師若然則鄭安得從楚鄭不從楚則明年晉宋衛曹安得有伐鄭之師也吾意敗楚之事當在三年侵鄭或四年五年伐鄭之役左氏誤附于此耳初敗楚師故其後楚莊怨而屢疾于鄭也若鄭于此既敗楚師尚何以從楚哉左氏之説皆出于附㑹亦時有合者若以爲國史則誤矣陳殺其大夫洩冶稱國者君與用事大臣殺之洩氏也大夫而稱氏葢爲卿矣冶以諌而殺陳必爲之名焉而不去其大夫誅其寔也以爲寔無罪也云爾十年春公如齊公至自齊齊人歸我濟西田歸不言來濟西稱我趙伯循曰但言歸我則足知其來省文爾哀八年歸讙及闡豈是公親受乎濟長不必皆是魯田言我以别他田爾公羊言未絶于我非也趙企明曰濟出齊魯之西臨濟之田皆曰濟西有齊濟焉有魯濟焉故曰我濟西田非如公羊兄弟辭也夏四月丙辰日有食之不書􅃋杜云官失之也授時推是月丙辰􅃋加時在晝交分十四日九百六十八分入食限先天推得二十六日三十三分四刻三三强入食限己已齊侯元卒子無野嗣是爲頃公齊崔氏出奔衛崔氏奔榖梁子曰舉族而出之辭也胡子曰書崔氏以族奔也欒盈亦舉族出奔何以不曰欒氏出奔耶劉原父曰春秋所記大事而已故使舉上介戰舉元帥雖有衆大夫不與焉者略所微也今何爲區區崔氏之族夫劉氏可謂辨矣而猶未也故聖人區區崔氏之族曰崔氏奔者盡崔氏之族也則尹氏召伯毛伯以王子朝奔楚者盡尹氏之一族乎即盡其族如先氏滅春秋亦止以先縠書之崔氏之奔安得舉其族乎斯于辭不逹矣公羊子謂譏世卿或曰世卿古制也文王治岐仕者世禄詩曰凡周之士不顯亦世葢譏不在世卿在專也是時權雖在髙國杼雖弱年未遽得政然崔出丁公至杼九世之逺宗立君之際或有異同足揺人心而用事者懼其見逼故舉族逐之乎凡諸侯之大夫違告于諸侯曰某氏之守臣某失守宗廟敢告然則崔氏者杼乎曰左氏以爲杼趙企明曰自是至于杼之逆凡五十有一年五十而爵葢至杼之逆則且百嵗矣是不然春秋所謂世卿者未必五十乃爵也以仍叔之子而相例彼亦豈五十乃爵乎公如齊五月公至自齊癸巳陳夏徵舒弑其君平國稱氏稱名國卿也謂罪不及民故稱大夫以弑者誤而胡子以爲特書徵舒名氏以爲洩冶正言之騐趙氏以書名爲懲子道外傳前年單子如楚過陳時洩冶未死也單子歸而告王以陳侯率其卿佐南冠以淫于夏氏陳侯不有大咎國必亡㨿詩株林乗馬朝食則非微行夜聚其適株林未必盡由夏姬徵舒爲卿用事夏南之從則以國政委焉亂賊之動于惡未有無權者徵舒弑平國成公嗣立而莫能討則自少西氏以來用物既𢎞濟之才智矣君臣淫虐之詞安知非舒所藉口乎六月宋師伐滕左氏傳謂滕恃晉不事宋滕在徐州界于魯宋本叔繡之後與魯俱爲文王之昭宗盟之好䘮紀相恤宋以是圍且伐之與魯爭也去年晉侯黒臋卒宋間晉之不競而爲是役則有謂滕恃晉者非也考之職方滕安能越齊衛以事晉而近舎宇下之􅁄哉晉魯字近而誤讀者不察耳趙子常曰宋襄執滕子而身亦見執于楚宋文圍滕而國亦見圍于楚諸夏之無道夷狄之資也公孫歸父如齊𦵏齊惠公晉人宋人衛人曹人伐鄭稱人者將卑師少也左氏言諸侯之師胡子去之師字直曰諸侯伐鄭取成而還以稱人爲貶誤矣趙子常曰晉人專伯討罪不能信義以屬諸侯又不能威楚徒紛耳秋天王使王季子來聘季子公羊以爲天王母弟也天子大夫稱字季子字也季上繫於王以明母弟也爵之字之則無以别于卿大夫也陳君舉曰自頃王下王室無聘魯者于是再聘而王季子寔來則已尊也公孫歸父帥師伐邾取繹間齊也杜註魯國鄒縣北有繹山鄭夾漈曰邾魯之間繹山多矣邾文公遷繹是邾都非此繹也大水季孫行父如齊冬公孫歸父如齊齊侯使國佐來聘趙子常曰未踰年稱君以嘉好之事來録其從吉也饑楚子伐鄭自四年以後鄭遂南北兩屬子良曰與其來者可也十有一年春王夏楚子陳侯鄭伯盟于辰陵辰陵陳地今陳州西華縣古長平縣界也楚葢得中國二諸侯矣陳從齊以㑹北杏接王國風絶丘中有麻作王室衰齊伯興也辰陵接列國風絶澤陂詩作中國弱夷强也於後吳楚争陳春秋終矣是辰陵者既不得如北杏二幽且將為虢中黄池此南北强弱之界公孫歸父㑹齊人伐莒四年齊魯平莒郯之怨莒人不肯魯伐莒取向而齊未獲歸父以取繹有慊故助齊爲役秋晉侯㑹狄于櫕函櫕函狄地從郤缺之謀也陳君舉曰楚方倡義于天下而晉汲汲于群狄至徃㑹焉晉卑甚矣冬十月楚人殺陳夏徵舒丁亥楚子入陳遂入陳殺夏徵舒轘諸栗門左氏傳異經經先書殺後書入胡子傳曰與楚子之能討賊故先之也謂春秋而果有是乎趙匡曰經文皆依先後次第而書凡稱日以隔文者皆以明先後趙氏説是矣當楚殺徵舒時寔未嘗入陳如蔡人殺陳佗蔡非入陳而後得佗也謂聖人許楚而先書殺乎夫春秋㨿寔而書善惡自見也苟紊其先後之序則何以傳信哉且加入陳於殺徵舒之上何害乎討賊之義而必遷就以㒺後世是胡子亦曲生異議且楚孔寧行父之誘縣陳者其始謀姑假徵舒以爲之辭也聖人何爲遽以討賊與之又何爲特從末减乎稱人者衆辭殺不歸其君以正典刑也胡子又曰不稱取而書入雖與之可矣夫入者未取也桓二年僖二十七年皆入杞不聞其能取也隠十一年魯及齊侯鄭伯入許鄭既有許地矣徒以許叔居許東偏則不言取哀七年魯伐邾以邾子益來矣徒以八年歸邾子益則不言取此寔入耳方入縣陳而申叔時之諌入寔未成乎取何爲不稱取而與之乎圍鄭之師意若此而已納公孫寕儀行父于陳寕行父從君于淫而出不書奔微二子則楚師不出徵舒不討靈公不𦵏二子足以免于奔而已不係陳宜絶于陳者也靈公殺二子爲之也極陳之惡説者以爲併誅二子是也而納之者楚子之過也不但專制其位而已十有二年春𦵏陳靈公楚子圍鄭左氏傳入自皇門至逵道葢即其國都矣而經止書圍胡子許以討賊從末減而不知左氏之誣也楚之殺徵舒就令出于討賊之公亦不應縁此併減入鄭之罪若謂退三十里而許之平遂恕而書圍則失實録之義矣夏六月乙夘晉荀林父帥師及楚子戰于邲晉師敗績邲鄭河南地大夫敵君于是始晉侯無志於中國矣林父徇先縠濟師既㨿敖鄗亦得地利而􅇶韓厥分惡之言先偹歸舟失兵家死地之義是林父主爲此戰也及者内晉之詞趙子常曰此救鄭而敗于楚則曷爲從其恒稱不絶晉之禦楚也晉率諸侯以攘夷狄者也當晉大夫自將以禦楚子雖無功猶不奪其恒稱楚終不可以無討也或曰得臣未命故姓名不登林父卿也鄭葢自是决于從楚矣秋七月冬十有二月戊寅楚子滅蕭蕭者宋以封蕭叔大心之邑宋附庸也楚既得陳鄭而遂滅蕭以偪宋胡子曰蕭既滅亡必無赴者楚莊以滅蕭告赴諸侯矜其威力以恐中國耳晉人宋人衛人曹人同盟于清丘晉景無制中夏之略也于是楚莊方張晉懼諸侯之從楚而爲清丘之㑹也乃循趙盾新城之轍而又微者寔行于以求諸侯不亦難乎人微者姓名不登也左氏言卿不寔其言不書劉原父曰春秋之世不寔其言者衆矣奚獨此耶然則左氏誣矣清丘衛地在濮陽縣東南宋師伐陳衛人救陳宋不自省徳而徒責陳之從楚至興大衆以伐之宋則非已亂之道矣宋以師伐而衛以人救是將有分災之義非求敵宋也凡救未有不善也自左氏以爲衛不討貳而儒者説經從之儒者之過也陳鄭宋皆河南地楚既得鄭則西諸侯服而又得陳陳介于鄭宋得陳則東諸侯服葢三國者中國之樞也晉景欲嗣文襄之業而不知救則謂其無制中夏之略者信矣十有三年春齊師伐莒夏楚子伐宋秋螽冬晉殺其大夫先縠稱國以殺不去其官罪累上也邲之敗林父主之主帥得全而偏禆受治晉已失刑即縠有罪當其時不能治也遲之期年之後而戮之疑䜛間有行乎其間者矣赤狄伐晉及清經所不載而傳謂縠寔召之此所謂欲加之罪者也縠召狄欲何説哉説者謂六卿争强互相仇滅葢近之矣張氏曰越椒將攻王楚莊尚思子文治楚而復克黄之所先縠先軫之孫而滅其族葢晉之徳刑皆不足以敵楚矣十有四年春衛殺其大夫孔達爲救陳故以悦于晉稱國殺而不去其官罪累上也夏五月壬中曹伯夀卒子廬嗣是爲宣公凡諸侯卒日弔不以禮則不日曹文與桓皆朝魯故卒日何休說公羊縁公子喜時之讓曰飬孝子之志加錄之誤矣晉侯伐鄭自胡子之意則比事直言以見貶自趙企明之意則因爵以見褒夫楚莊鴞張于是中國亟思伯矣晉景不親盟清丘至是悔而改圖中行桓子謀邲故晉侯伐鄭告于諸侯蒐焉而還鄭人懼鄭伯如楚謀晉而不能逞鄭遂服矣楚申舟他日曰鄭昭宋聾意皆指是也今曰此報怨之兵然則任鄭叛而縱楚强耶此晉侯親行故㨿寔書之雖予以復伯亦因見其大合諸侯而獨以一師行也秋九月楚子圍宋十三年伐宋左氏曰以其救蕭也而胡子以爲伐陳十四年圍宋左氏以爲不假道胡子復舉伐陳罪之救蕭之役經不書而傳亦可馮其以爲伐陳胡氏棄傳以事情臆説云爾舉兵一報憤已可紓逾年又復圍之楚仇宋何至是耶胡子不取假道之文葢於楚莊多曲説以薄其責耳又曰宋於中國盖亦有意然其術足以致兵以其輕挑强敵也然曰楚人有詞於伐而得書爵不知中國無伯楚莊馮凌勢盛書楚子著其强也今謂楚人書爵爲有詞不知前年滅蕭亦謂其有詞于伐而書爵乎十四年之書楚子吾以十三年例之𦵏曹文公冬公孫歸父㑹齊侯于榖榖濟北齊地趙企明曰宋入楚則齊魯以楚爲鄙榖之㑹謀楚也故明年歸父㑹楚子于宋魯㑹之而齊不㑹非不畏楚也魯安則齊安此歸父㑹齊侯之故也然予以爲齊以霸國之餘不能纉其先緒魯人背齊負晉亦由是起也十有五年春公孫歸父㑹楚子于宋魯大夫始特㑹楚子楚兵加宋魯常迎而㑹之僖公之間二十一年盟薄二十七年盟宋徃徃而是宋絀則及魯也胡子曰魯以周公之裔千乗之國謀其不免至于薦賄此比事以觀則知中國夷狄盛强之由春秋經世之略也夏五月宋人及楚人平或問宋楚之平華元紓情子反不欺及平而盟胥戒虞詐揆之人理幾于自反經乃稱人將如胡子貶二卿否榖梁有言平成也善其量力而反義也人者衆辭上下欲之也及者兩相欲詞宋人爲主故以宋及楚耳其以貶盖自公羊𤼵之趙匡申之胡氏循環斯㫖以明經義而今之言者無能改也夫弭兵之議宋楚之人誰不樂者所患乃在其君臣耳君不平忿臣靡匡惡則日尋干戈佳兵不祥孰甚乎今華元子反倡予和女釋然取平楚莊之强忍而屈議宋國不亡楚迷遂復雖曰聖人明微不計功利而民之受賜嘗嘆微管之仁苟能紓難足稱仁術即兹而言可明宋楚之平春秋所予葢議于衰世以觧倒懸義固宜然也顧其君不能謀早所以息民及其既成則不得不聴失君道矣戴溪趙鵬飛李廉之倫並號推隠不以爲非公羊安見吾欲問之然天下將分南北之勢焉而伯宗晉國之人良且曰天方授楚宋折而入楚則東諸侯有剥膚之災矣故僖二十四年宋及楚平不書宣五年陳平楚不書宣七年鄭平楚不書必闗天下之故如宋楚之合曰南北將分焉者而書之以爲中國懼葢晉伯于是不競景公無制中夏之略矣六月癸夘晉師滅赤狄潞氏以潞子嬰兒歸晉不救宋而區區乎狄以自封殖固罪之在也然潞今潞城而東與黎界則唐虞商畿内之地以禹貢考之豈應赤狄實逼處此與我中國並有此土也入宣以來群狄衰而赤狄代興三年侵齊四年復侵齊又將爲中國憂矣晉景怵于伯宗授楚之言䘮師于楚而欲取償于狄葢曰狄窘我使不得爲治楚之䇿也故興師滅之中國之無狄患不可謂非晉賜矣然卒無益於伯業之衰也豈非一指肩背之喻哉師衆將卑曰師左氏曰林父誤也杜氏因謂從告誤也凡滅夷狄雖君將不日此以其君故日四夷雖大曰子爵也左氏載伯宗謀討於酆舒然經例與陳夏徵舒異若謂滅潞而後獲酆舒於衛故殺而不書則疑左氏或誣抑晉人所執之辭未必事寔也秦人伐晉秦人微者李氏欲于王札子後移秦人輔氏之簡于此而指爲秦桓不知杜氏已明言無傳不敢易置矣晉自八年以白狄伐後不復交兵至是脩怨過矣哉王札子殺毛伯召伯札子者杜元凱云子札文倒札字也葢先王之子左氏即以爲王子㨗倒文之義陸淳孫復並同杜氏然則本經誤耳公羊又謂長庶之號經師譏其妄穿鑿是也髙抑崇曰書札而不書王子與内臣柔溺無異書王子札則與王子虎無異故變文别之亦不然也王子札一朝殺二卿而不忌天王不能施之則譏之不但其人而已胡子謂無政刑是也榖梁云矯王命殺之啖叔佐曰焉知矯命殺之左氏云王孫蘇子使王子殺之然經不以蘓首惡故知皆不足憑也秋螽仲孫蔑㑹齊髙固于無婁杜元凱言無婁杞邑公羊作牟婁王葆以為即隠四年莒所取杞邑然齊魯方不咸于莒無縁更㑹其地是公羊誤也大夫非伯事而私㑹諸侯自十四年榖始非國事而私相㑹自無婁始胡子曰禮之始失也諸侯非王事而自相㑹也無以正之不自天子出矣然後諸侯與大夫㑹詳見文公元年㑹戚註又無以正之然後大夫與大夫㑹詳見文八年盟衡雍註禮亦不自諸侯出矣初税畆即徹法之田復貢法凶年取盈之政也貢法若計畝取租徹若就田分稻耳左氏傳本不言什取二杜元凱乃以爲繼取其公田又復税其私田什一其説本榖梁去公田履畝之説朱子亦主以觧二吾不足非也襄公始用田賦二吾不足之對當在其後宣但廢助爲税不復察其豐凶民將有被其害而先王之惠政亡矣書曰初謹之也季明徳疑周公官遂人匠人二職成于戰國其初廢井田之時猶復或兼行貢助之法世儒傳聞因而分列妄以爲周公之制今括其意孟子請野九一而助國中什一使自賦者助法久廢難以卒變而論其施爲緩急序當如此葢國中則兼併可稽豐凶易察野外貪汚積弊情僞難知故助法之行以野爲急而後徐議國中非謂國之中田終可不助况鄉遂本列二區所以别逺近均勞逸耳安得謂其地異而遂分二法滕地絶長補短可行井田故授田隨地不必皆方説者言助法必平地乃可畫野成井則田在山谷谿澗之間者夏既五十畝行貢法殷又改畫七十畝行助法周又改畫百畝行徹法一一更置于溝塗畛域之間雖聖人亦安能煩擾如此哉周之授畝毎夫必以百畝爲率苟有肥瘠則以不易一易再易法約歸于中而授之是以約寔之田定八家也説者乃以都鄙授田有不易一易有再易通率二而當一則一夫百畝之田内有肥􅇤相半者而通二井之率以當一井也然則一井安得八家之寔賦哉徹之爲通以一夫之田或有病疾死䘮不得盡力則同井侯彊之家通力以作而田之分獲則各歸其主未嘗混而爲一也周百畝當今田四十一畝强家一壯丁僅可任耕四分之二則百中之五十畝也又中分五十畝得二十五畝則二中丁之所任耕也一家而缺一中丁焉則餘田二十五畝力不能任而八口之家食八人之外復有中丁可任耕者雖上農所入亦不贍矣則以前所餘田授之所謂餘夫二十五畝也此皆同井相通亦徹之所以爲徹者殷之助以力亦未嘗不通但人不講此義終至各治其私故名助爲徹以示所重在通耳若其所得之田則公私固有定分曷嘗少異於助哉説者所謂周之徹法計畝通分殊不知孟子以通觧徹初未以均收言也何則公私無别勤惰一施非分殊之理就如其説則通力之時何必公事畢然後治私事而農夫之獲又何得有上下五等之差邪法之中以其什一也貢法什一固得其常惟助法則必有各家私田合所得公田一分内所入畧多一畝二十分五厘數屬畸零亦不害其爲什一矣説者乃謂周之制公田百畝二十畝爲廬舍一夫所耕公田寔計十畝通私田百畝是爲十一分而取其一視貢爲輕安得寔皆什一耶周人班祿之制皆由公田百畝而積所以爲定經界防兼併也故全計之則爲百畝祿田所由給也中分之則爲五十畝圭田所由給也田有成數而後奸無所容今既除廬舍二十畝則公田寔只八十畝耳又當割别井公田二十畝而益之裒多益寡展轉剖分其田制難以言不亂矣五畝之宅就田斯可以治農業故田野之間必有閒曠草萊之地而八家聚廬焉市宅之㕓但爲官府造作之處商賈懋遷之居而已曷嘗以處民哉説者乃謂二畝半在田二畝半在邑春則令民畢出在外冬則畢入于邑吾恐盡田野之民必非邑市之所能容而死徙出鄉亦非農民之所便聖人何爲而立此徒勞之法哉後儒習聞衰世變亂之事過信禮家迂腐之言牽于邇言靡有定論至謂孟子自稱一家而卒諉井田于難曉矣使先王之法果有難焉此豈易簡之善哉然宣公税畝之日即先王助法之田也有志于治何必舍税畝之田而别求先王之意乎冬蝝生蝝螽子也草螽負蠜蜇虫螆蝑亦曰蝮蜪皆異方分别蝗子之語不月者秋虫未息冬又生子左氏榖梁俱以不成災故書非也饑周人于嵗杪計國用啖叔佐曰凡嵗飢年終之事故不繋于日月而以冬後書之十有六年春王正月晉人滅赤狄甲氏及留吁士㑹書人時未爲卿獻俘乃請命將中軍春秋㨿實而書非没其名以貶也甲氏留吁皆赤狄别種邑不言滅留吁非殘邑也傳言及鐸辰註家以爲留吁之屬留吁有屬益知非甲氏殘邑矣驅而分别斯亦可矣盡殄滅而無遺育則信非仁人之心王者之事矣夏成周宣榭火成周天子之東都也宣謂宣王榭者屋有東西廂無室謂之歇前也歇前者前無壁也胡氏謂廟則其制有室不得稱榭楚語曰先王之爲臺榭也不過講軍寔然則榭是講武屋有明徵矣宣王内修外攘復㑹諸侯于東都車攻所謂駕言徂東者其事也其詩曰射夫既同當是于此榭行之藏樂器趙企明以爲周宣講武之事不可見其跡今之罹災聖人有傷今思古之意是誠然也秋郯伯姬來歸齊人歸子叔姬罪齊也伯姬以自歸爲文見出而歸罪伯姬也伯姬文女胡子曰春秋内女出夫人歸凡男女之際詳書于策所以正人倫之本也冬大有年榖梁子曰五榖大熟爲大有年上瑞也自程叔子曰記異而胡氏從之以爲聖人言外微㫖謂記異則有之然寔幸之爾岷隠戴溪氏曰宣六年螽七年旱十二年水十三年螽比嵗凶荒民不堪命矣而忽有年非幸耶十有七年春王正月庚子許男錫我卒子寗嗣是為靈公丁未蔡侯申卒子固立是爲景公胡氏曰日卒書名赴而得禮夏𦵏許昭公𦵏蔡文公𦵏而不月胡氏以爲宣公不知禮義邦交之寔哀死送終獨厚於齊而利害不切其身者皆闕大則薄其君親次則忽于盟主又其次若秦衛滕雖來告訃怠于禮而不㑹也六月癸夘日有食之不書􅃋杜氏以爲官失之按姜岌云六月甲辰􅃋不應食大衍云是年五月在交限六月甲辰朔交分已過食限葢誤授時厯推之是嵗五月乙亥􅃋入食限六月甲辰􅃋泛交二日已過食限大衍爲是今先天厯新法六月甲辰􅃋泛交二日過食限與授時同己未公㑹晉侯衛侯曹伯邾子同盟于斷道斷道杜云晉地魯復事晉志同欲也榖梁謂之外楚葢前年楚已得宋南方勢盛爲中國者憂之曹衛故背華即戎者翻然有中國之思晉爲是紏率而盟也邾本附庸今急于得衆故遂列㑹其同欲可見胡子因傳言郤克憤齊執其大夫遂謂同謀伐齊釋其憤怒夫徵㑹之始豈擬其見笑以啟釁哉况郤子之至傳固云請伐齊弗許今庸得謂之伐齊至謂私屬之請則反殆同兒戲諸郤安能當千里之齊哉且髙固晏弱蔡朝南郭偃方自齊至以爲伐齊齊人奚爲來哉是則晉之徵㑹亦必以斷道先期而諸國如期來集也㑹而求逞執齊大夫經無明文且卿行旅從固上卿既還晏蔡南郭豈應同執反覆數端事在必無即有之豈可遂疑其徵㑹之始謀哉乃若晉衛之師則或因其不㑹致然於斯㑹無與也秋公至自㑹冬十有一月壬午公弟叔肸卒不稱公子未爲卿也稱公弟兼稱字録異恩也非大夫不卒䘮以其禮則卒宣公以庶簒適肸不義其禄于是喪以母弟恩視季友仲遂嬰齊繼成世卿比於桓莊之族矣若稱公子則嫌于見大夫且無以見宣公寵愛之私史非不知異母弟之不當踈外也陸氏諸儒辨之過矣然則公弟叔肸貴之非賢之也彼公子而弟稱者信因事見義然必其爲卿大夫而後云公子也春秋賢者而不卒如展禽之流者有之矣苟非恩禮之異曷爲登名也哉十有八年春晉侯衛世子臧伐齊趙子常曰齊東方大國晉不得齊則諸侯不附景公爲斷道之㑹始徴齊而齊侯不至于是自將以伐齊庶乎知所伐矣書世子呉幼清曰㑹朝與伐國皆非世子之所宜也公伐杞陳君舉曰自是内不言君將征伐在大夫矣今按此後有公將者矣陳氏豈以㑹伐不悉數耶夏四月秋七月邾人戕鄫子于鄫刺鄫無守備其臣子不能距難也甲戌楚子旅卒楚始告䘮而徃弔也不書𦵏辟其號也𦵏者以號配諡恐民聴之惑也楚僭王雖我有往不可書也公孫歸父如晉按左氏歸父欲去三桓以張公室與公謀而聘于晉欲以晉人去之其濟則仲氏一三桓也不濟則君受其名胡子曰輕于背與國易于謀大家而不知其本未有能成而無悔也然則公室不可張乎務引其君當道正心以正朝廷禮樂刑政自已出也其庶幾乎必欲倚外援以去之是去疥􅅑而得腹心之疾也庸愈哉冬十月壬戌公薨于路寢歸父還自晉至笙遂奔齊胡氏曰歸父以君命出使未反而君薨在聘禮有執圭復命于殯之文升自西階子臣皆哭情亦戚矣今宣公猶未殯而東門氏逐忍乎哉書曰歸父還自晉者已畢事之詞也至笙遂奔齊者罪成公君臣死君而忘父逐之亟也榖梁子曰捐殯而奔其父之使者是亦奔父也得經意矣君薨家遣方寸宜亦亂而造次顛沛不失禮焉非志于仁者弗能也詞繁而不殺歸父之善自著矣比事以觀則見當國者有無君之心此春秋所以作不可不察也春秋明志録卷七
