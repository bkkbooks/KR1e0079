body:
  text: 春秋明志録卷六明熊過撰文公名興僖公子母聲薑在位十八年諡法慈惠愛民曰文元年春王正月公即位踰年雖未葬稱公不可曠年無君也殷則於王崩之年嗣君改元太甲以二十五月而即吉仲壬之末年遂稱元年矣胡子言告廟臨羣臣之禮以為不可借吉故冡宰攝之按伊訓之言曰伊尹祠于先王奉嗣王祗見厥祖則太甲入祖廟其文甚明而説者乃曰告奉太甲之事而已侯甸羣后咸在百官總已以聽冡宰在者在廟是太甲於廟已臨羣臣有古者王朝覲諸侯于廟之禮聽者聽其政耳冡宰平時亦聽之但喪則聽之不以告君也又其柩前之位即始死之位喪大記記國君初死之禮云既正尸子坐於東方卿大夫父兄子姓立于東方有司庶士哭于堂下北靣初死之時即别嫡庶或疑古經十二卷公即位為公即立以諸侯受王命而立不得稱即位位訛為立亦誣矣葬蔡平公蔡太子宋失位魯人知其不終孟子曰即位而哭百官有司莫敢不哀然則攝告廟臨羣臣非也孔子言百官總己以聽冡宰而後賢并欲攝告廟臨羣臣其亦不察書義矣又何疑於康王哉吕伋之逆正柩前之位其出應門之外與諸侯出廟門俟文正相接烏有攝禮哉蘇氏疑其冕服為失禮而不知凶服之不可入廟且其借黼裳而不易冕麻則亦未純吉矣若晉侯既葬平公則釋冕已久故不可以吉服見成王方在殯而冕未釋宜無不可者二月癸亥日有食之授時厯推是嵗三月癸丑朔加時在晝去交分二十六日五千九百十七分入食限薑岌云二月甲午朔無癸亥三月癸亥朔入食限大衍同先天推得二十六日五千九百七十三四入食限蓋失閏三月為非禮而必欲歸餘非知厯理矣天王使叔服來會葬叔氏服字周內史中大夫天子使大夫葬諸侯禮也趙子常以為得禮則不月非實矣此書于二月癸亥日食之後曷謂不月凡諸侯五月而葬僖至是始薨三月而會葬之使實來可謂不度矣子常乃曰據四月乃葬中有閏月王臣不前兩月而至豈非臆説哉夏四月丁巳葬我君僖公天王使毛伯來錫公命毛文王子封畿外國疏云於時諸侯無復有毛或是世事王朝本是絶滅從此以後常稱毛伯國名尚存仍為伯爵必受得采邑為畿內諸侯也今按詩序季孫行父請命于周以時考之為文公請也諸侯喪畢以士服見天子天子於廟錫命之韍冕圭文公即位四月斬然衰絰而錫之韍冕拒韍冕則不忠釋衰絰則不孝是王處人以難矣晉侯伐衛叔孫得臣如京師得臣公孫茲子叔牙孫是為莊叔不稱使有司若以邦交之常禮行矣衛人伐晉晉文季年衛成侵鄭襄小祥告諸侯而伐衛及南陽先且居請朝王而已從師則圍戚者雖且居而伐衛者晉侯也趙子常謂纘文之業可耳而以書侯為貶則企明之過也衛稱人孔達將也大夫將猶稱人也其諸無辭於伐者歟秋而晉疆戚田豈詩所謂畏天之威者然直書而其事自見書人非貶也秋公孫敖會晉侯于戚敖慶父子於是禮樂自大夫出矣禮卿不得會公侯戚衛邑今開州古頓丘地左氏晉侯疆衛田季明德以文宣時晉界尚未交于衛是不知晉襄自以伯主正其所侵之地假義行之非必歸己也冬十月丁未楚世子商臣弒其君頵聖人書此者使天下後世察于人倫知所以為君臣父子之道而免於首惡之名誅死之罪也公孫敖如齊趙企明曰諸侯世相朝禮也繼世之朝必三年喪畢朝于天子而後及諸侯今未禫而公孫敖聘齊非禮也戚會西結晉今東結齊大夫之専甚矣三桓之張皆文之勢也二年春王二月甲子晉侯及秦師戰于彭衙秦師敗績彭衙今同州彭衙縣古馮翊郃陽秦地也然則晉侯深入矣胡曰及孟明非命卿稱師而已左氏秦孟明帥師伐晉報殽之役今知不然者經無其文且秦晉雖接壤土然兵在河外猶未渡河而晉兵已接戰其地非卒然應敵之兵疑左氏有誤耳事與襄十五年戰韓原同韓原亦同州地晉人之戰遂獲秦伯習聞其事而冀再得志耳丁丑作僖公主作新作非改作也主謂吉主左氏之傳經有一事而義自乖者作僖公主書不時者近之謂緩作主非禮則亦非考于屬辭矣始喪用重虞主用桑虞既葬之祭也間傳曰既虞卒哭蓋諸侯五月而葬七月而卒哭因將祔而告祭焉練主用栗期而小祥易服謂曰練埋虞主兩階之階間而奉練主祔于廟殷道也周則虞而祔僖既葬而虞其喪至十五月既練矣喪主埋于虞既練應以吉主祔廟吉主雖刻其工費家人可辦而况喪紀在國有常經何至緩乎此為僖未祔廟將欲躋之而謀其主也趙企明謂吉主已祔不可移又謂昭穆既殊則主必異故改作以俟古者及以為君則昭穆同而班近閔僖皆北面西上之主昭穆不殊諸侯之主禮皆一尺狀正方穿中央達四方何休徐邈與范注同云爾有何異耶三月乙巳及晉處父盟書及者魯侯乎君舉必書經無如晉之文蓋魯之微者也微者姓名不登書其所微而已傳言晉人以公不朝來討公如晉晉人使陽處父盟公以恥之此傳之誣也晉文之季年衛侯不朝于晉襄欲伐之先且居猶曰效尤辟也請朝王今魯侯猶未畢喪而元年魯晉亦有戚會何遽徴朝耶然則公實未行行者本微賤非諱公矣是時晉諸行皆有卿而先且居進將中行郤缺一命之卿未有行則處父不氏未命之卿也處父有寵于晉侯去年將兵侵蔡已得兵權將欲得政魯覘知之使微者私與盟也大夫會伯主微人盟其寵臣魯之為國如斯而已矣夏六月公孫敖會宋公陳侯鄭伯晉士縠盟于垂隴垂隴何為為伐秦也左氏誤以為伐衛伐衛則嗣是不書而冬伐秦者正垂隴之大夫也宋陳鄭知晉徴會不知以大夫往魯狎于戚之會故仍以敖行趙企明謂公還自晉知晉襄不親會非也三國既蒙辱故伐秦伐沈皆以微者行晉襄之不遂伯有由矣司空士縠士蒍子以官為氏晉卿也左疏因成二年司空亞旅受一命服證司空非卿矣夫縠以世官氏曰士以舊官舉曰司空安知其不由司空超為執政乎啖叔佐稱既命之卿例書名是已其後處父士縠卒以專權見殺其端微矣哉自十有二月不雨至于秋七月趙伯循曰夫子因舊史之書不雨告廟者則每時書之不告廟者則通言之志其不敬以示義公羊子曰大旱之日短而云災故以災書此不雨之日長而無災故以異書也八月丁卯大事于太廟躋僖公大事謂祫毁廟之主陳于太祖未毁廟之主皆升合食于太廟祫當在冬而八月舉急躋僖公逆祀也據魯頌詩序云將躋僖公季孫行父請命于周作頌則真異于常事矣胡子曰兄弟之不先君臣禮也三傳皆以臣子一例而别昭穆則過矣冬晉人宋人陳人鄭人伐秦此先且居公子成轅選公子歸生也陳君舉言春秋之始大夫將恆稱人由救鄭之後略之始稱人也自陽處父專將稱大夫是也而左氏以為尊秦非是也程正叔胡康侯趙企明皆以為結怨勤民是以貶焉此可謂知理而不知例者春秋書帥師者則有矣皆魯大夫也非魯大夫則列國諸侯自將也此內外之辨也隱五年邾鄭伐宋桓十四年宋以齊蔡衛陳伐鄭齊桓會兵伐郳伐鄭伐英氏晉襄伐許伐沈諸如此類皆無主名春秋無義戰者是也然彼善于此者則固有之矣不達于例而專以稱人為貶辭則士縠之專盟陽處父之専將春秋不沒其大夫名將二大夫得為賢乎公子遂如齊納幣譏喪娶也劉原父曰左傳云禮也是以喪娶為禮不亦悖乎杜預遷僖公薨月以就傳説然此年大事于太廟則已除喪矣三年春王正月叔孫得臣會晉人宋人陳人衛人鄭人伐沈沈潰沈姬姓子爵國今汝寧府東南古平輿于是得臣始從晉矣伐沈之師胡子曰辭無褒貶蓋知其非義舉矣猶曰比報復私怨之兵有間也夫報私怨者非義也然而猶有名焉是師也則謂之何名哉以沈南服于楚而曰吾能伐楚之與國是師之名不衷甚矣何得云辭無褒貶哉然則沈不可伐乎曰講春秋者在屬辭比事而不亂商臣之殺其君在元年冬矣巳閲嵗時伯主置而不問乃僴然聲鐘鼓于荆豫之間以伐其與國是師也失其輕重則無名甚矣而謂無貶何哉或曰何以見其貶曰屬辭比事焉見之矣吕仲木言諸卿稱人以示貶其義是也其事非也春秋外大夫將者自陽處父外恆稱人即非貶也據左氏將又非本命卿吕氏之言明于義而昧于類例也夏五月王子虎卒王子虎稱文公應有爵矣以其異于諸侯蓋王臣不可二君外交也左云弔如同盟禮也趙伯循曰天子大夫無與諸侯盟之禮是也而不察子虎實未與也季明德直以子虎上士若為翟泉王人者亦非也榖梁云叔服若是王子則會葬之時何不稱王子乎陳莊子死赴於魯魯人欲無哭繆公召縣子而問焉曰古者大夫束修之問不出竟焉得而哭今之大夫交政于中國雖欲勿哭焉得而勿哭是衰世之志比于同盟其可也聖人撥而反之不茍然矣秦人伐晉秦稱人杜元凱曰晉恥不出以微者告或曰將卑師少稱人左氏秦伯伐晉濟河焚舟取王官及郊考之經例秦伯不應稱人以沒實且傳稱秦伯舉人之周與人之一何為又親行乎取王官及郊敵已深入晉何為不應若晉畏秦不當復有明年之事矣夫晉之報秦逺興渡河之師不憚也而憚於深入豈情也哉將卑師少是也然而為憤則一而已秋楚人圍江薛季宣以為報沈之役髙抑崇曰貫澤之盟江從中國商臣以晉不能討意窺中國而圍江以試之也雨螽于宋孫明復曰雨而為螽也冬公如晉十有二月己巳公及晉侯盟左氏晉懼無禮請改盟非也懼無禮何不改盟地乎魯二年微者已盟處父喪畢則親受盟于晉君其自託于處父甚矣晉陽處父帥師伐楚以救江晉大夫書帥師之始大夫強而專兵征伐自大夫出矣胡子曰楚罪宜討秦甲出武關齊以東略陳蔡而南處父等軍方城之外江圍自解矣一軍逺攻強國豈能濟乎四年春公至自晉夏逆婦薑于齊不言逆逆之者微也傳云貴聘而賤逆是也稱婦貶乎婦有姑之辭而非貶也不稱夫人出薑孝公之女無寵于齊昭魯人賤逆不以夫人待之也啖叔佐曰凡夫人加氏字便于言爾今既曰婦薑故不要言氏季明德言其族黨若從衆媵然故不氏亦不字非也胡子曰方逆以成為婦蓋禫制未終而納幣故原意誅之夫穆薑齊薑不稱婦乎今謂誅意則宣元年穆薑是已齊薑歸成在十四年而稱婦是可謂娶喪乎出薑以祖姑成風姑聲薑穆薑以敬嬴齊薑以穆薑薨葬經皆有日月可考也謂譏婦可乎趙伯循云有姑義可施于至而不施于逆特以公自逆成禮于齊耳夫君舉必書此豈常事可略哉故婦者非有所貶亦非為公逆也狄侵齊秋楚人滅江晉伯之不競也秦伯曰同盟滅雖不能救敢不矜乎晉侯伐秦胡康侯曰聖人以常情待晉襄以王事待秦夫聖人而以常情待人也則春秋之貶絶者孰非人之常情也哉張主一曰晉侯不以江亡為恥而亟報秦怨其為盟主末矣衛侯使寧俞來聘聘者上交乎下周禮天子時聘以結諸侯之好是也而諸侯有殷聘十二年五服盡朝為殷見畢則諸侯更遣大夫以交聘今儀禮所存聘禮其事也季明德以為聘禮徇春秋之僭而立義非先王之正禮過矣春秋之初殷見亡而殷聘存其後文襄之霸也諸侯三載一聘五嵗一朝則是諸侯之聘伯主令之也寧母之會齊桓有招携懷逺之意修禮諸侯官受方物子常因謂其志始齊桓公則非矣成周之禮左氏莫能詳諸侯惡其害己也昭十三年晉叔向明王之制使諸侯嵗聘以致業間朝以講禮再朝而會以示威再會而盟以顯昭明朝聘之節病于煩數矣而稱明王之制亦非也衛成見執伯主魯僖之請王與晉侯雖釋之而兵禍未解於是衛始服晉而得紓難武子來拜僖公之賜豈敢僭天子之聘哉惟魯文之愚意其畏已故工歌湛露彤弓以嘗之而武子對以肄業則真愚不可及也謂衛僭者明德之過也冬十有一月壬寅夫人風氏薨妾不為夫人也防愛奪也妾母之為夫人也蓋推人子之情也周之禮元妃沒則以其媵為繼室繼室之禮攝女君繼室先右媵立其子也亦然其母故妾也魯嫡夫人薨乃推尊妾母惟定公夫人未薨故姒氏不得推尊也然其子立者則復不然晉杜班在第二以逼姞生襄公故讓而上之公羊子曰母以子貴此言未必非也而儒者不達從而非訕之不置胡子之説春秋曰欲崇貴其所生而不虞賤其父夫繼室以媵聖人之所許也繼室則共承宗祀非賤矣生以貴假之而沒以賤治之可乎王子有其母死者其傅為請數月之喪孟子曰雖加一日愈于己夫王子之不得喪其母聖人之制也而孟子許之故知上賢之識可謂原之人情達禮制之本也胡子又曰庶子為君為其母無服按儀禮喪服傳大夫以上為庶母無服此名服也施於庶母耳非謂其所生母也謂其所生無服不深於禮者也禮服問君之母非夫人則羣臣無服惟近臣及僕驂乘從服惟君所服服也惟君所服則其君非無服也謂其無服者不深于禮者也古者父在而服母則其情常詘以其有所厭也無所厭其情常伸矣厭父而已於嫡母無所厭也故曰君之所不服子亦有不敢服也儀禮庶子為父後者為母緦注曰君卒為母大功乃謂之無服乎又其祔也妾附于妾祖姑無則中一以上中一以上是祔髙妾祖姑矣夫妾至玄孫而猶有可祔之主謂聖人不緣人情乎榖梁子曰禮庶子為君為其母築宫其言是也於子祭於孫止非也苟於孫止後之妾母將何所祔哉故公羊子之意未必非也昔商人之頌祖德其長發禘祭之詩也其詩曰有娀方將帝立子生商有娀嚳之次妃也按祭法殷人禘矣今禘詩乃及于有娀而稱元妃明殷禘及于嚳與有娀耳聖人不以為非禮也次妃可以大禘則與元妃何異乎奈何其為妾母不可為夫人也周無嚳廟而有薑嫄之宫周禮大司樂舞大頀以享先妣非謂夫嚳既與禘嚳妃本多故别祀其親者如商之有娀不以元妃之故耶在禮喪服小記祖姑有三人則祔于親者蓋其遺意也商周之際其人多賢聖其人不茍矣而崇其所出如此聖人復起將何如定之哉故公羊之説未可為非以其去人情為近矣然則書小君夫人春秋無譏乎春秋治名實之書經世之大法也吳楚之王僭也經未嘗以王書懼名實之亂也今之書夫人小君而不懼名實之亂是仲尼緣人子之情以志禮之變而無譏也或曰並后匹嫡古何以禁之乎曰鄭之突忽衛之衎剽皆兩君也奚趐其恐名實之亂也若夫人繼室存殁自别其併得稱夫人者于文亦豈為並后哉出入之際春秋必異其辭以辨其嫌也亦豈若生存並后之意哉今之妾母書夫人小君不異辭故知春秋緣人子之情書禮之變而無所譏也哀公欲以公子荆之母為夫人宗人釁夏曰以妾為夫人無其禮則妾母為夫人無其禮則妾母為夫人之始其有司必損益舊文以行之苟無其禮其宗人豈無持釁夏之説者而傳不一言見之哉亂嫡庶大惡也春秋之法內大惡諱今而無諱明人子之尊其母以為至情非惡也然則聖人之制禮果未嘗拂于人之情也矣孟子曰諸侯之禮吾未之學嗚呼安得古諸侯之禮以證同然之情也哉五年春王正月王使榮叔歸含且賵榮氏見莊元年王不稱天異文乎仲子耳非貶也周官職喪掌諸侯之喪及卿大夫士凡有爵者之喪亦不及邦國夫人之喪也周之東斯禮猶未盡變也仲子之賵特惠公并及之意必不敢赴于王朝也夫攝女君與再娶夫人等耳今王有專使豈惟非職喪之舊哉公羊不知徒譏其兼賵雜記諸侯相弔之禮含賻禭臨同日而畢與介代有事焉而責天子於諸侯必異人乎其不言來者缺文榖梁以為不周事用夫喪三日而殮含禭有不及其尸者矣雜記含者執璧將命坐委于殯東南有葦席唐孔氏曰含禭者所以昭喪盡恩示其有禮而已既葬猶尚致之不必濟用天子與鄰國莫不道路長逺赴者猶尚不到責其未殯而來此是禮之不通也三月辛亥葬我小君成風王使召伯來會葬成者諡也蘇子由曰仲子非惠公之嫡故特為之立宫而不祔不書其葬蓋禮之正也自成風以來妾母皆葬蓋祔也魯禮之變自此始矣召以邑氏采地本在岐周奭封燕其後有留佐周室者至平王時别受采東都為天子大夫王不稱天異文乎僖公也職喪邦君無邦君夫人也王之懷諸侯如此而恩禮益不足貴矣鄭康成言天子於諸侯也含之賵之小君亦如之不應經義者夏公孫敖如晉秦人入鄀鄀秦楚界上小國今鄖陽上津內鄉間古商密地其後乃遷襄陽宜城界秦入滑窺東諸侯今入鄀又將有事南方矣秋楚人滅六地譜六在壽州安豐縣今廬州舒城縣郾姓皋陶後楚覘晉襄之治也冬十月甲申許男業卒子錫我嗣是為昭公六年春葬許僖公夏季孫行父如陳行父無佚子季友孫左氏臧文仲以陳衛之睦欲求好焉然三年寧俞之聘未報於事理不應倒置反聘于陳也謂過者近之汪近裕曰公孫茲娶牟嬰齊娶莒皆因聘以濟其私也自逆猶可敖如莒涖盟而代弟逆婼聘宋而為意如逆甚矣秋季孫行父如晉文襄之伯令諸侯三年一聘五年一朝王制諸侯于天子比年一小聘三年一大聘五年一朝其踈數有定矣而魯之貴卿比年如晉蓋仲氏季氏爭交晉以內固而三家始張故知伯主而不知王室若改物者矣八月乙亥晉侯歡卒子夷皋嗣是為靈公冬十月公子遂如晉葬晉襄公盟主薨卿共喪事非禮也鄭遊吉曰先王之制諸侯之喪士弔大夫葬惟嘉好聘享三軍之事於是乎使卿文襄之伯也君薨大夫弔卿共葬事夫人士弔大夫送葬此禮樂之自諸侯出也今按春秋之初禮猶近古故僖公以前葬諸侯未有使大夫出者然則子太叔所言諸侯之喪大夫送喪亦非先王之定制也及考晉文卒葬皆使微者往故姓名不登于經則大夫弔卿共葬事之令亦豈晉文之所昉為乎自是叔孫婼葬平公意如葬昭公馴至少薑以妾媵而諸國卿會葬矣三月速葬大不懷也趙盾欲禦秦之送雍者耳晉殺其大夫陽處父晉狐射姑出奔狄處父稱國殺據公羊則君漏言而射姑殺之也夫漏言小過坐以殺大夫則不惟失實而情輕罰重亦無以蔽罪矣且國未有主君而襄公又殁且葬乃以漏言罪之所謂誅於既死不亦太嚴乎據左氏則射姑怨陽子易其班使續鞠居殺之兩下相殺無與于君然宣十五年王子札殺召伯毛伯殺毛召者本王子捷與鞠居之殺處父實同而春秋誅意於子札不書天王也今書國以殺而鞠居射姑乃殁其主名可乎哉或曰射姑奔狄處父見殺之由也成十五年宋殺其大夫山宋魚石出奔楚殺山者豈魚石乎趙木訥知疑處父見殺之故而不知宋山魚石華元之例歸罪狐趙為可恨耳夫殺處父者非射姑而傳以為射姑非晉君而經以為晉君然則果誰殺之耶趙子常曰國無君大夫方專廢立則爭爭則相殺廢立之罪不見於春秋是故以國殺見君卒國亂澤不足善其身後不書殺者名氏不嫌君討譏不在相殺近之矣與莒殺其公子意恢同閏月不告月猶朝于廟不告月於朔也朔以見建辰言閏則斗指兩辰之間不得舉所建之辰也古者天子服玄冕以特牛聽朔于南門之外周禮太史以立冬頒告朔于邦國諸侯之太廟大夫南面奉天子之命君皮辨北面受之有餼羊告廟謂之告朔即以此日朝太廟遷正位會羣使而聽大政考其所行而決其煩疑顯衆以斷之先受朔政乃朝廟王教尊朝廟私也告朔朝廟朝正視朔皆同日事序所從言之異是聽朔朝廟之義耳其閏月則天子聽朔于明堂闔門左扉立于其中聽政於路寢門終月故于文王在門為閏而文公乃以為附月之餘而不告故左氏言閏以作時時以作事不告閏朔棄時政也髙抑崇曰知朝廟之不可以已則告月之禮曷為其可已哉七年春公伐邾三月甲戌取須句遂城郚間晉難也僖公取須句已而反之邾遂取僖之須句宣根牟襄邿不日此其日不正其再取而有之無興滅繼絶之心也郚今泗水古卞縣地城郚控須句以備邾難也夏四月宋公王臣卒史記弟禦殺世子而自立國人殺禦而立少子杵臼為昭公髙抑崇曰國亂故不日不葬凡治則禮詳亂則禮略宋人殺其大夫稱人殺衆辭也大夫二公孫不名死君難也春秋書人殺大夫而沒大夫之名者惟此一而已矣成公卒國亂襄夫人者昭公祖母也有淫行昭不禮焉公子鮑昭庶兄有侫才夫人私之於是夫人欲殺昭而立鮑穆昭之族攻公殺公孫固公孫鄭于公宫故不得書盜殺亦與王子札殺召伯毛伯之文異爾趙子常曰大夫者是昭公之所與存亡者也是故稱人以殺而不名名之則嫌於陳公子過昭八年戊子晉人及秦人戰于令狐晉先蔑奔秦據左氏晉襄卒靈公幼謀立長君趙盾使蔑迎公子雍于秦敬嬴抱太子日啼于朝盾乃拒秦書及晉志乎戰也而先蔑奔榖梁子曰不言出在外也趙企明據經文次第正之曰晉襄之卒于是期年葬之矣豈晉至是而始謀立君必不然也且左氏初言先蔑如秦則蔑在秦次言先蔑將下軍則蔑又在晉初既逆雍于秦則必不肯將兵拒秦苟背約拒秦豈容復奔秦耶理無可通皆為左氏之誣也豫反覆左氏則不特趙氏所疑也趙孟之逆雍固曰先君愛之矣其説敬嬴述先君之語乃曰此子也才吾受子賜不才吾惟子怨然則晉靈非先君所愛乎又曰秦舊好也結舊則安夫公子雍雖為亞卿于秦然杜祁所出也而靈實出于嬴按春秋秦徐梁黃葛五國皆嬴姓而徐梁黃葛皆小又不與晉通姻故敬嬴者秦娃之女也以其親則視公子雍有間矣以是結秦不猶愈乎且蔑之始使荀林父曰夫人太子猶在而外求君此必不行則公子雍者大臣有不與者矣而趙孟乃謂足以威民其謀國之不審如此何哉他日盾帥師納捷災于邾弗克納春秋善之况雍襄公之弟而靈公實襄公子豈有舍嫡嗣而迎亡公子之理哉然則左氏誠有誣者矣趙企明曰趙盾修先君之怨為是戰令狐秦地是晉伐秦也晉辭為曲蔑敗懼死而奔狄為是説者庶乎以經正傳矣然令狐者皆以為河東與刳首接今蒲州猗氏令狐城也若是則兵端乃又可疑矣狄侵我西鄙間晉秦之爭也狄逺於魯魯所患在戎耳今越齊衛深入矣許翰曰狄懲箕之敗四年間一侵齊至是復侵齊侵宋侵衛晉襄既沒莫之忘也秋八月公會諸侯晉大夫盟于扈不日略之也此公會宋公衛侯陳侯鄭伯許男曹伯而諸侯不序見晉伯之衰散辭也大夫者趙盾也不序諸侯故不出大夫主名或曰衆辭然溴梁諸國之大夫一國大夫不得以衆言也或曰無君蔇之盟齊襄死紏小白未入今晉靈已立矣於是晉以趙盾主諸侯晉不競于楚春秋辨名實故靈公盟會略諸侯不序而楚君將悉從其恆稱以罪晉之張楚也季明德謂晉事權未一先都士縠箕鄭父皆出故以衆辭舉臆説甚矣左氏曰公後至胡子説春秋因之責文公怠事焉夫盟會同也會所以為盟也及其盟不得云後會矣且經書公會諸侯盟而乃以不序諸侯為辟不敏何其信傳而不信經耶十五年十七年之盟以為不至可也而今者則實行而且盟矣謂後諸侯可乎趙鵬謂往會不及盟故不知盟者何人夫春秋之例固有公不在而書某侯某伯盟者豈不與盟則不知盟者乎陳氏所謂不係伯者之辭信然矣扈今滎澤縣西北黃河之南古卷縣冬徐伐莒公孫敖如莒涖盟徐以號舉兵無統紀如狄然也書曰徐戎並興蓋久為魯患矣今其伐莒以撼魯蓋亦弱晉而挾威于楚矣敖涖莒盟趙企明謂修僖公洮向之好同備徐或然也八年春王正月夏四月秋八月戊申天王崩子壬臣嗣是為頃王經不書頃王崩傳于十四年附見之邵氏經世年同冬十月壬午公子遂會晉趙盾盟于衡雍趙以邑氏盾趙衰子衡雍鄭地今滎澤西北故城在踐土東南晉文朝王處也髙抑崇曰諸侯不奔王喪而盾遂皆國正卿自相會盟于王畿之內惡莫大焉任氏曰晉魯之用事者會盟政在大夫矣乙酉公子遂會雒戎盟于暴壬午乙酉間二日耳衡雍鄭地暴王畿采邑詩稱暴公是已杜亦以為鄭豈其後屬鄭耶壤地去魯五百有餘里雒戎允姓居伊雒之間素不交魯而遂輒與之盟遂之專也而以遂事書胡子以為內外之别不可淆近之矣其盟之意不可知以為趙盾植黨盾何藉于戎哉公孫敖如京師不至而復丙戌奔莒于是王崩赴魯越三月矣而魯君不弔敖如京師經書于乙酉之下見魯人之輕王喪也國君為天子斬衰其道如是乎敖而以乙酉如京師而以丙戌奔魯無政刑君臣皆有罪矣奔者左氏曰從己氏胡子責敖志不帥氣既已備矣趙企明曰去經甚逺此敖自以國權在遂憤而出奔季明德以明年求經疑王室厚求弔使敖度禮不能供而復又懼魯君有討而已嘗涖莒盟故往之愈非其實矣文公之怠敖之奉使何所畏于不終事哉季孫如晉求遭喪之禮以行魯人不拒敖弔而非送葬何憂于王室之厚求哉敖之奔實以遂得政而不能復己氏故因出而往從之耳螽宋人殺其大夫司馬宋司城來奔稱人者衆辭戴氏之族將不利于君者也大夫孔叔公孫鍾離司馬公子邛不書其名宋有大司馬非一人并其屬之辭也司城蕩意諸而亦不名陳君舉曰凡奔非其罪不書苟接我也不可以不書則不以稱名之例書之胡子言宋昭不選國望寵其私昵故以官舉其論正矣然司馬之握節司城之效節蓋忠于宋昭而鮑黨忌之者也鮑徒實繁而二人者固亦不負昭公矣前書宋人殺其大夫則死者已衆此又殺其大夫司馬則兵權去司城來奔則國土非君之有官者殆盡而鮑之勢成矣以為責之斯已刻核劉原父又比之仇牧荀息以為春秋無庸珍之是得為察事情乎榖梁子曰以官稱者無君之辭是為昭公之殺無罪也夫晉尸三郤三郤皆不以官稱豈謂晉有君德哉趙企明以為書人以殺有罪也宋昭以為有罪故書人以如其志然二人者實無罪也不名以見其非罪辨則辨而失事實矣九年春毛伯來求金於是公孫敖不至京師毛伯遂徴職貢以供喪紀矣不稱王使有司以其常典行之非出于王如今時年例差必受璽書從事乃稱欽差也託于王命者政府自有成法周公王若曰此其式也若須王命者政府自有成法豈可無别冡宰直擅之哉伯相命士須材此初喪之事亦有司存之常故可不以詔王軍國之重而冡宰盡自聽斷可不可哉程子言家父致命以徴車故書使來求毛伯風魯以求金故不云王使于經義為近春秋書之見魯之不恭而王室不能修播告以討失職也而公羊乃云王者無求蓋得其辭而不得其義矣夫人薑氏如齊夫人如齊也徒如齊乎傳無其文謂歸寧者杜氏也歸寧常事而何以書習其讀者將問義焉趙企明曰文公並妃匹嫡齊女哀薑生惡及視又嬖共嬴生倭嬴寵而倭將貴故哀薑如齊將謀于父母也其歸寧蓋有其故存焉是以聖人書之著十八年歸齊之張本斯言近之矣然哀薑實孝公女不得稱謀于父母也二月叔孫得臣如京師辛丑葬襄王趙子常曰王喪卿共葬事於是始見也天王崩諸侯不奔喪而以微者行自東遷以來失之矣於是襄王使大夫來會僖公葬賵含成風且會之葬魯亦以公子遂如晉葬襄公而後使臣葬襄王一則以其來不可不往也一則以其如晉不可不如周也是故叔弓如晉葬平公季孫意如如晉葬昭公而後叔鞅葬景王舍是葬天子魯無使卿者矣靈王之喪簡公在楚上卿守國子展使印假往伯有曰弱不可子展曰與其莫往弱不猶愈乎此春秋之情實也晉人殺其大夫先都三月夫人薑氏至自齊晉人殺其大夫士縠及箕鄭父箕以邑氏左氏稱箕鄭父先都士縠作亂使賊殺先克初夷之搜將登箕鄭父都使士縠將中軍以先克言乃止于是清原十卿箕鄭先都在耳搜謀軍帥而趙盾超將中軍則先都箕鄭之死由士縠失職士縠失職由盾之代其位也然經不書克之盜殺則其事不足據矣人者衆辭大夫而衆得殺之國亂無政秉權之臣必與聞乎故矣不去大夫以其在位也及者纍辭楚人伐鄭公子遂會晉人宋人衛人許人救鄭於是晉靈以少主縱強卿上驕下肆楚始爭鄭矣范山之言曰晉君少不在諸侯北方可圖也爭鄭欲以圖北方其志豈小哉楚子師于狼淵狼淵今許州也蓋大師在許而使微者先嘗之書楚人非貶楚子實未出許臨鄭也趙盾初除列卿懼人之擬其後也意必常居君側會救鄭者必非執政故以微者書晉遂不競而楚莊伯矣夫君不出而卿行猶曰擅况以微者尸之乎夏狄侵齊秋八月曹伯襄卒子夀嗣是為文公九月癸酉地震此春秋書地震之始伯陽父曰此陽伏而不能出隂遁而不能蒸於是有地震孔墨曰陽伏于隂下見逼于隂故不能升以至于地震任輔以為諸侯變而不承天子大夫變而不承諸侯夷狄變而不承中國之象也冬楚子使椒來聘楚僭王而稱子趙企明謂自屈以與中國交信乎夫楚蠻荒之人其輕中國久矣彼其侵則侵滅則滅漠乎無所忌也今之聘魯欲圖北方耳而謂其願交中國可乎公侯之不足而自王其國乃肯貶而身居五等之末其亦必不然矣四夷雖大皆曰子亦接我之恆稱春秋之書楚子以中國之法治之非其自屈也椒楚大夫鬭氏宜申之族楚子始與中國交以號舉而無大夫莊王之篇所謂荆人來聘是也於是書楚子使椒來聘胡子以為進之夫書爵視書人者進矣然盂之會楚稱子將進之乎曰盂之會桓沒而中國無伯也椒不氏未為卿也于是乎楚張非幸其接我而復進之也秦人來歸僖公成風之襚夫於是秦將伐晉而歸襚于魯也人微者不稱使有司存之也僖公成風公羊子曰兼之也不言及為成風尊也劉原父曰諸侯無二嫡故妾母繫子為重程伊川曰雖子母先君後夫人體當然蓋亦按夫死從子之義也然而成風實非僖母也葬曹共公十年春王三月辛卯臧孫辰卒夏秦伐晉傳言秦伯伐晉取北徵則是秦伯而以狄例書之也秦自仲以字配國於詩駟鐡稱公終南稱君春秋從實書伯蓋韓原以來矣陸氏云狄秦傳無事迹胡子晉取少梁不經見謂秦報令狐故狄之耳夫春秋所書其罪在我奚必沒秦伯之名擅為進退哉蓋縱掠無什伍如狄然直書之矣陳君舉曰楚興秦之力也自滅庸以後秦為楚役自晉主諸夏之盟舍秦無加兵於晉者也會于夷儀之嵗秦成而不結又明年盟于宋而南北之勢成楚子曰釋齊秦他國請相見也是戰國之萌於詩次國風退秦于唐魏之後于序書系秦于周末於作春秋由韓原之後秦師無君大夫夫子所以致意于秦也楚殺其大夫宜申此鬭宜申也未為卿不氏宜申事商臣君臣之分已定而謀殺之則此討亂稱人可也而稱國以殺又書其官胡子以為微義趙企明曰宜申而捷則亦為楚人討逆故以無罪書也説者以吳楚之殺大夫嘗必關中國而後録則過矣自正月不雨至于秋七月及蘇子盟于女栗蘇司冦忿生後為王卿士食邑在溫子加爵也陸淳以殷制畿內諸侯稱子例如微箕是也及微者趙子常言中國無伯天子大夫自出以盟諸侯若諸侯特相盟之為者非也卑者之盟不日及者內為主已欲之也女栗畿內地近女水蘇子為王卿士執政魯密其迹而以微者往季明德以為密賂蘇子而貢獻之常數皆託庇焉不復遣他使需求而魯不至周者十八年或然也至成末年則尹單諸卿遂敢大會諸侯矣冬狄侵宋狄患不但齊魯矣楚子蔡侯次于厥貉楚圖伯而未集也遂書楚于蔡侯之上楚強而蔡附之矣傳稱陳侯鄭伯會楚子于息遂會蔡侯次于厥貉以伐宋陳氏見經但書蔡侯以楚未足得陳鄭也而曰三國被楚禍蔡先陳次之鄭又次之故息會非陳鄭意也斯不察于事理矣豫以為當從經陳鄭本不會故新城之盟有陳鄭而郤缺于是有戊申入蔡之師若陳鄭實會如宣十一年辰陵者春秋亦無庸沒而不書也此夷夏盛衰之幾故曰外次必有關于天下之故而後書是已謂關天下而書也寧有沒其實者哉十有一年春楚子伐麇是嵗正月甲子朔楚侵伐書爵始此厥貉地缺然其次為伐宋是也趙企明以為將圖再舉而以伐麇伐巢實之愚謂企明非也厥貉與孟諸近而麇則逺矣麇本屬均鄖鄉在漢南郡之東界有錫穴其君芊姓子也楚本意欲求東諸侯耳麇楚之服役而逃于厥貉故興師責之楚至是始書君時中國無伯而南服以強思代興此所謂情實也夏叔仲彭生會晉郤缺于承筐此大夫特相會之始謀諸侯之從楚者也彭生公孫茲子叔孫得臣弟則為叔仲氏所謂惠伯者也承筐今睢州古宋襄邑地夫討二大事楚方以君將而晉魯之君不出又皆以次卿行伯令亦偷矣哉秋曹伯來朝自是小畏大朝禮錯出矣公子遂如宋狄侵齊冬十月甲午叔孫得臣敗狄于鹹鄋瞞之狄漆姓防風後在巨鹿以北鹹今開州古東郡濮陽蓋衛地杜云魯地非也得臣乘狄侵齊設伏而邀諸塗將尊師少不書師自是狄不復窺齊魯無狄患終春秋矣十有二年春王正月郕伯來奔為齊逼爾左氏傳有近誣者謂郕太子朱儒自安于夫鍾國人不徇郕伯卒郕人立君太子以夫鍾與郕邽來奔然則太子耳夫鄭忽曹羈莒展皆擁虛名於位及其出奔猶但稱名况都未嗣位乎劉氏以太子當立郕人不得絶之春秋大居正書曰郕伯按諸侯嗣位未踰年猶稱子若君父病不視死不喪罪自應絶况身未即位以邑奔罪自應絶可稱郕伯乎謂魯以諸侯逆即書曰郕伯則春秋紊王綱甚矣陳君舉言辭從主人郕太子朱儒魯謂為郕伯晉太子州蒲魯謂為晉侯從而志之以見其悖禮然則吳楚之王何以不從其恆稱乎夫鍾魯邾常會之地又當齊衛之衝朱儒亦何為又安于此然則朱儒或常居于夫鍾其後必立乎位矣見逼而奔魯不能仗義納之魯之罪矣魯以寓公禮處之故不名左氏謂以諸侯逆得其實但謂以成君書太子則違經義矣杞伯來朝二月庚子子叔姬卒周人字稱叔故或加子以自異公榖以為母弟則僖女子叔姬者齊昭夫人也安得又一子叔姬耶趙伯循以為時君女古者女子十五許嫁笄而字文公四年始娶其女不應即及笄然則不知何君之女矣左傳杞桓公來朝且請絶叔姬而無絶昏公許之二月叔姬卒不言杞絶矣書叔姬言非女也釋例曰把桓公以二十三年即位襄六年卒凡在位七十一年文成之世經書叔姬二人一人出一人卒皆杞桓公夫人也唐孔氏曰其娣亦字叔者周之法稱叔也夏楚人圍巢秋滕子來朝秦伯使術來聘術者大夫故名而不字非貶而去族也左氏傳秦伯使西乞術來聘且言將伐晉是聘也志乎伐晉而已然河曲之戰經不以秦人主兵則左氏亦近誣矣讀者比屬觀之耳冬十有二月戊午晉人秦人戰于河曲杜元凱言河曲在蒲坂縣南按秦晉界黃河之曲晉在河東秦在河西今之蒲州同州是其處不言及疆埸之事守吏自相忿爭耳左氏大與經謬元凱因言秦晉無功以微者告故稱人非也季孫行父帥師城諸及鄆諸在莒東北二百里而近東鄆莒魯所爭者今莒州沂水縣古城陽姑幕地在莒西七十里城之備公孫敖也公孫敖奔莒魯人畏莒間已也季孫食邑在費自費以東從其經略于是城二邑以師焉書及者先後辭將因諸制魯也榖梁傳曰稱帥師言有難也不能伐莒問罪而徒費師徒財力焉魯人淺謀矣左氏云書時時矣又曷書哉十有三年春王正月夏五月壬午陳侯朔卒子平國嗣是為靈公邾子蘧蒢卒子貜且嗣是為定公自正月不雨至于秋七月世室屋壞周公曰太廟伯禽曰太室羣公曰宫伯禽封於魯以奉周公之祀則周公實魯之始而伯禽乃始封之君故魯人權宜變禮而不祧魯公之主以為世室髙抑崇曰世室者人君之所常有事者也公每月朝之有司以時黝堊之豈有將壞而不知者則其不知省也久矣冬公如晉衛侯會公于沓沓地缺自魯適晉必當其域中狄侵衛間衛侯之出也十有二月己丑公及晉侯盟杜長慶十二月無己丑十一月十一日公還自晉鄭伯會公于棐棐鄭地汪仲裕曰即棐林地棐林當新城東北宛陵東南李亷曰沓棐衛鄭不忘晉伯而介魯求通鴻雁載馳情可見矣十有四年春王正月公至自晉是年頃王崩子匡王立邾人伐我南鄙叔彭生帥師伐邾即叔仲彭生而脫仲字趙企明曰公如晉踰年而反邾伺魯隙伐其南鄙以修須句之怨不知公之及至也兵未反而伐邾其報怨速矣夏五月乙亥齊侯潘卒子舍嗣髙抑崇曰孝公名昭而諡潘曰昭非禮甚矣六月公會宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城鄭中國要衝新城鄭邑在鄭都之南僖六年伐鄭圍新城即其地宋新城在梁國穀熟縣西杜以為宋地非也至是諸侯之從楚者復附晉矣去年鄭衛介公通晉則諸侯同欲而為是盟晉靈不出而從趙盾主之書曰同盟自幽以來未有也鐡山陳氏曰二幽之同天子之政始自諸侯出也以諸侯而從諸侯其心未必有所疑新城之同諸侯之政始自大夫出也以諸侯而從大夫其心必有所不欲清丘之同宣十二年中國屈于夷狄也以後之盟屢書同者諸侯之異者可同也秋七月有星孛入于北斗榖梁傳曰孛之為言猶茀也其曰入于北斗斗有環域也斗為帝車運乎中央斟酌元氣所係甚大晉史臣占云孛入于北斗諸侯戮符周內史占云不出七年宋齊晉之君死亂為事應妄矣孫明復曰孛彗之屬偏指曰彗光芒四出曰孛公至自會晉人納捷災于邾弗克納人者將卑師少之稱捷災不以繫國與陳公孫寧儀行父正同不量而納而弗克言伯令不審而伯威褻非大其改過也先師傳經者多戾經義左氏曰趙盾將公榖曰郤缺將則既不卑矣左氏公羊曰諸侯之師八百乘榖梁曰長轂五百乘則既不少矣彼此更相異同不質諸情理貜且長自應立必無爭端捷災曷為出奔邾晉非匹晉女何得為邾妾耶又既卒十有四月國已有成君何為始謀納一亡公子至用諸侯之師用諸侯之師不合不書趙伯循謂左氏妄是已書法既與楚納公孫寧儀行父于陳同疑邾之叛臣而所傳聞異辭唐孔氏槩曰子糾不係齊皆不足據也九月甲申公孫敖卒于齊髙抑崇曰敖廢命奔莒此誅廢之罪也已而奔齊主齊而請公于是乎許之則其卒也是亦大夫而已特卒以典刑之壞且為齊人歸喪起也齊公子商人弒其君舍稱公子胡氏謂止其身是也未踰年稱子而弒則稱君孫莘老所謂辨君臣之分也舍母桓妾密姬非子叔姬吳幼清所辨者是宋子哀來奔公榖皆曰子失之失也者謂衍文是也左氏傳髙哀為蕭封人以為卿不義宋公而出遂來奔書曰宋子哀來奔貴之黎淳以為宋公之子若子同子紏則父危無去理孫明復以為子姓哀名諸侯之臣其時皆未有用國姓為氏若婦人者子帛誤文子宇則字也即子哀可褒褒者在事何用字以顯之哀仕危邦自無去理然辭尊富居貧賤守封人而去卿姑取節焉亦可矣必欲其為陳文子嬰齊樂豫豈所以責封人哉冬單伯如齊齊人執單伯齊人執子叔姬單伯自莊元年今再疑非一人汪仲裕曰晉欒書欒黶父子同稱欒伯士渥濁士彌牟祖孫同稱士伯家父仍叔詩序皆有之或世稱之也啖叔佐曰春秋體例他國自囚內國之人未有言執者舍母自是齊家人則所執子叔姬為舍母非也陸淳以為魯女嫁齊齊不受而執之吳幼清演之曰齊舍年幼新立急欲求配居喪而娶文公之女故其逆其歸皆不書姬歸當是九月之末至齊而舍已被弒姬無所從故十月之初魯遣單往請叔姬商人惡魯與舍為昏因誣單伯以曖昧之罪將以辱魯單伯乃叔姬歸齊之後如齊而非送叔姬也稱人罪齊人自當如胡氏傳以從程先生意十有五年春季孫行父如晉為單伯子叔姬也商人弒君行父不能沐浴請討而假伯主亦不聞請諸天王而問罪均罪之也三月宋司馬華孫來盟於是公子鮑之黨進而弒械成矣不稱使非君命也非其君命必有異志于其君者矣杜元凱謂奉使鄰國能臨事制宜至魯而後定盟故不稱使非也不書大夫而曰司馬見代公子邛也司馬主兵重官公子樂豫公子邛皆繼為之今以亂殺奪居之耳亂而得之必有主之者矣左氏以為得卿行旅從之禮而書官非也禮使介有常數而旅得盡從則一官皆鮑黨矣非以為得禮也華孫名也猶齊仲孫也或者字耦左氏誤置之也趙企明又謂宋疑子哀間宋魯之好華孫能掩宋昭之過亦於情實不近明年宋人弒昭晉衛陳鄭伐宋討之而魯不與君子是以知鮑之謀行矣來盟而特月異之也夏曹伯來朝左氏曰諸侯五年再相朝古之制也趙子曰按周禮諸侯猶各以服數朝天子若諸侯五年再相朝即四面而往無停時以禮推之諸侯除侯伯外無相朝之限有事乃行齊人歸公孫敖之喪吕居仁曰敖雖廢命奔莒而其子猶繼立於朝則大夫之汰甚矣以其子汰請其父之喪雖欲勿許得乎於是以見大夫之專也許翰謂文伯惠叔二子哀誠無已故魯人從其請國史書其事仲尼因而不削以敖著教非也六月辛丑朔日有食之鼓用牲于社授時厯加時在晝交分二十六日千四百七十三分入食限先天推得二十六日四十四刻七三二四入食限單伯至自齊單伯自齊榖梁子曰大夫執則致名單伯不名以為天子命大夫云説公羊者以昭十四年意如例而云不省去氏者淫當絶使若他單伯然者至也夫春秋賞罰之書也賞罰明而後人心正賞善罰惡其敢僭忒如二氏則單伯不稱使職淫乎叔姬惡孰大焉乃以天子命卿之故而諱不知天子之三公固有因而名者其惡孰與單伯得不名乎若曰淫當絶使若他單伯然者即聖人書法何以信後而示戒哉胡子以是為尊王是猶未免乎二氏之失也夫齊之執單伯執子叔姬兩書齊人而不書及者嫌于淫也則淫乎叔姬者公榖所傳殆齊人誣而執之云爾以定單伯之罪可乎公榖皆云單伯魯大夫黃東發以單伯自莊元見經逾七十年若魯大夫不應父子祖孫同名氏也然不知春秋之書尹氏亦前後百年而晉父子同稱欒伯祖孫同稱士伯不可以氏定伯為爵而云王臣也况于王姬稱逆自我之辭是不為內諸侯矣經止書至自齊而不書歸周是非內諸侯之驗也趙子常不得其故乃曰接我而書可乎趙企明劉原父從公榖以為大夫是也晉郤缺帥師伐蔡戊申入蔡討新城不與也是嵗蔡莊公甲午卒子申嗣是為文公然則乘喪伐之也其舉曰于伐入之間先伐不服而後入也夫蔡之不服豈無辭乎忿然而遂入之斯已暴矣何以服蔡陳君舉曰自伐書陽處父入書郤缺侵書趙穿由是凡役書大夫秋齊人侵我西鄙季孫行父如晉左氏齊人侵我西鄙季文子告于晉冬十有一月諸侯盟于扈諸侯不序散辭也程子言魯以備齊不在會蓋主左氏然以經考事則諸侯之會公不與而列會者非一斯會豈以魯遂不序哉左氏列晉侯蔡侯晉靈之伯皆未常出晉亦未遽得蔡偕行耳齊罪宜討又將間晉以絀魯而魯賣晉不行晉覘魯不得遂亦不討由是并失齊非齊賂晉也故終靈公之篇凡合諸侯皆不序而頃王崩葬復不書趙子常謂自幽以來中國之勢又一變者也十有二月齊人來歸子叔姬把叔姬來歸繫之國見絶于夫也此書齊人來歸子叔姬齊人絶之也黨惡之辭也齊侯侵我西鄙遂伐曹入其郛齊始敗夏盟晉遂不競而諸侯二陳君舉曰兵事言遂必天下之大故左氏曰謂諸侯不能是也伐曹討其朝魯也十有六年春季孫行父會齊侯于陽穀齊侯弗及盟及齊平公有疾使季文子會齊侯于陽榖請盟齊侯不肯曰請俟君間弗者遷辭齊非能責行父之抗也又非憾行父如晉圖已也直責賂耳於是乎襄仲納賂夏五月公四不視朔此不視朔正以實陽榖之言見魯絀於齊也六月戊辰公子遂及齊侯盟于郪丘趙子常曰特相盟雖大夫稱及內為志也吾大夫及諸侯盟稱君以見實而不日以示義非常也而日之者異之也不然則外之之辭也此齊侯也而曷為外之而書日惡其瀆貨以要盟也秋八月辛未夫人薑氏薨聲薑僖公夫人文公母也毁泉臺劉氏曰以為不祥而毁非明民之道也楚人秦人巴人滅庸巴子爵城在今巴縣北合州南庸今鄖陽府竹山縣古上庸也趙企明曰楚莊之圖霸其為謀深矣成王穆王將求諸侯則直與中國爭鋒伐鄭伐蔡伐陳以鬭于夷夏之境今莊王之興乃西連巴秦繞出周晉之後西南既合而北趨晉則中國諸侯在其掌握矣冬十有一月宋人弒其君杵臼庶弟鮑立是為文公人者衆亂失賊之辭獄無所歸矣抱遺經者從而正之曰宋人殺其大夫宋人殺其大夫司馬宋司城來奔宋子哀來奔宋司馬華孫來盟宋人弒其君杵臼而賊得矣臣弒君凡在官者殺無赦其不日所以别也十有七年春晉人衛人陳人鄭人伐宋衛序陳上主會者降之大夫帥師稱名氏賤者窮諸人然則荀林父孔逹公孫寧石楚非卿乎啖佐曰春秋不命之卿例書人非貶也傳見雜記言是晉荀林父之徒云云遂妄為卿不書之説若命卿失所即貶稱人不命者貶又何如書之耶啖子之言得經義矣夫卿則卿人則人其文則史而已若曰何故殺君猶立文公而還此則孔子所取之義也不得罪人而成其亂直書而義自見矣沒其迹而曰卿不書失其所也斯亦失所以為易簡乎夏四月癸亥葬我小君聲薑髙抑崇曰九月乃葬慢也不稱僖薑而别為諡非禮也齊侯伐我西鄙六月癸未公及齊侯盟于榖榖齊地楚所置公子雍者家鉉翁曰齊商傲而日益盈魯文卑而日益索皆將死之證也諸侯會于扈諸侯無辭背伯主也有伯主而莫之主也春晉衛陳鄭伐宋曰何故殺君猶立文公而還於是晉靈復合諸侯平宋而定其位何以為伯主以鄭伯二於楚不見鄭人辭曰命之罔極亦知亡矣將悉索敝賦以待于倏鄭人亦知晉靈之不足與矣晉鞏朔乃行成于鄭趙穿公壻池為質焉伯主於諸侯有質者乎明年鄭遂與楚伐宋中國不能于討賊而使蠻荆假途以信大義扈之會為之也秋公至自榖僖以前公會諸侯不至此何至喜于得齊而飲至也盟于榖而後魯遂背晉知有齊而已冬公子遂如齊十有八年春王二月丁丑公薨于臺下秦伯罃卒諡曰康子稻嗣是為共公夏五月戊戌齊人弒其君商人庶兄公子元立為惠公人衆辭歇職殺商人納諸竹中歸舍爵而行無有問之者則盡國皆其黨矣齊人貪私施本非助商人為逆者以其不能伸討賊之義故於其終反蒙弒君之罪胡子所謂亂賊之黨是也六月癸酉葬我君文公秋公子遂叔孫得臣如齊胡康侯曰使舉上客將稱元帥此春秋立文之常體也其有變文書介副欲以起問者見事情也子赤夫人之子今卒于弒不著其實是為國諱惡無以傳信於將來而春秋之大義隱矣故上書大夫並使下書夫人歸于齊中曰子卒則見禍亂邪謀發于奉使之日而公子遂弒立其君之罪著矣冬十月子卒既葬未踰年曰子弒而曰卒諱之也不地以見弒也孫明復曰未踰年故不日以别之夫人薑氏歸于齊子弒故母出左氏曰大歸也莊夫人諡曰哀薑魯人謂出薑曰哀一時之辭非諡也季孫行父如齊史墨當昭公時曰魯自東門遂弒嫡立庶魯君于是乎失國政在季氏四君矣孰謂行父賢乎許翰曰前乎子卒如齊後乎子卒如齊齊與聞乎故也莒弒其君庶其是為杞公子朱嗣是為渠丘公一名季他據左氏僕因國人以弒庶其僕之行弒懼季他立而已廢也則又何懷寶而奔棄國不顧國人既惡庶其何為反立其所愛行父時方適齊何為又與出僕之事若僕實弒春秋何為沒之而稱國乎啖叔佐曰豈有父為不道之可致逆聖人訓典固當不然劉原父遂曰子弒父不可匿其罪以其君無道書庶幾也吳幼清以僕因國人之弒君以作之其言曰僕因國人之弒君懼並及禍來奔止一字而經文了然矣春秋明志録卷六
