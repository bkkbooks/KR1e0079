body:
  text: 春秋明志録卷五明熊過撰僖公名申莊公子子般閔庶兄也在位三十三年諡法小心畏忌曰僖元年春王正月不書即位于先君之年也齊師桓宋師桓曹師昭次于聶北救邢先言次而後言救為次言故也將卑師衆曰師聶北邢地當狄人自衛入邢之衝時狄方入衛故齊桓大合三國之師次于邢境以防之唐孔氏曰按兵觀釁以待其事須可擊乃擊之張元德言屯兵便利以救邢懼敵桓公用兵主于持重是已胡氏以救而書次為貶齊桓棄衛則有之救邢豈徒具文哉夏六月邢遷于夷儀齊師宋師曹師城邢邢以自遷為文邢欲也傳謂齊桓遷邢于夷儀邢遷如歸邢遷如歸是也齊桓遷之非也夷儀今邢臺縣西有夷儀山邢將依山以為地險又去故都不滿一百五十里易以民遷傳謂諸侯救邢邢人潰出奔師亦非也狄實未嘗攻圍又有三國聲援曷為遂潰趙子常言潰者一國之事守不以纍桓公可乎又謂師逐狄人具邢器用而遷之若狄實攻圍則邢潰之始寧無所掠安得皆撰具遷之耶蓋三國之師為邢禦侮而待其遷故得遷而如歸蓋自是邢無狄患矣世或曰存邢亡國以屬諸侯非其薄德無稽而眩于名實也秋七月戊辰夫人薑氏薨于夷齊人以歸夷在今莒州界古城陽莊武地齊東鄙小國近莒者以慶父在莒也汪仲裕曰當薨之日齊人即以歸齊則因齊人至而薨也文定謂以喪歸魯曷為越百七十日始至乎經凡言以歸歸其國也歸者歸于魯也魯請乃歸于魯耳經曰夫人氏之喪至自齊不言至自夷而其事白矣楚人成伐鄭唐孔氏曰荆楚一木二名故以為國號亦得二名黃東發曰先儒謂楚至成王令尹子文得政國益強改稱楚以交于中國從其自稱非春秋改之也人者將卑師少或曰楚自是有事于諸侯皆稱人不與中國君將稱君者同文以辨內外非也八月公會齊侯宋公桓鄭伯文曹伯昭邾人文于柳柳今陳州有柳城宋地也于是楚兵已退齊桓即宋地謀合諸侯以攘之左氏謀救鄭非也趙子常曰凡盟主之會不月雖公若王卿士會之不月必有功而後月九月公敗邾師文于偃偃杜元凱曰邾地左氏謂邾授薑氏于齊故魯怨而敗之趙企明曰邾本附庸于魯不敢外交諸侯雖邾子瑣受王命其幽之再盟亦不敢與猶附于魯今柳之會邾人始與蓋將以五等諸侯自居不附于魯故八月同會而九月伐之愚謂趙氏失事勢矣齊桓之為盟主也魯乃敢訟言邾之附齊而討之哉或曰邾自北杏以來附宋冬十月壬子公子友帥師敗莒師于酈獲莒拿獲苡拿穀梁子曰惡公子之紿也劉原父曰非也古之人有知者不言其何知也啖子曰季友賢哲之士寧為匹夫之事乎傳謂搏莒拿近于誣矣劉氏之意得毋謂是耶然不足辨也今之説者抑鋒止鋭喻以詞命謂之曰善以季友之敗莒獲拿為責備之瑕也是則不無可辨者耳酈之戰兵端在莒慶父死于莒耳謂齊人不納使奚斯入請公羊之誣也夫以賊求賂莒之罪也魯之拒之亦必有辭于莒矣酈魯近邑而師至焉尚何辭命之能喻胡子之言君子以為迂矣故謂敗之正也吕仲木之言則然趙企明之言則然十有二月丁巳夫人氏之喪至自齊夫人氏則何以不稱薑劉氏敞曰杜氏曰闕文非也茍有所不通者則謂之闕文春秋何文不闕也夫人孫于齊不稱薑氏亦闕文耶榖梁子曰不言薑為桓公諱殺同姓也夫人挾小君之尊而殺二子魯人不敢討也桓公為伯主疾禍亂之所生豈得顧同姓耶此非春秋所恥也非春秋所恥則亦非春秋所諱矣古之人有為此言者可謂辨矣然文薑去姓氏而哀薑存氏終不能明也趙子常曰一事再見則蒙上文之例上書公與夫人薑氏遂如齊則下書夫人孫于齊者即如齊之薑氏也上書夫人薑氏薨于夷則下書夫人氏之喪至自齊者即薨夷之薑氏也此于古史簡奧之體可謂有見矣而哀薑氏存氏亦終不能明也春秋之法微而婉為魯人諱哀薑不可書殺為桓公存實則主人習其讀者思夫人之去姓而桓之大義滅親其功顯矣此又史外之法子常之所未及也二年春王正月城楚丘楚丘孰城之我城之也謂諸侯離至不可得而序非也楚丘魯地在今曹州東南界漢志注城武有楚丘亭杜亦以為楚丘在城武西南實當己氏戎界隱七年戎伐凡伯之地蓋魯備戎而城也左氏以齊既城邢意必及衛遂曰諸侯城楚丘封衛夫苟狄實滅衛衛即其分土而自建之止可曰復不可曰封况狄之入衛衛實未滅何以封為哉且城邢則曰邢苟城衛曷為有內辭榖梁子曰衛未遷故不言城衛趙子常又以伯令得內辭書之皆非也城緣陵乃以為衛耳季明德以衛伐齊喪滅邢并疑楚宫非衛詩則又過矣夏五月辛巳葬我小君哀薑以私禮葬足矣不可以小君禮祔也虞師晉師滅下陽虞列大國之上請先伐虢也左氏注其事詳矣又自立異曰賄故非也而胡子因之趙子常則曰三公封國先庶邦按左疏漢志武王封仲雍後周章弟虞仲為泰伯嗣國今解州平陵縣東北古河東太陽縣為虞公世族譜封虞仲庶孫于中國以為虞仲後為西吳吳者虞省文也亦謂小虢秦武公十二年滅之事當在魯莊時居中國者即今靈寶亦謂西虢羅氏路史俱指為陜之平陸誤矣晉侯爵成王封少弟叔虞于唐地在晉陽後十一世孫曲沃武公併晉都絳又徙新田命為絳今平陸絳縣也然太陽之虞雖為公爵而春秋所書先大國者皆主兵也故舍宋一再主兵無先齊者豈論爵哉虞國于太陽而下陽虢采邑正在河東太陽縣界故榖梁子以為虞塞邑蓋下陽雖虢采邑而虢都河南滎陽相去視虞反若稍逺季氏遂疑絳都西南相界不須假道不知晉人恐虞以疆埸相援耳今虞自撤其藩圉以近晉不亦愚哉邑而書滅何也馬融曰虢仲封下陽叔封上陽此言無出也西虢自忌父始為卿士寰內諸侯其采天子親制之其後王巡虢守與之酒泉然則皆周邑也少頴林氏言天子之地非諸侯所得取故書滅使若國然是也趙企明因謂下陽者虢之采取其采虢復何在故書滅然不知酒泉桑田桃林華山皆虢略虢尚在也其後火中成軍乃取之始可言虢滅耳季氏以下陽即國名别無滅虢之事故不再書不知孟子明言假道于虞以伐虢者止謂虢邑耳虢常銜王命命曲沃伯為晉侯又常同朝王所情好如此金氏謂曲沃賂周必虢公實為之請似矣今狡焉思啓封疆越國而取其采邑是一舉而有數失也秋九月齊侯桓宋公桓江人黃人盟于貫江嬴姓顓帝玄孫伯益後國今光州息縣界古汝南安陽有江亭黃嬴姓陸終之後今光州定城廢縣界汝南弋陽有黃亭楚旁小國於會盟諸侯近宋意自宋招徠之也張元德曰惟宋與不煩他國稍得其情實矣杜元凱曰江黃始來故為合諸侯胡氏遂謂諸國皆在非也江黃來于是伐楚之議成矣貫杜氏云梁國蒙縣蓋宋地冬十月不雨楚人侵鄭三年春王正月不雨夏四月不雨踰時不雨書首月徐人取舒舒郾姓臯陶之後徐在下邳舒在廬江相去甚遙孔疏云爾趙企明言相去二百七十里非也凡勝國而不用大師為取詩懲荆舒則舒乃荆之與國取舒蓋剪楚援也取不言滅孫莘老曰不絶其把是也莊二十六年齊伐徐遂服焉意者取舒出于伯令以嘗楚故許翰謂倚諸齊其後楚滅舒庸則此年取而未有矣然楚自是疾徐而加兵焉桓公合八國于匡使諸侯之大夫救徐亦必舒故之以輕師越境以襲強國之黨而師無他虞東諸侯之勢益張江黃逺來非震其威哉六月雨秋齊侯宋公江人黃人會于陽榖陽榖在東平須昌齊西鄙宋致江黃于此非便道矣左氏曰謀伐楚蓋受成命于齊桓也冬公子友如齊蒞盟往受盟于齊聽伐楚師期也不煩諸侯大夫離至受事為密也楚人伐鄭四年春王正月公會齊侯宋公桓陳侯宣衛侯文鄭伯文許男穆曹伯昭侵蔡蔡潰遂伐楚次于陘陳從可逋宛丘之道許從可集許昌之援鄭從可據虎牢之險邇荆蠻者獨蔡即夷蔡居汝水之南楚門户所必救也輕兵卒至不暇告楚而潰此師之竒蓋桓公管仲素定之䇿左氏蔡姬之嫁豈足知哉陘蚡昌建國之地卒而至陘以奪之氣楚難于守又恐江黃議其後復難于戰矣夏許男新臣卒此卒於陘也陘則胡為不地榖梁子以為內桓師也胡子引劉原父之言曰卒非正也其為人君不知命者夫原父之意將謂新臣不終斯役實以疾辭還而卒者乎於傳有之許穆卒于師葬之以侯苟左氏而不謬也則許男非為不知命者也陘今許州郾城東南四十五里召陵之南本蔡地也趙企明因杜氏遂定陘在蔡南為楚地其後為楚所併則不可知然謂非頴亭陘亭而以為非卒于師則誤矣師方次陘而許男卒卒在退盟召陵之先必以召陵許地遂謂非卒于師則不惟失考于地里而亦昧諸侯薨于路寢之説矣蓋不卒于師者屬辭當併下文觀之春秋無費辭詳於下則略于上也子業嗣是為僖公楚屈完來盟于師盟于召陵屈氏完名楚大夫也據袁婁書齊侯使國佐來盟此不稱使外之也楚雖帖春秋猶謹辨之不使同兵交之使來盟于師據袁婁日據僖之邢之鹿上之狄宣之辰陵則與凡與外且不月再言盟來盟于師師在陘也屈完之意召陵者實退盟之所也桓退師以禮于楚楚之求服召陵齊又要盟以堅其志是屢盟長亂桓公豈為之哉召陵攘夷繇漢以來説曰齊桓多會盟而春秋美召陵是金吉甫以召陵不責楚僭王管仲器小殆精于康侯矣哉或曰楚自王其國非敢有加于天下沿至楚靈之橫而申之會禮以為歸曰吾用齊桓耳李氏所謂文襄之盛未嘗得以爵通椒之聘始得稱子凡書子者趙氏謂皆其自稱卒而自赴諸侯亦惟曰子惟葬則以王配諡如諸侯葬皆以公配諡書之耳蓋臣子及會喪者尊之也或曰襄公在楚楚人使其親禭魯人以桃茢先祓殯是會葬諸侯不以王禮尊之乃獨其臣子耳中國不以王處之楚亦未嘗以王通齊固不得以治之也夫王豈可假者而聽其自王哉禮家言春秋不書楚越之王恐民之惑也自王其國民毋惑于改步與金氏之書義精矣齊人執陳轅濤塗秋及江人黃人伐陳轅袁同陳大夫氏也執不服國服即釋之不稱以歸也江黃國近陳及者齊及之間無事得蒙齊人之文也資糧屝屨之故執其人伐其國先人謂之斁信矣八月公至自伐楚前事侵蔡後事盟召陵伐陳而以伐楚至舉其重也葬許穆公冬十有二月公孫茲帥師會齊人宋人桓衛人文鄭人文許人僖曹人昭侵陳宣兹叔牙子魯卿也趙子常曰桓公帥諸侯以伐楚楚既成而陳人以辟軍見討既執其大夫以二國伐之又以七國之衆侵之桓為已甚矣胡氏月以異之以桓公失方伯之道也桓公召諸侯以侵蔡伐楚楚既伐事當在蔡桓公委蔡以餌楚而後責於陳其伯圖所及天下諸侯有以量之矣或曰桓公以陳人懷二異日必先向楚因乘楚服以魯主兵示陳與國近如魯逺如江黃皆能用之七大國又迭為侵擾以威陳此桓公管仲以力服人之謀非獨以辟軍見討也五年春晉侯殺其世子申生申生為驪姬所譖獻公苟無欲殺之心則申生不奔新城公必不殺其傅新城奔而其傅殺此申生所以不能自明也然則申生之自縊實晉侯拒不得通而逼令自殺其為賜死無疑禮公族之罪不以犯有司刑於隱者不與國人慮兄弟也世子非君誰得而殺之左氏記申生不辭不行以安驪姬若果初心則必不奔新城既奔則猶有望焉冀其見察未必有死之心奔而不赦則申生之無所逃不得不自縊矣經文書殺之意非虛加以立意義也先儒以為仁之賊豈不哀哉責獻公者胡義自備杞伯姬來朝其子於是伯姬歸杞十三年而杞伯疾伯姬因歸寧成風豫欲託其子於魯子不名未立為世子也蓋杞伯失夫道伯姬失妻道失母道其子失子道髙抑崇曰先王之制諸侯未冠而即位謂之童子侯童子侯不朝不可以成人之禮接也然則魯侯亦失邦交之道也未能行朝禮故繫于母而曰朝其子伯姬為志乎朝其子也夏公孫茲如牟左氏曰如牟娶焉然公子友葬原仲公子結媵陳人之婦無不書其故者趙子常謂私事不得書但言如以重國使非也杜元凱又謂因聘而娶蓋其言無所本者牟微國也而為魯附庸杜氏據漢志定為泰山牟縣鄭樵以為登之牟平者非也自桓十五年一來于魯魯未嘗有聘及之何言因聘而娶之乎趙企明曰此私交也兹公子牙之子前年伐陳專兵又無故如牟叔孫之僭基於此聖人詳之或曰魯齊征伐會盟之故使兹如牟取貢賦之助公及齊侯宋公桓陳侯宣衛侯文鄭伯文許男僖曹伯昭會王世子于首止及其會啖叔佐曰齊不敢為會主是也于是子𢃄有寵于惠后世子危不得立桓公率諸侯以會之隂以定焉禮之變也蘇子由言首止之會非王志也諸侯不以王命而會世子不以父命而會諸侯衰世之事也或者遂疑世子為植黨諸侯為脅君必齊桓會衆請朝願奉世子惠王感悟使世子就會焉而免其朝若然則又何為欲撫鄭以從楚哉疑世子避叔𢃄之逼出居首止首止衛地故諸侯會焉苐史傳無明文可據耳秋八月諸侯盟于首止世子不與盟故雖無中事亦舉諸侯以别之公羊謂前目後凡得其一耳諸侯之不盟王世子也諸侯之遜也翼戴諸侯之事非世子之所要也王世子之不與盟也不毁列也逺利也是春秋之所善也鄭伯逃歸不盟王思齊侯定世子而使周公召鄭伯曰吾撫汝以從楚可以少安鄭伯喜于王命而畏齊故逃歸不盟胡氏以為貶是已髙抑崇曰齊之服楚圖之非一日也才踰年惠王已導鄭伯叛之故中國之不競非獨諸侯之罪王亦有以啓之也楚子滅弦弦子奔黃荆楚始滅中國矣弦今光州光山縣古弋陽車犬縣江黃道柏方睦于齊皆弦姻也弦子恃之而不事楚又不設備故亡楚屈完常以大夫書子文何以不書楚大夫將恆書人也黃東發曰齊處北楚在南齊積二十年間之力僅能盟楚盟召陵弦近楚滅之旦夕耳豈齊救所能及哉九月戊申朔日有食之以至元辛巳為元逆推至僖公五年得一千九百年每百年加一該加十九分得日七十萬空六千九百四十七日九十一刻四正合僖公丙寅正月辛亥冬至然後順下八月又該二百三十六日二四四十四四乃以六十甲子除去三六一百八十日止存五十六日又加辛亥日八十五刻四分共得五十七日九刻八七四四正戊申日為九月朔亦云交分得二十六日八千九百八十五分六六入食限自漢言春秋日食者皆遺此條今按劉仲敬先天厯法魯僖五年六分二十六日九十刻六七強入食限庚寅二百四十二日四十二刻乃己未日五十刻交會之臨是同人二千二十五月之終臨卦二千二十五月之首從此逆上丁卯嵗首冬至該八千六百四十三日零八刻五六五九數故其年至日乃丙辰日四十一刻強以先天月法除之得二百九十二月零二十日零一刻五數強又上九日三十七刻七九七強為丁卯子月之首又上亥戊申四月乃僖公九月朔正得戊申日蓋其上推法如此冬晉人執虞公林少頴言聖人不忍周衰諸侯再取其地故不斥言滅而但云執此言非也春秋治其名實者也寧有不忍周衰沒其亡地之實者乎滅下陽晉據而有之者也虢公醜奔京師未嘗執也故書其重重在地也虞滅而修其職貢于王謂輸其甸賦之貢則虞公猶存于國置之而不得他去其事與下陽異而執天子三公重在人也杜元凱本以職訓命祀為句貢易知不煩詁釋而讀者遂昧耳虞公不能地緼于晉命行乎虞民而執之猶其下執之辭趙子常以為上公不名非也春秋豈有滅國之君不名者哉或以為見執而始有悟僅能不屈則益無據矣不言以歸不言所舍以為猶存於國耳而實制於晉亦自是遂亡矣六年春王正月夏公會齊侯宋公桓陳侯宣衛侯文曹伯昭伐鄭圍新城秋楚人圍許諸侯遂救許新城今鈞州新密縣南近方城諸侯越鄭都圍之意其導楚故也左氏紀此事凡誣者二謂討鄭逃盟是也曰鄭所以不時城者誣也救許而楚還楚固畏齊之強也未幾洮之盟許男與焉齊蓋得許許曷為面縛銜璧哉夫面縛者圍急而出降之事也安得圍解數月之後無故而行此孔氏但知馬遷記宋事之妄不知左氏誣也圍新城非若宋圍長葛齊桓待其服耳趙子常以桓之帖荆為難蓋僅圍其邑志在得鄭諱其憚遇楚師夫合六國之師奚畏楚哉苐不能聲楚罪耳楚稱人將卑師少耳趙伯循疑不能圍夫兵法十則圍之常也然環而攻者豈必多之謂哉亦惟其精而已冬公至自伐鄭七年春齊人伐鄭夏小邾子來朝杜元凱曰郳黎來也邾之别封曹姓故曰小邾始得王命而來朝也何休氏曰齊桓公請天子進之于是以爵通也自是天下無未命諸侯矣齊嘗輔宋爭郳今則進郳為小邾子而仍使附魯故來朝桓公霸令之行諸侯無朝者而獨小邾以附庸之故亦禮之所不能盡禁者耳鄭殺其大夫申侯申以邑為氏即今信陽州本楚邑也侯者名也黃東發曰申侯本自楚來鄭故導鄭背齊從楚鄭將復歸齊故殺申侯以説齊左氏謂陳濤塗怨申侯反已於齊譖而殺之若然則申侯蓋忠于齊者殺之是怒齊也何名為説季明德曰凡别族之臣以名繫氏貴戚之臣稱公子公孫皆為卿者也置卿因國大小大國三卿次國二卿小國一卿皆命於天子若大夫則諸侯自命而以名通此禮之常而卿大夫之所以别也春秋時凡為卿者皆不請王命矣故於其見殺皆不稱卿而謂之大夫王制以卿為上大夫而下言大夫又别有上中下三等前後自相抵牾至以次國一卿小國二卿命于其君而不命于天子則于禮尤為不通漢儒附會之説其亦不察于春秋不書卿而書大夫之義矣然卿必有職如太宰司空之類皆官名也春秋于大夫未有書其官者見其非公選也當時用人或以私愛而登庸或以世官而承襲官無專職兼攝無常皆德不稱其任者也非義所繫則略而不書耳胡康侯以為不書官者不與其自為卿也夫魯之單伯鄭之祭仲皆命大夫也而亦不書官此豈繫於不命而自為卿乎張主一以為宋統承先王得自命官故有司馬司城之書亦非也蓋司馬司城義繫于官耳若宋果能自命則華向皇樂之族以貴卿而見于經者亦多矣何以悉不書官乎皆不通之論也秋七月公會齊侯宋公陳世子欵鄭世子華盟于寧母寧母今兖州魚臺縣古方與魯地也左氏以為謀鄭然紀事亦有可疑者子華以三族違命欲齊去之以為成其言以鄭為內臣者非欲叛其父也而管仲遂曰子父不姦之謂禮既殺申侯以説齊矣而桓公乃曰諸侯有討于鄭未捷管仲既曰記姦之位齊辭子華矣而經實列于會登名載書然則抱遺經者當必知所擇矣曹伯班卒五年首止之所同盟也不日卒蒙上盟月也不曰趙子常謂弔不以禮也班僖公赤子僖卒在莊三十二年而班嗣位卒子襄嗣是為共公禮雜記凡諸侯弔者有介有含者有禭者上介謂之圭將命上客臨自稱一介老將命必大夫也鄭康成記禮言天子于二王後含為先禭次之賵次之賻次之于諸侯含之禭之諸侯相弔如天子於二王後是時齊桓主盟諸侯方睦魯人弔而不以禮然則一變而後至道者亦斯類乎公子友如齊趙企明曰公與公子友同心事齊五年一聘之節未嘗廢也季明德以諸侯無朝聘之禮公子友之如齊乃議時政聽事期耳至于僖公親往以五年為期則必古人諸侯受成方伯之禮不可如舊説例稱朝聘則誤矣詳見隱七年齊侯使弟年來聘下冬葬曹昭公八年春王正月公會王人齊侯宋公桓衛侯文許男僖曹伯共陳世子欵宣盟于洮鄭伯乞盟洮今濮州南界于曹古鄄城水經注曰鄄城西南五十里有洮城杜氏以為曹地是也何邵公曰王人銜王命會諸侯諸侯當北面受之故尊序于上左氏傳曰盟于洮謀王室也然則謀子帶乎首止之會世子已定位矣謂惠王崩襄王患太叔帶之難懼不立不發喪而告難于齊乎則盟洮之後位亦當定何至歷四時始以崩訃乎寧母之盟子華在焉鄭伯未盟也鄭伯之逃本出王意鄭當尋盟故王人下齊為鄭求解焉此以屬辭知之左氏謀王室云者本誣説也抱遺經者有以知之矣夏狄伐晉狄邇晉而逺齊齊晉又未嘗通也吳幼清謂桓公不能攘過矣秋七月禘于太廟用致夫人夫人孰謂謂哀薑也趙企明謂聲薑或曰蓋成風焉仲舒劉向倡之范劉孫胡和之以為立妾母之辭也或曰公羊有説焉公本聘楚女而齊媵先至故脅之立即十一年陽榖之夫人也然則何居曰固哀薑也夫成風者僖公之妾而非其母也啖氏知僖公成風猶惠公仲子而不若趙企明之明也繫成風于僖猶繫仲子於惠蓋妾之辭也今以為立妾母既已非其實矣宗人釁夏曰自桓以下娶於齊不言聘楚也葵丘之盟曰無以妾為妻齊為盟主而僖與會受盟矣又豈有受齊媵之脅而盟者與受盟者乃無一怍者乎是公羊之誤也蓋哀薑之惡僖公不敢致其主于廟遲之八年乃舉禘祭因而致焉禘也者審禘昭穆之祭婦之廟見無以禘為也然則三者雖未能明其必為哀薑而于禮義事情為不悖矣或曰傳有之成風聞成季之繇而事之屬僖公則成風僖公妾母也何疑曰成季賢者而有此何以正慶父乎以是知左氏之誣也隱之䇿曰惠公仲子文之䇿曰僖公成風以經正傳知左氏之誣也然則僖何以不逆夫人趙子常曰陽榖之夫人僖公子時所娶也陳氏傳曰魯禘非禮雖用之羣公之廟不書據傳禘于襄公禘于僖公之類有用之羣公之廟者矣但有事譏不在用禘也事在昭公十五年必禘于太廟致哀薑也而後書譏在用禘也凡禘恆日用以致不當祔之夫人故不日以異之冬十有二月丁未天王崩子鄭嗣是為襄王左氏前年閏月崩非也九年春王正月丁丑宋公御説卒子襄公兹父立趙子常曰不書葬蓋迫於葵丘之會不及以禮諸侯之送葬者也夏公會宰周公孔齊侯桓宋子襄衛侯文鄭伯文許男僖曹伯共于葵丘宰官周采地在今鳯翔府岐山縣天官冡宰兼為三公者即周公閲名孔天子三公不字也不殊會胡氏謂非若王世子貴有常尊比是也宋稱子未踰年也宋桓不書葬左氏榖梁遂曰未葬之辭非也葵丘晉地在河東汾隂杜氏及國名記并指陳留外黃宋地莊八年齊侯使連稱管至父戍葵丘則臨淄西界齊地知不然者唐孔氏謂傳齊侯不務德而勤逺略西為此會則此地逺處齊西不得近在臨淄也汾隂晉地故晉侯欲往會之若宋則齊晉素不通何緣欲往且宋在齊南不得為西孔氏以盟無晉侯遂謂非晉地不知晉侯以宰孔言還不會尚安得盟哉據史氏襄王使宰孔賜桓公彤弓矢大路矣而經不書啖氏曰桓文之伯不書錫命蓋有微旨也秋七月乙酉伯姬卒唐孔氏曰禮姊妹在室期未嫁其夫不為服則兄弟不為降諸侯絶旁期此將嫁于諸侯當服其齊衰期故書其卒也九月戊辰諸侯盟于葵丘桓盟不日此何以日當是時宰孔已有錫命以王命行乎諸侯則急于期會矣殆于所謂震而矜之者以為桓盟之盛而日之非也陸淳氏曰盟稱諸侯明宰公之不與也陳君舉以為知節是也其美胡氏義已備甲子晉侯佹諸卒唐孔氏曰此甲子晉侯卒蓋赴以日而不以月魯史不復審問書其來告之日惟稱甲子不知甲子是何月之日故在戊辰後杜元凱曰甲子九月十一日戊辰十五日書在盟後從赴然杜長厯定朔不足據則十五十一亦非矣趙子常曰雖後之猶日見春秋日法之嚴然若以子為戍之誤豈不易簡亦何必信趙説耶冬晉里克殺其君之子奚齊國人不子奚齊之義胡氏傳備矣十年春王正月公如齊于是諸侯私朝伯主如二君矣魯侯之初如齊也春秋諱之以故至是專朝不可諱矣周之典諸侯殷相聘世相朝非有所禁也惟其菀栁尚息不復宗周而獨之霸主朝伯主曰如朝京師曰如又有甚者諸侯為兩君之好有反坫管氏亦有反坫則諸侯如齊必有至其私第者聘禮賔問卿面卿辭曰君貺寡君延及二三老而已矣而毁裂至是春秋可不作哉其後僖公即世晉遂以不朝來討文二年移齊事晉襄二十八年移晉事楚而變極春秋且終矣狄滅溫溫子奔衛齊方圍楚力不及狄亦伯圖之缺也溫本子爵國鄭漁仲曰己姓顓帝裔孫封于蘇鄴西蘇城是也鄴城今彰德府臨漳縣西二十里其地南近衛東界于狄狄利其近已故滅之地遂入狄周圻內别有溫周司寇蘇忿生食邑在今河南懷慶府南本與鄴西之溫不同左氏誤以為一文十年魯及蘇子盟于女栗其國尚存然則襄王勞文公而賜之溫殆近於誣矣孔疏杜注國名記謂蘇所都之邑名為溫夫溫子蘇子烏可附會而無别哉晉里克弒其君卓及其大夫荀息息之名從君于昏也蓋自杜氏之説始也于是胡氏安國髙氏閌習其讀而不變黃氏震乃復曰驪姬亂國奚齊卓子不可輔息受其託孤蓋愚人耳愚謂二説者皆非也若謂息從君殺申生之昏耶殺申生時息傅奚齊耳獻公之所謀獨在里克息茍坐其責不亦枉乎若以立奚齊為昏則申生既死國無冡嗣君命立奚齊是君矣何以為昏故為原父之説盡而辨矣弒君者必月卓與哀十年齊荼不月二君皆庶孽與地君遇弒不同也又按世子君之子適庶之分也然曰君之子異乎下殺上矣奚齊卓子皆嬖子其君一也而齊有先君之命春秋不君奚齊君卓子何也既以奚齊正適庶則以卓子正君臣討里克之罪也張元德言卓子有先君之命者誤夏齊侯許男伐北戎戎患中國及曹魯耳狄則邢衛晉溫鄭齊魯宋皆受其害齊桓召陵之師經營久而方興者其先戎狄迭起有以牽制之也然戎弱狄強北戎在燕西狄北意今紫荆倒馬諸關之地杜即以為山戎非也戎訖春秋無大患狄遂代興敢于伐晉敢于滅溫溫近王畿殆將被髮左袵無以稱一匡矣齊不合諸侯以討狄顧施勞于許而專役以伐戎雖云節制不失所先後哉戎狄難猝制又恐與戎合威戎所以警狄然已細矣晉殺其大夫里克秦納公子夷吾是為惠公稱大夫猶在位也榖梁氏曰稱國以殺罪纍上也其殺之不以其罪也其義胡氏備矣秋七月冬大雨雪十有一年春晉殺其大夫丕鄭父里克之黨也夏公及夫人薑氏會齊侯于陽榖薑氏公子時所娶薛士龍曰齊侯女也故僖之䇿不書逆女薑氏髙抑崇曰兩君為會而婦女厠于其間非禮也秋八月大雩其月過時之甚者也不日者日必以辛也冬楚人伐黃陳君舉曰滅不言伐此書伐病桓公也以陽穀之會貫之盟徒以亡其國耳十有二年春王三月庚午日有食之薑岌云三月朔交不應食在誤條其五月庚午朔去交分入食限大衍同授時推是嵗五月庚午加時在晝去交分二十六日五千一百九十二入食限先天得交分二十六日五十刻零三二五六入食限疑五誤為三然列書于春王之下文在夏前勢不可強移位置也夏楚人滅黃言滅不言君死于其位也公羊子所謂亡國之善詞上下之同力也冬伐而夏始滅歷三時矣而救不至齊真負黃蓋是時管仲死矣公榖之言是也而史記于僖十五年係管仲之卒真氏若欲以蔽罪于仲者與左氏同再考秋七月冬十有二月丁丑陳侯杵臼卒子欵嗣是為穆公十有三年春狄侵衛夏四月葬陳宣公公會齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹鹹今開州東南界即叔孫得臣敗狄之地杜云東郡濮陽也鹹本衛地東界於齊狄入衛故會以備之左氏謂為杞故非也淮夷北距把都雍丘千里東越郯宋西越徐陳然後乃至不能病把况近舍衛而逺慮把伯略亦豈然哉秋九月大雩冬公子友如齊十有四年春諸侯城緣陵備狄也緣陵不書其人穀梁以為散辭陸淳曰是前目後凡也孫覺趙鵬飛推為鹹之諸侯因傳淮夷病杞之説然左氏何以知其有闕而不書哉淮夷去杞踰千里勢難病杞趙氏亦既知之然惑公羊徐莒云者而失于屬辭比事經書十三年春狄侵衛故夏會于鹹鹹本衛地故即而謀之因遂城之耳此可棄傳任經不然何以會于衛地哉故城緣陵即鹹之諸侯前目而後凡耳緣陵者諸家指為把邑無所詳勘獨前漢志臣瓚以為營丘則始胙太公者把安得踰千里邑之况先君分壤有廟又去新都臨淄僅餘百里豈其棄以委杞哉向見季明德欲定為沙麓之比云齊衛狄三國接壤然無據不能決也而非杞邑則同矣就令把邑亦不得如胡氏以為專封也夫昔未有國而今始有者封也把古諸侯位上公王室衰而夷狄侵桓率諸侯改營使辟難耳緣陵既杞邑何嘗更封而欲罪其專哉是故胡康侯不如黃東發之盡夏六月季姬及鄫子遇于防使鄫子來朝譏魯公愛其女使自擇配傳意備矣鄫姒姓子爵沂州承縣東八十里故鄫城是己國名記鄭地滎陽有鄫水城名偶同耳左氏説者以為鄫夫人則明年經何以始書季姬歸鄫耶秋八月辛卯沙鹿崩鄭漁仲曰沙鹿不盡晉地通衛狄按今大名府元城縣東界有沙鹿土山古陽平地也西為衛東為齊北狄地不可繫之國矣事關乎天下也狄侵鄭於是狄不能近衛又東不得志於齊遂西撓鄭矣伯主與有責焉冬蔡侯肸卒是為穆公子莊公甲午嗣汪仲裕曰穆公父獻舞見獲于莘莊十九年留卒於楚而立十有五年春王正月公如齊張元德曰純用五年一朝之制同於事天子矣楚人伐徐三月公會齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘遂次于匡公孫敖帥師及諸侯之大夫救徐牡丘齊地匡今睢州界在古長垣西南鄭樵謂與牡丘相近非也遂者急於後事之辭次其本意也書盟書次書大夫帥師胡氏云桓志之怠是也夏五月日有食之左氏云不書朔與日史官失之也大衍推四月癸丑朔去交分入食限差一閏授時推是嵗四月癸丑朔去交分一日二千三百一十六入食限先天得一日一千三百一十五分二四入食限秋七月齊師曹師伐厲厲神農之後今隨州北厲鄉屬楚之微國也伐國不月以齊之不競于楚救徐不力而分兵以伐其與國之微者故月以異之明年夏伐厲不克救徐而還不書不足書也八月螽九月公至自會黃東發曰救徐不能救師未退而先返己歷三時矣季姬歸于鄫已卯晦震夷伯之廟趙伯循曰古史之體應合書日而遇晦朔必書之以為厯數之證然則公榖皆以晦為冥非也夷氏伯字趙伯循曰大夫既死加諡之後不更稱名左氏曰展氏則其立廟之始尚未賜氏應書展伯矣公羊謂季氏之孚亦非也餘見胡氏傳冬宋人襄伐曹宋始二於齊也陳氏傳曰諸夏之相加兵自莊之十九年未之有也於是再見宋襄公為之也其輕齊爭霸之心已見於此矣楚人敗徐于婁林婁林今泗州古下邳僮縣楚兵挑徐出至婁林詐而敗之徐以號舉劉原父曰始稱王故夷狄之趙子常因曰始叛周僭大號按漢史載楚文王滅徐偃韓氏偃王廟碑以為穆王與楚用兵伐徐走彭城本末恭穆天子傳等韓當詳于史矣然春秋中徐其本稱子僖三年亦書楚人於彼何不以號舉乎既謂楚已滅徐何為其國至此尚存據史氏注引括地志徐城在越州鄮縣則今鄞縣與下邳之徐不同退之誤合為一耳按後漢東夷傳徐夷率九夷以伐宗周西至河上穆王畏其方熾乃分東方諸侯命徐偃王主之檀弓載徐容居之對曰昔我先君駒王西討濟于河是駒王偃王本一人真常僭王而九夷孔子欲居蓋山東之裔而非鄮矣四夷雖大春秋皆以子書之而楚文滅徐文不足據耶或曰兵無統紀如狄然則號舉之十有一月壬戌晉侯及秦伯戰于韓獲晉侯秦嬴姓伯爵周孝王封伯翳十九世孫非子於今鞏昌府秦州古西戎地也韓古韓侯之國括地志在同州蓋詩溥彼韓城者而其後晉併之也為桓叔子萬食邑因氏之故使萬孫韓蕳視師焉河自龍門而南至華隂而東晉在西河之東南河之北以河北為內河南為外晉地是時有河南列城五自華山而通盡虢之東略南及華山故三敗及韓渡河也晉不悔禍而請戰故春秋蔽罪于晉書晉及晉侯雖獲秦伯曰妖夢是踐豈敢以至于是舍之靈臺未以歸也陳君舉言獲則以歸不足言非也其稱君君重師次大夫敵胡義詳備秦自五羖大夫之入未嘗輕用民力矣季明德定秦伯卒與晉文不逺秦誓應作于兹役之後左氏誤傳其卒在文六年而作書序者因謂敗殽乃作秦誓蓋公子縶子桑皆勇力之臣必媢嫉百里穆初惑之戰而遂獲其君雖足以見將勇兵強而歉于返躬責己故作秦誓畨畨良士指百里也仡仡勇夫蓋縶桑諸臣而媢嫉能容其説非無發者穆由僖二年至二十八年此戰之外雖敗楚圍城濮圍許圍鄭三役皆與晉文共成伯事為中國計孟子稱奚顯君可傳後世豈以戰勝為功哉若入滑敗殽穆公尚在雖奚踰百之年不保其存而三良未殉必能以義相規何得迷復乎穆以未同盟弔葬不及則其不赴而史誤書有由然矣十有六年春王正月戊申朔隕石于宋五是月六鷁退飛過宋都隕石者星隕也星石之精陽不翕則隕矣鷁乘風而化陽鳥也退飛者隂驅之是月者決不日而月也宋都者內别辭于宋也五六先後言者後散辭先聚辭也過也者有退飛之始焉掠而過宋耳凡氣之運有其始聖人知之懼其惑民不言也言其可見者耳蓋天人必有感應焉或曰後五年有盂之執六年有泓之敗以應五六數則鑿矣三月壬申公子季友卒大夫曰卒其卒名正也兼字之意恩禮之隆史之變例也與仲遂皆生而三命為世卿叔五世及婼尚曰三命踰父兄以知牙未三命故不書也程子曰生而世族使世為卿故氏遵之然不可通於叔孫叔孫世卿據經曷嘗書族哉趙子常曰叔肸之子嬰齊復稱公孫叔本非氏此子常之誣也叔牙桓之庶子叔肸自文公子豈可誤合耶叔牙之後稱叔孫叔肸之子嬰齊以公子之子稱公孫叔老老者亦肸之子不稱公孫而稱叔其後老之子弓弓子輒及鞅輒子詣皆氏叔安能斷自嬰齊以叔非氏哉古者氏以世祿孫以王父字為氏常禮也後世以世官則有若季友仲遂叔肹者故叔肹子老遂得稱叔非繫于王父矣季明德言祖卒而孫受氏則稱其祖者為氏而非字此明德之誤也孫以王父字為氏氏即字也在王父在孫異稱耳又何必辨之哉至謂友之子無佚可稱季遂之子歸父可稱仲不必更言公孫其説是也而又自疑何也夫行父逮事四君無佚未立乎位其稱公孫與否於經無見也歸父當仲遂卒後二年如齊伐邾己勝其任其齒必長羈貫就傅在遂未命之先已如常禮稱公孫以自别其後因不改耳非謂不可稱仲也嬰齊乃歸父之弟而即稱仲義自可見傳者不知乃謂嬰齊後歸父耳又謂稱字以師禮尊而不臣如齊仲父亦非也季非名友豈非名哉是故知此説者知弟不可以後兄知王父字為氏非通論也豈細故哉夏四月丙申鄫季姬卒秋七月甲子公孫茲卒叔牙子也冬十有二月公會齊侯宋公襄陳侯穆衛侯文鄭伯文許男僖邢侯曹伯共于淮會而月無功而還故異之也淮今泗州盱眙淮水所經處古臨淮也鄫今沂州據左氏淮夷病鄫故即而謀之且東略然以經考之則去年楚人敗徐婁林泗州近古徐城故今為徐謀楚而會其地徐子雖未會明年與徐伐英氏則兹會之故而伯主之功亦細矣哉邢以小國避狄夷儀本屬于衛今驟列于衛而序曹上衛人于是積不平焉而邢之滅于衛文有由然矣十有七年春齊人徐人伐英氏不月趙子常曰有徐人也英郾姓臯陶後國當在今夀州六安間楚與國之小者杜氏不志其地路史國名記亦止言漢為黥布國而漢志九江郡不定英所在晏元獻類要皋陶子孫封英六黥布傳正義云英改為蓼杜元凱曰蓼國安丘蓼縣則正今霍豐界于夀州六安者也桓為徐謀楚不能病楚而徒伐其與國君子以為細矣夏滅項項本汝隂項縣而漢志汝南郡有故項城今陳州之項城楚旁小國也齊桓為徐婁林之敗伐厲不克乃伐英氏又不得楚於是憤而滅項也杜氏不考地里事勢信左氏之誣以公有諸侯之事未歸取項自魯至項不啻千里公又在會孰為是謀而能分兵以取人國者乎然則孰取之乎曰齊之取也上伐英氏矣雖書夏而間無事故不再舉齊人如六年齊執陳轅濤塗秋間無事止書及江人黃人伐陳不再舉齊也杜氏不言師諱滅趙企明曰取邿取鄟皆滅也何獨偏諱滅項乎是止公討滅項者亦誣也夫人會齊侯于卞因止公之故亦誣也淮會在十五年冬至十七年滅項謂淮之會未歸取項而踰年猶未見討至十七年始書滅而討之乎下書公至自會即非自齊足明左氏之誣矣其得失則以齊之不能加于椘而已季氏以頓誣為項既又以頃誤為須昌則求之不得其故而妄臆特甚矣秋夫人薑氏會齊侯于卞夫人聲薑也卞今泗水縣古姑蔑魯地也於是齊侯將歸夫人要于路而會之聲薑令妻魯人所頌而有此也稔于見聞矣九月公至自會月致譏無功也冬十有二月乙亥齊侯小白卒齊亂明年子昭立為孝公先儒稱桓公以尊周為名帖荆為績其所以從諸侯于盟會者皆以自為而已使誠不私其國合諸侯以事天子朝覲訟獄必歸焉則禮樂征伐自天子出而躬率方伯之職討其不庭雖以復文武之境土可也天下諸侯其孰非天子之臣而敢有二心也故有興國之勢而不為以求其利而遂失之矣孔子於春秋曰其事則齊桓晉文惜周之令不能行也蓋因其事而裁之故曰其義則丘竊取之蓋宋襄秦穆楚莊而下則無譏矣十有八年春王正月宋公襄曹伯共衛人文邾人伐齊外伐國恆不月今月以異譏之也據左氏桓公常屬公子昭於宋以為太子桓公卒宋公以諸侯伐齊納公子昭齊履謙曰考之于經左氏之言有不可信今按桓公葵丘之盟首曰無易樹子若昭之既立於管仲則必應立者又何自疑其事屬之宋襄雍巫何術輒得近于衛姬管仲尚在薦羞細故何得輒與儲事且孝公既立為太子則必有播告之修國人所聞若桓有後命欲立無虧亦其邪心耳况許而未發則昭固儲二也國人安得乘其邪謀擁立亂命然則寵均而爭勢或有之其云屬昭于宋欲立無虧皆妄也説者不得其情謂之奉少奪長或曰昭入有辭故不書納國人緣後命立無虧則國有君故書伐非也此直乘其內釁而伐喪耳若為孝公則鄭姬所出鄭何不與何為既立讐宋而有伐宋圍緡之事乎夏師救齊踰時而救善之中有遺美焉爾趙子常云救四公子之徒當是時無虧死安有四公子哉五月戊寅宋師及齊師戰于甗齊師敗績狄救齊甗齊地戰者以主及客此其以宋及齊以宋為志乎此戰也伐喪非禮志乎戰而敗之甚矣而齊人不能徴詞持重亦自見矣狄本欲與衛相衡其救有為為之聖人與人為善不逆詐也秋八月丁亥葬齊桓公齊桓不能慎終胡氏義備矣顧云付托宋襄則非事實也冬邢人狄人伐衛狄言人杜諤曰便文是也中國與外國會君殊之師與大夫序必微者而後得稱人以便文者非其君榖梁子以善纍而後進非也又曰功近而德逺夫衛以怨報德使狄得以假義胡氏以為中國之罪也而何狄德之逺乎邢藉狄威大邦為讐而取滅于是決矣十有九年春王三月宋人執滕子嬰齊宋稱人將卑師少也其月異於戎蠻子戎蠻子遂失國也此尋齊桓圖伯之迹效其滅談爾執諸侯不名嬰齊名不能以理自明而遂屈己以下宋之微者故本其自賤之實而書名以執終也嬰齊即位于隱乙丑迄僖或曰己卯七十五年矣距其未立通計殆且百嵗執而不書以歸未歸其國而即釋意其既釋必不能任國事而子立乎位二十二年伐鄭之滕子非嬰齊矣名者諸侯之終事嬰齊舍是無以見于經故詳之也杜云以罪告臆語耳胡氏遂云著其罪傳無其文而何以定之也邾豈不以鄫罪告而鄫子不名又何説耶杜云從所赴春秋赴執君豈懼不名而赴以名者國史常法豈不能裁歸于例耶周官大司冦掌建邦之三典以佐王刑邦國詰四方凡諸侯獄訟以邦典定之諸侯無有相執之道也夏六月宋公曹人共邾人文盟于曹南鄫子會盟于邾己酉邾人執鄫子用之曹南之會宋稱公而人曹邾何也蓋大夫稱人也宋公在而曹邾敢以大夫會乎公羊傳實書宋人則曹南無宋君此公羊趙匡之遺意而陳氏謂人曹邾以貶宋實不然矣鄫子之會會邾子也若即赴曹南之盟則實邾嘗盟經但當云如會耳且以地考之鄫有二滎陽有鄫水城鄫水溱也國名記云爾而鄫漢志作繒屬東海郡蘭淇南城之間𨽻今沂州邾在管之西宋即今之應天曹南介于邾宋之間曹南之盟既畢則邾東歸邾宋南歸宋趙匡云宋還莫不由邾也邾子執鄫子用之者邾人自用之非宋之罪也蓋曹南與邾兩會宋不與邾會何以命邾子用鄫子耶此以道里往復論事勢也春秋所書必重首惡若宋人實使邾人執鄫子理無不書宋公也假宋使邾執鄫子春秋乃寬宋而蔽罪于邾是為縱首謀而討其朋惡者矣使春秋實欲討朋惡者乎則當如季姬使鄫子來朝之例書之以兩見其罪今宋沒不書而反以罪歸之可乎此以聖人權衡定書法也宋襄之圖伯雖其中不可保然外假仁義故不重傷不擒二毛豈肯殺諸侯以祭淫昏之鬼乎邾服宋而與鄫鄰鄫為魯壻則邾所仇之國且觀後日戕鄫子亦出于邾之肆虐初不必待宋此以事實而定獄辭也左氏倡之翕然和者皆是也獨趙伯循劉原父乃能知之耳然則宋其無罪乎宋為伯主而不能治諸侯之兩下相殺咎將誰歸乎以此治宋知不免矣秋宋人圍曹不自反而欲速見小利胡氏傳備矣陳君舉曰宋公欲合諸侯而亟修怨于曹諸夏之圍國自此始衛人伐邢張元德曰衛不自省其從宋伐喪之罪而以報復為事罪之也冬會陳人穆蔡人莊楚人成鄭人文盟于齊楚初與諸夏盟也不言會之者內微者也稱人外微者也於是陳穆修好于諸侯以無忘齊桓之德初為之約而君大夫未行胡氏謂沒公人陳蔡諸侯非也陳蔡先楚陳首謀而蔡鄰陳必或贊決焉鄭列楚下桓公沒鄭首朝楚不敢先也于齊亦預焉不恥于辱先矣胡謂一以外夷狄二以惡諸侯失道三以謹會盟之始不易之言也而以春秋為諱此夫得失在乎其時春秋奚為諱之哉梁亡梁國名今同州邵陽縣古夏陽伯益之後秦仲有功封其少子康是為梁伯地界秦晉之間自取滅亡則亦兼弱攻昧取亂侮亡耳陸淳謂秦暴取國非也文十年秦伐晉取少梁豈秦得而復失于晉耶梁逺于中國魯人會盟四國大夫于齊聞梁之亡也歸而言之不由赴告則不言其亡之者避不敏也二十年春新作南門新作南門左氏以為不時公羊以為變古胡子曰用力于所不當為是以新作為譏而不譏其僭也按左氏隱元年新作南門不書以非公命不書然則非新作矣榖梁南門者法門也杜預陸淳直謂城之南門按魯城南門本名稷門非法門也劉敞曰南門者天子之門非諸侯之門也蓋玉藻之言曰天子聽朔于南門之外書顧命曰逆子釗於南門之外則南門誠天子之門矣然天子五門無南門則竟不能明天子之何門也陳氏禮書南門之外謂之應門今詳顧命正指畢門為南門也以在寢室之南也與禮書意同則豈城之南門哉今以明堂位知諸家失也明堂位曰太廟明堂蓋謂魯明堂太廟猶周明堂也凡南門本明堂之門其所云南門八蠻之位亦以天子明堂言耳是春秋書南門者譏魯廟非禮因書南門以見義耳趙企明乃曰庫門雉門推原父之意為説焉如此則雉門旁失兩觀春秋宜書新作門觀以别于他門矣安得槩言南門耶夏郜子來朝富辰云郜之初封文王之子𣆀季之弟隱十年公敗宋師取郜而桓三年魯取郜大鼎于宋郜濟隂城武縣其亡久矣介于魯宋宋實滅之公羊子謂失地之君自隱至今七十三年矣失地之君猶有存者乎即在能勝朝乎意者魯取而别封以為附庸大啓爾宇為周室輔謂是類矣五月乙巳西宫災公羊子曰西宫者小寢也小寢則曷為謂之西宫有西宫則有東宫杜預謂公别宫是已榖梁謂為閔廟夫廟必以諡配者閔廟何以獨稱西哉又宗廟皆在左不得稱西諸侯有三歸夫人居中宫左媵西宫右媵東宫古制也鄭人入滑滑今偃師縣南黃東發曰滑鄰于鄭服衛故鄭入之此説本于左氏夫滑畿內小國在河北近衛河南近鄭相距道路適均而于鄭常親密是時衛方附宋鄭方附楚分為二黨衛欲間鄭通周之道逺交于滑因而為鄭所入此理之所有也然滑頺叔之黨能無啓釁乎秋齊人狄人盟于邢據左氏為邢謀衛難也外特相盟不書與狄盟而書中國無伯華夷亂矣桓公帖荆孝公與盟于國桓公攘狄孝公與盟于邢齊之替有由哉冬楚人伐隨此鬭榖於菟也不書楚大夫將恆稱人也隨姬姓侯爵國今德安府隨州在厲南二百里而近左氏稱隨以漢東諸侯叛則是猶能抗楚者然亦自是絀楚不復通諸侯矣哀元年猶與楚子圍蔡則亦能免狂楚之禍視漢東諸姬之盡者殆必有道矣夫二十有一年春狄侵衛宋人齊人孝楚人成盟于鹿上楚隂合齊推宋為首黃東發曰宋襄愚而妄作楚特以戲視之鹿上宋地杜注汝隂原鹿今光州固始界淮汝合處季云兖州府金鄉縣菏水之南宋之北鄙指後漢志乘氏鹿城鄉然而非也水經注雖以鹿城為名鹿上苐固始近楚而金鄉逺宋人求諸侯于楚必宋襄至楚近地而盟焉情也夏大旱郎顗言魯僖旱修政自敕時雨自降然春秋於僖公初書雨已而書雩已而書大旱公之德衰矣秋宋公襄楚子成陳侯穆蔡侯莊鄭伯文許男僖曹伯共會于盂執宋公以伐宋齊桓之世楚通上國皆微者君大夫自疑鄙陋不敢輕至也楚人盟齊盟鹿上始輕中國而楚子始來宋亦尊之於陳蔡鄭許曹五國之上矣齊本預楚鹿上之謀疑而不至宋襄翻然而來其見執固自取矣齊桓伯業已成猶不敢輕楚宋襄圖伯之始延冦啓侮何哉此楚子執而以衆執為文者中國禮義所由而使蠻荆執其盟主以為諸侯自執之也公羊謂不與執中國之説非矣陳蔡鄭許素黨楚者曹以前年曹南不致餼宋圖焉是皆不親宋者豈惟不親且將讐之是宋公之執諸侯甘心屬辭者可以見共執之義矣昔周之盟岐陽也熊繹守燎而不與盟是周室之不成子也今於先陳蔡而稱子四夷大曰子懼其惑民也冬公伐邾杜氏曰為邾滅須句故黃東發曰邾嘗從宋伐齊魯救之不克邾執鄫子用之又魯親也故怨邾特與宋盟未敢伐今宋有楚師故乘間而伐邾以事證東發是也楚人使宜申來獻捷盂會稱子矣獻捷于魯何以稱人凡使大夫來以人言者人不能使大夫也其曰人文誤耳會既稱子遣使則何為稱人耶宜申不稱鬭氏未為卿也事之是非係于獻捷不係于人楚子而後見也陳君舉謂嫌豫楚故人之非也不曰宋捷魯史自諱榖梁子謂不與楚捷宋是聖人因而諱之也胡氏曰楚之意在脅魯拒而請討辭意嚴正矣十有二月癸丑公會諸侯盟于薄釋宋公日盟以公與也前目後凡故諸侯不序薄宋地杜氏不言其所史記作薄今歸德府東南榖熟鎮西南為南亳湯都北蒙城因景山名景亳偃師為西亳莫詳所盟何亳也執未出境故曰釋榖梁傳曰外釋不志此其志何也以公之與之盟目之也魯見脅歃血要言求楚以釋宋公胡氏責魯不申大義使宋公見釋出自天王是也其言與中國非也中國諸侯不得擅相執擅相釋也二十有二年春公伐邾取須句須句者何邾之屬邑也左氏之言須句風姓實司太皥與有濟之祀邾人滅之須句子因成風來奔公伐取須句而反其君焉然哀八年邾子益已失國而魯歸之得書取須句反其君乃獨不得書何也此齊桓晉文之所難而春秋所亟與者在魯則內諱左氏誣矣莒人伐把取牟婁杞邑也伐邾取須句須句邾邑明矣若以須句為國則今既取以歸其君至文七年安得又伐邾取須句耶蓋僖取須句以邾不服服則反之至文公遂取而有之耳邾之先儀父未命服役于魯至齊桓請王命爵為子也遂以列爵王朝自侈從伯主會盟而不附魯故柳會方歸而公敗其師於偃今又從宋會曹南則伐而取其邑也胡康侯謂其擅取人國而反其君與收奪者無異不失事實乎此胡安定劉原父孫莘老趙企明言之可信者若取則滅之云者趙氏之言不足以定傳而反若為羡文夏宋公襄衛侯文許男僖滕子宣伐鄭鄭伯如楚宋公伐鄭子魚曰所謂禍在此矣秋八月丁未及邾人戰于升陘蒙伐邾之文不言公見公以須句戰也言及者魯志乎戰也升陘魯地邾人未及侵伐魯逆而戰之不言戰勝負敵也冬十有一月己巳朔宋公及楚人成戰于泓宋師敗績日事遇朔曰朔楚欲為鄭報宋發兵至泓泓宋地也宋公迎戰主戰在宋故書曰宋公及楚人者楚之微也非楚子也左氏曰楚人伐宋以救鄭曰楚人未濟曰芉氏勞楚子於柯澤柯澤鄭地蓋楚子屯重兵於鄭而與宋公戰者其先衝也陳君舉謂楚君將猶稱人非也宋師敗績敗者宋師非宋公也左氏言宋公傷股春秋之法君重于師寧有不書者哉汪仲裕言為中國諱敗夫執不諱也而諱敗乎哉二十有三年春齊侯伐宋圍緡孝公乘宋敗遂欲繼霸故左氏曰討其不盟于齊齊之盟謂無忘桓公之德也然則不獨報伐喪矣伐國而圍邑胡氏譏其殘中夏是也緡今兖州金鄉縣南界古髙平昌邑夏五月庚寅宋公茲父卒子王臣嗣是為成公張元德曰僖公附楚不會宋葬秋楚人伐陳此楚成得臣不書楚大夫將猶書人也冬十有一月把子卒左氏把成公卒弟姑容嗣是為桓公書曰子夷也杜預以為把是伯爵程子信之疑于黜于前世中間從夷故子之後復稱伯胡康侯從之夫把之説何紛紛乎把公爵也武王存夏之後干把以備三恪傳謂王者之後稱公是也自東樓公西樓公十世至成公皆無異辭也入春秋以來桓二年稱侯莊二年稱伯自是終春秋書伯凡六變以為用夷禮而貶者左氏以下之説也以為時王所黜者范寧以下之説也伯主擅為進退趙匡以下之説也夫黜于春秋之前則既已不足辨矣春秋狄秦狄鄭狄晉者有之特以號舉而未嘗黜其爵左氏乃謂夷禮黜杞可乎謂其雜用夷禮降一等純用夷禮降二等可乎春秋之初杞即淳于之把而非雍丘之把常以來朝不敬致討矣曷不于此時貶而獨貶于卒乎周之東遷諸侯不道非獨一杞悖亂如鄭衛桀驁如楚吳天王不能一有所懲把于周為客其罪不浮於列國而獨蒙黜不惟勢有所不行而情亦有所不通矣范寧謂為時王所黜可乎至於伯主擅為進退者則亦可疑齊桓之盛且不足以致把又百年而始盟于蟲牢若之何而擅為之進退乎苟謂有進退則載書之際莒子先薛伯曹伯次許男或有之矣而敢變其爵乎然則奈何曰國削弱而自降吾聞諸王貫道或曰春秋之末諸侯之賦常重矣子産請于晉曰鄭伯男也夫鄭固常自降而春秋未嘗以男書之而獨可以自子書杞乎曰制貢以五服逺近為重輕矣侯甸男采為列耳鄭男服而從甸服之貢故懼不給豈公侯伯子男之男乎故知自降之説不可棄也已二十有四年春王正月夏狄伐鄭於是狄踰邢衛而至鄭且有辭于伐矣左氏鄭人入滑王為滑請鄭不聽命王怒使頽叔桃子出狄師伐鄭不書王命渝周召以從諸姦以為不足書也諸侯之無伯害哉秋七月冬天王出居于鄭天子不言出禮乎曰非禮也易之離曰王用出征以正邦也斯不亦出乎書金縢言王出郊康王之誥言王出應門之內斯不亦出乎天王之居鄭紀實之言也春秋天王在外者三昭二十一年劉子單子以王猛居于皇二十三年天王居于狄泉不書出而襄居鄭特書出蓋景王崩嫡庶未定諸王子爭立王猛立于皇未得入成周也國人殺猛將立子朝恭王立于狄泉亦未得入成周也皆即其地而立其實非出若襄則實逼于叔帶自成周而出者非固書出以外襄王不書出以內王猛恭王也天子不言出者特漢儒附會公穀刺取以立説乎不信易書而信漢儒之曲禮以證春秋可謂不達矣趙企明之意云耳可以證公榖胡氏之誣矣然其謂襄之避弟為盡孝悌則有不然舜之愛象固恐傷頑嚚之心也然舜尚匹夫也舜為天子象果使二嫂治棲而謀篡舜且何以處之乎叔帶果先后所愛然通隗氏又帥狄師攻王則人道絶矣已避而成其亂天下之亂將何時極乎趙氏之見近于婦人之仁而不達乎周公大義滅親之義矣左氏晉侯納王之事趙企明曰春秋以周為重安有晉侯納王而不書者今按晉文踐土之盟始迎襄復辟至是蒙塵五年矣左氏所載五年之中有晉侯勤王殺帶皆法應書而經無其文是其事本無矣則請禭與田或亦河陽狩歸之後而誤紀於此耶晉侯夷吾卒不月來訃後也晉侯卒以前年九月文公定而後來告故即告時書之春秋重喪紀雖後猶書之也兄公子重耳立是為文公左氏載秦伯納公子不書不告入也公子入于曲沃使殺懷公於髙梁不書亦不告也夫春秋外納不書宜納雖伐不書豈以告不告哉若懷公即子圉也則固已立乎其位奚為而在髙梁髙梁在平陽楊縣西南今洪洞縣洪洞在平陽五十五里曲沃在平陽南百二十里則去曲沃尚逺宜亡公子據邑求入實未入者耳按史記秦穆公滅梁芮公子圉聞惠公病曰梁我母家也而秦滅之我兄弟多即君百嵗後秦必留我而晉輕亦更立他子圉乃歸亡晉或者歸方及梁而公已卒不及入而秦已納重耳入遂遣人殺之于梁耳然亡公子爭國者如子糾未有不書何獨不書殺圉哉若圉實懷公立乎其位則重耳弒君矣臣弒其君孔子懼而作春秋春秋何為沒其實哉若謂不告亦不書則弒逆之人巧于文姦豈肯以實告也春秋得以正其弒逆者必有本實可據豈修春秋如晉乘之類而徒然無一直筆可徴哉是子圉直亡公子而非懷公文公亦未嘗殺圉近蜀湯氏雖不知圉非懷公然謂文入勢順圉逃懼無戰爭殺戮則近矣然則謂殺子圉於髙梁可疑矣謂殺懷公者左氏誤矣懷公者卓子也夷吾重耳之弟也子圉重耳之從子也介推曰獻公之子惟君在矣惠懷無親以惠懷并列九人即知非子圉矣然卓子先君而後稱者蓋其時必有以新鬼大而逆躋者故也二十有五年春王正月丙午衛侯燬滅邢曲禮曰諸侯滅同姓名疏家皆引之趙企明曰虞滅下陽楚滅夔皆同姓不名也而楚子虔誘蔡侯殺之非同姓乃名是曲禮誤援春秋立説也下有衛侯燬卒之文以類誤耳朱先生亦謂傳寫誤或然也趙子常求之不得又增邢魯同宗於同姓之下此近于蛇足矣書滅自足以見衛罪而邢之從狄亦非無罪也夏四月癸酉衛侯燬卒衛文公卒子鄭立為成公宋蕩伯姬來逆婦意諸者公子蕩之子出自桓公以王父字為氏伯姬其母也娶女必親迎而伯姬以母為子逆非正也榖梁子曰婦人既嫁不踰境劉原父以為公自主之於經傳無明文何以見其自主哉宋殺其大夫殺大夫不名衆辭也宋成以僖二十三年嗣位次年如楚次年殺其大夫意必有討於泓之戰矣其討於泓之戰示服楚耳趙企明以為宋將託于晉乃歸罪於其臣以滅先君之恥臆説耳晉文方入伯圖尚未萌芽宋肯遽託之乎公羊曰三世內娶無大夫于義迂假榖梁曰不稱名姓在祖之位尊之啖叔佐曰夫子因魯史垂訓宋大夫祖位同者書姓名何妨乎秋楚人圍陳納頓子于頓頓偃姓子爵今陳州項城縣界漢南頓也納頓子者楚榖梁以為陳非也頓子見逐出奔何氏言小國例不兩書出入似矣然於經陳無加兵于頓之文意者疆場之事頓子親為膚受之訴而實未嘗失國歟曷為不言歸興師而致之其勢視歸以為難耳頓子不名王彥光曰諸侯不相名故北燕伯亦不名然則不與納也何居曰春秋之法夷狄而中國則中國之陳頓之事而使夷狄正諸夏庶幾乎興滅繼絶者有中國之道矣安在其不與也若曰不與其納則齊桓之城邢胡子何以與之與齊桓而不與楚聖人大公之心不若是也然則無罪乎曰執宋公納頓子侈然廢置諸侯若代德者矣是可罪也而聖人權以與之葬衛文公冬十有二月癸亥公會衛子莒慶盟于洮中國無伯參盟復起也初僖元年公子友獲莒拿至是二十五年矣莒無所釋憾于魯而衛方不咸于齊自桓之沒衛即從宋伐齊已而邢人狄人伐衛明年而衛人伐邢又明年而齊人狄人盟于邢又明年而狄侵衛蓋齊邢狄為黨而衛自為黨也莒國城陽齊國臨淄封壤相錯故衛又欲携莒間齊立黨嫁禍以自紓春秋據實書之杜氏謂豫之非也明年盟向則齊侵魯者再衛伐齊者一其情曉然可知聖人豈遽豫之以調人合方之事哉文公既葬而成公不稱爵述父之志平莒于魯降名從未成君也季氏云僖致二國使從楚非也榖梁傳曰莒無大夫其曰莒慶以公之會目之趙伯循曰凡事接于魯雖非命卿皆書名傳不逹此例遂穿鑿耳洮時屬曹至三十一年乃入魯莒慶不稱氏未賜族二十有六年春王正月己未公會莒子衛寧速盟于向向莒地尋洮盟也齊人侵我西鄙公追齊師至嶲弗及齊衛讐而鄰莒孝公自欲紹伯故討二盟其侵曰人追曰師齊伏為諼也嶲齊地濟北榖城西􅈶下是也蘇氏指掌圖曰博州鄭漁仲汪仲裕定為今東昌博平地在齊西而南近魯西鄙今東昌正在兖西北地至嶲急辭譏其深入公榖謂侈而大之非也弗及不能及內無戎備也謂譏魯有畏者公羊之謬也夏齊人伐我北鄙衛人伐齊杜氏云孝公未及魯竟先使微者伐之趙子常以為齊侯而略言之非也衛人以洮盟故為魯報齊公子遂如楚乞師乞重辭也重人之死非所乞也亦卑辭也成二年臧宣叔如晉乞師不書而書乞楚師志望國之屈于蠻荆也秋楚人滅夔以夔子歸夔子爵芉姓楚君熊摯後今荆州府歸州東二十里有故夔子城楚于是滅同姓矣冬楚人伐宋圍緡此是與齊爭宋左氏謂宋即晉非也是時晉方養鋭猶未通諸侯也魯乞楚師為楚人道用之兵禍之不可啓而屬辭者可以責魯矣公以楚師伐齊取榖公至自伐齊於是置桓公子雍于榖易牙奉之以為魯援楚申公叔侯戍之以逼齊趙子常曰東諸侯鮮不折而入于楚是天下之大變也至者飲至也二十有七年春杞子來朝此杞桓公也其稱子左氏傳曰公卑杞杞不共也杞自貶以朝大國則曰伯魯人卑之則又曰子齊桓既沒而貢賦日繁此魯所以取責于杞也春秋從史文而魯惡見矣夏六月庚寅齊侯昭卒弟潘嗣是為昭公史記云潘殺孝公子而立左氏曰孝公卒有齊怨不廢喪紀禮也孝公名昭而潘諡昭非也秋八月乙未葬齊孝公六十六日而葬速也乙巳公子遂帥師入把內入國據無駭帥師入杞不日趙子常曰杞桓公來朝公卑之以子男禮見使公子遂帥師入把責無禮焉重小國之幣而薄姑姊妹之恩故日以甚之也冬楚人陳侯蔡侯鄭伯許男圍宋晉伯之興皆以救宋却楚故晉人之言曰成伯安疆自宋始季氏謂宋中國之樞是也陳蔡鄭許皆楚道所由曹衛道少逺則為楚聲援絶宋通晉矣圍宋之役傳曰楚子及諸侯圍宋宋公孫固如晉告急然則實楚子也而微其辭經本誤文也公羊子曰執宋公故終僖公之篇貶啖子正之是也然啖子信榖梁人楚子以人諸侯信斯言也是聖人以禮望蠻荆而薄責于中國也且讀者無乃疑夫人楚而爵中國乎聖人史外傳心之法固隱而莫測也其不厚望蠻荆而薄責中國又以疑似之辭垂後者決然可知也吾讀陳氏之言異焉序楚於上而盟之嫌其豫伯夫春秋之法會同則以國大小為序征伐則以主兵者為序而奚有是乎以微者告以微者書杜氏既失之其曰子玉又吾所不知也十有二月甲戌公會諸侯盟于宋於是魯僖與盟則絶宋北道無以通齊也二十有八年春晉侯侵曹晉侯伐衛楚得曹而新昏于衛雖不與圍宋而實為聲援又皆近宋故先以偏師侵曹欲動楚而嘗之楚不動則又正名伐衛使楚救衛以分其勢多方誤之先軫狐偃之始謀非實修怨者榖梁以為忌而胡子遂譏之過矣不曰遂兩之也李堯俞曰曹逺衛近不得以為繼事而言遂公子買戍衛不卒戍刺之此僖為楚戍衛也買者莊公子僖庶弟也僖背華即戎買見晉之伐知徙義而遷矣刺而文致以説楚非也周官小司冦掌外朝之政三公及州長百姓北面羣臣西面羣吏東面三刺之法訊羣臣訊羣吏訊萬民矣而以不正之令殺先君之子以媚蠻夷之人何義乎左氏謂魯畏晉故刺買亦以説晉猶曰戍衛者買之謀云爾然城濮魯不與戰至踐土乃朝王所又此時楚方救衛僖肯遽舍其死黨而翻然即華哉三月丙午晉侯入曹執曹伯卑宋人外入國如哀八年宋入曹不日此其日以為伯討也執不歸京師先軫怒楚之謀非所宜卑也胡氏以為譎是也夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績城濮之戰輕兵侵曹以示其緩重兵伐衛以聲其急多方以誤之謂晉侵曹則又伐衛謂其伐衛則執曹伯者又晉侯也春秋辭繁而不殺因其功而著其譎聖人之情見矣書晉侯見晉侯志乎此戰也子玉得臣書人未命之卿蜀湯氏謂非人以貶楚子是也胡子曰得臣未有必戰之意晉苟復衛侯而封曹則得臣將釋宋圍矣此蓋緣左氏以起義者也而左氏失實考之經宋圍已釋在楚人救衛之時使楚方圍宋則執曹于何卑宋而城濮戊申之次且何以有宋公也經書衛侯之奔在城濮戰後子玉奚為先事請復傳稱陳蔡從楚經亦不書即求之傳既曰楚子入居于申使申叔去榖子玉去宋也子玉之使伯棼亦請戰而已不言請圍今左氏載得臣之語乃曰釋宋圍是其言不亦自相反哉杜知其踈乃曰楚子還申遣此兵以就宋圍之衆誤矣謂得臣未有必戰之志恐亦信左氏而不考之過也是時楚大衆在曹南背􅈶而舍未嘗盡行髙閌謂與救謂之師戰是也敗則乘勝逐北并摧在酅之衆故曰師城濮當在鄄洮之間曹衛界上杜云衛地也楚殺其大夫得臣此成得臣也楚殺公子例不去公子得臣去氏何也陸淳以為未命然則傳之所稱或得諸追書如檮杌之類以為討當其罪而去氏趙子常誤也殺有罪而以纍上之辭書惡楚子也知其不可敵也而不能使勿敵少與之師又以一敗殺之胡子所謂重師而棄其將以與之是晉再克而楚再敗也衛侯出奔楚屬辭比事春秋教也始衛分七族餘氏受三監之地其地南始武父北至圃田巍然大國也衛成之立叛華即夷始與楚婚晉文伐之致楚師耳修其辭以下晉晉雖有不禮之憾敵怨已易世矣聞楚之敗而亟請罪焉尚可也懼而奔楚自襄牛適陳使元咺奉叔武以受盟豈非迷復者哉胡康侯謂不以罪名之重晉文之咎是不考于事而以虛辭説春秋也奔楚即罪又何嘗辭費哉趙企明亦不考左氏因以晉文逼衛侯使奔而踐土之衛子晉文實立之也若衛子晉所立則不兩月之間衛侯何敢遽反而楚何敢遽奉之不亦誣哉然則不名者婚嫁之故未至于卑伏屈損不失寓公之禮故據實書爵而不名耳非罪晉也歸則復名叔武立不可以無辨也何邵公曰出奔楚當絶不當廢叔武而反之令得殺叔武也按子者謂侯未踰年在喪之稱也衛鄭之奔若匹夫然而即夷以免不可再辱社稷若叔武者春秋已正其稱子何氏謂當絶衛侯是也五月癸丑公會晉侯齊侯宋公蔡侯鄭伯衛子莒子邾子于踐土晉始伯故序齊宋之上齊先宋伯者以強弱升降也叔武稱子治君臣父子不敢以兄弟通也莒故附魯即楚邾附宋伐齊魯宋服遂懼而請盟也踐土今鄭州滎澤縣西北一十五里衡雍故城僖二十四年天王出居于鄭自後未嘗歸於成周傳于二十五年書四月丁巳王入于王城而經不書非實也傳言王宫之作鄉役之三月耳鄉也者前也城濮未戰之前三月作宫豈遂知其必勝而王必出勞乎左氏雖不可盡信然初不言召王也即召之其罪輕于放弒矣放弒春秋不諱也而獨諱召乎往天王出居于鄭踐土鄭地也盟而朝將以納王趙氏可謂核於事矣王聞勝而往勞之杜説足以正河陽之行耳而以言踐土不其左歟公羊謂不與致天子而胡氏信之過矣陳侯如會陳本與楚楚敗懼而屬晉聞會自至故曰如會來不及盟也公朝于王所不日盟之日也列朝于踐土之後見將納王也但言公非期會不序也王所者踐土之宫據覲禮天子所在言王所詩曰自天子所其例也傳言晉侯出入三覲而經不書又王子虎盟諸侯于王庭非朝則何以至王庭以是知諸侯皆朝非期會不序也胡康侯據榖梁所非其所為言按覲禮肉袒于廟門之東周官大行人廟中將幣三享蓋禮受摯于朝受享于廟朝者位于內朝而序進覲者序于廟門外而序入此常禮也趙伯循曰天子巡守諸侯會朝于方嶽之下何得云朝于外即為非禮且物理人情豈有天子出巡而諸侯不朝乎但曰據經諸侯既盟王乃至方行朝禮則亦不知王尚居于鄭惑公羊致天子之言矣朝覲久廢是亦晉有功焉惜也不俟天子之歸復朝王城不但嘉禮野合耳常朝于京師出朝于王所諸侯之職也六月衛侯鄭自楚復歸于衛衛侯名别叔武也自楚者惡所自也惡即戎也復歸者國逆辭叔武之賢也何休以為不當廢叔武而反衛侯是也趙企明曰叔武書子以書其遜且賢衛侯書名以見其逆且有罪其言善矣然不知春秋據事直書之本旨也衛元咺出奔晉元咺衛子之相也初衛侯之從楚其國人莫欲也故出其君以説于晉衛侯復寧俞盟國人曰天禍衛國君臣不協以及此憂也居者無懼其罪而咺猶奔叔武之相懼衛侯有討也叔武不書殺左氏以為誤公羊以為忌假令實誤元咺奚為訴其殺弟乎假令咺誣其君訟當不勝何為衛侯反不勝乎晉人豈不知嘗為叔武殺歂犬乎劉原父非左氏是已公羊終殺叔武云者謂非誤殺也然衛侯殺公子瑕及元咺皆書豈反不書叔武之殺意者叔武實未嘗殺元咺之奔自緣子角見殺又以故相自疑見逐而行乎趙子常曰由僖公而臣益專其出奔非有罪則強家相傾不然則亦關乎一國之故與公子之未命者異故志書之陳侯欵卒子朔立是為共公秋杞伯姬來來謝過而求平也公子遂如齊張主一曰公子遂如齊而取榖之憾解中國貴伯權如此冬公會晉侯齊侯宋公蔡侯鄭伯陳子莒子邾人秦人于溫天王狩于河陽劉原父曰晉侯召王自嫌不順使王狩以匿其罪狩不當書今書者所以起狩為晉侯召也杜氏亦有罪而情順胡子因取其説傳經焉夫既曰罪矣又曰情順其亦不達于辭矣榖梁子曰諱天王公羊子曰不與再致天子也求而不得乃求魯子之言近溫而逺踐土夫諱近不諱逺是魯子之妄以别於踐土也仲尼曰以臣召君不可以訓今説春秋孰非承斯義者然非孔子之言也夫聖人之史固以教也故曰亂臣賊子懼天王有凌遲之嫌晉侯得以自脫于召君之罪雖謂之訓亦安能以為戒也君子正誼而不謀利信如何休則雖正君臣明王法亦奚可也况所謂致諸溫必能致諸洛又臆説哉若仲尼原其自嫌之文而為是寬宥則履霜之漸不可懼乎經先書會溫而後書狩蓋天王聞而往也溫即河陽之屬水北曰陽溫在河北王者無外不得言非地也然則為天王與晉侯諱書王子虎以尊王室全伯功也信乎曰諸侯有疑則盟于會同王官之伯臨之伯不盟也由齊桓以來莫改也子常容知子虎之與盟乎傳有之王命尹氏及王子虎內史叔興父䇿命晉侯為侯伯不言與盟也惡用諱翟泉盟王人不諱以是知非子虎也壬申公朝于王所傳言晉侯以諸侯見則非獨公矣不月者杜云缺文謂由録內而獨日趙伯循曰録內書日何不月乎公羊非也榖梁以為失所係如晉文行已傎而不宗周趙伯循曰言為文則鑿也晉人執衛侯歸之于京師晉人者晉之微者也溫之會傳曰討衛許也而以交訟紀于下則衛已赴會又何以不書衛侯來會乎書執于狩後則晉侯遣人别執之謂執在王狩之前傳失實也榖梁曰此入而執言入衛也蓋必有所傳聞焉合經義矣而陸淳譏其不知咺訟之事非也襄二十六年晉人為衛孫氏故會澶淵執寧喜衛侯如晉晉人執之而經不書説者曰為臣執君不可録削之也而為咺執衛侯曽謂文公不知此而春秋又何不削乎衛侯之復自楚言有奉也咺之奔畏逼也衛侯之執不緣咺之訴以恃楚而不朝故溫會為討今遂執耳歸于歸之于趙伯循謂傳寫衍縮其義一不煩妄釋也歸義焉假義行之耳衛元咺自晉復歸于衛惠王復周公忌父鄭復公父定朔宋復蕩意諸不書必挾外援以歸然後書其曰自晉譏在晉也君歸則身出而歸晉君出則晉奉而歸衛胡氏曰大夫不世其稱復絶之也陳君舉曰衛元咺復歸宋魚石晉欒盈復入皆伉辭也諸侯遂圍許曹伯襄復歸于曹遂會諸侯圍許鄭伯襄莒子邾子執君歸皆不書復于是言復失國非二君不名於是始名之罪也罪曹伯所以譏晉也行賂于巫史以求復輕其社稷宗廟甚矣君子欲正性命之理者奚可苟焉免乎哉遂者急後事辭得復而行不歸國也而曹伯之自立可知矣二十有九年春介葛盧來介莒附庸國在今萊州府髙密縣西南杜注城陽黔陬縣地葛盧者董氏繁露附庸二十里名者也趙子常曰僖公始作頌以來淮夷為誇故雖不見公書之以其能來也公至自圍許飲至以為功是魯人不以朝王為重也夏六月會王人晉人宋人齊人陳人蔡人秦人盟于翟泉此大夫交政之始也洮之會王室有故世子畏不得立公卿大夫皆不遣而下士實行世子使令之私也而得以王人首載書者齊侯為惠后叔帶及其公卿大夫不得已而盟也事定則葵丘殊宰周公不盟矣若翟泉則左氏以為鄭故是諸侯有疑耳諸侯有疑會同則內史掌其盟司冦涖其約王室所以待諸侯也何疑于王人而盟之洛陽城中有太倉其西南有池水焉斯翟泉也洛去王城二十里耳襄王復辟晉侯慮羣小未安故為此盟盟以微者則人不驚王子虎不與盟也則是盟也者晉侯慮事之周有關于天下之故矣左氏以為公會王子虎盟公榖經適有公及之文胡子遂以為諱公貶卿失經意矣然遂啓大夫交政及其甚也有君從臣盟若鄭伯及伯有衛侯及析朱鉏北宫喜者矣又其甚則臣逼君于盟若趙鞅盟于公宫者矣漸可畏哉秦後蔡班杜氏曰襄二十六年澶淵宋向戍列鄭下與此皆後會或然也秋大雨雹不書月日闕文也胡子曰雹者戾氣隂脅陽臣侵君之象冬介葛盧來以不見公故復來啖叔佐曰不於廟受故不言朝陸氏曰葛盧但以事來本非來朝所以不廟受故書來爾然則不得如公羊云不能乎廟也趙企明謂明年侵蕭因此張氏以為求援舉兵或然矣三十年春王正月夏狄侵齊胡子曰上書狄侵齊下書圍鄭直書其事而義自見者也髙抑崇曰齊桓召陵之後書狄侵晉晉文城濮之後而狄侵齊狄敢陵侮而二伯不相攘斥也秋衛殺其大夫元咺胡子略曰元咺無人臣之禮然春秋躬自厚而薄責於人也衛侯在外而稱國以殺待其殺而後入是志乎殺咺瑕也大臣從君于惡而不能止故曰君與大夫專殺之也及公子瑕據左氏瑕立為君逾年矣今但曰公子者趙氏以瑕為元咺假立而自秉國權如未君故以君殺大夫之辭言之而在元咺下然則左氏失實胡子謂瑕能拒咺守節非也守節者必退而耕于野不義乎其食或遂違而去之則可矣及者咺故延及之咺存則瑕存咺死則瑕死耳謂非其黨不可也衛侯鄭歸于衛鄭賂周歂冶厪以卿故據其自卑之實而書名公子瑕攝國而未立與國人立叔武者異是其位未絶也故再歸不書復然成十五年晉厲執曹成其歸書自京師者殺士榮則針莊子歸衛侯于周而置諸深室者晉也請王命以殺衛侯天子曰不可君臣無獄元咺雖直不可聽也為臣而殺君又安用刑晉人乃歸衛侯左氏謂公為之請納玉於晉十瑴是也納王玉非也春秋以自歸為文命不係于王權不歸于晉蓋散辭也豈獨不以衛獄纍京師哉晉人秦人圍鄭晉軍函陵秦軍泛南各使微者圍鄭故稱人杜元凱據傳釋經是也諸家謂晉侯秦伯貶稱人不知函陵汜南尚逺鄭都也然則無貶乎翟泉之不至鄭之罪也越五年而兩會盟無舊怨明矣左氏修怨之言失實也然不修其文告而稱兵以圍之則伯主亦已甚矣秦叛夏盟與晉連兵于是始介人侵蕭蕭杜氏曰宋附庸國冬天王使宰周公來聘公子遂如京師遂如晉冡宰上兼三公其職任至重天王以魯兩朝之故而宰周公實來意莫厚焉魯君不朝而以聘禮上問如邦交諸侯之伉也不專事而兼事以行胡子謂夷周于列國春秋所誅而不以聽者也三十有一年春取濟西田濟西之田蓋魯之田也濟水自滎陽東過魯之西至樂安入海故有魯濟齊濟巨野之西今為東平東平西北為范皆濟西也今東平汶上縣與壽張故城接而濟水流經其西則為濟東故曰自洮以南傅于濟東皆魯濟矣東界魯北界齊南界曹其地還魯今云濟西魯濟也宣元年齊人取濟西田至宣十年齊人歸我濟西田而以為曹田左氏公羊之妄也襄十九年取邾田自漷水書邾濟西苟曹田也曷為不書哉晉執曹伯不應踰四年而始分其地趙伯循指傳妄是也且分曹田者晉人怒楚之譎謀今曹伯襄既反楚又已退雖宋人必不能保其賜也魯何為者而分曹田哉傳前後自乖必不察于事情矣詩頌僖復周公之宇考僖年經無其事豈非即此為頌哉書法與成二年取汶陽田同濟西汶陽皆魯舊地也趙子常衍杜氏之説謂之伯主故不係曹此過信傳也宋大鼎係郜豈有實曹田而不書者哉然則于何取之乎齊魯之間間田也公子遂如晉言濟西也夏四月四卜郊不從周以建子為正王者必以嵗首為郊百神受職矣三代不同周郊適與冬至同月非為長日之至也日常用辛豈至皆辛哉周禮小祝司寇戎之事保郊祀于社薛尚書逺曰王安石兩讀者非據文郊社同墠也秦壇言三百步四周為澤宫魏儒芳言壇有四門門外為四郊觀覲禮大略可見故逸周書曰設大社于周中當四周之中立大社即澤中方丘而圓其頂即地上圓丘也大司樂冬日至以陽聲召陽氣其律相繼故天神降夏日至以隂聲召隂氣其律相生故地祇出合為九變其律相合故人鬼格此所謂大合樂非分祀也二至演樂則分隂陽以召驗之及祀天地配以后稷則同于大社乃坤順承天合同而化之義循中庸郊社事上帝之言薛氏是也魯之郊史角為惠公請也然曹劌諌觀社曰天子祀上帝諸侯會之受命焉諸侯祀先王先公卿大夫佐之受事焉則有其制而未嘗敢用也僖首舉之故魯頌曰周公之孫莊公之子龍旗承祀謂莊公之子明郊始于僖也祭統漢儒之陋言成王而并及康王中無定主附會之説也魯郊非禮謂求吉之道三四以為非公羊之謬也周禮祭祀者先卜吉卜牲與日左氏云禮不卜常祀郊用嵗首上辛有常無卜郊之禮也記禮者謂卜郊受命于祖廟作龜于禰宫趙企明以為魯僭而非三代常典左氏啓蟄孟獻子祈農皆魯遷避之禮郊迎長日之至鄭云建寅日長之時緣左氏誤以魯事為周也夫企明以郊為魯僭是也然謂啓蟄祈農之郊為魯人遷避之制則亦非也周禮大樂師奏圜鍾于圜丘則天神皆降安得以啓蟄祈農為非周制乎但此五帝因事之祭并祈年田祖皆于社行之郊社一也魯郊大報天主日而配以月非諸侯之事守矣又魯郊嘗以孟春孟春者建子周正也卜郊在三正之月旬一卜之故于啓蟄之月適為四卜郊耳曷嘗避孟春上辛哉魯頌曰春秋匪懈享祀不忒則四時錯舉亦不正與周同秩如成十七年九月內郊是也乃免牲未牲曰牛既卜曰牲牲成而卜郊上怠慢也榖梁子曰免牲者為之緇衣纁裳有司元端奉送至于南郊免牛亦然非也辨見後猶三望猶者憾辭三望者方望戴氏謂魯居東方密近泰山濟水而望祀西南北三方是公羊指泰山河海胡子聽之按孔頴達李瑾以魯為汶南泰山在汶北魯頌稱泰山魯邦所瞻非周公百里封內趙企明乃謂岱濟淮皆失實矣賈服杜氏俱以分野之星國中山川為三望按書望秩于山川則望不得言分星國中山川亦不得言望也古者天子四望魯僭天子而不敢盡同故三望以自旌也然望禮或因於類因於柴今不祭天而望失禮之中又失禮矣秋七月冬把伯姬來求婦伯姬之來杞衰見侵因伯姬以求庇也然杞侯失夫之剛而不制僖公以兄弟而不拒蓋兩譏之矣於是僖女叔姬歸為把桓夫人不書歸禮不充歟見出而歸喪蓋兆於此狄圍衛十有二月衛遷于帝丘帝丘今開州滑縣東北七十五里古濮陽顓帝之墟故曰帝丘今淇縣西朝歌衛都其左正受狄衝蓋狄在今真定府以南古中山連亘順德府平鄉縣本在衛北故徙南帝丘以避之卜年而遷蓋寧俞與謀焉衛成不自強而晉文莫之救蓋伯業替矣三十有二年春王正月夏四月己丑鄭伯捷卒子蘭嗣是為文公衛人侵狄秋衛人及狄盟狄有亂衛人侵狄狄請平焉衛人與狄盟于狄書衛及衛所欲也譏也冬十有二月己卯晉侯重耳卒子歡嗣是為襄公三十有三年春王二月秦人入滑滑近衛鄭秦戍鄭必假道焉入其國都曰入齊侯使國歸父來聘國氏歸父名卿也桓文起諸侯不相聘矣於是晉文沒而齊昭聘魯豈欲嗣伯故修好耶吳氏謂報公子遂夫豈有六年方報聘者哉夏四月辛巳晉人及薑戎敗秦于殽人者蜀湯氏曰晉襄公在柩次敗秦師者諸將近是及者晉人角之上薑戎掎之下不同陳也薑戎本允姓其後戎子駒支云謂我諸戎四嶽之裔胄疑因冒薑姓也今陜州盧氏縣北連靈寶古虢略薑戎當在其處國語宣王敗績于薑氏之戎蓋其來久矣殽今陜州東硤石關杜注𢎞農澠池西晉河外虢略東境之地晉在北戎在南故因秦入滑邀其歸也趙子常曰外相敗不書以秦人背晉而戍鄭將因襲之反覆晉鄭之間是伯圖之所宜討故日以謹之與之以繼伯而討罪也今按先軫之謀曰秦不哀吾喪而伐吾同姓之國秦則無禮何施之為此其言未可與把子比而同也胡子皆以為去仁義懷利以相與豈不已甚哉癸巳葬晉文公晉先有文侯而今復諡重耳為文故曰二文非禮也狄侵齊公伐邾取訾婁秋公子遂帥師伐邾間晉之有事也晉人敗狄于箕人謂郤缺也稱人者未為卿傳曰郤缺獲白狄子矣季明德以為今廣平北皼肥之狄非白狄非也箕晉地今太原府大谷縣東三十里古城邑縣南狄至是蓋深入矣陳君舉曰凡列國敗之不書據隱九年鄭人大敗戎師閔二年虢公敗犬戎之類惟晉特書之特書晉者晉帥天下諸侯以安諸夏存中國也前年狄侵齊去年狄侵衛而不能救于是伐晉蓋僅而後勝之也以是為盟主病矣冬十月公如齊報聘也而自行僖之輕身為已甚矣季明德言僖女為齊昭夫人經不見無據十有二月公至自齊乙巳公薨于小寢小寢內寢也君薨必于路寢就羣臣百官以明授受正其終也趙伯循曰大位姦之窺也危病姦之伺也若蔽于隱是女子小人得行其志也胡子言君日出而視朝退適路寢聽政使人視大夫退然後適小寢釋服則非疾時事矣僖從桓文有功焉舍是無足取詩有溢美焉耳隕霜不殺草李梅實彌冬不寒也孔子曰天失其道草木猶干犯之而况君乎於是咎徴見三桓出矣晉人陳人鄭人伐許討其二楚也趙子常曰前年楚鬭章請平于晉晉陽處父報之晉楚始通文公為之也襄公始有志于諸侯不先定東諸侯之交而有事于許非其序也雖然伐楚猶可也伐沈微矣春秋明志録卷五
