body:
  text: 春秋明志録卷八明熊過撰成公名黑肱宣公子母穆姜在位一十八年諡法安民立政曰成元年春王正月公即位二月辛酉葬我君宣公無氷豫恆燠若之徴也三月作丘甲志重賦也周十六并為丘四丘為甸而成三甲令使丘為甲是乘為四甲而不增乘以將有齊師也甸乘丘甲自鄭康成注論語舉公卿大夫畿內采地之制及小司徒辨畿內都鄙地域皆稱司馬法言雖異而事同古天子用兵先用六鄉不足取六遂不足取公卿采地及諸侯邦若諸侯則先三鄉不足乃總徴徴境內也一甸四丘所出有匹馬頭牛甲士三人步卒七十二人此徴兵法謂之長轂一乘此統一軍之甲杜氏以為使丘出之胡子疑其重遂謂增三之一稍輕于杜然皆以虛數求而不附之地也包咸注論語曰方里為井十井為乘百里之國適千乘也何休曰軍賦十井不過一乘說者以為近是而何說今不見公羊注今以萬二千五百家而為鄉家出一人而為軍以地計之實得一千五百五十六井二夫而成一軍三鄉四千井得三萬二千人以地方百里所賦除其山川沉斥城池邑居園囿經塗溝洫三易之通得八十里而以四十里為遂大司馬五起五家為比課徴邦國出兵徴兵既至臨陳還同鄉遂之法皆用卒兩師旅也以五起之蓋井餘三夫若一井八家盡起諸侯三鄉三萬二千人合三遂七家出一人得四千五百三十五人少一千六十五而不成三軍包何說尚未盡陳祥道言魯三郊三遂可備六師亦考之未詳也蓋十六井百二十八夫為丘四丘為甸軍賦起于井成于甸甸即乘詩頌僖公公車千乘舉成數之辭昭公八年搜于紅又曰自根牟至于商衛革車千乘三家之師也乃作丘甲以後四分公室時耳然至哀八年邾茅夷鴻言于吳曰魯八百乘蓋其數與前八十里者合又以受封之始言故作三軍時三家各毁其乘以足之可見今尚未及千乘矣周禮大國五百里記曰成王封周公地方七百里記禮者合附庸言之其實五百里疑亦出經師附益魯之乘固不可據舊相檢核也至襄十一年乃書作三軍則車乃有定數耳詩公徒三萬是槩舉全數侈言之今曷嘗增乘哉據子産言天子一圻列國一同今大國數圻非侵小曷以致此蓋得之矣胡子疑計甸增乘三之一既又引二廣之法疑其增甲而不增乘兩者竟不自决過矣小司徒注引司馬法别有革車之制成三百出革車一乘萬井革車百乘甲士千人徒二千人疏家謂公卿大夫畿內采地所出與小司徒井邑丘甸辨畿內都鄙出軍之法不同或疑一成百井而六十四井已足一乘又旁加一里餘三十六井無所用之鄭注以緣邉三十六井者為治溝洫殆强解剝內外分為二事規制不能畫一無以正經界均賦稅是不知開方止可以井其云旁加乃以虛數相配未嘗以之畫野也禮疏坊記諸侯車甲牛馬計地令出恐非力之所能是國家所給今考左疏長轂馬牛甲兵戈盾皆一甸之民同共此物若鄉遂所用車馬甲兵之屬皆國家所共給若以一鄉出一軍者則是家出一人其物不可私備蓋得先王之意矣夏臧孫許及晉侯盟于赤棘不月略之也許魯卿臧孫辰子凡內大夫特盟諸侯恆略之惡其伉也歸父奔齊晋蓋疑魯二于已魯亦以晋之不已信也故為赤棘之盟赤棘晋地蓋懼晋而求同也左氏聞齊將出楚師故盟赤棘然魯方善楚楚不與齊交楚曷為為齊出師哉且齊本强國其欲伐魯何藉于楚疑左氏傅聞有失實者矣秋王師敗績于茅戎夷狄敗中國月而不日敗績于茅戎不月異天子于諸侯也不言敗之者公羊氏曰王者無敵莫敢當也不言戰榖梁氏曰莫之敢敵非莫敢敵戎邀之不戰而潰也茅戎允姓别種不地明其敗于戎也公榖以為晋敗之誣矣不戰而書敗績明其自敗也劉康公不以惇信持國而輕于邀戎是失其所以居天下禦四夷之道也劉質夫原程氏之意以尊尊自反表經義得之矣冬十月二年春齊侯伐我北鄙二于晋也夏四月丙戌衛孫良夫帥師及齊師戰于新築衛師敗績衛書大夫帥師于是始强也齊師者齊侯也一役而再有事者略言之用衆焉稱師前年晋侯衛世子臧伐齊故齊伐魯反過衛而報之新築衛地凡戰以被伐者為主故以衛主之左氏謂侵齊與齊師遇失書法矣傳有缺文失新築戰事從經趙企明與豫同也然衛人不能反躬解紛逺怨之道並見矣陳君舉曰良夫世為卿至林父出其君入于戚以叛是故孔逹不言帥師必良夫而後言帥師六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晋卻克衛孫良夫曹公子首及齊侯戰于鞍齊師敗績僑如得臣子嬰齊叔肸子古大國三卿是時魯四人將並仲孫蔑五卿始趙盾以諸侯伯至是郤克遂以大夫伯政在大夫矣魯于聘問盟㑹雖二卿並行止書一使至行師用兵則並書諸將其他國惟書元帥詳內略外耳陳君舉言凡帥非卿不書卿非元帥亦不書非也魯是時止有二軍行父將一軍而許佐之僑如將一軍嬰齊佐之耳至襄十一年始作三軍趙子常謂不正其四卿帥師㑹戰各自為帥非也然仲孫蔑以十五年無婁之㑹睦齊不出胡康侯乃謂無人乎成公之側亦非實矣鞍去國五百里自癸酉逮己酉凡三十七日春秋以七大夫主戰書及大夫皆橫志乎戰也是時晋有六卿政在大夫豈獨魯哉單襄公辭鞏朔曰兄弟甥舅侵敗王略王命伐之告事而已不獻其功所以敬親昵禁淫慝也意蓋有所諷矣曺無大夫而曰公子以吾之四大夫在焉舉其貴者也此曺大夫帥師之始秋七月齊侯使國佐如師己酉及國佐盟于袁婁如師者盟非前定之辭春秋內詞稱及故盟國佐者魯也左氏乃謂晋師及國佐盟于袁婁公羊則曰卻克使魯衛之使以其詞為之請逮于袁婁而與之盟非也文七年公㑹諸侯晋大夫盟于扈襄三年豹及諸侯大夫及陳袁僑盟二十七年豹及諸侯之大夫盟于宋稱及者皆內詞也然其與盟者未嘗不書據經文何以知晋盟國佐哉使盟國佐者實晋主之而三國大夫皆與恭盟應如召陵不言及或魯衛所請亦宜書及衛人及國佐盟于袁婁安得于內事之辭無别哉榖梁傳曰鞍去國五百里袁婁去五十里据傳國佐背城借一則袁婁近鄰國都明矣今臨淄縣西有袁婁一戰綿地五百里焚雍門之茨侵車東至海君子聞之曰夫甚勝之詞焉齊侯使國佐如師而進盟之于袁婁以逼齊君桓公之所不敢而四臣安為之甚矣鞍戰之忿也八月壬午宋公鮑卒子固嗣是為共公庚寅衛侯速卒子臧嗣是為定公取汶陽田取者得非其有之稱汶水出泰山萊蕪縣水經注在汶北乎暢極目是蛇丘歡棘皆其地矣孔疏魯在汶南則汶陽之田北與齊界此魯侵小而得者或云古鑄國地僖元年以賜季友則屬魯當在春秋前為齊所侵不繫魯者地當在所損不以名假之也杜氏云恥乘勝脅齊求賂得邑故諱使若非齊邑非也胡子曰恃大國兵力一戰勝齊得其故壤而不請于天王以正疆理則取之不以其道與得非其有奚異乎冬楚師鄭師侵衛十有一月公㑹楚公子嬰齊于蜀杜元凱曰蜀魯地蓋楚公子嬰齊以大衆與鄭師臨衛久未退兵而嬰齊適先至蜀以魯之素有舊好而相親也故成公特毁列親㑹之公羊以書公子為亢啖叔佐曰傳以處父不書族為亢今以書族為亢何自矛盾也丙申公及楚人秦人宋人陳人衛人鄭人齊人曺人邾人薛人鄫人盟于蜀楚大夫初㑹盟中國也㑹而後盟間有事則地㑹地盟此非有事而再言地㑹與盟事異也㑹書公子嬰齊盟稱人何也中國君大夫疑其始也以楚大夫未嘗主中國㑹盟也魯欲致諸侯以求楚成諸侯始以微者往諸侯之未忘晋也嬰齊亦去之而使微者主此盟也公羊以嬰齊為惡而曰得一貶焉耳非也謂㑹書公子從恆稱以見實盟變文稱人以示義者誣也宋華元陳公孫寧衛孫良夫鄭公子去疾本不與盟謂人嬰齊不可不人諸卿誣也左氏謂蔡許失位而不書猶誣也秦序中國之上秦强也齊大國而序鄭下左氏謂大夫非也臧宣叔曰齊楚結好我新與晋盟晋楚爭盟齊師必至雖晋人伐齊楚必救之則陽橋之役楚本為齊而來然齊怵于鞍之威遠楚近晋以微者盟而拜賜故楚人怨之擅為進退而後其班左氏云匱盟必得其情矣至襄十四年向之㑹鄭公孫蠆乃别于齊人宋人衛人之下晋悼方明復以國班耳春秋公與大夫盟例不書㑹而書及我君欲而大夫從之也蜀魯地也㑹盟異事而皆于蜀則魯欲是而摟諸侯之大夫以從楚不沒公以為伯權與夷夏盛衰之所繇也豈獨惡在內者乎邾薛鄫親來預盟漸非桓公之舊晋景亦聽其自至未有改焉至悼公時則遂以為定制而小國多不附大國矣三年春王正月公㑹晋侯宋公衛侯曹伯伐鄭春伐鄭中國之無伯蜀之盟為之也於是乎晋力疲于鞍而楚張矣蜀之盟鄭實導楚晋樓諸侯以伐之鄭不可謂非罪也宋魯曺幸反楚而從晋固亦知擯非族類矣則復怨勤民安足以深罪五國哉胡子責五國之復怨勤民殆非孟氏取彼善之義哉宋衛未葬而稱爵齊氏因謂正諸國之爵見鄭當討亦非也春秋之法踰年者則自稱君耳桓十三年衛宣未葬而衛侯書爵踰年也僖二十五年衛文雖葬而洮之㑹衛子不爵未踰年定四年召陵陳子不爵未葬且未踰年也必踰年者所謂緣臣民之心不可曠年無君故以事相接勢不得復稱子也然則金革之事不避禮與君子以為東郊不開荆蠻猾夏其急同也辛亥葬衛穆公二月公至自伐鄭甲子新宫災三日哭哭新宫災公羊子曰宣宫曷為謂新宫不忍言也其言三日哭奈何廟災三日哭禮也榖梁子以為禰宫亦不以哀為非禮也胡子蓋曰神主未遷故不稱宣宫蓋出劉質夫云耳禮諸侯葬七月卒哭告祔于廟而遞遷之祭畢則主反於寢三年喪畢則入廟以諡配廟焉子生三年然後免于父母之懷故喪必以三十六月斷禮家除喪于二十七月之後者天道去體而存用之義宣公薨至是二十八月而主不遷或疑三大功上古實不以足三期魯人猶存遺意遷主非緩而以二十七月為後王短喪之漸非矣趙企明曰以未祫知其主未入也然以經考十二公入廟舉祫皆無文即如胡子責其緩於遷主又必曰先人之笑語寢食不在焉可無哭也則是凡宫也者妥神而已死而營焉于笑語寢食焉何有而謂可必哭乎昔儒以廟災准墓毁然孔子防墓之崩泫然流涕則哭而以三日期亦過禮矣春秋西宫及桓僖廟災皆不聞哭亦無譏然則應災在實不徒事虛文也哉乙亥葬宋文公夏公如晋左氏傳曰拜汶陽之田鄭公子去疾帥師伐許公至自晋秋叔孫僑如帥師圍棘棘者公羊言汶陽之不服邑也其言圍之不聽也棘去汶八十里與蛇丘下界為疆是今肥城縣地矣趙伯循曰內言圍皆叛也大雩晋郤克衛孫良夫伐牆咎如牆咎如者赤狄别種也宣十五年晋滅赤狄潞氏其餘民散入牆咎如左氏謂討赤狄之餘是也克良夫得志于鞍而不自戢欲殄滅使無遺育此豈仁者之心哉冬十有一月晋侯使荀庚來䀻此晋聘之始衛侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟蜀盟楚故也既而從晋伐鄭矣今公朝晋晋報焉故庚盟魯疑其二楚良夫盟魯疑其以已自解于晋也聘而遂盟蓋於是時庚良夫生事專命魯雖以微者行盟亦不以禮自守矣胡子以二卿之抗故諱公則隱及莒人盟于浮來何以不諱公乎先儒謂大夫終不可以盟公雖來涖盟猶諱其失經義一也鄭伐許稱鄭疑文缺或曰鄭襄公背華即夷一嵗而再伐許狃于强而兵陳不戒如狄故狄之四年春宋公使華元來聘三月壬申鄭伯堅卒子費嗣是為悼公杞伯來朝杞桓公來朝訴叔姬也夏四月甲寅臧孫許卒公如晋葬鄭襄公秋公至自晋冬城鄆田言之曰汶陽邑言之曰鄆釋例土地名魯有二鄆文十二年城諸及鄆莒魯所爭東鄆也東鄆今莒州沂水縣古城陽姑幕成十六年公待季文子于鄆西鄆也魯既得汶陽故城鄆為固恐齊人復奪之耳杜元凱謂公欲叛晋城西鄆為備其說無稽矣鄭伯伐許未踰年而自將以躋惡也五年春王正月杞叔姬來歸僖三十一年冬杞伯姬來求歸至是四年疑色衰而愛弛矣前年杞桓來朝而叔姬竟歸魯受其訴耳不能謀其姑姊妹使以無罪出于是特書其月以别於郯伯姬仲孫蔑如宋夏叔孫僑如㑹晋荀首于榖荀庚如齊逆女宣伯餫諸榖然則非國事也書之如國事然何也自鞍之役魯得汶陽田晋無獲也已而與齊平矣榖齊邑申元宇所謂城榖置管仲之地晋適齊必徑魯而後逹不㑹諸魯而㑹于齊地趙氏所謂銷齊侯議魯之謀破晋人謀已之諼左氏志其㑹而不知其故是也或謂大夫專故書之若國事斯已不察矣梁山崩梁山本古韓今韓城縣漢夏陽地也梁山東南為晋地西南為秦地西北為白狄地界于三國不可繫之晋公羊言為天下紀異是已許慎云山者陽位君之象也象君權壞當時諸侯未聞有戒心而修德者然則絳人語伯宗降服乘縵徹樂出次祝幣史辭真虛文也哉秋大水冬十有一月己酉天王崩子簡王夷立十有二月己丑公㑹晋侯齊侯宋公衛侯鄭伯曹伯邾子杞伯同盟于蟲牢于是齊鄭皆服矣自文宣以來未有者晋景可以遂伯而不能也蟲牢鄭地今開封府古陳留封丘縣許靈公訴鄭伯于楚鄭悼公如楚訟不勝楚人執皇戍及子國鄭伯歸使公子偃請成于晋則蟲牢之盟主于鄭所欲也故左氏止云鄭服古者諸侯相見揖讓入門不得終禮者六其一天子崩今己丑上距己酉天王之崩赴告必至且蟲牢又近王都聽其盟而不知忌比事屬辭者可以默識矣六年春王正月公至自㑹二月辛巳立武宫武宫者武公之宫武公者隱公之曽祖至是八世十一傳矣立者不宜立胡子謂非即遠有終是也明堂位曰魯公之廟文世室武公之廟武世室然昭十五年有事于武宫不稱世室煬又武公六世祖屬在武上定立其宫亦不稱世室趙企明曰記禮者出于春秋之後見魯立武宫遂有武世室之語以為不經也左氏意以為武軍之宫如楚子所立者啖叔佐曰非也宣十二年楚自邲戰回作先君宫以告成事若然則煬宫復何謂乎趙伯循曰立武宫蓋别録他故若以鞍戰之故不應五年方立之據啖趙所析則以武宫為武世室真妄附㑹也矣取鄟取邑必言國伐萊取根牟伐邾取繹伐莒取向皆是也取者取為已邑不滅其國之稱鄟者杜元凱以為附庸也魯之附庸則奚必伐不奪不饜之心季氏伐顓臾之類也衛孫良夫帥師侵宋以其辭㑹也不能修文告而止淺侵之斯晋景之伯令也矣夏六月邾子來朝為下日卒月也來朝者例不月公孫嬰齊如晋此文公孫聲伯也受命伐宋壬申鄭伯費卒弟睔嗣是為成公秋仲孫蔑叔孫僑如帥師侵宋二卿並將矣而止于淺侵迫乎伯令無辭于伐也楚公子嬰齊帥師伐鄭陳君舉曰楚初書大夫將也冬季孫行父如晋晋欒書帥師救鄭凡救未有不善之者然蟲牢之諸侯其卿大夫莫與焉則諸侯有未協者亦足以覘伯令矣七年春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛鼷鼠有螫毒者孫炎曰如今鼠狼李巡以為鼱是也榖梁子曰郊牛日展斛角而知傷展道盡矣其所以備災之道不盡也又有繼之詞也曰亡乎人矣非人之所能也所以免有司之過也乃者亡乎人之辭是也免牲者為之緇衣纁裳有司𤣥端奉送至于南郊免牛亦然則其言非矣犧牛而飾以文繡成牲之謂也免牛者出之滌牢脫其楅衡而已緇衣纁裳何為哉吳伐郯吳初入伐中國也吳今蘇州武王封仲雍曽孫周章子爵而别以周章弟虞仲封虞外傳泰伯為公爵主吳伯之言必因泰伯文而誤附㑹史記云自泰伯至夀夢十九世此但數吳建國之君而通計之左氏云吳伐郯郯成夫吳郯隔江淮二水而深入以爭則徐魯齊衛亦自是開道矣季文子曰中國不振旅蠻夷入伐而莫之或恤無弔者吾亡無日矣夏五月曹伯來朝為下事月不郊猶三望免牛矣復言不郊間有事也范寧曰為三望起秋楚公子嬰齊帥師伐鄭公㑹晉侯齊侯宋公衛侯曹伯莒子邾子杞伯救鄭八月戊辰同盟于馬陵莒本屬齊齊服故莒從之宋以五年辭㑹魯衛受命侵之至是始與盟約家鉉翁曰此合諸侯救鄭因以同盟幸諸侯之猶同也杜元凱曰馬陵衛地陽平元城縣東南有地名馬陵季明德誤倒讀為平陽然曰諸侯救鄭不當逺去鄭地指為開封府中牟縣馬陵岡或然也公至自㑹髙抑崇曰諸侯㑹而楚師退故不以救鄭至吳入州來州來楚與國今鳳陽府潁上縣古淮南下蔡地吳是以始大晉人致吳以罷楚舍偏兩之一與其射御教吳乘車與其戰陳而叛楚楚罷而伯亦衰矣故入州來所以録其始豈為子重奔命之故哉冬大雩閏六月龍見乃雩戌亥隂盛而亢旱則反時矣雩而舉時歷三月之辭也衛孫林父出奔晋見惡于君也杜氏曰林父自結于晋之權臣為衛國患幾四十年衛獻所以失國晋實為之也八年春晋侯使韓穿來言汶陽之田歸之于齊晋以齊從蟲牢馬陵之盟俾魯歸田以堅之晋伯益偷矣胡子以汶陽魯田魯人恃大國兵力脅得其地而不正疆理於天王卻克戰勝令齊反魯今復有命俾歸諸齊齊人貪得晋有二命穿列卿無所諌止其言幾矣而汶陽實鑄地在魯所損之中烏得正疆理于天王乎來言者緩詞也歸之于者易詞也魯微弱不能保亦見矣晋欒書帥師侵蔡襄陵許氏曰侵蔡報伐鄭大國爭衡而小國受敗春秋矜焉其說是也然晋威不足報楚亦可以知伯業矣公孫嬰齊如莒因馬陵之盟始復與莒通汪仲裕曰因遣聘而請昏納婦春秋止書曰如不與其託于公以遂其私非也左氏言逆婦趙伯循以經正其妄矣宋公使華元來聘夏宋公使公孫夀來納幣春秋常事不書信乎曰常事而書則不勝書矣納幣婚禮之常則三納幣者何以書哉或曰婚禮不稱主人故文成之納幣不稱公使夫周之制宗子無父母之命親皆歿已躬命之公羊謂稱兄弟師友者非也國君大宗也小宗且莫之敢宗焉有兄弟可稱乃不得比宗子而不自命乎若夫師友則純臣也王彪之有言稱臣納伉儷名君以行大禮遠尋古禮于義不通至杜氏傳春秋又謂使卿非禮胡子因緣以為說夫大婚之重安可以忽而謂使卿為太重者征南何據而倡斯義也近時湛子述公羊之㫖謂為録伯姬者其言雖非而謂卿行為禮則未失也顧未逹春秋所以致譏之意耳遂之納幣公子也夀之納幣公孫也婚禮别嫌明微使公子公孫非道也非謂其卿也趙匡之意庶幾近之然則季孫之致女不譏卿乎曰斯則趙子所謂季孫之强毁列以行下大夫之事未有不辭者以為致女乃娶婦者之事非嫁女者所得與也晋殺其大夫趙同趙括同括為莊姬所讒而欒郤害之也故國殺為文而不去其官左氏曰同括之誅欒郤為徴唐孔氏以成二年欒書代朔將下軍定朔之死然則史記屠岸賈按趙氏夷臯之弒並殺朔嬰與同括者妄也經不言殺嬰朔季明德曰左氏以韓厥立武事即記于八年欒郤方張厥敢言武事定為悼公可爾豫謂明德不然傳終言之耳十年晋侯夢大厲被髮及地搏膺而踊曰殺豫孫不義則立在景卒時爾經世表載于十年秋七月天子使召伯來賜公命天子當作天王啖叔佐曰二傳不知其誤强穿鑿耳賈逵云畿內稱王諸夏稱天王夷狄稱天子悉無當于義此因曲禮誤分也宣十五年殺召伯逮今十二年而召伯又來是伯本爵名季明德以為字非也賜公榖作錫劉原父云錫命為諸侯是已錫之者不請命而來錫也于是王命益不足以寵諸侯矣胡子曰罪邦君之不王譏天子之僭賞也冬十月癸卯把叔姬卒繫把者非罪出無絶道也以夫人禮成其喪故卒異于內女來歸者晉侯使士燮來聘叔孫僑如㑹晋士燮齊人邾人伐郯衛人來媵九年春王正月把伯來逆叔姬之喪以歸叔姬把出婦也叔姬不應出當時必有以愛奪之者而魯人不責之義及姬死則把伯尚有悔焉耳故逆其喪歸春秋辭繁而不削大改過也或曰母出與廟絶故出妻之子服母齊衰期為父後則不服也而况其大哉初以為罪而出之終以為恩而逆之非禮之禮也公羊以為魯脅把使逆其喪左氏曰魯人請之故把伯來迎而孰知春秋大改過之義乎趙伯循曰叔姬絶於把而卒于魯是謂魯不得使逆之把不得歸葬之非也亦有兄弟不可以據魯之失不在于歸喪而在於生受其歸耳不書葬者魯不㑹公㑹晋侯齊侯宋公衛侯鄭伯曹伯莒子把伯同盟于蒲晋宋交惡魯以汶陽田故女于宋無所忌晋也衛亦以孫林父奔晋媵魯以平伐宋之怨蓋三國合矣趙子常謂自馬陵以來諸侯未二非也景三同盟蟲牢以得鄭也而宋辭馬陵以得宋盟左氏謂尋蟲牢是也以為莒服細已甚不足道也蒲之盟三國連婚懼將二也晋不知反求諸己要質鬼神從事于末胡氏所謂不知本矣或謂蒲衛地魯衛始終從晋而衛尤親故要諸侯盟于其地非也晋主夏盟恆日于是特不日以異之春㑹而夏來媵晋之謀國者君子卑之乎故曰無制中夏之略公至自㑹二月伯姬歸于宋夏季孫行父如宋致女趙企明曰晋將送媵女于宋魯疑伯姬未見於廟脅于晋而奪嫡也使卿致女者成公一時之權制非常禮也晋人來媵秋七月丙子齊侯無野卒子環嗣是為靈公晋人執鄭伯晋欒書帥師伐鄭人微者非伯討也楚執宋公于盂以伐宋宋公之執楚以夷肆其惡也鄭動于楚賂竊㑹公子成於鄧然即往朝晋矣晋執諸銅鞮盂宋地銅鞮晋地來而執之是晋暴于楚也趙子常曰晋人執鄭伯以伐鄭而歸鍾儀使求成于楚則何以罪鄭哉冬十有一月葬齊頃公楚公子嬰齊帥師伐莒庚申莒潰楚人入鄆莒國于城陽地接郯齊經宣四年公及齊侯平莒及郯是也吳伐郯道宋魯楚伐莒歷蔡鄭宋衛而掠魯齊所謂君處北海寡人處南海者也中國不振旅楚之深入斯亟矣春秋蔡沈潰不日獨紀庚申于莒潰病晋也莒晋同盟潰而莫之省憂也鄆者莒魯所爭東鄆也本魯地而莒據有之莒潰因入之耳不書遂楚用偏師入之行間無嬰齊也謂一役再見者恆稱人非也偏師可以入邑楚兵之强益可忌矣秦人白狄伐晋鄭人圍許城中城中城者魯乘齊喪城之也杜氏以為魯邑在東海厚丘縣西南榖梁之徒又言郛內之城者皆非也胡子曰謹于禮以為國辨尊卑分貴賤明等威異物采凡所以杜絶陵僭限隔上下者乃體險之大用也獨城郭溝池之足恃哉察於胡子之言而知本末矣十年春衛侯之弟黑背帥師侵鄭晋命也晋人執鄭伯于銅鞮踰時矣鄭伐許示不急君衛鄭比鄰也故命侵鄭以動之黑背稱弟母弟也皆先君之遺體而獨厚母弟知母而不知父之道也齊僖厚其母弟年而無知弒君衛定厚其母弟黑背而剽篡國無知年子剽黑背子也古之展親者有道矣夏四月五卜郊不從乃不郊左疏五卜者當是三月三卜四月又二卜吳幼清曰二月下旬初卜三月上旬再卜三月下旬三卜不從則當止而不郊矣乃于三月下旬四卜又于四月上旬五卜或曰以十二月下辛卜正月上辛正月下辛卜二月上辛二月下辛卜三月上辛三月下辛卜四月上辛四月下辛卜五月上辛則不郊當是五月事矣據四月卜郊為義故終言之公羊傳曰其言乃不郊何不免牲故言乃不郊也凡卜不從者皆言免牲此獨不言免牲而直曰不郊者卜免牲不吉也有待于改之辭也然五卜不從魯已自知其瀆故不復再卜而遂不郊耳五月公㑹晋侯齊侯宋公衛侯曹伯伐鄭晋侯者景公耳劉原父曰左氏傳謂晉人立太子州蒲以為君按經但言晋侯亦無以明其是州蒲若欲貶晋書其名乃可明耳此大事也仲尼豈忘之哉信經足矣家鉉翁左氏誤以鄭事為晋事近之伐鄭者左氏云歸鄭伯也然經不書意鄭伯歸于欒書伐鄭之時其後鄭猶不服故復命衛侵之諸侯伐之歟齊人來媵晋渴齊欲得之故改汶陽之命已乃媵魯懼其怨而二而合宋也齊渴汶陽恃晋親已而復之已而晋媵魯懼魯晋之合又改命也於是致女媵諸魯齊晋大國其役于利其輕于親矣春秋常事不書媵常事耳孔疏左氏不博異氣故書齊媵見異姓媵者非然又曰齊大國媵我榮耳不得貶則自乖矣公羊傳曰三國來媵徴過九女僭也或又曰録伯姬賢得媵寧謂推見至隱耶丙午晋侯獳卒諡景子州蒲嗣是為厲公秋七月公如晋奔喪也晋止公葬晋侯將交歡焉諱不書葬不與葬晋侯也冬十月十有一年春王三月公至自晋不書葬以為諱則書至以見實君子是以知成之不自立也晋侯使郤犨來聘己丑及郤犨盟按世本犨克從祖昆弟服杜誤祖作父晋欲交歡于公以求諸侯公留於晋者九月公返國遂使大夫來聘而與微者盟義與荀庚孫良夫同夏季孫行父如晋報郤犨之聘也左氏以為蒞盟內大夫涖盟四公子友公孫敖叔孫婼叔還未有不書者左氏妄也秋叔孫僑如如齊許翰曰魯蓋激晋之德禮不施將二于齊而未能者歟冬十月十有二年春周公出奔晋不名天子之三公也不繫之宰則不居要職矣自位而奔曰出不但王人內京師且是時尹單專政惠襄見逼權不足以統百官矣至與伯與爭政為其所傾其積豈一日哉自周公奔于是尹單劉相繼㑹諸侯又不若蘇子時猶有所忌也夏公㑹晋侯衛侯于瑣澤瑣澤公羊作沙澤當或在今大名元城近沙鹿北當狄道西連衛墟晋厲初立而求諸侯不及諸侯而先魯衛晋將謀敗狄以魯衛有同欲也于是魯衛睦而連宋婚宣伯聘齊以修好前好亦媵也杜誤為鞍之前耳蓋得魯衛因可敗狄益得東諸侯晋為是㑹瑣澤也左氏乃曰宋華元克㑹晋楚之成盟于宋西門之外鄭伯如晋聽成今以遺經究其終始既無荆楚又不及宋鄭左氏何以為據哉且晋楚之盟是夷狄中夏之大幾春秋未有沒其事不書者陳君舉顧謂晋楚常同盟不書至襄二十七年特書之君舉蓋沿左氏之妄矣此疑因襄二十七年㑹宋而誤紀于此華元鄭伯傳聞異詞傳遂違經宋之㑹晋楚各處其偏趙孟曰吾左還入于宋故得稱宋西門之外瑣澤雖地闕然經無宋文足知其誤趙企明蓋始疑之矣秋晋人敗狄于交剛髙抑崇曰此狄蓋白狄也九年秦人白狄伐晋此先敗狄而後伐秦是知報九年之役也冬十月十有三年春晋侯使郤錡來乞師錡克子晋卿也外乞師不書必盟主也而後書乞卑詞兵出于報怨不以王命興師無以令于國也三月公如京師其月尊京師也諸侯相如不月雖來朝不月必公如京師而後月諸侯朝天子正也實㑹晋伐秦過京師也而不朝故書如而不書朝若朝于王所則書朝未有以如即為朝也左氏誤曰公及諸侯朝王說公羊傳者謂不敢過天子淺矣識此而後謹于君臣之義夏五月公自京師遂㑹晋侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦遂者急後事詞見其非去京師而始為㑹也晋侯挾天子之令脅伯主之威摟諸侯以疾秦而修其私怨序諸侯而劉子成子不書不以伐秦纍王室以用之于私也曹伯廬卒于師曹宣公卒子負芻嗣立是為成公秋七月公至自伐秦冬葬曹宣公十有四年春王正月莒子朱卒莒子朱即渠丘公季他也朱卒子密州嗣是為黎比公莒初志卒以同盟也徐氏邈曰莒行夷禮君終無諡故不書葬夏衛孫林父自晋歸于衛晋侯强歸之也衛侯如晉晉侯强見孫林父不可既歸使郤犨送而復之髙抑崇曰晋受衛國逋逃罪戾之臣又强歸之故書自昔歸秋叔孫僑如如齊逆女鄭公子喜帥師伐許子喜穆公子子罕也九月僑如以夫人婦姜氏至自齊夫人齊頃公女齊姜婦者有姑之恆稱榖梁曰大夫不以夫人此以夫人非正也刺不待公親迎而直以之至國也僑如之不氏一事而再見者卒名耳胡子曰或迎之于其國也或迎之于境上或迎之于所館中禮之節可也冬十月庚寅衛侯臧卒子衎嗣是為獻公秦伯卒秦桓公史佚其名子嗣是為景公十有五年春王二月葬衛定公三月乙巳仲嬰齊卒入成魯乃有二嬰齊十五年三月乙巳仲嬰齊卒嬰齊者皆曰公孫歸父之弟也而後歸父則仲遂者乃為王父也故稱仲使若王父字然魯秉周禮而有是乎哉或曰魯有公孫嬰齊者聲伯也文公之孫叔肸之子也卒于十七年狸脤經有明文蓋猶及從公於晋也仲嬰齊莊公之孫于公孫嬰齊為從祖時同而名又同又皆公孫也豈應若是耶將春秋或有誤而三傳巧為之說耶據是數者則仲嬰齊一人也公孫嬰齊又一人也氏不同卒又不同也胡子乃承其誤何也吾悟夫席氏之辨而未核也嬰齊孰後後仲遂也歸父奔則仲遂無後故立嬰齊所以為遂也然則魯人舍歸父不為立後而重遂後者遂謀立宣公有寵成公宣之嫡子故思其恩而報之歸父字子家而其孫以王父字為子家氏非無後者也公羊子曰魯徐傷歸父之無後揆之事情何所據乎後歸父則應稱仲孫春秋不書仲孫而書仲非獨以别于仲孫蔑之氏蓋亦見魯非為歸父立後原止為仲遂云爾嬰齊非後歸父則應稱公孫乎曰嬰齊歸父從子遂之孫自不得稱公孫也劉原父云此公孫之子非公子之子是也啖氏止以為别于聲伯是亦誤也癸丑公㑹晋侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚晋侯執曹伯歸于京師戚衛地孫林父邑曹國于濟隂定陶在衛西南㑹戚以謀曺可也然負芻親殺其太子君之副不得謂兩下相殺而先盟後執非禮矣季明德以春秋不書則疑若本無其事者今按公羊昭二十年曺公孫㑹奔宋傳公子喜時見芻之當立也逡巡而退夫當立者本以太子既殺則負芻庶兄于次當立耳遂謂晋厲執曺伯之不朝以媚王而非有討賊之意矣負芻既與㑹盟若定其位然者乃始執而歸京師則執之非也君子以為辱盟矣曺人之請于晋曰若有罪則君列諸㑹矣不能正名而討是所以為晋厲之伯業也歟公至自㑹夏六月宋共公固卒子成嗣是為平公不日非訃也楚子伐鄭秋八月庚辰葬宋共公宋華元出奔晋宋華元自晋歸于宋宋殺其大夫山宋魚石出奔楚按事于經元既奔晋因晋力得歸故曰自晋傳言止于河上非也山本蕩氏自蕩意諸雖失官而山常為司馬今汰而驕背其族殺公子肥是族之所絶故其赴去氏不去大夫者在位也季氏不知曰弱公室殺公子肥者元文奸之詞則過矣魚石與山同桓族也山殺則魚石必懼而奔經世書曰右師華元左師魚石誅蕩山蓋以左氏魚石止元而許討也然既許討又云自疑而奔既元止五子矣又决睢澨閉門登陴左氏所傳真得少失多矣華氏自督以來世卿用事元以司寇御事之子代公子成為右師擁文繼弒與聞乎故權寵逮于共公無改蕩氏在昭公時常被斥逐而魚石亦致見疑桓族怨元共薨乘幼君共謀逐之亦勢也元藉晋之威奔未踰月儼然而歸治謀己者而加之罪權勢所在指揮如意矣然山魚石均宋亂臣山見殺國人魚石復倚楚而入觀春秋楚晋之書則經傳相違可繹思筆削之旨矣冬十有一月叔孫僑如㑹晋士燮齊髙無咎宋華元衛孫林父鄭公子鰌邾人㑹吳于鍾離鍾離之㑹㑹吳之始晋大夫之伯以諸侯為㑹之始也公羊曰外吳胡子曰外吳春秋固外吳乎曰否既㑹士燮又同姓㑹吳耳趙伯循所謂按實再㑹依實書之者是也知然者鍾離楚地今鳳陽臨淮縣古嬴姓子爵國名夀夢時吳楚以為界其邑近吳故先㑹中國而後至其地以㑹之也猶之襄十年之柤柤蓋楚彭城亦近吳界邑也故殊㑹春秋據實書之耳與鄭伯勞楚公子棄疾之祖不同彼自鄭柤地名偶同也問曰向鄭地也近中國矣然則襄十四年何以亦殊㑹乎曰經所稱向者譙國地按向姜姓國隱二年所謂莒人入向者公羊曰向我邑公羊之言亦非也譙國近吳疏家不諳故誤以為鄭趙伯循雖未指向所在義同鍾離則固已得其㫖矣問曰春秋不外楚乎曰吳楚均夷原其始則吳㑹齊盟盂㑹未嘗外楚何獨乃外吳乎問曰何以知其地因殊㑹也曰襄四年戚之㑹不殊吳戚衛地孫林父邑也近也以是知殊㑹之非外吳矣問曰善道吳邑奈何不殊㑹曰晋命魯衛先往非先㑹也齊桓不戰而屈楚文公戰乃屈之厲通吳以制楚矣君子以為暗于治吳許遷于葉遷國月此何以不月從夷狄也經世書曰楚遷許于葉許逼于鄭請遷于楚故遷于夷于白羽于容城皆不月以别于中國之避狄夷而遷者也十有六年春王正月雨木氷榖梁傳曰雨而木氷也志異也夏四月辛未膝子卒名夀諡文子原嗣是為成公孟子時滕復有文公祖孫同諡或左氏誤也膝入春秋三書卒皆不名至是日之矣蓋能自强而不以附庸自處故訃喪如諸侯鄭公子喜帥師侵宋子罕穆公子六月丙寅朔日有食之授時推是嵗六月丙寅朔加時在晝去交分二十六日九千八百三十五分入食限先天推得二十六日九千八百三十五分二八入食限晋侯使欒黶來乞師黶欒書子甲午晦晋侯及楚子鄭伯戰于鄢陵楚子鄭師敗績鄢陵鄭地南鄙晋以孤軍越其國都而與楚接是時晋未及伐鄭而楚亦未必救矣晋自戰城濮以來至鄢陵再勝楚爾城濮用衆師而鄢陵獨晋與楚厲信健君也楚君傷而敗公榖皆曰楚子傷故不言師非也鄭戰稱爵敗稱師形楚之詞獨師敗君未敗也君何以不敗未至于楚子棲矢于目也趙企明以為文誤非也戴溪氏曰鄢陵之戰城濮同功然厲公勝厲公之志驕矣楚殺其大夫公子側子反司馬也稱國殺而不去其官與得臣同纍上之詞楚子親集矢于目而師未敗也子反旦而戰見星不已命軍吏察夷傷補卒乘繕甲兵展車馬雞鳴而食惟命是聽楚師還及瑕王使謂子反曰先大夫之覆司徒者君不在子無以為過不榖之罪也乃竟不能奪于子重之言使得以行其相誣之意其為纍上甚矣陽豎獻飲左氏與吕氏春秋異詞且于事情不合夫旦戰見星未巳吕氏臨戰渴而求飲于何時乎左氏軍吏之命本期復戰在見星之後則是時尚未飲也吕氏則誤以為臨戰左氏云側之自殺王使止之弗及吕氏則誤為斬司馬以為戮豈出于子重所誣而楚史如檮杌之類有實録乎儒者說春秋至謂春秋敗績而城濮鄢陵柏舉楚人皆殺其主帥以為强兵之由嗚呼其亦不講于師律也矣秋公㑹晋侯齊侯衛侯宋華元邾人于沙隨不見公沙隨今歸德府寧陵縣北古宋地晋自鄢陵為此㑹也鄢陵之戰魯齊衛宋邾皆不至然晋使乞師專責于魯故齊衛宋邾皆以魯為望而僑如之譖亦曰魯不二小國必睦晋人以諉罪云耳不見公明曲不在公亦有所諉罪之詞也公至自㑹公㑹尹子晋侯齊國佐邾人伐鄭此王臣㑹伐之始尹子王卿士子爵著世卿置君曰氏㑹盟征伐指其人正其爵曰子在周禮司馬法恭考之王有四方之事冢宰徴師于諸侯其詞曰某國為不道征之以某年月日師至于某國小宰掌戒具虎賁氏奉書以牙璋發之詩之常武以皇父整六師休父戒師旅然劉卷平丘之㑹其語晋人曰天子之老請帥王賦元戎十乘則涖師特其名耳厲公求諸侯以泰故鄢陵雖能駕楚而鄭猶不服于是尹單相繼以王臣出矣曹伯歸自京師胡子曰曹伯不名其位未嘗絶也不絶其位所以纍乎天王也其言自京師王命也言天王之釋有罪也負芻殺世子而自立不能因晋之執置諸刑典而使復國則無以為天下之共主矣九月晋人執季孫行父舍之于苕丘從公故不稱行人舍置也執未至而即舍之于苕丘故不言以歸榖梁傳曰執者致據婼至自晉而不致公在也執者不舍據晋執叔孫婼囚之于箕不言舍而舍公所也據公在苕丘冬十月乙亥叔孫僑如出奔齊魯人立其弟豹以為叔孫後是為穆叔十有二月乙丑季孫行父及晋郤犨盟于扈公至自㑹乙酉刺公子偃偃成公庶弟也內殺公子言其故先名後刺据公子買不卒戍此其但先刺後名其故不可言也公將有行穆姜以僑如之意欲去夫二家者指偃與鉏曰汝不可是皆君也僑如之情非偃與鉏之所知也既魯人出僑如季孫歸而出偃遷怒也十有七年春衛北宫括帥師侵鄭晋命也左氏曰救晋髙抑崇趙企明皆云非事實也夏公㑹尹子單子晋侯齊侯宋公衛侯曹伯邾人伐鄭王臣合六國之師伐鄭遇楚輒還能驟合諸侯而不復敢當楚二卿失威廢命豈細故哉不但厲威之頓也六月乙酉同盟于柯陵此王人下盟諸侯之始柯陵鄭地趙企明曰周禮天子巡守則有方嶽之盟不巡守則有殷同之盟皆謂諸侯既朝見受政事乃退而自相與盟王官之伯臨之而已伯猶不盟况卿士乎二卿奉王命伐鄭而不服于是有諸侯之事王人與盟雞澤平丘皆不諱而伯業益不競矣狄泉不盟王子虎其事寧可得哉秋公至自㑹齊髙無咎出奔莒髙國既去崔氏無咎身為卿佐不能徴示慶克䝉衣之罪以開君心反以閉門索客使讒人有間可乘至于見逐而崔氏復進則亦有罪矣故書奔無異文九月辛丑用郊魯之郊其始祈榖于上帝也九月非其時矣辛丑上辛也杜長厯四日也定辛亥朔日也哀辛巳六日也無有用中辛者也用者非為農事而以郊禮為之魯郊不勝書書其尤失禮者而已趙企明不連九月為讀顧曰僖公雖請自疑其僭卜之未遽用也成公至此不復卜而直用之前此未嘗用也則其說異若以不卜直用則襄七年奚為又卜耶魯頌曰春秋匪懈享祀不忒皇皇后帝皇祖后稷魯之郊有用秋者矣郊有定期卜之日王立于澤宫卜士而已非為期也周禮前期十日卜日卜其日之事耳或又以用為用人者益謬晋侯使荀罃來乞師罃首子也冬公㑹單子晋侯宋公衛侯曹伯齊人邾人伐鄭十有一月公至自伐鄭壬申公孫嬰齊卒于貍脤杜氏長厯十一月無壬申趙伯循以為誤是榖梁子曰乃十月也致公而後録臣子公羊以為待君命然後卒大夫陸淳辨疑曰春秋編年月之書一例以先後書之且言卿卒然後公至皆據事實何傷教意二傳不逹其文謬誤之體遂妄為說劉原父權衡云公孫敖卒于齊彼不待君命卒大夫昭公在外叔孫婼卒亦不待致公而録之其言哲矣十有二月丁巳朔日有食之姜岌云十二月戊子朔無丁巳似失閏大衍推十一月丁巳朔交分入食限授時推是嵗十一月丁巳朔加時在晝交分十四日二千八百九十七分入食限與大衍同皆與經文不同今先天厯法加一閏得十二月丁巳與經文合其分十四日七十八刻九十分强入食限邾子貜且卒子牼嗣是為宣公晉殺其大夫郤錡郤犨郤至錡郤克之子犨從姪郤至伯父也張氏曰郤氏雖多怨既為大夫則君之股肱也厲公不正其有罪無罪而用嬖幸胥童長魚矯之計一朝殺三卿又劫欒書中行偃能無及乎此春秋所以列書而深罪之也楚人滅舒庸舒庸東夷偃姓之國地譜廬州城下舒城槖師未為卿書人或曰春秋為中國作楚大夫將而稱名氏必其人能為中國患者公子嬰齊帥師凡四見公子貞凡七見則雖伐吳從其恆稱而陽丐囊瓦交兵于吳橐師滅舒庸但人之則皆未嘗為中國患者也以其未嘗為中國患則不復詳其名氏志夷狄之相攻滅而已十有八年春王正月晉殺其大夫胥童童甲父孫克子也胥童孰殺之厲公未弒厲公殺之也尸三郤殺胥童欒書中行偃懼及乃殺厲公耳傳謂欒書中行將弒君而殺其大夫又為之詞曰書偃之罪不著于春秋殺胥童不以兩下相殺告也傳者又何以知書偃之殺之也誠書偃之殺之也而後弒君乃不得從荀息仇牧書及乎庚申晉弒其君州蒲稱國以弒者例書時月與其日謹之也去年十二月丁巳朔長厯推二月丙辰朔知庚申二月日也稱國弒公羊子曰衆弒君之詞左氏以為書偃使程滑弒厲公則宜書主名與稱國之意不合矣厲公暴虐將危社稷欒書中行偃幽執之則將變置而程滑遽弒之亦因衆怒若舉國共廢而誅之云耳正月幽之二月然後殺其書偃之意惟欲自紓亦未有必弒之意也然而春秋猶謂之弒君者君親無將非天子不得廢置諸侯以貴戚之卿而易置人君非臣體也古社稷臣能與國存亡者義足以匡君而弗聽則有易位之權有伊尹之志則可耳春秋世卿之柄國者皆其君之罪人也苟免于大惡焉斯幸矣再從子周嗣年十四齊殺其大夫國佐崔慶專齊之始事張主一曰靈公非不知國佐之直與慶克之內亂宫闈也卒殺國佐則靈公之知又下魯成數等矣公如晉悼公立朝嗣君也夏楚子鄭伯伐宋宋魚石復入于彭城陳氏曰奔大夫復不書莊閔以上有書歸若入者矣則皆不書奔者也奔而言歸自衛元咺始咺訟其君者也雖然歸猶言自也若宋魚石晉欒盈不言自矣公至自晉晉侯使士丐來聘丐燮子也秋杞伯來朝八月邾子來朝為下日薨月也築鹿囿公羊傳曰􅏺有囿矣又為也己丑公薨于路寢冬楚人鄭人侵宋晉侯使士魴來乞師魴燮弟㑹子也廬陵李氏曰齊桓伯業始于平宋亂晉文伯業始于釋宋之圍悼公伯業又始于彭城之救故成伯安疆自宋始矣十有二月仲孫蔑㑹晉侯宋公衛侯邾子齊崔杼同盟于虛朾虛朾宋地承厲公之衰人心方散曹滕諸國多有不至魯以喪故使仲孫蔑齊以逺故使崔杼晉皆懷逺之而已陳己舉曰崔杼嘗奔衛不言歸其再見何齊納以為大夫也齊之禍靈公為之也春秋明志録卷八
