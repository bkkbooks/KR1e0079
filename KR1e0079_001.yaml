body:
  text: 春秋明志録卷一明熊過撰隱公魯本侯國姬姓系見史世家今山東兖州府曲阜縣奄宅之故地也隱公名姑息惠公妾聲子子在位十一年諡法不尸其位曰隱周道衰諸侯莫之適從僣端見禮樂征伐自諸侯出矣孟子曰詩亡然後春秋作詩亡非特黍離之降也邪說交亂是非不足盡憑而詩之教亡其所繇來實在平王之世平逮隱而沒治之故自隱公之簡始學者觀王伯升降之際聖人反正之幾權得矣非天下之至神曷能與此乎元年王者而後改元諸侯改元非正也禮稱諸侯三年喪畢以士服入見天子天子錫之圭璧黻冕然後歸寧有踰年改元者哉書曰平王四十九年己未公即位者正也魯自改年而絀周之年非也史遷自真公濞已上為周王世表無諸侯年真公當夷王諸侯僣端始見改元矣趙子常言諸侯既殯嗣子柩前踰年正月朔乃先謁廟以明繼祖還就阼階之位以正君臣國史因書元年失之矣而元儒吳立夫顧謂史官志人君在位久近紀述之常體非以為重事其說則曰秦惠文王立十四年稱王秦史改元魏惠王三十七年稱王而汲冡竹書改元太史公漢興以來諸侯世表高祖功臣侯年表類書其侯王元年淮南鴻烈亦稱淮南元年始先秦時本重改元如立夫以為非重則秦魏稱王何為又改元年史官紀實寧有未改元遽稱疑年者若太史淮南則緣春秋而誤不可謂諸侯可改元而引以為證也衛世家獻公出公皆稱後元則益悖矣不然則黜周王魯疑春秋者亦何過哉春王正月書春而繼以王王者所以奉天時也王謂周王也書王而係以正曰此周王建子之正而異乎夏商者也周正月可以為春乎春蠢也陽氣蠢然動也陽之始生亦可謂春也書曰惟十有三年春大㑹于孟津既戊午師逾孟津周厯太初三統四分韋昭班固皆步得次日己未冬至冬至之月稱春自武王革命之始已然故孔安國曰月改春自移然則非孔子加春於王月之上也雜記孟獻子曰正月日至可以有事於上帝日至冬至也正月而日至周改月矣周禮亦稱子月為春而實非冠以夏時也按殷人鍾銘唯正月王春吉日加王於春是時月稱王三代一道以證王者改時月也然亦為與春王書異遂謂春不可改亦過矣彛器史法偶不同非春不可改也三統之建協於三易人統首艮艮寅位也地統首坤天統首乾乾子位也孔子曰其文則史故春王正月者非孔子欲行夏時輒敢更也白虎通引尚書大傳曰月以仲冬月為正伏生有所受矣隱之不書即位者胡子曰內非承國上不稟命諸侯扳己以立而遂立焉春秋首絀隱公以明大法也若是乎聖人之權乎且聖人必以書不書為褒貶則桓之弒隱宣之殺惡及視聖人何為書其即位乎豈以桓宣視隱當末减乎抑春秋之所託始姑假隱以定法則聖人上下其手何異舞文而人之罹法者有幸不幸本不足據為定乎莊閔僖之不書即位又將何說乎聖人之於春秋本不欲沒其實而善惡自見公榖之說乃曰成公志是雖異絀隱之說而以為削於聖人可乎禮先君始歿嗣者稱子入春秋則雖有力者或先人以奪人心而定之位如齊頃未逾年而稱公鄭悼未逾年而稱伯則皆不待改元而即位也或疑十二公非擇而書即位也蓋諸侯每用周正繼立立於君薨之月不待踰年者孔子削而不書恐亂夏時亦誣矣柩前之位辭稱哀子而主喪者即逾年臨羣臣之人也曷為不待改元而即位乎仲子者桓母也手有文焉為魯夫人而惠公再娶以夫人禮之非矣隱母聲子實攝女君故當時以為疑者遂私有翼戴使隱不俟逾年而即位一年不可二君故其元年不得更書即位耳故沙麓齊履謙謂其即位於歲前與桓莊僖元年不書即位者同也左氏不知而曰攝誤矣季子甚信齊氏之言嘗以為是但其以仲子為隱母則亦强解辭費不必然也三月公及邾儀父盟于蔑三月者周建寅之月近蜀湯氏為建辰之月是不知厯數不讀漢志矣魯元侯也而稱公僣也自侯以下葬而稱公耳詩泮水曰魯侯戾止閟宫曰魯侯燕喜如是而已儀禮公食大夫五等諸侯同稱公周禮之末造而改竄以成其私者也春秋私盟于是始及者榖梁子曰內為志焉爾不日史詳略也邾曹姓出自顓帝陸終第五子曰安周武王封其後挾于邾子爵國在今鄒縣東南二十里當嶧山之南北界于魯而南連滕薛即今曲阜滕嶧縣之間縱廣踰于五十餘里矣西自邾瑕以至沂東即今濟寧至沂州之境橫長三百餘里𫝑不得為魯附庸意小邾嘗附庸于魯而誤加于邾耳小邾亦邾所分地為郳城近嶧縣儀氏與徐儀楚陳儀行父同父名與孔父同邾大夫也黎氏言當與邾子克别是一人吳立夫信之然又因莊王弟子克字子儀疑之非也故湯氏謂如家伯家父然以為家臣之老則亦非也邾五年伐宋桓十五年來朝俱人之十七年書儀父莊十六年又書克則人非儀父儀殳非克矣即曰諸侯不生名附庸之君字也則卒稱邾子而生何用去一子字耶古者天子㑹諸侯使聚盟方嶽者必割牛耳盛以槃而以敦盛其血司盟之官北面讀載書以告日月山川之神戎右傳敦血以次授當㰱者含其血乃坎牲加書而埋之蔑之盟無天子之命也隱初即位而亟盟鄰國之微者斯已無王矣夏五月鄭伯克段于鄢鄭國名伯爵宣王封弟友于今華州為故鄭後遷虢鄶在濟西洛東河南潁北四水間今開封府新鄭是已伯謂寤生段其母弟也鄢今鄢陵段以罪絶屬籍不書國討而專目鄭伯左氏曰譏失教也克者如二君之辭見段之有徒衆也趙氏企明所謂幸辭詩叔于田大叔于田皆刺段而誤以為刺莊公謂失教成于殺可也以為罪重于段非訓也以君臣兄弟之倫治之君不君兄不兄而其臣若弟不可遽悖也秋七月天王使宰咺來歸惠公仲子之賵臨諸侯畛于鬼神曰天王宰氏咺名王朝上士中士例名非冡宰貶而人之也季氏謂元士攝冡宰亦非也惠公隱殳仲子惠公再娶之夫人而桓之母也榖梁謂孝妾惠母蓋因桓公成風而誤也不稱及一施無别之辭車馬曰賵所以助喪者隱新立不朝而天王反舉恤典天王失所以為天矣仲子再娶之夫人則何以單舉姓字乎仲子生有手文曰魯夫人于是元妃沒有聲子繼室而又以夫人娶仲子故異時宗人釁夏曰孝惠娶于商此禮則有以妾為夫人則固無其禮也此其實也而春秋以王制治之不與也古者諸侯不再娶于禮無二嫡春秋故正之不與惠以為夫人也而一施之過矣然必以為妾使若媵然而曰平王忘小辨之怨不念伯服之于周而反啓桓公之于魯則于事實亦少謬矣九月及宋人盟于宿宋魯初合也內稱及宋子姓公爵武王封紂叔父微子于今歸德府是商墟人者列國大夫卑名氏不登于䇿非貶也宋紹興中韓璜機人表鄧名世及元祐中張子平撰人譜凡三十八國諸侯大夫千七百六十五人中稱人者四百皆是也宿風姓國男爵今宿州經舉國為盟地國主與在焉是時齊鄭合而魯有內憂故使微者密其跡逺結宋而盟于其附庸之國也冬十有二月祭伯來此王臣私交之始也祭本周公第七子所食采邑今鄭州東北一十五里祭城實管城也祭伯畿內大夫祭公之族啖氏謂伯字非爵也祭魯同出而私來魯人以王臣禮之王臣無私交也伯何以知其非爵逮莊公而祭叔來伯叔皆字也若儀禮既冠而字伯仲叔季惟其所當則為行次檀弓五十乃稱伯仲非也公子益師卒稱公子貴戚為卿者也益師孝公子惠公弟書之志戚也禮王于三公六卿諸侯大夫士皆有服君于卿大夫士小斂大斂皆親臨之將葬弔于宫比葬不食肉比卒哭不舉樂以有服也故大夫卒史必書之不日者傳謂公不與小斂蓋恤典厚薄君臣始終之義在焉二年春公㑹戎于潜大行人時見曰㑹行人曰時㑹以發四方之禁是天子宗伯所司也以㑹禮㑹諸侯僣也㑹戎甚矣不朝王而㑹戎其為倒施又其甚者也詩曰戎狄是膺戎昆吾之後已姓在今曹州南近宋是周公所膺也魯公就國常與淮夷同征隱公不能繩祖武而輒行㑹禮斯已弱矣諸侯盟㑹為壇基三尺階三等公上侯次伯子男下升降揖讓稱先君相接戎來朝則坐之門不與諸侯齒也安得式序在位以為㑹乎潜魯南鄙近戎地夏五月莒人入向莒已姓子爵少昊之裔武王封兹輿期國于成陽今青州府莒州是己地與齊相近向姜姓炎帝後向城在莒州南七十三里即鄭漁仲所謂沂州古向城寰宇記居河陽軹西北􅐱道元指軹南者宋人定為密之莒縣南七十里非是杜元凱指為譙國龍亢東南向城則益逺非所利之國也莒子娶于向向姜不安莒而歸夏莒人入向以姜氏還若是則破其國都俘其人民莒之罪也然入罪小于滅此實兵不再舉奄而有之矣僖二十六年公㑹莒子衛寧速盟于向稱莒地宣四年公及齊平莒及郯莒不肯公伐莒取向向係莒則向實滅而書入何也赴以入以入書之耳故曰其文則史胡康侯曰非王命而入人國邑見諸侯之不臣也擅興而征討不加見天王之不君也可謂得竊取之義矣無駭帥師入極無駭公子展之子未命大夫也從將尊師衆例書極杜氏曰附庸國或欲通極劇字曰今贛榆縣紀障本紀故封劇縣地紀遷其地遂為魯附庸莒入向無駭遂得入極也凡爵命出于天子大國卿三命次國再命小國一命一命受職再命受服三命受位命氏者公孫之子不可稱公曾孫以王父字為氏請于君而氏之也趙企明曰左氏謂無駭卒羽父為無駭之子請族杜氏不逹以為為無駭請非也然曰公子公孫皆生姓之無駭非終身無姓者聖人惡其專兵去族以示貶愚謂氏族一也姓者百世不易公子公孫不可指為姓也無駭與挾翬同皆隱未爵者也陳氏曰春秋之初魯有無駭挾鄭有宛詹紀有裂繻則猶有未命大夫也吕大圭曰內大夫帥師自無駭始內大夫與諸侯盟自柔始自無駭帥師而後有翬有公子慶父公子友公孫兹公孫敖公子遂公孫歸父之帥師甚則季孫行父臧孫許叔孫僑如公孫嬰齊四卿並帥師矣自柔㑹盟而後有公子結公孫敖季孫行父公子遂臧孫許仲孫蔑仲孫貜仲孫何忌之及諸侯盟甚則叔孫州仇仲孫何忌及邾子盟句繹矣秋八月庚辰公及戎盟于唐此戎請盟約期而往也唐魯地今魚臺縣故方與縣有武唐亭戎來不拒足矣與之盟非也九月紀履緰來逆女紀姜姓侯爵炎帝之後輿地廣記國今青州夀光紀城實古北海劇縣鄭樵云紀後遷劇所謂叩劇云紀劇聲訛鄭所言良是苐不知遷劇之紀在莊公之簡不當輒言于此耳緣夀光西南三十里為紀城其又西為東安平即紀季所入之酅又西北且百里為東莞祭統國君取夫人之辭曰請君之玉女其遺幣以先人之禮行之公羊謂辭不稱主人非也夏后氏逆于庭殷于堂周于户然諸侯則于館詩稱文王親迎于渭未始出疆越境而使卿未為非也冬十月伯姬歸于紀伯姬惠公之女也紀子伯莒子盟于密此外特相盟之始紀子帛者啖助程先生皆曰闕文紀本侯爵而稱子則其稱子闕文也或曰子帛或侯字之誤按左氏子帛即子伯蓋逆女履繻之字密今萊州高密近紀之邑聞之趙企明曰紀自入莒有窺魯之心紀子伯往來莒魯之間于是道與莒子謀于密為魯謀也周官有調人諧和萬民有合方氏除其怨惡則諧和仇怨聖人之所與也故履繻字而不名褒之也其後八年而為浮來之盟莒魯以是交好蓋紀新昏于魯事必有然者然何待八年乃盟浮來其序于莒子之上者或曰比內大夫或又曰主盟此本闕文不假迂曲莒小于魯雖能入向何敢遽至窺魯魯史書法有定繻雖可褒褒者在事何緣獨以字進左氏亦豈可盡信其誣也十有二月乙卯夫人子氏薨榖梁傳曰夫人薨不地夫人隱之妻也卒而不書葬夫人之義從君者也左氏以為仲子說者曰以三年喪畢考宫祭告知之然安有元年先歸賵至二年而後薨者耶郭定襄以為左氏誤仲子為夫人是也鄭人伐衛衛姬姓侯爵國今淇縣負淇水面百泉古衛都河北朝歌之東康叔始封之地也其後成王伐殷以武庚餘民封康叔君故殷墟朝歌始併入焉而盡有三監之地世家謂封指加地耳季氏謂武王伐武庚非事實也段之亂其子滑奔衛衛人為之伐鄭取廪延于是鄭人伐衛鄭伯克其弟又不字其子而擅相伐其惡著矣三年春王二月巳巳日有食之春秋書月者于春之下則必係王以大一統或事應係時而書則其下月與時文不相屬不得復係之王矣何休謂二月殷正三月夏正存二王之後統其正朔非也書稱統承先王修其禮樂者于其國所謂之把得夏時者耳王朝大一統何為存之耶正朔亦豈在禮樂中耶日月俱東行而日遲月疾月追及日是為一㑹然日月之行有冬有夏日之盈縮損益四序不同冬至後為盈初春分為盈末夏至後為縮初秋分為縮末盈初縮末俱八十八日九十一分而行一象縮初盈末俱九十三日七十一分而行一象盈縮極差皆二度四十分然不可正視由測晷景或以金水二星及月食之衝知之至月行古厯平行日十三度十九分度之七皆謂近日而疾逺日而遲今課月與天㑹為一轉入轉疾初日行十四度六七六四從是漸漸殺厯七日適及平行度其積度比平行餘五度四十二分其疾日損入疾末限又厯七日行十二度空四六二損其所益而無餘乃復行遲初限又歷七日適及平度其積度比平行不及五度四十二分其遲日損行度漸增入遲末限又厯七日復行十四度六七六四益者亦損無餘入轉一周實二十七日五十五刻四十六分遲疾極差皆五度四十二分舊厯日為一限皆用二十八限不知轉分進退時各不同至日月之蝕乃月道出入日道兩相交值當朔則日為月所掩當望則月為日所衝故皆有食然月曰白道舊謂九道出入黃道一周為交周其日道距赤道逺二十四度月道出入日道不踰六度其距赤道也逺不過三十度近不下十八度南向者恆內北而外南月道出黃道外為陽入黃道內為隂月當黃道為正交在春正半交出黃道外六度在赤道內十八度正交在秋正半交出黃道外六度在赤道外三十度復當黃道為中交在春正半交入黃道內六度在赤道內三十度中交在秋正半交入黃道內六度在赤道外十八度是為四象二别七日各行九十一度周厯一交得二十七日二十一刻二十二分二十四秒每一交退天一度二百分度之九十三凡二百四十九交退天一周有竒終而復始月道與赤道正交距春秋二正黃赤道正交宿度東西不及十四度三分度之二夏至在隂厯內冬至在陽厯外月道與赤道所差者多夏至在陽厯外冬至在隂厯內月道與赤道所差者少白道二交有斜直隂陽二厯有內外直者密而狹斜者疏而濶故其差亦異差數多者不過三度五十分少者不下一度三十分經朔應二十九日五十三刻空五九三而㑹然月在疾度日在盈限則先經朔而食月在遲度日在縮限則後經朔而食陽厯限六度隂厯限八度以躔離朓朒推演加時本距交逺近考求食分又以入氣盈縮入轉遲疾參伍合朔之正則古法謂百七十三日有一食未盡也夫春秋及漢及元有連月食者將以何盈縮定度哉日行先在黃道裏依限而食者多月行先在黃道表依限而食者少上古陽盛雖㑹而恆不食大戴禮誥志篇孔子曰古之治天下者必聖人聖人有國則日月不食星辰不悖楊敬仲謂堯舜禹之時厯年多無日食至太康失邦始日食其言是已然曰厯家嘗以可推步者為衰世之術豈逹于天者哉參同契曰水盛坎侵陽火衰離盡昏易通卦驗冬至之日植八尺之表日中晷進尺二寸則月食退尺則日食晷進為盛退為縮以分隂陽壯弱也然則其食當于合朔而不稱朔何也姜岌按春秋日食云是歲二月巳亥朔無巳巳似失一閏三月巳巳朔去交分入食限大衍同授時加時在晝去交分二十六日六千六百三十一入食限今豫友劉敬仲先天推得交分五十四刻九空九二入食限耳然則杜氏長厯推此月之朔為庚午不但司厯之失食耳辰之弗集瞽奏鼓嗇夫馳庶人走左氏諸侯用幣于社伐鼓于朝以自責豈徒修其文哉三月庚戌天王崩於是平王崩立太子泄父之遺子林為桓王不奔喪諸侯不臣也不書葬魯不㑹也諸侯為天王服斬衰禮當以所聞先後奔喪而歸含襚賻賵春秋歷十三王桓王子莊王莊子僖王襄王子頃王皆不志崩謂王室不告者是季氏謂三王實不立以嗣王故追稱而史誤序于為君之世考之經世歷年莊以甲申嗣位巳亥崩僖以巳亥嗣位甲辰崩頃以壬寅嗣位戊申崩俱非疑年而季氏以為誤其不考甚矣經世之書即卦氣以驗人事非茍焉而已者夏四月辛卯君氏卒左氏云君氏蓋聲子隱公之母也不書姓為公故曰君氏云禮所謂攝女君者是也其不薨無赴哭祔姑之禮不稱夫人故不言葬然則定姒定公之母也何以不稱君氏是昭于定無隱桓之已嫌也二氏者以為尹氏雖王臣于魯為外大夫不卒其卒者必有故若劉子主召陵卒書劉卷矣穀梁子謂天子崩尹氏主魯焉隱而卒之信則私情耳其謂以為王子虎之類然而王子虎名春秋之法惟天子及魯侯崩薨不名其他善者乎即其惡者乎無弗名矣其弗名史失之也今尹氏之卒也將為一氏俱卒乎其大夫者實卒乎氏所同而名獨也一人卒而舉其同其于義蓋未知其為善志也茍曰書氏以見世卿之強則後之強者多矣其遂以得國者亦多矣而不氏何必于尹也獨立斯義乎春秋王卿士卒不日而尹氏何獨日乎夫尹氏尊之不天子也親之不魯侯也何獨不名而舉氏而日卒乎然則世卿實可譏也其如君氏實非尹氏何哉金氏曰魯有尹氏隱公所困之地所謂鍾巫尹氏者夫尹氏爵位不著亦法所不得書也聲子以君母而舉其繼室之號以卒之明隱之異于他庶子再娶非正則桓非適也秋武氏子來求賻武氏世卿也武氏子未命也不稱天王桓在喪未有命告也其求賻志諸侯失供喪紀也胡氏曰邦有大事而魯不賻雖問罪可也不足以討而反求之以是為失道也王貫道有言周凡三求求賻以平王崩求車以桓王將崩求金以襄王崩喪事有缺則臣職不供甚矣魯安在其秉周禮也包茅不貢霸主至興師而責之武氏子之求賻豈可責也此亦如寠人子矣窶人子故巨室也以其臣僕之不供而遂窶今將責窶人子之徴賦而不責其臣之無藝得乎杜氏曰不共王喪致令有求經直文以示不敬得其㫖矣八月庚辰宋公和卒于禮天子曰崩諸侯曰薨大夫曰卒春秋曷為卒外諸侯而內書薨內薨者臣子辭也外卒者從赴也赴而曰卒臣子辭不可一施之也史因赴而書孔子因赴而修故曰其文則史非黜而書卒也弔不備禮則不日赴不以時則不月或不告或告而不往則不卒著交鄰之道孔子曰其義則丘竊取之矣冬十有二月齊侯鄭伯盟于石門齊姜姓侯爵本四嶽吕侯之裔尚佐武王封今青州府樂昌縣古營丘也傳六君至獻公而徙臨淄詩仲山甫徂齊城彼東方蓋其事耶侯謂僖公祿父隱之世宋衛為西黨齊鄭為東黨再春秋前于是東諸侯始嘗㑹于虗有合矣齊東濱海鄭近在畿內距千四百餘里鄭莊欲挾馮謀宋而宋魯睦故親至齊地而要盟焉周之宗盟異姓為後忘宗盟而先齊蓋石門古濟北齊地今為東平之平隂鄭以齊地主又爵高而私尊之是齊伯始基而王伯消長之幾在此陳君舉謂有關于天下之故是也盟先主盟聖人約史之法與載書異衛子魚道踐土之盟先晉魯鄭而後齊宋莒載書之正法也其後叔向子産向戍皆諸侯之良號能獻禮不能舉隱公告薛侯之禮及子魚稱踐土之書宋盟楚人遂執牛耳憤哉或曰聖人約史固異載書乎曰書公及之類是已書公及異載書則正事情以見實癸未葬宋穆公趙子常曰天子葬日不及禮不日諸侯葬月不及禮不月此葬日與夷感穆公立已而侈僣也胡康侯曰諸侯五月而葬同方嶽之盟者至或葬或不葬而交鄰國待諸侯之義見矣四年春王二月莒人伐把取牟婁把當作紀莒入春秋首帥師入向而天討不加也于是再取人之邑焉春秋之初猶以取邑為重子産言天子之地一圻諸侯一同今大國數圻侵小所致蓋滔滔皆是故自桓十四年宋取鄭牛首而後無書者矣季明德言牟婁紀邑在今青州府安丘縣南界于莒把都雍丘距牟婁甚逺于此無邑本紀把字近而誤杜氏不察因謂把併淳于遷都焉淳于高密地在牟婁之東亦紀南界杜因此通誤按女叔侯告晉平曰把夏餘也而即東夷昭三年椒舉曰啇紂為黎之搜東夷叛之黎今河內近衛則所指皆近地非青州東萊之夷也又釋例土地名淳于雍丘雖郡别竟連則季說非但此時尚未遷淳于耳戊申衛州吁弒其君完州吁莊公之子也不稱公子未為卿非削其屬籍也是故許止蔡般稱世子商人之徒稱公子稱公子者公子而為卿也公子而不稱公子公子未為卿也未為卿而能弒其君則以其有寵好兵而莊公不禁也學者習讀而問義察所由來可知教子之法矣夏公及宋公遇于清啖叔佐曰遇者諸侯倉卒相遇其禮簡略但致恭敬而退本無所謀是也宋殤忌馮在鄭祕其踪跡約其與國私㑹于清以嘗鄭清鄭地詩清人之地是已杜指為衛地以東阿清亭當之不知東阿齊地即所謂齊王烹阿者不得為衛邑季明德以水經定為魏地在今淇縣清水合淇水入衛河處南近牧野皆非也宋魯之㑹衛方有弒完事在三月十七日戊申去遇期不逺州吁亦必不敢釋位逺出傳亦無明文其同伐鄭乃後來求寵之謀或窺二國相遇之意則未可知耳然今書衛人則州吁亦未敢出也况是遇乎不得豫指衛人之同㑹也王道衰伯者未作弒逆橫行莫之討而自謀其私也害哉宋公陳侯蔡人衛人伐鄭此諸侯㑹伐之始陳媯姓侯爵武王封舜後滿于陳國今陳州古宛丘蔡姬姓侯爵文王第五子叔度之子仲繼封今汝寧上蔡縣也宋人樓諸侯外以定州吁而內欲以除其所惡不義甚矣秋翬帥師㑹宋公陳侯蔡人衛人伐鄭于是大夫始敵諸侯諸侯之師再舉也翬不稱公子隱不爵大夫也公榖二傳謂貶者非若翬以與弒而先貶至桓三年返稱公何耶翬以貴戚隱授之本兵柄而不疑于是翬之弒械成矣九月衛人殺州吁于濮人衆辭謂右宰醜傳誤也濮衛地謂陳地傳誤也詩擊鼓曰從孫子仲平陳與宋即春秋伐鄭之師也衆仲以州吁安忍阻兵衆叛親離料其難濟已而被執于陳使右宰特蒞殺耳故殺州吁地曰濮石碏使羊肩别殺石厚于陳故地曰陳傳有其文而經著其實耳杜預不知因賈逵以濮為陳季明德又不能明觀傳文而肆辨城濮宛濮非也陳氏曰五國之諸侯不能定州吁而殺于濮于濮言未得國也見衛之有臣子也冬十有二月衛人立晉晉莊公子是為宣公左氏曰衛人立晉衆也晉逆自邢不書入若小白之志欲也諸侯世子誓于天子而立之繼室則朝于天子而命之烏有擅易如是者乎趙子常謂上無天子下無方伯諸侯又為之㑹伐以定之國人討賊立君而聖人豫以權非矣周衛非逺告請非難命討事異烏有權也五年春公矢魚於棠君舉必書存䇿書之體而善惡自見矣棠今魚臺縣古方與出國都逺矣夏四月葬衛桓公葬稱公以神明治之尊之也此古聖人通幽明鬼神之義也陸淳氏曰侯伯子男之國稱其君曰公臣子之辭也諡不得云公者諡王所賜其言非也汪仲裕曰衛桓公諡不當其行號不同其爵諡不當其行可也號爵不同彼烏知之哉秋衛師入郕郕姬姓伯爵文王子郕叔武所封國在今濮州雷澤東其北為衛地東為鄆魯濟西田近地也若懷之武陟則隰郕之郕矣與衛皆文之昭九月考仲子之宫桓之弒隱啓之也禮庶子為君則為其母築宫桓一公子耳隱為其母宫以成其邪心故桓之弒隱自啓之初獻六羽魯僣八佾于羣廟舊矣周禮舞師凡小祭祀不興舞而仲子獻羽羽翳也爾雅釋言曰纛山海經五采之鳥名翳析羽而注干首羽輕舞便于指揮凡舞必先羽而用籥始奏以文也執干戚者綴行而繼進復亂以武也按詩簡兮方將萬舞而下云左手執籥右手秉翟則萬羽為一公羊云萬者干羽者籥止因獻羽之文昧萬舞有籥羽矣且婦人祔夫無别樂别廟之禮仲子妾廟小祀而用羽非舞師之義何休謂婦人無武事獨奏文樂亦不知始進復亂節奏之詳且衆仲對羽數舉天子諸侯大夫皆曰羽亦不因其無武功而名之也六羽本非仲子所宜用故曰初獻程子謂見用八之僣而不知用六亦仲子之僣也左綿趙氏曰隱公以為廟外立宫不可同宗廟之禮殺而用六是隱之待仲子尚在乎正不正之間而惑于先君之邪不能正也其言是矣而不知用六亦非也邾人鄭人伐宋邾先鄭主兵也趙子常言大夫自以其班非也季明德不信邾人釋憾之言疑為鄭莊告邾之事過矣螟蟲食苖心葉根節者别為螟螣蟊賊春秋書螟者二在隱一在桓其後凡十一書螽而已蓋輕者不勝書矣螟輕于螽也冬十有二月辛巳公子彄卒臧僖伯孝公子惠公弟宋人伐鄭圍長葛長葛今許州北五十里縣也蓋鄭東鄙地陳君舉曰伐國不言圍自僖以前則書之春秋之初猶以圍為重也六年鄭人來輸平輸平者致平意而實未平其輸平平翬㑹伐之怨胡氏謂離宋黨是也輸者有所納之辭趙企明疑致祊田據左氏釋狐壤之憾耳鄭以虛辭致而不歸魯人察其情故不從宋亦不救鄭中立而有所要與宣十五年宋及楚平昭七年燕及齊平定十年十一年及齊平鄭平書法異矣陳君舉言鄭輸平志諸侯之合非事實也夏五月辛酉公㑹齊侯盟于艾艾山今沂州西魯地漢志注臨沂縣當是也春秋之初齊鄭黨也于是鄭長葛方圍齊為是㑹以謀之陳君舉云鄭方交惡于王亟平齊魯將以合諸侯焉亦近之而非實也秋七月公羊子曰春秋雖無事過則書春秋編年四時具然後為年也冬宋人取長葛程子曰天子弗治方伯弗征鄭弗能保有赴訴卒喪其邑皆罪也宋人強取不可勝誅矣七年春王三月叔姬歸于紀為莊十二年叔姬歸酅張本滕侯卒滕姬姓侯爵國在今兖州府滕縣文第十四子叔繡之後滕侯卒不日無名公羊子曰微國也春秋未有以微而不名者也榖梁子曰滕侯之不名用狄道也夫其用狄道也則何以不名吾謂榖梁蓋臆也如榖梁則宿男不名何解哉謂宿男微不登盟書庸詎知滕侯為同盟哉或稱陸氏春秋有不盟而書名者何也曰國之史册凡諸侯有告命則書然必因其所赴禮篇所録赴告之辭云寡君不祿而已左氏薨赴以名趙匡極辨其妄是也若史逸其名者盟書既以不考赴書又本不登故滕宿皆不能著其名也乃後有書者則去孔子近載籍又足徵也不然則後之不名者何鮮也左氏以禮經同盟稱名薨以名赴莊元年陳侯林卒左氏又以為未同盟而袲㑹陳侯實同伐鄭將㑹者未必盟而名不名又不係盟不盟乎二說皆閡乎義矣蓋同盟名于載書朝㑹名于要約聘告名于簡牘趙氏所謂卒赴則按而紀也久而或亡則焉所據乎謂世久近似是也乃胡子則詳葬義而名否因宿男見例謂不赴以名而孔子特書之有見于赴而無見于辭禮春秋之義微矣夏城中丘中丘在今沂州古臨沂也在沂水之東東為向北為鄆南為郯則西逾沂水距魯巳三百六十餘里近莒之邑也葉夢得曰魯之城多出于畏齊畏晉畏邾畏莒不然則大夫強而自城其邑耳今屬辭以觀其本末莒入向則魯疆埸須有以備之然夏而用民不憂其力矣齊侯使其弟年來聘結盟以黨鄭也其稱弟子之義胡氏備矣或謂聘本天子所以諭諸侯之志者齊恃強而僣行之然周禮大行人諸侯之邦交歲相問殷相聘有行之者矣殷中也比年使人以意相問曰小聘三年大聘諸儀文稍盛于問陳祥道謂三輔人語輕財曰聘或然也故殷又為盛司儀曰諸公諸侯伯子男之臣相為國客則有禮蓋考禮正刑一德以尊于天子王制所不禁也顧其時諸侯之修邦交者魯史無自書之而獨以其接我而書然所交已非禮之初意矣秋公伐邾無王命稱伐罪也棄蔑盟而黨宋以動鄭比事以觀不足誅矣冬天王使凡伯來聘此周聘之始凡周公第二子采邑今衛輝府輝縣古汲郡共縣也魯不王而莫之討猶聘而撫之以為非時聘之舊矣戎伐凡伯于楚丘以歸此戎患之始變執言伐公羊傳曰不與夷狄執中國也楚丘魯地今曹州東南界近巳氏戎者凡伯失節魯不修方伯之職則胡氏義備矣顧曰衛地誤也榖梁復云伐凡伯者衛而聖人書戎則不惟缺八年春宋公衛侯遇于垂外特相遇不書齊將平宋衛于鄭而宋請先以為不誠乎瓦屋之盟也垂曹地在今曹縣北當宋衛之間而界衛南以水經考之杜謂衛地誤也曹方附魯而鄭輸魯平故隱祕其跡以遇禮行之宋猶未釋于鄭也三月鄭伯使宛來歸祊庚寅我入祊祊今沂州費縣東南地近魯鄭莊欲離宋黨故以賂餌魯吕大圭曰左氏言以祊易許經文未見其事是時鄭方結魯非魯結鄭其言是巳豈左氏見假田之事誤合為一耶入者猶言納也趙匡指為歸入之言不當入也祊者鄭受之天子而魯可私受乎陳氏曰入未有言我者言我交之之辭也夏六月巳亥蔡侯考殳卒子封人嗣是為桓侯辛亥宿男卒秋七月庚午宋公齊侯衛侯盟于瓦屋榖梁子曰諸侯之參盟于是始宋衛欲致齊以絶鄭故為此盟東諸侯之交始盛程子曰自是傾危之俗成民不立矣瓦屋即定八年瓦亭季氏謂南燕地之近衛者杜元凱謂周地非也八月葬蔡宣公九月辛卯公及莒人盟于浮來公及者我所欲也公將黨宋圍鄭親至莒地毁列而與微者盟此吾君特㑹外大夫之始故謹志之也杜元凱曰諸侯之卿大夫再命以上皆書于經自一命以下大夫及士經皆書人名氏不得見然謂微者不嫌敵公侯非也浮來張洽曰莒地今志在莒州西三十里杜以為紀邑亦非也螟冬十有二月無駭卒大夫名而不氏别于貴卿也無駭公子展之孫其後為展氏九年春天王使南季來聘三月癸酉大雨震電庚辰大雨雪挾卒夏城郎趙企明曰郎今之單父魚臺單父宋地則郎逼于宋者也魯將北㑹齊鄭伐宋疑宋搗虛故盟莒人固其東城郎備其西事或然也秋七月冬公㑹齊侯于防周禮大宗伯時見曰㑹諸侯有不順服者王將有征討之事則既朝覲王為壇于國外合諸侯而命事焉即大行人所謂命以征討之事者諸侯不得專征討何為而有㑹乎將謀伐宋即魯㑹防防魯北鄙近齊之地杜元凱以為琅琊東南則非齊魯所由之道高抑崇指兖州金鄉縣界則宋地之近於緡者齊魯方欲謀宋亦不應先至其地也左傳宋公不王鄭伯為王左卿士以王命來告伐宋然經文未見以卿士書鄭伯蓋左氏傳耳十年春王二月公㑹齊侯鄭伯于中丘左氏曰為師期也夏翬帥師㑹齊人鄭人伐宋翬不稱公子猶未為卿左氏以羽父先㑹齊鄭貶不書族非也此中丘諸國㑹稱君伐稱人㑹者君而微者從翬陳氏謂前目後凡非也高氏謂齊渝瓦屋之盟鄭為兵首亦非也中丘地臨沂水順沂而下可至宋之東鄙翬帥齊鄭由東道入宋正兵也宋鄭交怨兵連不弭書先齊者鄭嘗以爵尊齊也春秋魯史故得先大國書及內辭也六月壬戌公敗宋師于菅胡氏曰詐戰曰敗敗之者為主菅宋地北鄙自郎而西以逹于菅公之敗宋由西道入家鉉翁謂公自出竒兵是也其日甚之也初翬㑹師伐宋已而六月戊申公㑹齊侯鄭伯于老桃宋地也壬戌公敗宋師于菅菅宋地杜以長厯推無戊申孔定為戊午是也然曰齊鄭後期故公獨敗則非矣此竒正之師耳地近日又近豈後期哉辛未取郜辛巳取防受之於師曰取榖梁傳曰取邑不日此其日何也不正其乘敗人而為利取二邑故謹而日也郜姬姓子爵文王第十一子所封今兖州城武縣有郜城為北郜郜之所居在城武南為南郜秋宋人衛人入鄭高抑崇曰宋又連衛以報鄭鄭幸菅之敗而不備故宋衛乘其虛而入之趙子常曰外入國有以來之不月宋人蔡人衛人伐戴鄭伯伐取之戴今睢州考城縣古外黃居鄭北鄙趙企明曰三國入鄭不克故移兵戕其附庸鄭伯出兵乘之戴鬭其前鄭扼其後取三師言易也此如取鄭師于雍丘取宋師于嵒之類非取戴也然曰聖人幸其勝表而爵之則又不然實鄭伯故書鄭伯三國將卑師少而鄭伯親將胡氏謂以寡覆衆亦非也冬十月壬午齊人鄭人入郕郕魯濟西近邑其北為衛濟逼單父單父宋地戴以鄭附庸宋挾蔡衛以伐之郕宋衛與國齊人黨鄭伐之宋鄭交惡而及其附庸與國其怒與色可謂失所施矣十有一年春滕侯薛侯來朝此諸侯來朝之始薛任姓侯爵黃帝裔孫奚仲之後禹所封也國今滕縣東南滕薛南鄰宋故宋人嘗曰滕薛吾役也周制諸侯朝覲以命數為節小國不能供故朝以求降然朝者朝事之名本諸侯所以事天子者而諸侯世相朝亦周禮行人邦交之儀故曽子問有告廟命五官之文蓋其事也凡朝必以禮接于廟非諸侯不言朝禮與朝天子異矣魯侯朝而稽首于伯主晉人曰天子在而君辱稽首寡君懼矣齊侯稽首于魯君魯君拜齊人怒魯人曰非天子寡君無所稽首于周禮司儀諸公諸侯伯子男相為賓則有禮則是相朝以繼先君之好賔禮接之而已春秋非惡其朝但志其非世傳言滕薛爭長亦非其禮見也闕述職而私相朝聘則胡氏備其義矣夏公㑹鄭伯于時來秋七月壬午公及齊侯鄭伯入許時來今鄭州滎陽縣釐城許姜姓男爵炎帝裔四嶽之後武王封文叔于許國今許州鄭長葛近許而宋取之意許必有昵于宋且欲許田也故啓魯為時來之㑹而連齊入許矣冬十有一月壬辰公薨程子曰人君終于路寢見卿大夫而終乃正終也薨于燕寢不正其終也薨不書地弒也蓋魯君薨未有不知其地者薨而不地欲以起問見其有故也不書葬者魯之臣子蔽于邪說不成隱之為君趙子常謂不以君禮葬也左氏曰不成喪是矣公榖皆以賊不討不書葬然不可通于蔡景許悼矣所謂義正而事失真者也春秋明志録卷一
