body:
  text: 春秋明志録卷十二明熊過撰哀公名蔣定公妾姒氏子在位二十七年其十四年春秋絶筆諡法恭仁短折曰哀元年春王正月公即位楚子陳侯隨侯許男圍蔡楚君自將也左氏曰報柏舉也杜元凱曰定六年鄭滅許此復見者蓋楚存之胡子以為恕楚罪稱爵夫恕楚罪豈必在稱爵哉鼷鼠食郊牛改卜牛夏四月辛巳郊秋齊侯衛侯伐晉于是齊侯衛侯會于乾侯救范氏魯師及齊師衛孔圉鮮虞人伐棘蒲不書師諱內伐盟主也陳君舉曰春秋之初諸侯無王者齊鄭宋魯衛為之也春秋之季諸侯無伯者亦齊鄭宋魯衛為之也冬仲孫何忌帥師伐邾二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田漷東沂西田在繹山東南蓋邾城在繹山陽即今鄒縣地近季氏費邑左氏曰伐邾將伐絞邾人愛其土故賂以漷沂之田癸巳叔孫州仇仲孫何忌及邾子盟於句繹句繹繹山之地也杜氏云邾地吾大夫及諸侯盟恆不日此其日之何伐其國而要之盟故異之也邾以漷沂之田易絞土恐其悔而盟之也再書大夫名氏者季氏不與盟趙企明曰勢在季氏季氏不往則勢不徒行故伐邾取田非季氏不可得信在邾子邾既屈則信已著故句繹之盟季氏所不必與强者已親之以示威屈者已辭之以避辱則信乎季氏之强而不可制也或曰季氏不得田故不與盟叔孫之郈在魯西鄙仲孫之成在魯北鄙相去邾田為逺懼季氏之强而邾田卒歸于彼也故叔仲二家獨與邾子盟皆非也田之歸季孫與否豈邾子所能與哉夏四月丙子衛侯元卒孫轍拒父蒯聵以立是為孝公或曰出公滕子來朝晉趙鞅帥師納衛世子蒯聵于戚蒯聵奔靈公嘗再欲立子郢郢辭公因夫人欲立之郢終辭其卒也南子立亡人之子輒則廢蒯聵而立輒未有靈公之命也蒯聵初以疑似之迹出奔以待見察耳輒蒯子蓋知之矣見其父奔而仇以為罪人及靈公薨國人援已遂立于其位則輒之無父可知矣故稱世子以明正其言納於戚者孫明復謂輒拒不得入衛是也輒貪國叛父逆人理以滅性故孔子於蒯聵出入皆正其世子之名陳君舉曰後十二年而蒯聵自戚入於衛衛侯輒來奔則輒拒父也屬辭比事則輒萬世不可掩矣餘見胡氏傳秋八月甲戍晉趙鞅帥師鄭罕達帥師戰于鐵鄭師敗績鐵杜氏云衛地在戚城南然則鞅所帥即納聵于戚之師也傳稱鄭歸粟范氏按鄭既叛晉從齊則餉助范氏以抗晉事所必有晉師方近鐵戰于鐵亦勢所必至也然晉不修文告以問黨叛之故而輒與之戰則鞅主乎是戰者也左氏記齊餉范氏經無據謝氏以為罕達為衛討蒯聵趙鞅禦之則于經傳兩無據矣冬十月葬衛靈公十有一月蔡遷于州來蔡殺其大夫公子駟蔡始封今上蔡縣州來吳所滅趙企明以蔡遷為倚吳避楚今按左氏蔡請遷于吳而中悔吳泄庸如蔡納聘稍納師師畢入蔡侯告大夫殺公子駟以說哭而遷墓則當書吳人襲蔡蔡亦不當以自遷為文此左氏之誣也公子駟書大夫稱國以殺言君與用事大臣擅殺之三年春齊國夏衛石曼姑帥師圍戚曼姑惡子戚衛邑也齊卿主兵不係戚于衛趙子常曰修春秋之特筆也蒯聵在戚輒不當有國父不可圍齊人不當黨逆是故蒯聵出入皆稱世子雖魯史舊文夫子實因之以正名而于圍戚特不繫衛以異之也或問衛輒立不立孰可者胡子言之曰輒辭其位以避父衛之臣子拒聵而輔之可也奈何曰奚為其可也夫胡子之言是教之僞之道也夫既已辭其位矣乃聽其臣之輔已而拒父也是謂之乎姑為之而欺其人者乎彼其意乃假乎于人而已辭名焉者夫假乎于人而已辭名焉者譬諸小人穿窬之盜也父子之間容施僞乎然則奈何曰去之而已聵未嘗有廢命也而輒可貪國叛蒯乎春秋正蒯為世子郢之辭固知蒯之當立也假而靈公廢蒯也猶亂命也國之臣子尚得以正治之不可從君于昏也如謂蒯有罪也則亦非輒所得非委而去之以從蒯國付之郢焉可也臣子實不忍乎或請諸周立輒之子乃其身不可以一日而安其位者也夫胡子之言教之僞之道也夏四月甲午地震五月辛卯桓宫僖宫災桓僖二公不言及說公榖者固云親盡尊卑如一也或曰祖有功宗有德信乎曰奚不信也然則奚不言及曰是二公者將德醜而莫能擇焉由哀遡僖七世矣桓十世矣三家出于桓立于僖以是為說而不以時毁也諸侯五廟耳昔者先王之制禮也所以奉天非必以其私情為也是故諡與廟可以觀德焉孝子慈孫欲改而不能也今胡子之言曰嫌于擇祖是秦政違天之議也夫廟與諡是二者皆出于臣子者然誄必稱天而諡因之有天之道云爾也乃孝慈之心不惟莫之敢且莫之忍也已然則胡子之言苟以存求厚之道而失聖人奉天之意矣夫奉天何為也天道明則畏愧之心生畏愧生而天德王道舉矣季孫斯叔孫州仇帥師城啓陽啓陽杜注琅琊開陽縣據水經故鄅國在邾東鄙而近于費昭十八年邾人伐鄅鄅子帑從于邾魯人習漷東沂西之利二卿帥師脅邾而城焉恐其爭耳非邾邑故不繫邾杜氏曰魯懼晉故比年四城趙企明因言晉越齊衛而後至魯魯何虞而備晉啓陽今在沂州地近邾元年取邾田疑邾伐我故備之以地證事趙疑若得矣然繼是伐之者二城迫之者一未聞邾一報也已而遂入邾以邾子益來矣魯何疑于邾之伐哉企明僅得其一耳中失而外鍵本亡而末務許氏之論魯然乎哉宋樂髠帥師伐曹薛士龍曰討樂大心之亂也秋七月丙子季孫斯卒子肥嗣為康子蔡人放其大夫公孫獵于吳諸侯不得專放大夫僣天子之事也凡放者君與大夫咸與焉稱國胥申父是也國亂無政衆人擅放之則稱人李廉以為稱人者放有罪然杜注以獵為公子駟之黨則是不主于遷非得罪國人者杜必有誤矣明年而公孫翩之亂辰姓霍皆公孫也豈獵放吳故其黨乘蔡侯如吳而遂甘心于一報者耶傳謂諸大夫恐其又遷得其事而誣其情矣冬十月癸卯秦伯卒孫嗣是為悼公叔孫州仇仲孫何忌帥師圍邾四年春王二月庚戌盜殺蔡侯申子朔嗣是為成公高抑崇曰宣十一年蔡侯申卒是為文公此蔡侯申于文公為曽孫周人以諱事神豈有曽孫與曽祖同名者乎必有一誤是也殺依公榖作弒公孫翩弒君而書盜蔡人諱公孫弒君而赴以盜也屬辭者觀于辰之奔姓霍之殺而盜得亦見蔡無臣子矣公榖胡氏皆稱盜不名人為微賤又言蔡侯不能以禮信自衛夫人得而害之故變文稱盜以警有國其說皆非如使弒君之賊得逸其罪名將何憚而不為乎是又與于弒逆之甚者也蔡公孫辰出奔吳與聞乎弒葬秦惠公宋人執小邾子夏蔡殺其大夫公孫姓公孫霍蔡成公討殺父之賊而以公孫姓公孫霍為同謀也故不得去其大夫見其勢可以得賊而使之佚蔡無臣子之實也晉人執戎蠻子赤歸于楚此隂大夫也則其曰晉人何有當國者之命也趙孟之謀國如此宜晉之不競也晉不競于伯詐蠻子而執之則既背信矣又以歸于楚北宫子曰辟伯晉而京師楚是也蠻子名以屈服也城西郛杜氏曰城西郛者備晉也蓋助晉叛臣恐君怨六月辛丑亳社災榖梁云亡國之社以為廟屏戒也其屋亡國之社不得逹上也有屋故得災周禮建國之神位左宗廟右社稷又云决隂事于亳社在左立于廟門之外以為屏蔽與國社不同位故左氏述季友間于兩社為公室輔秋八月甲寅滕子結卒子虞母嗣是為隱公冬十有二月葬蔡昭公葬滕頃公五年春城毗孫明復曰毗魯邑夏齊侯伐宋宋景伐曹執小邾欲圖伯故齊景伐宋爭之晉趙鞅帥師伐衛衛助范氏而蒯又未入故晉復伐之秋九月癸酉齊侯杵臼卒子荼嗣是為安孺子景在位五十八年范純夫曰治愈久政愈蔽年彌進德彌退者是也冬叔還如齊卿弔且會葬也諸侯卒士弔大夫葬禮也閏月葬齊景公按長厯是年閏十月也公榖謂不正其閏劉原父曰喪以年斷者不以閏數以月斷者則以閏數葬之為事以月斷故公榖為非然九月至此僅三月耳茶以非正而立故速葬也六年春城邾瑕瑕邾邑在今濟寧州南古亢父魯有負瑕故稱邾瑕以别之高抑崇云瑕邾邑魯未嘗取于邾而遽城之見魯之迫邾也然則杜元凱以為備晉者非也晉趙鞅帥師伐鮮虞左氏傳治范氏之亂也杜元凱曰四年鮮虞納荀寅于柏人故吳伐陳吳入楚使召陳懷公以晉辭夫差克越乃修先君之怨伐陳夏齊國夏及高張來奔荼之立陳乞不與故乞以詐謀逐國高國高為國世臣從君于昏受其顧命力不足以衛上委君而逃書奔以罪之蓋國高奔而乞之弒械成矣叔還會吳于柤趙企明曰吳既伐陳魯懼兵之及我故叔還往會之秋七月庚寅楚子軫卒子張嗣是為惠王齊陽生入于齊齊陳乞弒其君荼陽生立是為悼公胡子曰景公命荼世其國已則篡荼而自立是絶于先君不稱公子誅不孝也以陽生繫之齊廢長立少者亂之所由生也榖梁曰陽生正荼不正不正則其曰君何也荼雖不正已受命矣何邵公曰乞為首惡故書弒其君陽生實篡故書入于齊孫莘老曰陽生入齊而陳乞弒君是陽生與聞乎故也不以陽生首惡者陽生之入陳乞召之荼之弒陳乞為之加陽生以弒君之罪則乞廢立之迹不明也據數家說經則左氏朱毛之言陳乞之泣皆誣妄矣冬仲孫何忌帥師伐邾三年州仇何忌並將圍邾矣今何忌又伐之將邾之待仲孫者獨薄于二氏歟宋向巢帥師伐曹巢戌曽孫高抑崇曰樂髠伐之猶未服且為入曹起也七年春宋皇瑗帥師侵鄭皇氏戴公子皇父之後定十五年鄭罕逹帥師伐宋敗宋師于老丘宋畏齊鄭之黨不敢報齊景沒宋欲伐與國故既伐曹即侵鄭左氏以為鄭叛晉李廉曰宋之叛晉久矣豈復為晉討鄭乎晉魏曼多帥師侵衛曼多絳曽孫五年晉伐衛至今未服高抑崇曰衛輒拒父至今六年猶未納也晉人不以此致討而以范中行氏故加兵于衛何哉夏公會吳于鄫秋公伐邾八月己酉入邾以邾子益來薛士龍曰伐邾本三家之謀而公親之不得已也公內迫于三家三家歸過于公也蘇子由曰其不書滅邾大夫茅夷鴻保于茅請救于吳明年吳為之伐魯復邾子故也杜元凱曰他國言歸于魯言來內外之辭也宋人圍曹冬鄭駟𢎞帥師救曹𢎞公孫夏曽孫救曹以報宋皇瑗之師八年春王正月宋公入曹以曹伯陽歸經書入傳曰滅經書歸傳曰殺凡不有其地曰入入輕于滅歸輕于殺春秋之恆辭也聖人豈舍重而録其輕哉此左氏之誣元凱蓋從而黨之乃曰宋公既還不忍禇師之詬怒而反兵滅非本志故以入告非也馬遷世家亦言宋滅曹蓋襲左氏之誤據曹陽歸宋在敬王甲寅至丙申去孟子去齊已一百八十三年而趙臺卿注曹交曹君之弟臺卿博學必有所據孫奭失考實耳交未必陽弟則當孟子時必有曹君豈國實未滅耶曹始從齊桓為北杏之會以府宋怨其後齊桓進曹與會盟抑諸莒許之下以謝宋耳終春秋會列因仍不改然自僖十五年至宣三年三十九年書宋之圍伐者三自哀三年至八年圍成而遂滅凡加兵者四嗚呼諸侯之無伯也害哉吳伐我此吳為邾伐魯加兵國都矣定公以前魯疆場猶存警備外兵不易至于國都故被兵言四鄙夏齊人取歡及闡邾子益齊外甥齊取魯邑為以邾子益來也歡在汶北非魯本封闡在汶南則邦域之中故言及歸邾子益于邾左氏曰齊侯使如吳請師將以伐我乃歸邾子秋七月冬十有二月癸亥把伯過卒子維嗣是為閔公齊人歸歡及闡左氏傳季姬嬖故也九年春王二月葬杞僖公宋皇瑗帥師取鄭師于雍丘雍丘把地界宋鄭之間後屬宋今陳晉地取者覆而敗之榖梁子曰取易辭以師而易取鄭病矣鄭自定十五年罕達伐宋至又以逹嬖許瑕之故欲取邑于宋以與之不義甚矣然至設覆而悉俘之則豈已怨之道哉夏楚人伐陳左氏傳陳即吳故也秋宋公伐鄭冬十月十年春王二月邾子益來奔吳人討邾囚諸樓臺栫之以棘使諸大夫奉太子革為政故邾子來奔公會吳伐齊據傳吳子使來警師伐齊然吳逺于齊間魯而後至此必因魯之求吳魯弱不敢及吳尊吳為主故不書及而書會吳之患及于東夏魯為之也趙企明曰齊窺魯之西鄙久特幸魯有滅邾之事脅義以取邑魯之憾齊亦久矣特幸邾子之來脅義以伐之二者假義以濟欲其實大不義也三月戊戌齊侯陽生卒子壬嗣是為簡公自左氏以為齊人殺悼公而胡子遂以為悼公變而克正故書卒以沒其見弒不忍以夷狄之民加中國之君然卒而書日無以起問者見情實元凱直云從赴則亦必隱情以赴魯人無從知之雖魯侯在行亦必莫察也左氏何由察之而春秋又不以微文見意耶既云吳子三日哭于軍門之外似哀有喪者然必齊人敗海道之舟吳師乃還情文不侔蓋左氏之誣也且魯吳邾郯之師不強于齊煩兵于鄎尚未入國齊何所憚而遽弒其君哉趙企明曰經書齊侯陽生卒而傳者以為齊弒其君此何以通之趙盾實弒而傳以為非弒陽生非弒而傳以為弒學者不信經而信傳反曲經以合之若杜氏之誣君子不責而學春秋者亦折而從傳吾所不曉夏宋人伐鄭晉趙鞅帥師侵齊高抑崇曰齊人師諸侯以貮晉可以討矣然趙鞅乘有喪而加兵焉異乎士丐矣五月公至自伐齊葬齊悼公衛公孟彄自齊歸于衛定十四年衛世子蒯聵出奔宋衛公孟彄出奔鄭則彄固蒯聵之黨也蒯聵猶在戚今乃托齊歸衛從輒而背蒯聵徙于不義矣薛伯夷卒秋葬薛惠公冬楚公子結帥師伐陳吳救陳結昭王次弟吳自柏舉之後恆以號舉雖救兵亦不進于中國以其所為不離于狄道耳胡子謂吳以號舉深著楚罪而傷中國之衰非也左氏傳延州來季子謂子期曰二君不務德而力爭諸侯春秋狄吳蓋以此耳然非必季子將也札以襄二十七年來聘書名救陳之役若季子實行法當書矣札壽夢少子也壽夢以襄十二年卒至今七十七歲壽夢卒札已能讓國年當十五六至今蓋九十餘老未必能將此左氏之誣也十有一年春齊國書帥師伐我夏陳轅頗出奔鄭轅頗濤塗四世孫凡列國卿大夫之奔必有關于一國之故而後書轅頗之奔在楚伐陳吳救陳之後其必志本向楚而與衆有不合者乎趙企明不信左氏賦封田之事有由然矣五月公會吳伐齊甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書艾陵齊地據傳當在嬴博之間于是時戰吳子呼叔孫賜之甲劍鈹則魯與戰矣其不以與戰之辭言之何也諸侯以兵屬于吳皆不序也既書公會吳伐齊而戰則從其恆辭魯人屈于強吳而求伸于中國其罪不可掩矣秋七月辛酉滕子虞母卒其後世嗣不可考冬十有一月葬滕隱公衛世叔齊出奔宋齊即太叔疾儀之孫申之子也前年公孫彄自齊歸於衛今世叔齊出奔宋一出一入其黨有不能相容者矣齊適宋即臣向魋則必悖逆之臣其奔不為無罪矣左氏載孔姞事得其一耳十有二年春用田賦賦者斂錢之名據傳仲尼曰以丘亦足矣則周制以兵賦今改用田賦論丘賦者主夫家論田賦者主田畝考鄭康成曰古者不以田為賦是也蓋賦者丘賦用田賦是計田以賦矣力役之征宜出夫家夫家謂之丘田征粟米而已魯以稅畝井田盡廢豪强兼并夫家不保其居丘畝數損改用田以賦若漢斂民財以田為率蓋不復論丁中矣周制歲時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之豈有以田為賦者哉杜元凱言丘賦之法因其田財通出馬一匹牛二頭今欲别其田及家財各為一賦不知古法田與夫家本别授田有法本無甚貧甚富之家不以財為凖也魯用田賦則不論夫家其田既出粟米又出力役今又供軍需是為重耳國語賦里以入止是布縷之征又曰鰥寡孤疾有軍旅之出則征之益害道矣竊詳孔子丘足之意必改三家四分之制而一切兼并皆還之古然後力役可責夫家其牛馬車乘之費輔以漆林之稅非苟然也古之獻民數者其意深哉今之言治者主糧而棄下不論觀此可知也夏五月甲子孟子卒孟氏子姓宋也禮坊記曰魯春秋去夫人之姓曰吳其死曰孟子卒然論語記稱謂曰吳孟子猶存國可以起問今直書孟子則真若宋女內大惡諱也此昭公夫人也或者以為妾夫強吳之女魯人敢妾之耶吳幼清曰不以夫人之禮喪之也昭公君且逐之而葬不備况夫人乎公會吳于槖臯槖臯今廬州府東北廢梁縣界古淮南逡遒縣吳地也魯德吳伐齊之役又孟子新卒恐吳疏已將為之合諸侯焉以成其霸故親往會之吳之肆魯為之也秋公會衛侯宋皇瑗于鄖鄖今揚州府泰州古海陵縣界吳地也吳欲圖伯故魯為致二國乎其地傳言吳徴會于衛然經不書吳人與會于事理未然也左氏傳衛殺吳行人且姚然記宰嚭藩衛之辭止言衛侯來緩不問且姚之死則原無其事矣然則謂吳孟子與會二事豈非皆誣也哉宋向巢帥師伐鄭宋鄭之間有隙地曰彌作頃丘玉暢嵒戈錫子産與宋人為成曰勿有是及宋平元之族自蕭奔鄭鄭人為之城嵒戈錫九月宋向巢伐鄭取錫殺元公之孫遂圍嵒冬十有二月螽季孫問諸仲尼曰丘聞之火伏而後蟄者畢今火猶西流司厯過也杜元凱曰周十二月今十月是歲應置閏而失不置雖書十二月實今九月之初尚溫故得有螽至明年復十二月螽實亦十一月也十有三年春鄭罕達帥師取宋師于嵒罕逹救嵒圍宋師向魋救其師鄭子賸使狥曰得桓魋者有賞魋也逃歸遂取宋師于嵒夏許男成卒公會晉侯及吳子于黃池黃池今開封府古陳留封丘地汪仲裕云地近濟水則在鄭之境而晉嘗有之是也國語吳起師北征闕為深溝通于齊魯之間北屬之沂西屬之濟蓋為是矣言及者會兩伯之辭吳強欲伯然有內憂司馬寅曰夷德輕不忍久經序晉于吳上本紀其實非謂不與夷狄之主中國也左傳云晉為先歃而外傳吳語中即云吳先歃是經足據也夷狄舉號君臣同辭故柤之會夀夢也死以號舉吳僣王猾夏與諸侯接禮文不與是以中國先自會而後殊會之雖吾君大夫與之特會亦一切以號舉而已黃池晉吳兩主之會然晉董褐舉命圭以折吳曰無卑天子而干其不祥吳退而就幕則榖梁謂辭尊稱而居卑稱㑹諸侯以天王正應經義其盟而爭歃然卒先晉人子服景伯對吳曰執事以伯召諸侯蓋吳至是始竊侯伯之禮以與諸侯接而魯史至是亦據子爵以稱之耳然則聖人以伯豫之乎夷夏有大防矣然有在夷狄而進之者而吳非其國也聖人豈容心哉楚公子申帥師伐陳楚乘吳出會伐其與國耳蓋吳强楚莫能如也於越入吳薛師龍曰吳子忘不共戴天之讐爭中國諸侯于外而越卒入吳所謂旡逺慮有近憂矣胡子曰吳嘗破越遂有輕楚之心既破楚又有驕齊之志既勝齊師復與晉人爭長自謂莫敵也而越已入其國都矣吳侵中國而越滅之越又不監而楚滅之楚又不監而秦滅之秦又不監而漢滅之曽子曰戒之戒之出乎爾者反乎爾者也秋公至自會晉魏曼多帥師侵衛蒯聵居戚十二年晉人不能以討衛乃以范中行故而數興師師雖數出能侵而已兵威之頓其復可言霸業哉葬許元公九月螽冬十有一月有星孛于東方凡星孛皆言所加曰東方者日久遍歷東方所加非一宿也公羊以為見于旦杜氏從之何劭公亦指房心按周十一月日躔所在而言非也趙子常曰凡星變無不書而春秋所書星變者四皆為天下紀異也莊公七年四月辛卯夜恆星不見夜中星隕如雨是時諸侯無王而伯者興雖曰假尊王以示義而天下大權由此實歸齊晉人情絶望于周矣故夫子于莊公之篇初序齊桓霸而莊王僖王崩葬特削不書此天下一大變也文公十四年孛入北斗是時晉君少不在諸侯而楚圖北方中國罷于戰伐齊商人弒其君執天子之使諸侯不為之變王室益以微矣故夫子于晉靈會盟而不序諸侯而楚君將稱君于是始是年頃王崩葬復削不書又一大變也昭公十七年有星孛于大辰平丘而後晉不復能主夏盟子朝之亂諸侯無勤王之師而春秋治在夷狄矣哀公之時東方諸侯制于吳越天下將變為戰國而春秋終焉以其時考之皆非常之異也盜殺陳夏區夫高抑崇曰區夫徵舒之後徵舒弒逆楚殺之而陳人猶使其世執國政春秋因其為盜所殺而書之與華孫同意盜殺蔡侯申盜殺陳夏區夫當春秋之季世變之甚至盜興而専殺國君卿大夫則亂已極矣十有二月螽十有四年春西狩獲麟鐡山陳則通曰春秋書狩即狩禚未有不志其地今但曰西狩則窮國以西淫獵所至雖麟不獲免焉麟仁獸也仁人君子之象也感獲而絶筆其聖人遁世無悶之意乎愚按孔子獲麟曰唐虞世兮麟鳳遊今非其時來何求麟兮麟兮我心憂則謂書成瑞至者過矣然則春秋以天道終信乎曰春秋者究禮樂之原極性命之統者也曰天命曰天討聖人所以飾喜怒者孰非天也天也者何也民受天地之中以生者也喜怒哀樂之未發謂之中發而皆中節謂之和無非出于天命之性也獨以麟出為天道乎哉春秋明志録卷十二
