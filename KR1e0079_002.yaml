body:
  text: 春秋明志録卷二明熊過撰桓公惠公子隱公弟名軌史記一名允弑兄自立在位十八年諡法闢土服逺曰桓元年春王正月公即位即就也先謁廟明繼祖也還就阼階之位見百官以正君臣也事畢而反㓙服焉其禮如伊尹冕服奉嗣王祗見厥祖者朱先生謂王侯以國爲家雖先君之䘮猶以爲己私服是也然柩前之位所謂即位而哭阼階之位亦止行于廟中與正朝之禮猶有不同未受黻冕自難以士服臨朝康王之誥曰諸侯出廟門俟王出在應門之内應門内王之治朝而可以麻冕彤裳臨諸侯乎王世子未受命即成爲君諸侯世子雖誓于王君薨猶必親受命也借吉行事必待踰年故冕服見祖太甲于元祀月朔迺行之先儒謂始䘮即行朝廟即位禮者亦考之不詳也桓繼隱而言即位榖梁子以爲與聞乎弑矣三月公㑹鄭伯于垂鄭伯以璧假許田埀曹地鄭適魯之道埀之㑹請許田也公羊子曰易之則其言假之何爲㳟也許田魯朝宿之邑田多邑少稱田春秋之初諸侯爲惡從而爲辭焉孔子傷其弊曰利而巧文而不慚小人之過必文春秋著其事見王風日趨于變且以志鄭莊之爲欺也夏四月丁未公及鄭伯盟于越榖梁傳曰及者内爲志焉爾程子曰桓公欲結鄭好以自安故既與許田又爲盟也杜元凱曰越近垂地名秋大水啖叔佐曰凡水旱皆書時者爲其乆乃成災故不可書日月也冬十月二年春王正月戊申宋督弑其君與夷及其大夫孔父榖梁子曰孔父先死其曰及何也書尊及卑春秋之義也公羊子曰孔父生而存則殤公不可得而弑也父甫通男子之美稱故父名嘉字也杜氏言稱名以罪妻出不擁蔽其面既不知傳家附㑹之誣又不知君名于上臣不可字亦無緣與仇牧荀息書法異也公榖及先儒皆以善孔父書字違經義矣趙企明曰父孔子六世祖不敢名也春秋孔子之家史非若太史氏修于國故可諱君親一也王猛不諱而諱孔父乎何謂臨文不諱乎趙子常變其說曰天子之命大夫故不名則益疎矣劉卷非天子三公乎從胡氏滕子來朝元呉立夫論杞曰春秋列國把爲難攷立四義以辯卒莫之定也滕把等耳胡子惡其朝魯曰降而子以狄之其求經亦太深矣聖人不以一罪及人之子孫然滕之書子嗣是迭出豈波及于其後若申韓之敎乎書來朝即所以治之子之變不可攷矣以子產爭承例之殆自貶以從殺禮耳趙企明衍孫明復之說曰大國爵不過公侯小國自嫌相抗非利故把侯以侯爵來接即有入把之師以討不恭則謂滕自貶者深中事情矣或曰滕之子趙匡謂居䘮稱子是故七月杞侯來朝不降胡子謂杞爲紀不過証滕子爲貶耳以把爲紀則九月入把經有明文左氏固以爲不敬致討則非紀之誤明矣胡子求經何其臆决也三月公㑹齊侯陳侯鄭伯于稷以成宋亂稷宋地諸侯之㑹自參以上必言故其義胡氏備矣夏四月取郜大鼎于宋戊申納于太廟此宋之賂受之于㑹其義胡氏備矣秋七月把侯來朝義見滕子來朝下把姒姓公爵武王封禹後東樓公國今開封把縣古雍丘或謂唐侯堯後陳侯舜後獨宋以易姓相繼微子之德特崇其爵建爲上公夫三恪之備以神明之胄耳豈私其相繼之故耶蔡侯鄭伯㑹于鄧始懼楚也楚爲中國之害于是始是時楚武王熊通始僣稱王慿陵江漢故漢東諸侯爲此㑹也鄧蔡地潁川召陵縣西南之鄧城趙企明謂曼姓侯國今襄陽府鄧城楚婚姻之國故二國託焉近是胡康侯曰觀諸侯㑹盟離合之跡而夷夏盛衰之由可攷也九月入把左氏曰討不敬也公及戎盟于唐冬公至自唐盟唐而致者桓公以得與戎盟爲幸乆而歸行飲至之禮危之也三年春正月不書王缺文也杜氏以爲不頒厯劉炫規之今胡氏取爲傳者是以榖梁以爲桓弑君無王胡氏信之然天下不獨桓無王也若云孔子因魯史以立王法凡天下無王者以類誅猶可也二年春與夷之弑定十三年之薛弑其君比何以不相同乎十年書王以爲正曹終生之卒五年陳侯鮑卒赴以二日謂長厯大衍步推不在一月故不得質言書王與其正猶可也十五年何以不正天王之崩十七年何以不正蔡封人之卒乎豈謂事不在正月故不書王乎春秋書王本以大一統不謂王之能王也况王月實非魯所能私哉其後趙子常少變之然無能改也胡氏别爲之辭然至二年書王則無以自解宋萬趙盾宋歸生之弑而稱王矣公㑹齊侯于嬴嬴齊地今泰安州界内杜氏曰以國君娶夫人不由媒介自與齊侯㑹而成昏非禮也夏齊侯衛侯胥命于蒲此志齊衛之合也春秋之初齊黨鄭衛黨宋㑹稷之後宋鄭平矣二國固無所釋憾也故胥命者比周而相推長焉於是乎齊僖稱小伯而詩之式微黎以方伯望衛矣齊桓之紏合不待致伯而行其事則僖開之而桓習其舊也豈天下之細故哉推伯不已凌夷之勢有齊魏相王之漸陳君舉王伯厚于經爲合自公榖以爲近正而古荀卿子遂曰春秋善胥命卿之學榖梁氏之學也趙匡曰㑹遇亦並不盟皆是約言而退何得獨異此文且二君並非賢君又無殊異之迹據經文直譏其無人君之禮耳則趙說亦未盡也蒲今在大名府長垣縣界古陳留衛地六月公㑹把侯于郕左氏把求成也秋七月壬辰朔日有食之姜岌以是年七月癸亥朔無壬辰亦失閏其八月壬辰朔去交分入食限與大衍同授時推八月壬辰朔加時在晝食六分一十四杪先天得交分二十五刻七五一入食限公子翬如齊逆女稱公子始命爲卿也越境而遣卿禮也胡氏譏之過矣九月齊侯送姜氏于讙據榖梁禮送女父不下堂母不出祭門諸母兄弟不出闕門左氏凡公女嫁于敵國姊妹則上卿送之公子則下卿送之于大國雖公子亦上卿送之于天子則諸卿皆行于小國則上大夫送之然則送女踰境非禮也讙今寧陽西界地則入魯境矣不言夫人者公羊子曰自我言齊父母之于子雖爲鄰國夫人猶曰吾姜氏也陳氏曰已去齊故不言女未至魯故不言夫人也公㑹齊侯于讙夫人姜氏至自齊冬齊侯使其弟年來聘左氏曰致夫人也有年公羊子曰有年以志喜也不足者示人有餘魯桓得罪于天侈天之賜以自慶史據實而書孔子不削以示譏乎四年春正月公狩于郎狩守也張羅驅逐守取之名爲田苗除害則蒐索取之曰蒐葢搜而擇之去其害者而已獸多可殺曰獮以其捷也則謂之獵皆一事之通名周禮大司馬仲春而敎振旅平列陳辨鼓鐸鐲鐃之用遂以蒐田祭社仲夏而敎茇舍撰車徒讀書契辨號名之用遂以苖田以享礿仲秋而敎治兵辨旗物之用遂以獮田以祀祊中冬而敎大閱則合三時之所辨者而皆辨之遂以狩田以享烝其義胡氏備矣夏天王使宰渠伯糾來聘宰者何宰夫也夫宰有太宰卿小宰中大夫宰夫下大夫若宰周公則太宰矣何則未有中下大夫而公者也其知糾宰夫者公羊以爲下大夫則宰夫之宰非冢宰矣渠氏也非邑也伯糾者說公羊者以爲字鄭箴膏肓名且字非也伯非爵也儀禮所謂二十而冠字伯某甫者是也王朝大夫未爵書字也何邵公說公羊曰老臣不名知其非名而誤也左氏云父在故名然仍叔之子有父在焉而不名且稱子今伯糾之不稱子安知有父乎無父乎胡氏以爲冢宰伯爵斯亦不攷諸前聞而私爲之說矣周禮宰夫凡邦之弔事掌其戒令與其幣器財用則咺之來周以宰夫之職使之也宰非冢宰也其與伯糾名字不同者王朝上士中士稱氏名下士稱人故趙子常以例定之曰宰氏咺名趙企明曰小宰士大夫兼之故名咺則其考于周禮益疎矣咺以宰氏伯糾以宰官不嫌同辭以法據舊史書之係于來聘而不係于名不名亦非以名字爲宰之高下事之得失也其不討而聘胡氏義是矣春秋上紀天之書也桓四年七年何以缺二時史失之也胡氏以謂四年之無二時以糾之聘而知王之不復能用刑也是何邵公之遺說也然五年仍叔之子亦聘矣而秋冬何以書也七年之無二時胡氏以謂榖鄧之朝見諸侯之不復能修職也邵公曰桓公以火攻人故去二時二氏之說靡所定矣然如胡氏之例則二年滕子來朝不具四時乎不可通于彼矣如何氏之說則火攻之惡不猶愈于成宋亂乎是故二氏求經之過杜征南范豫章可謂不鑿矣五年春正月甲戌己丑陳侯鮑卒按杜元凱長厯正月甲申朔日内無甲戌則巳丑乃六日也甲戍下按傳先儒疑有陳亂文公子佗殺太子免公疾病亂作之事爲蔡人殺陳佗張本趙企明曰甲戌之下闕事也左氏以爲再赴疎矣就使再赴不過再以卒之日赴也豈有一人而二日卒耶公羊家以其卒不地爲弑按陳侯卒于國自應不地何得因疑爲殺乎夏齊侯鄭伯如紀欲襲紀也胡氏謂著齊人滅紀之罪紀侯去國之由是也天王使仍叔之子來聘趙企明曰徴兵也仍叔之子云者公羊謂譏父老子代從政葢以爲私愛害公選矣葬陳桓公城祝丘高抑崇曰祝丘近齊邑葢公欲助紀而畏齊故非時而城以備之秋蔡人衛人陳人從王伐鄭王之伐鄭胡子曰鄭伯不朝貶其爵可也自將攻之非天討也夫周之微不振乆矣貶爵削地豈肯從令而受命乎彼謂移此師以加宋魯爲天討不知夫鄭也交惡于周不王已非一日不待奪政不朝而後見其罪也是尚可以稽天誅乎使諸侯翕從遂以夷鄭而周之威令因是復振則于周宣親征爲有光矣烏足深責哉故胡子之言吾以爲不如趙企明之得㫖矣蔡衛陳畏比鄭而以微者行無功而還又烏得褒然則祝𥅆請從之事不必問其有無矣先儒以爲諸侯不可敵王故戰于繻葛而不書戰王卒大敗而不書敗亦近乎迂僻矣夫王師敗績于茅戎猶可言也何􅉃于諸侯拒戰之事而顧盡没其實乎奪鄭權當在春秋前入春秋則鄭伯皆以外諸侯書耳王之無天也吕仲木曰省文從讀又曰闕文亦可也大雩雩者號祭吁嗟求雨也魯南爲雩門舞雩在城南舞以女巫雩樂以皇所以達陽中之隂雩祭以舞爲盛遂名壇曰舞雩有二龍見而雩設壇祈澤常祭也旱而雩非常也大雩上帝用盛樂又非常僣也胡氏義備矣月令建午之雩則秦制耳螽螽蝗屬詩螽斯是已形長而青長角長股一生九十九子者啖助曰書時者連月有之冬州公如曹六年春正月寔來州者天子圻内之邑河内武陟非隨絞州蓼伐楚之州亦非淳于之州也蘇忿生有田十二而州在焉後爲周州公食邑隱十有一年蘇叛天子不能有也取鄔劉蔿邘之田于鄭以十二邑與鄭而州在焉則州公失采然至是五年而始伐鄭仍叔之子伐鄭而兵端始啟意者仍氏未行州公猶得㳺偃于州以明年夏盟向求成于鄭既鄭齊衛人伐盟向王始遷其民于郏夫十二邑者盟與向皆在焉觀此則王雖與鄭尚不有至是旅拒以爭而州公之來繼仍氏有徴發耶春秋稱公者惟二王後及三公稱公故州公天子之三公也左氏不知以爲淳于公輿地廣記遂附㑹之以東海縣有大小州山曰高宻夷安城淳于本春秋州國誤矣淳于者酈道元云本夏之斟灌國武王以封淳于公把併之夫淳于非二王後安得稱公是酈亦緣左氏再誤也魯南連曹西達于周州公來魯經曹衛已從王魯未嘗出師故如曹而六年寔來杜元凱云寔實也承冬如曹之文間無事是也胡子以寔爲名比于失地之君將有其末先録其本亦所謂度其國危逐不復者誤之也夏四月公㑹紀侯于郕左氏曰紀來諮謀齊難也秋八月壬午大閱劉原父曰大閱冬事也秋興之厲農矣傳謂懼鄭忽畏齊人而季明德直謂紀求魯援故不因田而簡閱則臆之而已蔡人弑陳佗程子曰蔡桓侯殺陳佗實以私也而書人同于討賊者衆人之公也陳君舉曰公子與太子兩下爭利相殺則其討之何以庻孽亂正統如之何勿討也九月丁卯子同生古者冢子生食以太牢不食而見冠于阼階死則爲之斬其異于庻甚矣禮内則卿大夫以下子生皆書于閭史故䇿書大體嫡冢必書胡康侯曰其不書世子天下無生而貴者誓于天子然後爲世子或曰生不書世子俟其成立可托而後誓大君有命開國承家葢隂寓與賢之意故文公與成黒肱子赤子野皆嫡長而生不書于春秋所謂無生而貴者禮言爲後者四有正體而不傳重嫡子有罪疾是也往予見季氏申榖梁之㫖謂莊疑于齊襄之子故特書之然齊詩猗嗟固以我甥爲詠魯齊之人皆能明微何俟聖人杜元凱謂十二公推子同嫡長孔氏疏之曰文公哀公其母無明文未知是嫡以否據公衡之年成公又非穆姜所生葢其父未爲君之前已生縱令是嫡亦不書其考之詳矣然則或人隂寓與賢云者亦非無見也冬紀侯來朝請王命以求成于齊也公告不能七年春二月己亥焚咸丘此建丑之月也據爾雅火田爲狩故詩言在藪火烈具舉月令仲春建卯之月毋焚山林王制曰昆蟲未蟄不以火田然孟春啟蟄而周禮穴氏掌攻蟄獸各以其物火之仲春之田有火弊則許其焚圃草以田特禁其焚山林耳今焚于建丑之月何以書哉高抑崇曰咸丘乃魯地近齊者故孟子以咸丘蒙爲齊東野人呉㓜清以非狩地故譏是也公榖曰火攻夫咸丘内地則何以火攻若邾婁之邑則何以不繫邾婁耶夏榖伯綏來朝鄧侯吾離來朝榖嬴同姓國在今襄陽榖城縣伯爵鄧曼姓商之侯國亦在襄陽北鄧城古者諸侯不生名來朝而名則附庸也榖鄧以諸侯而名者何也胡子以朝桓立義曰惡其黨惡也然而滕紀不名又何以通于彼例也左氏謂賤之名夫降爵成禮如滕紀薛者有矣不敬見伐如把者有矣史豈嘗賤而名之先王制禮不敢遺小國之臣而况名其君乎公榖皆曰榖鄧失地之君趙企明因訂之曰榖鄧皆在南陽而逼於楚懼不見容故越蔡許陳曹宿邾六國厯千四百里而以朝禮接于魯葢失地而奔者也然莊十六年楚然後滅鄧此時曷爲遽以失地名之故趙匡劉敞以爲用狄禮而名之匡言非失地而名信足辨公榖矣以爲用狄禮而名即如把桓公用夷禮何以不名哉是匡亦妄也或曰榖鄧于魯交好不通事無本末鄧旋爲楚所滅而榖終春秋不經見以其接我故詳其名是變一例也葢近之耳缺秋冬與四年同八年春正月己卯烝秦道静釋杜駮論云周禮四時之祭皆用四仲此夏仲月應書冬烝其書者爲夏五再烝見續起也趙伯循曰周雖以建子爲正祭祀則用夏時本月周書曰夏數得天百王所同亦越我周改正易械以埀三統至敬授民時廵守嘗享猶自夏焉胡氏不知以爲冬事誤矣天王使家殳來聘高抑崇曰謀納后也夏五月丁丑烝程子曰正月既烝矣而非時復烝者必以前烝爲不備也其凟亂甚矣秋伐邾趙企明曰隱有遜國之心則即位三月儀父來盟桓簒弑則定位六年儀父不至桓憤而伐之邾終不即至迄十五年因牟人葛人之來始與之俱朝焉義之可恃也桓以不義伐之豈必書公書師而後見貶哉冬十月雨雪祭公來遂逆王后于紀趙企明曰齊將滅紀紀托于魯勢不能庇紀于是爲之謀俾納女于王爲重焉祭公因不反命而遂逆王后其說是已而謂祭公尊不當行則非矣趙子常曰桓王取后于紀命魯主昏嘗使家父來聘則其事前定矣既已納幣契成故祭公來受辭于主昏者而往逆后于紀皆禮之冝也天子不自主故祭公不稱使成使于我故言遂諸家泥于常事不書之說謂書來書遂爲非常于是譏祭公罪紀而議及天王坐以虛文說經而不以天子昏禮推原之也九年春紀季姜歸于京師公羊子曰其辭成矣則其稱紀季姜何自我言紀父母之于子雖天子后猶曰吾季姜也謂化天下以婦道者非本㫖矣趙企明曰紀姜歸不書以非祭公所得以也然則文姜母一國翬寜得以之乎翬祭或以或不以翬專也據實而書趙氏亦未之考耳夏四月秋七月冬曹伯使其世子射姑來朝曹姬姓伯爵國今曹東五十里實古定陶武王封文王子叔振鐸之地今伯爲桓公也胡氏引周官典命世子出從朝命之禮謂同急趨王命者耳若諸侯相朝世乃行之非先王常典而使世子攝行豈禮也哉尸子曰夫已多乎道胡氏言之備矣十年春王正月庚申曹伯終生卒射姑嗣是爲莊公夏五月葬曹桓公秋公㑹衛侯于桃丘弗遇桃丘東阿縣東南桃城也考水經葢濟西魯南界地西南距衛尚隔范鄆等皆魯邑先儒以爲衛地非也桃丘之㑹必魯聞衛矦適齊期戰故㑹之以間齊而衛已由他道先過故曰弗遇若中背公而更與齊鄭則但常言弗至以見實耳胡氏謂惡失信非也冬十有二月丙午齊侯衛侯鄭伯來戰于郎紀故也凡戰以主及客郎以自戰爲文左氏謂伐有辭魯嘗以周班後鄭餼而齊衛以應鄭之請則稱戰三國之罪也然事在五年而今始報耶且北戎在狄北燕西距臨淄甚逺假能􅊳至亦倐忽爾鄭復去齊千四百餘里烏能逺爲應援而鄭忽柔懦昏庸亦非安攘之才矧齊鄭入紀之後魯欲援紀不親齊者已厯六年何由魯又至齊而爲之班事不經見左氏不足據也趙企明謂伐有罪然元年而鄭盟之三年齊妻之今年衛亦期㑹桃丘焉其定乆矣今何以伐之齊鄭謀紀魯爲庇諸王而女焉是以來也以是來則惡在外矣十有一年春正月齊人衛人鄭人盟于惡曹參盟者據隱八年瓦屋日宋齊衛皆諸侯也據僖十九年曹南不日有曹邾大夫也惡曹盟于戰郎之後郎之諸侯非耶而何以不日齊鄭之黨乆矣尚疑桃丘于衛故盟同絕魯則亦甚矣左氏惡曹地缺案詩衛毎言曹地在鄘居邶之南故曰渡河露處于漕邑衛女適他國所經葢孔道也戴公廬曹陸德明曰詩作漕音同然則惡曹豈即漕耶葢郎戰之後鄭歸自衛而南齊歸自衛而北漕所必繇故於是盟耶其人者將三國自甚其事故諱之若大夫盟者耶陳氏謂一役再見者但人而畧之非也且傳有宋而經闕安知惡曹非漕地耶或曰漕地葢郎西近曹三國合兵至郎必由曹境以入既歸則遂講盟其地耳夏五月癸未鄭伯寤生卒秋七月葬鄭莊公九月宋人執鄭祭仲甚哉漢儒之不知道也公羊子吾何譏焉其曰蔡仲之行權者可謂謬乎謬者矣忽本嫡子仲當托孤之任君薨遲疑至于既葬而猶不立突方在宋啟宋之心挾爲竒貨不能早定嗣君計安社稷身辱國危仲之邪心也安在其權乎夫祭仲者祭氏而仲名也公羊子曰祭仲賢而不名乃有逐君之臣而賢者乎以逐君之臣而賢也則二百四十年之間其不大悖者亦有矣反不得如仲之稱字何聖人之昵仲也以是知仲之名也然胡子以爲因字而見貶何也曰命卿之稱字胡子以爲尊王之義見仲任之重而深其責也云爾即不知天子之三公比隆于列國之君者而有時乎名如仲者乃反字乎以是知仲之名也或曰仲之當名固也仲之爲名亦有所據乎曰說左氏榖梁者葢以蕭叔非字例之左氏謂祭仲字左氏誣也唐應德曰公問羽數于衆仲葬原仲春秋大夫以仲名者多矣此以祭仲爲名是也孔父亦名也哀子亦名也􅊳歸于鄭􅊳不繋鄭蒙上文也與赤歸于曹同不言公子簒也劉原殳曰祭仲之義冝效死勿聽又不能若是則強許焉至其國而背之執􅊳而殺之亦可也鄭忽出奔衛君在䘮恒稱子既葬矣未踰年稱子據僖二十五年衛子踰午矣未葬稱子據文九年毛伯來求金不稱王鄭忽未踰年者也其名之權臣專制遲疑未嘗立爲君也故從未君之恒辭而稱名不稱世子者亦未嘗立爲世子也其復歸稱世子斯趙子常謂特筆以正名者非不修春秋之舊矣柔㑹宋公陳侯蔡叔盟于折以大夫㑹諸侯盟于是始柔不稱氏未賜族爲卿者也凡内公子出與㑹盟法當以臣禮書名趙氏謂諸侯之弟攝君則稱字非也禮卿不㑹諸侯盟折孫明復發微曰魯地公㑹宋公于夫鍾夫鍾杜氏曰隱公時齊鄭皆入郕而有隙二國㑹郕豈欲察其情實歟冬十有二月公㑹宋公于闞折以下三盟皆宋莊結魯仇鄭之計其屢盟而厚疑胡氏義備矣十有二年春正月夏六月壬寅公㑹把侯莒子盟于曲池觀春秋進退予奪抑揚之㫖則知安中夏待四夷之道矣把公榖作紀曲池今曲阜縣北境古汶陽汪仲裕曰隱二年把莒盟于宻是時紀謀齊難故魯桓與之盟莒以援之耳秋七月丁亥公㑹宋公燕人盟于榖丘南燕姞姓伯爵黄帝之後國今衛輝府胙城縣榖丘宋地在今歸德府南宋魯陳蔡常爲盟矣今又盟燕齊鄭于是道斷八月壬辰陳矦躍卒弟林嗣是爲莊公不書葬魯不㑹也後放此公㑹宋公于虗冬十有一月公㑹宋公于龜虗龜皆宋地丙戌公㑹鄭伯盟于武父宋公辭平故更與鄭盟將謀伐宋焉武父鄭地桓先往葢桓先有忿心也許翰氏曰王迹既息伯統未興諸侯自擅無所禀命觀隱十年見兵革之亂也桓十年十二年見盟㑹之亂也伯統興而諸侯有所一無復此亂矣是以君子不得已而與桓文丙戌衛矦晉卒子朔嗣是爲惠公再書丙戌者作經之後傳授羡文非孔子存之也十有二月及鄭師伐宋丁未戰于宋内稱及微者也趙子常曰不言公蒙上文非也武父以丙戌盟逮今踰旬則両家歸而别遣人㑹伐耳春秋一事而再見者不盡没其名以見實間有事不得蒙上文也春秋無義戰謂往戰者罪在内胡子以戰立義耳非其極也十有三年春二月公㑹紀侯鄭伯己巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績己巳之戰三傳異說左氏宋多責賂于鄭鄭不堪命然是戰也宋與鄭兵之主也宋與魯戰胡子以爲出公羊攷公榖之傳宋魯紀齊無其說也得非胡子無據之言耶鄭主兵而先紀唐孔氏曰公在㑹以爵爲次第也齊先宋不主爵趙子常謂齊以強大易周班葢亦臆言之孔氏以爲宋使齊爲主猶隱四年州吁伐鄭而使宋主其所證騐不至如胡子之無據也穀梁子以爲于把戰鄭𤣥以爲紀之誤春秋戰無不地者即于把于紀何爲不地也儒者或言齊合三國攻紀魯鄭援紀而與戰與經文書法不應皆穀梁之勦也春秋考郵異曰戰在魯之龍門故春秋說曰龍門之戰兵死傷者滿溝正與書法内辭合則是戰于魯也戰于魯而不地何也公羊子以爲近而異于郎是也與鄭戰爾而胡爲于魯去年冬及鄭師伐宋丁未戰于宋矣則宋之來也非報丁未之役乎然則于魯者近之矣三月葬衛宣公夏大水秋七月冬十月十有四年春正月公㑹鄭伯于曹曹在衛南而東北爲齊界亦所以伺齊衛之往來耳無氷榖梁子曰無氷時燠也夏五夏五者闕文也桓公之簡多缺經莊公之簡多闕傳自十九年後空一年之經而失傳或累數年之經而傳皆無之皆其墜佚也趙企明曰修經之後傳授闕之或以聖人因舊史闕之非也夫趙氏之言是矣穀梁以爲傳疑胡康侯因曰春秋因舊史有可損不能益可損不能益是也然聖人經世之典苟存闕文何爲哉孔子稱及史闕文言其時之遵所聞而不敢自用易置也若遂去一月字遂増一月字其于春秋之義微矣何爲存之徒以益後世之疑乎以是知聖人不爲也鄭伯使其弟語來盟諸侯之尊兄弟不得以属通其弟云者則知諸大夫有所不心乎􅊳也榖梁謂來我舉其貴非也來盟者奉君命來受盟也趙企明所謂屈己而求盟于我是也榖梁謂前定而胡子取之非也齊年陳黄皆名也謂諸侯之兄弟例以字通而書名者罪其寵愛亦非也秋八月壬申御廪災乙亥嘗乙亥之嘗左氏曰不害者火不害粟也而榖梁以未易災餘爲不敬胡康侯因之爲傳然趙匡之言曰易災可一日而辦况其間經兩日乎此以其時考之而定其非災之餘矣至鄭漁仲則又曰廟祀必十日成享越三日而嘗則粢盛已出廩矣此以禮定其非災之餘也趙企明曰祭祀必爲酪醴粢盛非穀所成也三日之前穀已出廪則又以事定其非災餘也然則直書其不時耳以爲不易災之餘非也冬十有二月丁巳齊侯禄父卒子諸兒嗣是爲襄公宋人以齊人蔡人衛人陳人伐鄭以一國而用諸侯之師於是始伯者之漸成矣伯者之令行於天下自是無書以者本非所得制而今制之以行己意胡子以爲交譏之是也十有五年春二月天王使家父來求車天子五路以祀其金輅以封同姓曷爲求之魯乎禮曰魯君孟春乘大輅旂十有二旒日月之章祀帝于郊魯僣天子之禮車輅之制魯或存之周衰典禮不修車輅不能自制故下求于魯趙子常曰求車有闕乏也俄而天王崩七年而後克葬則諸侯不王之罪大矣義見隱三年求賻下三月乙未天王崩此桓王也趙伯循曰此後莊王僖王不書崩見王室不告也季明德以莊僖因嗣王追稱實未嘗立按經世表莊以是年甲申即位乙亥崩僖以乙亥即位甲辰崩季氏失考矣夏四月己巳葬齊僖公五月鄭伯突出奔蔡鄭世子忽復歸于鄭奔書名失君道也唐孔氏謂自奔即自身罪名與不名隨赴而書趙子常言鄭伯突别于忽非也春秋于忽始終未嘗以伯書何用名突以辨之耶突以外内之援取非其有嫌于宜鄭也故不繋之鄭立已五年諸侯㑹之而莫討則成乎君矣故以伯書伯也而至于奔習讀者可以問義矣忽雖冡嫡而出稱名則鄭莊不以爲世子不但未誓之于王朝也歸而始稱世子者祭仲姑假之絕人望以動􅊳因求免逐君于諸侯之䇿未遽以爲君也其于制􅊳葢亦巧矣復者已絕之辭比事而觀則忽之宜立而昏懦與􅊳之不君仲之不臣并見矣許叔入於許許叔之入榖梁子曰其歸之道非所以歸也胡子本之爲傳曰上告天子下告方伯求復其國則正矣叔因亂竊入者耳然乎曰此吕仲木所謂喜許叔憫亡國者是也且古者諸侯世子皆誓于天子正也入春秋皆不誓矣繼世則朝于王所而授命正也入春秋則皆不命矣彼以責諸無事而立可矣許太岳之後見滅非其罪也處許東偏十五年天下莫之省救也天王方伯安足恃哉告諸天王則繻葛之戰且中肩矣王縱有命鄭豈授之哉若其伯主五侯九伯而實助虐于入許之役又讓許于鄭者也欲以責齊是何異黎之臣子望衛以歸國而徒賦泥中乎故許叔之入可與權矣其曰入難辭也難辭也者非其義之難其事之難也叔字也與齊小白莒去疾齊陽生異矣或曰叔排難而入以立新國故字之公㑹齊侯于艾左氏傳曰謀定許或謂謀紀非也于是定許以撓忽耳然彭生之禍自是生矣邾人牟人葛人來朝邾見隱元年牟子爵祝融之後泰山郡有故牟國季氏謂今登州福山非也葛嬴姓伯爵書稱葛伯者是國今歸德府寧陵寔古梁國杜元凱曰三人皆附庸之世子其君應稱名故其子降稱人旅朝非諸侯所得爲也不奔王䘮而相率以朝弑君之賊罪己不事于降而人之也諸侯旅朝至桓文甚簡矣亦庻能以禮制天下也哉秋九月鄭伯􅊳入于櫟櫟今鈞州寔古陽翟此入邑非復國也然自是有鄭矣故蘇氏子由以爲一國二君其間忽之弑子亹子儀之廢立皆没而不書趙企明遂以爲明􅊳之強憫忽亹子儀之微弱不能保其存亡是或一道也然常反復遺經忽之卒葬不見其文亹儀之立經亦不書縱有傳所言亦疑如忽稱世子之意葢仲挾之以虛名制􅊳若二君然未嘗爲君故蘇趙皆誤也鄭而果有二君也則高渠彌之弑忽齊之弑亹傳瑕之殺儀經寧有不書者而􅊳之卒葬乃獨詳于經耶冬十有一月公㑹宋公衛侯陳侯于袲伐鄭榖梁子曰先地後伐疑也非其疑也趙企明謂議所伐袲今徐州蕭縣之西宋東界之地地而後伐即逺地聚謀聽命于宋未即加兵其辭緩矣趙子常謂伐鄭爲㑹言故則似之而非也當是時有能修方伯之職者正忽之嫡乎請于王而君忽可也以忽不足君乎請于王而納厲然非大居正之義也仲誅而國是定矣宋與魯鄭未釋己巳之憾而忽之復魯鄭不以爲利故又釋怨爲㑹以謀之耳反覆皆私可乎哉孫明復謂袲鄭地者非十有六年春正月公㑹宋公蔡侯衛侯于曹左氏傳曰謀伐鄭也夏四月公㑹宋公衛侯陳侯蔡侯伐鄭納􅊳再勿克也自是宋魯諸國遂棄鄭無爲謀者矣􅊳之智矣謂能結援哉王制諸侯爵次有序先蔡而後衛今蔡序衛下周之宗盟異姓爲後今陳序蔡上是主㑹者得以意爲輕重矣自是蔡終春秋遂序衛陳之下則國弱不能自強亦并可見嗟乎豈春秋之細故哉秋七月公至自伐鄭趙子常曰㑹盟不至㑹伐何以致民爲重也致伐不月茍致以四時首月則書其月一時無他事不敢廢時首也冬城向隱二年莒入之矣其介于莒魯之間故或因其服而城之其後莒卒滅向而莒魯之爭始于此矣十有一月衛侯朔出奔齊朔惠公也立三年逼于公子職公子洩出奔徃與東海季明德論左氏序急夀事明德指其事失實者衛宣烝夷姜生急子必不在先君時及奪妻宣姜生夀及朔則又當在十七八年後自隱公壬戌至桓公庚辰纔十九年朔雖已生僅可二三嵗耳然宣卒朔嗣已在桓十二年計其時宜甫週嵗尚在襁褓何以不四年間遂見逐奔齊邪當宣姜惡急于宣朔少必不與聞而謂同搆哉况宣公殺急及夀宜如晉申生宋痤目君以殺若微者殺之姓名不登則亦宜如衛孟縶稱盜矣經一無所書則急夀之死何爲者而二子乘舟亦何所指也向見陸詹事子淵謂穆伯潜莫能定其疑葢與明德實同竊意宣姜從夫之諡必如鄭武姜衛莊姜嫡妻之類而所奪乎急者當别一齊女故記亦不稱宣姜也朔年已可君則未必奪急妻以生者史記稱宣公以急爲太子則或嫡出未必夷姜所生也至于乘舟之事當是不得于宣而出亡以死朔于次應立若謂黔牟與弟昭伯頑皆急母弟爲朔庻兄則衛人何以不立黔牟昭伯而立朔耶且謂昭伯烝宣姜生戴文及宋桓許穆夫人是昭伯既生二子二女則于宣姜豈私烝哉而朔又方爲君昭伯庻兄豈有妻其母宣姜之理且謂齊人使昭伯烝于宣姜不可強之則益逺于人情矣姦生子孕冝不育諸公族安肯奉以爲君而其女弟宋桓許穆又豈肯娶以爲夫人乎左氏必不足信也宣淫亂備載于詩惡本難掩然急夀之死則其自爲無與于朔公羊不察乃以王命絕之則是出于附㑹非春秋書奔之本意矣十有七年春正月丙辰公㑹齊侯紀侯盟于黄左傳曰平齊紀張元德曰公十三年㑹紀敗齊以益其怨今乃盟之不足釋憾也黄齊地二月丙午公㑹邾儀父盟于趡魯地夏五月丙午及齊師戰于奚内稱及微者也齊稱師用大衆也戰不言勝負敵也奚魯地近齊界上者左氏曰疆事也六月丁丑蔡侯封人卒弟季嗣是爲哀侯秋八月蔡季自陳歸于蔡胡子曰季歸何以不有國獻舞立矣是以得國而不居春秋所爲賢之也爲是說也本之何休之說公羊耳以季獻舞爲二人它無所據也而東海季明德亟信之胡安定曰蔡季者蔡桓侯之弟弟當立歸者善辭其說所自出杜預也鄭漁仲考之史曰蔡桓侯立十年卒桓無嗣國人召其弟于陳立之是爲哀侯獻舞其弟云者則所謂季者也今考左氏云蔡人召蔡季于陳則必蔡桓無嗣漁仲之言非茍爲也昧者不察而曰季桓侯之弟而獻舞桓子從而譜之是固祗取異者耳若桓既有子蔡人何用召季獻舞既當立且既立矣又何用詡然誇之曰力足以得國而不居乎縱其欲居將安置新君乎故季獻舞一人也其字者趙子常所謂公子反國非有罪不名以别之也初字終名不復國如諸侯之卒然名之也趙企明所謂聖文褒貶之法非也癸巳葬蔡桓侯五等諸侯卒舉其爵于其𦵏皆書公禮也桓獨繋以侯杜元凱謂謬是也胡子曰春秋諸侯雖伯子男葬皆書公志其失禮此言非也齊有丙公丁公乙公癸公魯有考公煬公幽公等皆成康盛時齊魯爵皆元侯不以稱公爲僣也獨晉人曰我先君文侯反在平王之世意者晉有二文故爲别之歟若以蔡季賢能爲兄請諡于王而以侯配之此經傳無文况齊魯先侯配諡以公彼豈不請而臣子私尊之者且諸侯五月乃𦵏由六月丁丑逮八月癸巳十七日而渴𦵏則不能請諡之一騐耳杜元凱謂謬誤者豈不然哉及宋人衛人伐邾不言其人微者也左氏曰伐邾宋志也冬十月日有食之授時推是嵗十一月交分加時在晝二十六日八千五百六十與大衍同書十月失閏得十一月己巳三十五刻七七八三入食限杜預謂庚午日先天大衍厯新法推授時皆不定者疎也十有八年春王正月公㑹齊侯于濼公與夫人姜氏遂如齊濼今濟南府治即水經歴城也桓公至此葢深入矣㑹不言夫人如齊夫人之志濼非夫人之志也與黨與之意脇于夫人而往也遂者急後事辭㑹公之志如齋非其志也以見公之制于夫人也夏四月丙子公薨于齊丁酉公之䘮至自齊秋七月冬十有二月己丑𦵏我君桓公春秋明志録卷二
