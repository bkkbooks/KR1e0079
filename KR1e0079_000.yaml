body:
  text: 春秋明志録春秋類提要臣等謹案春秋明志録十二卷明熊過撰過字叔仁富順人嘉靖己丑進士官至禮部祠祭司郎中過嘗注周易専以明象數為事論者與來知德並稱蓋不主先儒舊說者此書亦多採撮舊解各加辨駁大㫖在於信經不信傳自序謂道存乎志志明諸言故以明志為名其中於公榖及胡安國傳俱有所糾正而左氏傳為尤多如以邢遷於夷儀為邢自遷非桓公遷之以城楚丘為魯備戎而城非桓公城以封衛以晉人執虞公為存於其國制之使不得他去而非執以歸以寧母之㑹齊辭子華為不實以洮之盟謀王室為誣說以用鄫子為出自邾人非宋公之命以晉懷公為卓子之諡文公未嘗殺子圉以趙盾並未使先蔑逆公子雍於秦以衛石惡為孫氏黨非寧氏黨以楚殺慶封非以罪討無負斧鉞狥軍之事俱不免鑿空立說屢見抵牾又如以郭公為鳥名謂紀異如螟蜮之類以梁亡為魯大夫㑹盟所聞歸而言之不由赴告故不著其亡之由亦多出於臆斷有用思太過之失然其得解之處往往詞㫖平允大義炳然究非他家托拾空談者可比故卓爾康謂其頗出新裁時多微中亦春秋之警䇿者視所作易注近實多矣乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:465818de5e4df8d8d6f1c3587991b3a3d91f55d78b5f986d6ce71a7c63222606
