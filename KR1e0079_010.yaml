body:
  text: 春秋明志録卷十明熊過撰昭公名稠襄公夫人妾齊歸子在位二十五年孫齊在外八年凡三十三年薨於乾侯諡法威儀恭明曰昭元年春王正月公即位叔孫豹㑹晉趙武楚公子圍齊國弱宋向戍衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人於虢書加於牲上而晉人許之舊書宋之盟辭也宋之盟蓋楚先歃今讀舊書楚人得無重得志而晉少懦乎曰左氏之紀事本有可疑而杜之傳左氏遂以臆决之耳晉楚之從列於㑹者於宋之盟蔡實先衛而虢則衛先蔡是班位之不同也楚屈建公子圍衛石惡齊惡陳孔奐公子招鄭良霄罕虎是人之不同也若齊國弱宋向戌皆宋㑹不出主名者而今以告之明神獨能無異乎故讀者讀其盟辭而班位與宋不同者據經為斷可也據經之班楚曷常重得志乎蓋衛晉之從而蔡楚之黨先後之間了然可見杜氏求其說而不得乃曰衛先至會據襄十年齊世子光進班之例為言不知宋之會良霄實先陳蔡而至亦未嘗進班何獨於虢乃進衛也杜氏謂楚恐晉先歃故欲從舊書不歃如是則公子圍雖有先人之心亦兢兢然圖免爭端何謂得志乎夫盟則書盟㑹則書㑹經未有以盟為會者宋虢經皆書㑹而傳皆以為盟經何以沒其實何以為傳信乎當時赴告之辭必有足據而襄昭皆當孔子之世其藏在諸侯之䇿者皆得於見聞之真矣夫不盟則不歃雖宋之會吾亦未見楚之得志也而况虢乎哉胡子疑晉少懦而楚重得志蓋亦若信傳而不信經者三月取鄆據𫝊乘莒亂而取邑也然不書伐莒取鄆胡子顧曰不悉書為內諱也使為內諱則沒其實而不書不愈乎李廉曰不書伐莒嫌討賊夫書其伐莒誠若為討賊若上書伐莒下書取鄆則亦秪見其因利而動亦何嫌之有乎襄十二年春季孫宿救台遂入鄆趙企明曰鄆者東鄆莒附庸也故不係之莒明鄆之為附庸者春秋書內取七皆國名例未有以邑書取者也又按左氏載莒訴魯取鄆之事以經考之諸大夫會虢原未為盟惡得云尋盟未退魯伐莒且會在正月取在三月其事本不相及也莒方弒君未嘗與會何敢宇然逺往訴魯而楚反欲為莒執魯卿邪夏秦伯之弟針出奔晉三傳書曰秦伯之弟針罪秦伯也諸侯之尊兄弟不得以屬通其弟云者親之也親而奔之惡也有千乘之國而不能容其母弟也左氏紀針其車千乘然諸侯地方百里者出車千乘而其正卿始得百乘耳秦雖大國針尚未為卿雖富安得遽有千乘逺從哉又云享晉侯造舟於河十里舍車自雍及絳歸取酬幣終事八反啖叔佐曰針雖富奢應不能至是傳說之大甚也斯可謂抱遺經者矣六月丁巳邾子華卒子穿嗣是為莊公晉荀吳帥師敗狄於大鹵大鹵大原也今晉陽縣也於是始用卒兵威一振狄地遂多歸晉矣然不見經者非以取降及滅也凡得地非用兵而自來附者恆不書陳君舉曰晉自悼公以來狄師不出敗狄至是而再見晉彌衰也悼公之伯魏絳諌曰勞師於戎而楚伐陳必弗能救是棄陳也獲戎失華毋乃不可乎悼公卒復有事於逺略至伐鮮虞遂外晉矣秋莒去疾自齊入於莒公子恆稱公子必篡君爭國而後名之去疾密州之長子密州見弒而去疾奔齊至是因齊力以入國未見其能討賊也展輿與聞乎弒者也去疾雖宜入而不能討賊則其入也與篡君爭國何異矣莒展輿出奔吳展輿嘗踰年矣不稱爵未有成之為君者也蓋為弒君者所立實不以為君也叔弓帥師疆鄆田高抑崇曰疆者封溝之也季孫嘗帥師城鄆後復為莒所取今乘莒亂而取之又帥師以疆之者懼不服也葬邾悼公冬十有一月己酉楚子麋卒楚子麋實弒也何以書卒從所赴也其赴奈何公子圍縊之而瘧以赴之也故從而卒之胡子曰聖人耻中國不能討向戌子産靡然從之懼無以昭後世也而泯其跡是僑戍得諱而圍幸逃於弒君之惡矣夫僑戍則信不明於討賊之義然未至於如圍之惡也因此而諱彼即如州吁宋督之類諸侯列之會成其亂而不恤也誰與討者而不諱㦲以是知從赴而書也金氏曰弒君而自立者必不以弒赴而春秋皆正其弒春秋成而亂賊懼矣獨從僞赴以免圍此或者聖人微闡之意且將投畀有昊乎豫謂實從赴耳弒君者雖不以弒赴如董狐南史之徒猶得以書之是謂國有人焉耳抑亦或中國禮義之區不獨其服在僚役者不忘君臣之義而在野亦有小人之針猶得傳播以相徴驗而書之不至如楚習於蠻俗而熊通商臣莫或討也漠然視其存亡蓋至是以恆辭赴而君臣聽之則俗益衰而事益可駭矣左氏所紀播於諸侯焉用之者雖其國之所賢如椒舉亦皆以為冝然矣從赴而書將並治其臣若君也乎然下書公子比出奔則讀者可以知麋之弒而問義黃東發云經傳不同當以經為正亦可謂曲而中矣季父圍共王子立是為靈王楚公子比出奔晉比共王子靈王之弟也比與圍兄弟也而為右尹於是不義圍而出則非其罪矣出非其罪則曷為書之以圍弒君之罪不著於春秋故書比之出以明變也二年春晉侯使韓起來聘起厥之子王葆氏曰前此晉之聘魯者九未嘗以上卿執政者將命今韓起始以去年為政而是春即聘於魯蓋晉霸漸衰而欲以嘉好結魯也夏叔弓如晉秋鄭殺其大夫公孫黑黑騑之子公孫夏之弟此殺有罪也從其恆稱而不去族與楚得臣宜申宋山異何也不以時討也古者誅有罪無留獄豈幸而勝之哉冬公如晉至河乃復季孫宿如晉少姜之數於守適晉侯之蔽於愛也魯君之至河士文伯以非伉儷為辭曰請君無辱此亦晉侯之明也君則無辱而卿致服雖非先王士弔之禮亦魯君臣酌輕重以事盟主之情初非晉之輕君比臣宿之如晉亦自事勢所必至逐君之漸未必萌於此胡子之明斯義於經本自多鑿若魯侯之妄動則不待貶之而自見者胡子欲勿反而為之辭乃若成少姜之為適而聞義不從强遂其非矣故啖氏之㫖精於康侯企明矣或曰庸知晉之非輕君比臣也曰晉之辭直且是年春晉侯使韓起來聘則晉之禮於魯固未嘗輕也及叔弓如晉晉人方修郊勞致館之禮而况魯君之重哉屬辭比事以觀則得其情理矣三年春王正月丁未滕子原卒子寧嗣是為悼公夏叔弓如滕五月葬滕成公秋小邾子來朝此小邾穆公也高抑崇曰公即位之初大國來聘小國來朝非不可有為之國也而終之以流播詩曰靡不有初鮮克有終可不戒哉八月大雩冬大雨雹北燕伯欵出奔齊按左氏燕簡公多嬖寵欲去諸大夫而立其寵人燕大夫比以殺公之外嬖公懼奔齊胡康侯曰人主不尊陪二而與賤臣圖柄臣者事成則失身而見殺事不成失國而出奔此有國之大戒也春秋凡見逐於臣者皆以自奔為文正其本之意也垂戒逺矣四年春王正月大雨雹當雪而雹故以為災凡陽侵隂不入為霰隂侵陽不入為雹劉原父曰申豐言聖王在上無雹可也言雹之為災由藏氷故非也夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷會於申楚人執徐子徐今鳳陽府泗州北五十里界古下邳僮縣頓今項城縣界古陽州南胡今穎州界漢汝隂縣沈今汝寧府汝水南淮夷今淮安申今南陽古宛縣申伯舊封時屬楚指掌圖以為吳地者非此楚專會諸侯之始也於是晉平之伯益衰姑曰逞其心厚其毒又曰苟有寡君在楚猶在晉以為之辭耳子産䇿之固曰晉君少安不在諸侯而誰欺乎蔡陳鄭許徐滕頓胡沈邾宋淮夷相率受命於方城之內而晉人聽焉宋之盟為之也至是斷吳通上國之道而晉亦不得通使南方矣以為未也於會而執徐子秋率見七國伐吳則斷吳之情見矣左氏秖以徐子吳出為見執之由未全得其情實也同惡相執不志危會申之諸侯故特志之高抑崇曰申之會非與國則小國而已魯齊衛曹薛邾把不會也宋鄭小邾滕雖會而終不與也則雖偃然肆志以專諸侯亦不得已而從之耳秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳再序諸侯有不與伐者也執齊慶封殺之慶封再奔吳豫之朱方非齊臣矣而繫之齊猶曰為齊討也封弒君之黨不可終莫之討故繫之齊以見罪或曰雖豫之朱方而未仕反而繫之齊非也書與陳夏徴舒異何也朱方今鎮江府丹陽縣吳之邉邑耳伐者始謀也屈申圍朱方克之乃執齊慶封而盡滅其族其始非以罰罪討也伐其邉邑而獲城守者見其齊人也意其通吳而誅之耳負之斧鉞以徇於諸侯此左氏之侈言也不與經應矣遂滅賴賴今汝寧府恩縣襄十年諸侯會於柤遂滅逼陽滅賴不日異其事於中國也賴本近楚乘伐吳而滅之以威與國可謂暴矣然春秋之治外固與中國異也左氏云賴子面縛銜璧楚子焚櫬啖叔佐曰按經但言滅是死位也經傳不同誤耳蓋此事是他年楚子曽伐賴賴降而舍之非此時也舊事不編年故誤耳九月取鄫內取不月此其月異之也莒亂著丘公立不撫鄫鄫叛而來也鄫在琅琊鄫縣路史謂鄭地溱水者非是鄫逼於莒然如晉覿巫立所出以為後聖人顯書滅矣是莒滅鄫魯弗能止之鄫叛莒而來又不能請天子方伯興繼而遂兼之則卒滅於我而已矣冬十有二月乙邜叔孫豹卒五年春王正月舍中軍舍者弃而不有之辭中軍者三軍之中也公羊子曰三亦有中諸國皆執政冡卿掌之猶晉謀元帥郤縠將中軍作三行荀林父掌中行也季孫盡征故言舍中軍趙企明言季掌上軍叔掌中軍仲掌下軍叔豹死於家亂故季得假舍中軍焉非也劉炫云四分公室制法别耳連作三軍今據哀十一年季氏稱左師孟氏稱右師叔孫氏自以叔孫為軍名則舍中軍者是公家不有取其賦而已非廢置之義矣而傳顧曰毁中軍豈與經文應哉季明德曰左氏以為四分公室則軍分為四矣春秋何以不别白其辭乎意其所以為此者亦計後日公家所入而言耳蓋季氏盡征中軍終春秋之世而孟仲二軍則歸公之賦亦漸減矣至定哀時以十二分為卒則季氏盡去四分而叔孫去四分之三仲孫獨忠但去四分之一則公室之所存者十二分之四耳此所謂四分公室而實舊額未嘗改也左氏誤傳季氏擇二三子各一之說而後舍中軍之義不通矣况初舍之時止是三分去一而叔孫舍仲孫貜皆未盡専公室所存尚有十二分之八安得遂謂之四分哉然則中軍之舍罪専在季氏矣據季氏此言則傳謂公臣不具三耦亦左氏遺實之言也楚殺其大夫屈申楚殺大夫必有關於天下之故而後書蓋以為二於吳而殺之者加之罪之辭國殺而不去其官罪纍上也公如晉夏莒牟夷以牟婁及防兹來奔牟氏夷名則莒卿也自於法應書三傳云莒無大夫重地故書陸淳並非之是也牟婁本隱四年莒人所取紀邑及者有别之辭防則今安丘古平昌縣兹在今諸城古姑幕縣牟婁在防兹之間南界莒地與邾城聨比矣榖梁氏曰及防兹以大及小也公羊氏曰不以私邑纍公邑然則哀八年齊取歡及闡又何大小私公足别耶孟氏言有王者作魯在所損乎在所益乎土地胙之天子狡焉啓封疆者聖人所不聽也故異牟婁於防兹牟婁取諸紀者也由是以知聖人正疆理之意矣陳無宇曰諸侯正封季孫乘魯侯之出納叛人而利其邑罪何可言耶秋七月公至自晉戊辰叔弓帥師敗莒師于蚡泉莒以牟夷來討叔弓乘其不備而逆敗之蚡泉魯地秦伯卒子嗣為哀公秦伯不名史失之也公羊乃云匿嫡之名名者嫡得之非也冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳越姒姓子爵國今紹興府古越州少康庶子所封也此通越制吳之始吳自襄十四年至是凡四受楚兵已而吳滅州來長岸雞父日尋干戈柏舉一戰遂至入郢亦未必能制其國死命也趙子常曰變文則曰徐人越人復其恆稱則曰徐曰於越皆從史文也劉原父言吳楚徐越上世皆有元德顯功與中國之君無異顧皆稱王王非諸侯可當故春秋書之書號則舉其本封列爵則黜其僭竊推之可逺引之可來此聖人重絶人亦春秋之意也六年春王正月杞伯益姑卒不日非訃也弟郁釐嗣是為平公自是終春秋以爵列於會矣葬秦景公始會秦葬夏季孫宿如晉拜莒田也葬把文公宋華合比出奔衛合比宋右師凡出奔皆有罪詞左氏載寺人柳譛逐合比則經不得書奔且柳譛合比與伊戾譛太子痤皆坎用牲埋書而伊戾有向戍桞有華亥皆為之徴以共濟險健不應纎細相同平公在位已四十年不應一術可以再相愚侮疑因前事而誤附會之耳但華臣與合比為宗納華臣之族矣事或有之右師又以冢卿勢亦易舉是傳之情得失參半然不足盡憑也烏可謂無罪哉秋九月大雩楚薳罷帥師伐吳子蕩楚令尹楚靈至三伐吳而皆不勝冬叔弓如楚諸侯兩事晉楚宿如晉則弓如楚矣高抑崇曰四年公不會申巳而震楚兵威將朝楚而不能故以叔弓先聘而明年躬繼之也齊侯伐北燕將納北燕伯七年春王正月暨齊平齊黨亂也晏子曰吾君賄左右諂諛作大事不以信未嘗可也以其不出主名賈逵何休遂曰魯與齊平許惠卿曰燕齊平也魯燕孰主乎曰主齊燕平六年冬齊伐北燕將納簡公師次於虢而不進燕知其貪也而行成齊與之平傳言齊求之是也公孫段卒伯有之厲傳明言在齊燕平之月可以參决之矣曰春秋之法內不書國者有矣此實燕也曷以內辭書曰冬春相接無異事省文也猶桓五年冬州公如曹六年春因書實來爾胡氏沿休說然休責魯結吳不汲汲於齊胡氏責魯附夷狄而得齊平則亦少異矣信如胡子則魯不汲汲於齊恃強援焉可也如齊之強何畏魯有多援魯之有援亦豈必能加於齊者而齊求之哉謂齊求魯者事理有礙矣則叔孫婼於齊蒞盟不足證齊魯為平乎曰經書齊平在正月矣何待三月乃如齊涖盟乎故知趙企明之妄也矣齊伐北燕納燕伯庶幾乎義而取燕姬與寶賂竟然而返是齊景之黨逆也君子曰昭定而下春秋多罪齊齊景公有馬千駟死之日無得而稱焉蓋此類是也三月公如楚叔孫婼如齊涖盟婼豹庶子魯齊鄰也虞適楚見侵故尋舊好夏四月甲辰朔日有食之授時推加時在晝交分二十七日二百九十八分入食限今先天厯新法推得甲辰交分二十七日闕二百六十分闕九四入食限士文伯以日食之災衛大魯小蓋周四月是夏二月日在降婁魯分故曰去衛地如魯地六物不同民心不一事序不類官職不則同始異終秋八月戊辰衛侯惡卒子元嗣是為靈公九月公至自楚冬十有一月癸未季孫宿卒悼子沒武子前平子以孫繼祖十有二月癸亥葬衛襄公八年春陳侯弟招殺陳世子偃師稱公子招嘗為卿矣復稱弟蓋絀而以弟受祿其殺偃師必爭政也左氏載哀公元妃生偃師而嬖二妃屬其子公子招公子過哀有廢疾招殺其世子偃師而立留哀公經而死夫留哀公既嬖而託之矣得立則哀所欲也又何以自經託留之語疑招自文而左氏誤載之也殺偃師而得其政柄則復稱公子矣重舉國者偃師非招之世子也所謂徇其私愛施於不令之人以至亡國為失親親之道者則胡義精矣夏四月辛丑陳侯溺卒叔弓如晉賀楚章華則賀晉虒祁矣楚人執陳行人干徴師殺之陳公子留出奔鄭偃師曰世子留曰公子别嫡庶也然留之立非哀公意也曰哀公死留踐其位矣而猶曰公子招姑立之以為名耳將自取焉不成為君也秋搜於紅紅今泰安州後漢志泰山郡注有紅亭者是在魯北境杜元凱以沛國蕭縣有紅亭實之則宋東鄙矣傳言根牟至於商衛根牟魯東界商宋地魯西界與紅不應况搜淺事豈應至是耶不言公公不與也桓莊之狩皆言公昭定之搜不言公兵政有在不在焉不言大初分公室假搜以閲軍實耳猶未僣天子之大搜也杜氏謂經闕者非矣至曰時史闕略仲尼略而從之益於義無取曷以為春秋哉陳人殺其大夫公子過偃師殺哀公卒陳於是五月無君而招制國命矣不書招殺不與招以討也以陳人殺之偃師之殺不蔽罪於過也是國亂無政而已矣大雩冬十月壬午楚師滅陳執陳公子招放之於越殺陳孔奐滅陳而始討殺世子之罪滅國者其始謀也舍首惡而施其從刑之辟又何言哉葬陳哀公黎錞曰經已書楚滅陳則執陳公子招殺陳孔奐葬陳哀公皆䝉上文云耳九年春叔弓會楚子於陳是時三家分魯陳會無往者而叔弓實行叔弓肸之孫故不畏楚人之討也許遷于夷夷今鳳陽府亳州古譙郡西北界本陳間地楚滅陳得之成十五年許已遷葉地今許州葉縣本方城外蔽恐楚欲之故請易地以媚楚而避鄭傳稱然丹遷城父人于陳城于即夷而遷方城外人于許許亦夷也許楚之情見矣然許本依楚鄭固畏楚者也而鄭數伐許率不見庇於楚亦必無以得其歡矣既不能强又不能弱殆謂許焉夏四月陳災外災不月其月異亡國也陳亡矣而天災還繫之陳從所赴也陳亡矣誰與赴者楚䖍利于得國而耻于受災以陳赴也胡子謂叔弓歸而言之夫弓使在春而災在夏可云目擊乎而紀于春秋是楚人赴之也杜氏比諸沙鹿梁山而曰大都以名通者不繫之國夫陳本先王之建寧比于國之大都而名山不以封又非若封壤之必當繫國也然則聖人無興滅之意乎夫興滅者心也據實者跡也聖人眀于天之道而察于興衰之故火出而火陳逐楚而建陳也聖人從赴而書之著天人相與之際謂之憫可也謂之喜可也在學者自得之耳秋仲孫貜如齊貜蔑子速弟速無嫡子以弟貜後貜幼庶子羯攝之三十一年羯卒貜嗣爵是為孟僖子向見季明德直云羯子誤也冬築郎囿郎隱狩地莊公築臺焉以察戎者三家既分公室丘民皆制於已故多闢搜狩之地張主一以為娛君耳目而竊其權夫魯之權何待竊哉十年春王正月夏齊欒施來奔施公孫子以王父字欒為氏傳謂子旗是也嗜酒多怨與陳鮑相攻而出秋七月季孫意如叔弓仲孫貜帥師伐莒意如悼子紇子是為平子代祖宿立春秋詳內略外故凡師舉元帥而魯偏禆得書于是叔孫舍不出而叔弓代將外是則非三家不將矣趙企明云季為元帥叔弓為佐貜為戎右非三軍并出也將尊師少稱將弓及貜皆卿雖以佐行不得不書亦足以見季氏之強一出而將佐戎右皆大夫也戊子晉侯彪卒子夷嗣是為昭公孟子曰晉平公之于亥唐也弗與共天位弗與治天職也李廉以為政在私家賢者壅棄為削弱之由是已九月叔孫舍如晉葬晉平公十有二月甲子宋公成卒庶子佐嗣是為元公十有一年春王二月叔弓如宋葬宋平公夏四月丁巳楚子䖍誘蔡侯般殺之于申名著諸侯之終事也故蔡侯般稱名其曰楚子䖍何以蠻荆之君殺中國之君名所以正其罪也故其相殺不名据十六年楚子誘殺戎蠻子而說者比于衛侯滅邢書名者為衍名誤矣其日謹之也据宣十八年邾戕鄫子不日故其自相殺不月亦据殺戎蠻子穀梁傳曰何為名之夷狄之君誘中國之君而殺之謹之而名之也稱日稱地謹之也公羊傳曰楚子䖍何以名絶曷為絶之為其誘討也此討賊也雖誘則曷為絶之懷惡而討不義君子不與也孫明復曰般之罪不容誅矣楚子貪蔡地土殺之不以其罪故生而名之不得以討賊論當坐誘殺蔡侯般也楚公子弃疾帥師圍蔡五月甲申夫人歸氏薨歸胡姓歸氏者齊歸也季明德曰齊歸乃襄之夫人而昭公定公皆其所出也其始至不見於經者為公子時娶也左氏以襄公夫人為敬歸而齊歸乃其娣非也自昭元年至哀十一年再無卒襄公夫人者而齊歸以妾乃得書卒此何禮乎然則齊歸為襄公嫡夫人明矣大搜于比蒲搜春事也以五月行之非失時矣搜淺事也以大名之則僣耳大搜天子之法而夏官司馬之司也魯兵制壞而搜狩之制壞三家之僣且及此矣晉叔向曰魯公室其卑乎君有大喪國不廢搜國不恤喪不忌君也能無卑乎殆其失國仲孫貜會邾子盟于祲祥杜元凱曰祲祥地闕高抑崇曰始也盟蔑盟趡魯君親與之盟今使貜㑹盟自是何忌盟拔州仇何忌盟勾繹是吾大夫與君盟魯邾之强弱斷可知矣雖與邾盟以修好然魯人之志必欲滅邾而後已此盟可信耶秋季孫意如會晉韓起齊國弱宋華亥衛北宫他鄭罕虎曹人把人于厥憖亥合比弟他遺子括孫杜元凱曰厥憖地闕此謀救蔡而弗克也蔡侯獲罪於其君而不能其民天將假手於楚以斃之般不足恤也而圍蔡八月其民可弔矣荀吳曰不能救陳又不能救蔡物以無親晉之不能亦可知也于是蔡已亡合九國大夫以謀救蔡庶乎無所為而為之義也蔡能嬰城抗楚加之諸侯從簡書以相恤勢無難者然不能師而使狐父請蔡於楚情見力屈蔡卒見滅則韓起之懦也胡子謂晉力不能春秋恕以待人而不求其備則非矣九月己亥葬我小君齊歸冬十有一月丁酉楚師滅蔡執蔡世子有以歸用之圍蔡稱公子弃疾帥師而滅稱師者一事再見則從略之恆辭也孫明復曰言世子有者有未立也父殺國圍拒守危困以至于死未立可知也劉原父曰楚子䖍誘蔡侯般殺之世子有守國楚師圍之八月而不能服于是乎虐用之古者父母之仇不與共天下寢苫枕戈終身則有之為者盡于世子矣陳君舉曰滅而以歸未有言執者執弗臣之之辭也是故均之為滅國也嘗臣之也書曰以沈子嘉歸殺之未嘗臣之也書曰執蔡世子有以歸用之十有二年齊高偃帥師納北燕伯于陽偃傒𤣥孫陽即唐今保定唐縣古中山榖梁傳曰納者內不受也北燕伯何以不名不以高偃名北燕伯也諸侯不相名而况于大夫其可以名諸侯乎三月壬申鄭伯嘉卒子寧嗣是為宣公夏宋公使華定來聘公如晉至河乃復未祥練而朝伯主不立甚矣以取郠之訴而見辭晉諸臣相與為諼也季氏專魯疑公如晉議己也故賂行乎晉臣假莒訴而辭公耳取郠在十年云晉平之喪未之治似也然葬且二年何不見討待其來朝乃辭之乎即其實欲討者何不聽其朝而詰之乃顧却之使反乎五月葬鄭簡公楚殺其大夫成熊稱國以殺罪纍上也左傳楚子以若敖之餘殺成熊黃東發曰以宣四年鬬椒之亂也熊于得臣為四世孫雖鬬氏同出若敖已遙遙矣或曰吳楚殺大夫必關于中國之故乃書夫將有其終必有其始此亦楚䖍見殺之繇豈不關于中國之故哉秋七月冬十月公子憖出奔齊憖字子仲襄公弟也出奔者奔于位傳謂從公于晉誣辭也凡出奔者皆有罪辭季氏之臣南蒯將去季氏立憖不克而以費叛憖遂奔齊假于張公室以濟其私君子不由也楚子伐徐晉伐鮮虞鮮虞子姓國今定州及順德平鄉之地古鼓子肥子之國狄之别族也其西南則邢衛東北則兾晉以號舉者疑缺文或曰以詐用兵無紀律若狄道蓋與先王封國雜處者故以號舉據實也胡子曰楚滅蔡晉莫能救而效其所為以伐人國是中國居而夷狄行陳君舉曰詳于狄事而不詳于楚則晉無中國之志也十有三年春叔弓帥師圍費陪臣執國命而三桓之子孫微矣魯公室卑由三家家臣于是以張公室為名故南蒯據費不書其叛家臣叛其大夫所謂出乎爾而反之非叛君也然則許南蒯乎于是魯四分而君無名矣有能思君臣之義而懷周公禽父之德一反之正者是社稷之臣而蒯非其人也蒯之鄉人有歌蒯者曰家臣而君圖或又歌者曰去我鄙魯之人亦不知有君矣蒯之張公室跡似而情非挾其私而行之也蒯成而憖代庸愈于季氏乎襄七年季孫宿得政首為南氏城費費者季氏邑也禮大夫無百雉之城彼城者蓋欲自殖也故費叛則以叔弓圍之叔弓副意如以帥師意如之黨也故知蒯不書叛者則知好還之理亂臣賊子懼而聖人之情見矣冶區夫明于撫下而暗于事上亦春秋之所治也夏四月楚公子比自晉歸于楚弒其君䖍于乾溪比稱公子故楚卿也自晉者榖梁晉有奉是己左傳叔向言去晉而不送非也歸之云者易辭內有應如觀從是也以為歸楚而不逆非也歸不言復位未絶也于楚者至其國之辭也乾溪者即許所遷之夷公羊所謂築乾溪之臺者是也觀從師于乾溪而遂告之且曰先歸者復所後者劓師及訾梁而潰王縊于芋尹申亥氏蓋受比命以潰䖍師本其始禍安得不云比弒之哉事莫慘乎意䖍立而比奔其畜謀非一日矣為榖梁氏之說者顧曰歸一事也弒一事也而遂言之以比之歸弒比不弒也弒君者必日比不弒也夫歸之與弒誠二事也然歸而立乎位矣不弒則不止也不弒則將安所置䖍耶經書四月弒䖍于乾溪傳言五月䖍縊于申亥氏則其初赴安有定日而遂以不日為比之不弒乎春秋誠責比不明于君臣之義而謂不責其無討賊之心矣可哉然則如此者其始也不免于無討賊之志焉不能而後奔奔而入又必伸討賊之志焉正其名而絶䖍雖誅之可也不然不能免于弒君之惡矣楚公子棄疾殺公子比不稱人以殺而云弃疾殺者弃疾利比之位而殺之其意不得為討賊稱公子未立之辭若比為王而弃疾為司馬于經自應書弒矣杜元凱曰不書弒君位未定也釋例云比既得國國人皆驚亂弃疾從而煽之比懼自殺皆弃疾之由故書公子弃疾殺公子比也左氏傳曰弃疾即位名曰熊居秋公㑹劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于平丘齊服也自宋之會大夫專盟會者十年申之會楚子專盟會者十年晉無伯業可紀述矣晉昭聞楚靈之禍盡徴會且及于吳决然而起意將代興焉合十三國之君于衛地而以劉子令之庶乎得其機矣此天下盛衰之大故非特以志晉也然志本為利又欲劫之以威晉合諸侯至是遂止復不出者一十四年則鄟陵復有恭盟而終春秋遂無盟主矣聖人詳而志之聖人之情也八月甲戌同盟于平丘公不與盟晉人執季孫意如以歸不殊單子習悼公之陋也公不與盟而意如執趙企明曰邾莒之訴于經無以見十年意如叔弓伐莒謂莒之訴幾矣邾十一年方盟祲祥何訴哉以經文觀蓋意如欲專盟而公不得盟晉侯因其專而執之耳于邢公在晉而季孫宿專㑹溴梁公在會而大夫擅盟意如視為常焉今又欲專平丘之歃公不得與盟意如之抗終迷不復矣文十六年季孫行父會齊侯于陽榖齊侯弗及盟成十六年公㑹晉侯于沙隨不見公此責齊晉可也今公自不得與盟豈晉不盟公也乎經書晉人執意如則意如抗公可知矣然則晉執意如庶乎霸討矣然不歸京師而執以歸也劉子以王命令諸侯其執强臣不聽天子亦自豫奪也皆非霸討之義公至自會蔡侯廬歸于蔡陳侯吳歸于陳廬者世子有之子是為平公吳者世子偃師之子是為惠公楚滅陳蔡而縣之于是弃疾以陳蔡諸師入楚因遂得封同惡相求如市賈焉事定而酬之殆真心也以自歸為文則散辭何也弃疾使技如子躬聘鄭致犨櫟之田事畢弗致其後弃疾曰不穀有事其告子陳蔡賦皆千乘子革所謂足畏者也是彼于犨櫟不能輕以豫人明矣陳蔡方有新功而楚新內定力莫能制吳滅州來弃疾謂子期曰未修守備未定國家而用民力敗不可悔子姑待之是處陳蔡之心也陳蔡雖縣當其入楚及郊請為武軍築壘壁示復仇之民陳蔡之憤可知也于時晉昭又乘楚亂大合諸侯于平丘楚必有奪之氣者始任陳蔡之復而封之耳不書楚封非謂靳其專封亦不書自楚也趙企明直謂晉力則亦許之過矣其曰陳侯蔡侯既即位而赴也廬與吳生而名之廬吳皆亡國太子之子異世而繼絶雖兩君不可不辨也冬十月葬蔡靈公公如晉至河乃復吳滅州來乘楚亂十有四年春意如至自晉意如之至罪晉之失討也意如制魯國使其君不得與于平丘之盟晉幸執之怵惠伯死命之言致有逸罰晉之罪也意如去氏一事再見而卒名如婼耳非以其逃罪失歸道也胡子專責晉然失所以為責者矣榖梁子曰大夫執則致致則名意如惡然而致見君臣之義也夫既曰惡矣猶欲見以臣乎邪辟之人而及乎禮是國無刑賞也范密揚士勛之說亦不必然季孫四分魯而有二寵靈盛矣孔子又豈因其區區擁昭之恩而私于彼哉左氏謂之尊晉夫晉之所尊何所見之既其可尊則意如之至雖欲尊之亦何所見義耶或曰公羊婼存氏如何曰左氏榖梁則去氏矣吾以理決之以衆決之公羊一而左穀二矣婼去氏是也三月曹伯滕卒子須嗣是為平公夏四月秋葬曹武公八月莒子去疾卒弟庚輿嗣是為共公子郊公奔齊冬莒殺其公子意恢趙企明曰公子而不言大夫非大夫也舉其實而已矣稱國以殺罪纍上也去疾卒而意恢殺則意恢者去疾之厚也去疾自齊入莒必意恢有力焉去疾宜有以厚之今去疾卒庚輿去疾之仇故方立而殺意恢焉則意恢之死非其罪去疾纍之也去疾纍之是乃所以纍去疾也今按意恢之殺距去疾卒已歷一時則庚輿既立必疑意恢欲立郊公之故左氏序郊公奔及迎庚輿於殺意恢之後殆失實也故以企明說為暢十有五年春王正月吳子夷昧卒子僚嗣二月癸酉有事于武宫籥入叔弓卒去樂卒事武宫立于成六年籥所吹以節舞者樂舞入廟必先文而後武叔弓卒當籥入時及其去之則諸樂皆去武宫非所當有事也當是時叔弓而涖乎其事則去樂卒事其可也胡子以為合禮記禮之變而書之者也如不涖乎其位則有司莫敢告遂行之而已啖叔佐言宗廟大事大夫卒小事以理言之應待祭畢則不涖乎位者乃可耳趙企明曰宗廟之禮主于孝君臣之禮主于恩孝重恩輕則宗廟之禮也禮不可輟今有事于廟而為叔弓輟樂焉是以輕廢重也春秋不可以無譏夏蔡朝吳出奔鄭朝氏吳名蔡公孫歸生子以王父子朝字為氏費無極以反間譛朝吳于蔡蔡人逐之無極之言曰吳在蔡蔡必速飛而蔡侯不悟亡國之君真不可與圖存矣而罪朝吳何也凡奔皆惡也國亡不死而又事仇反覆乎蔡楚之間而已矣無極謂朝吳王唯信子故處子于蔡子亦長矣而在下位辱必求之吾助子請請者請諸侯非謂楚也吳必挾楚之重以陵其衆見諸行事而衆莫之堪也無極先有以窺之奚翅以名利纍其心乎六月丁巳朔日有食之大衍推五月丁巳朔食失一閏授時亦食五月丁巳朔加時在晝交分十三日九千五百六十七分入食限今先天厯推得丁交巳分十三日九十五分二九七七入食限秋晉荀吳帥師伐鮮虞伐鮮虞嘗狄晉矣曷為復書荀吳一伐鮮虞也當楚人滅中國而晉不能救則狄之以示義當中國無楚患而晉大夫亟從事于戎狄則復其恆稱以見實春秋于晉楚之際無不盡其辭也冬公如晉十有六年春齊侯伐徐齊景公女于吳昭四年申之會楚合淮夷執徐子通吳之道斷矣于是齊侯將而伐之齊師至於蒲隧徐人行成徐子莒人郯人㑹齊侯盟于蒲隧叔孫昭子曰諸侯之無伯害哉齊侯之心非叔孫所知也晉人始欲通吳以制楚今晉衰而楚亂方新景公不能自修遽欲代興耳以興師伐逺為齊無道亦未察其微矣書齊侯杜諤謂别大夫之自將者非褒也其名不書不足書以為不忍絶晉者于義迂矣楚子誘戎蠻子殺之蠻氏在汝州西南近伊闕是申葉許鄭之西而南與楚白羽為界子爵者也左氏蠻子名嘉今不書名史失之耳楚子誘殺戎蠻子與楚䖍蔡般無異而或名或不名杜氏曰蔡大夫怨深故以楚子名告此非蠻人所告蓋楚不以其君名告故不得書名也若是乎其書也聖人不如是之隨也賈逵曰楚子不名以立其子夫殺則殺也立則立也是二人之身也若是乎其書也聖人不如是之恕也胡子曰䖍滅中國而棄疾討蠻氏謹內外之辨也夫亂而無質罪也誘而殺之是田于蹊而牛奪也以是為討也聖人不如是之誣也必如公羊子之所謂君子不疾也不疾乃深疾之庶乎知春秋之㫖矣夏公至自晉秋八月己亥晉侯夷卒子去疾嗣是為頃公九月大雩季孫意如如晉冬十月葬晉昭公十有七年春小邾子來朝夏六月甲戌朔日有食之姜岌云六月己巳朔交分不叶不應食當誤大衍云當在九月朔六月不應食姜氏是也授時今厯推是歲九月甲戍朔加時在晝六分二十六日七千六百五十分入食限今先天新法推得二十六日七千六刻乙二三入食限于是祝史請所用幣季氏不與叔孫婼曰夫子將有志不君君矣秋郯子來朝八月晉荀吳帥師滅陸渾之戎辛有適伊川有被髮而祭于野者曰不百年此其戎乎蓋僖之二十二年晉惠自秦歸允姓之姦近逼伊雒而二于楚萇𢎞測之曰陸渾氏甚睦于楚蓋得其情矣然陸渾氏滅亦無救于晉伯之衰也兵將等故登其名氏謂褒非也貶非也是非存乎事焉耳陸渾後屬晉曰九州之戎冬有星孛于大辰孫炎曰龍星明者以為時候故曰大辰大火也心在中最明故時主焉孔頴逹曰傳稱孛于大辰西經直書于大辰者雖在其星之西仍在大辰分度之內故直云于大辰申須曰篲所以除舊布新也天事恆象今除于火火出必布焉梓慎以為宋衛陳鄭火宋大辰之虛也陳太皥之虛也鄭祝融之虛也皆火房也星孛及漢漢水祥也衛顓頊之虛也故為帝丘其星為大水水火之牡也其以丙子若壬午作乎水火所以合也胡子曰心為明堂天子之象其前星太子後星庶子孛加辰象天子嫡庶將分爭也讀者互觀焉可矣楚人及吳戰于長岸不月夷狄相戰略之也楚稱人將卑師少長岸楚地禦吳兵以水戰也楚吳始書戰敵也自是楚君大夫不見于經者十有八年而吳入郢矣謂昭公之春秋莫辨于吳楚者是也榖梁子曰進楚子故曰戰夫兩相敵未見其可以進也楚苟修其訓辭兵于境上而請師端吳雖强敢加五千里之楚乎狠然惟吳之求夫楚子可進何在也即如胡子謂之觀楚可也夷狄相攻中國之幸置私好惡欲偏強勝焉豈聖人之情也哉唐孔氏以陽丐楚令尹楚恥其敗而以賤者告亦非也然則無惡乎曰楚吳罪均也無擇而施好惡志吳強所以嘆中國云耳猶曰楚雖衰而吳且起諸侯之無伯害哉十有八年春王正月曹伯須卒子午嗣是為悼公夏五月壬午宋衛陳鄭災劉原父曰四國同日而災非人所能為也其序宋衛陳鄭春秋之正也同德則尚爵同爵則尚親六月邾人入鄅鄅妘姓子爵小國在邾東鄙今沂州古啓陽地汪克寬氏曰書以惡邾且為宋公伐邾起也秋葬曹平公冬許遷于白羽白羽即析今鄧州內鄉縣也楚人築章華臺于夷故許遷白羽左氏記王子勝之言乃自葉遷按經九年許自葉遷夷今寧得又自葉遷白羽是經文遷夷謾然不經心目矣十有九年春宋公伐邾鄅夫人宋向戍之女也故向寧請師因其臣之私請而興師伐國當時列國之政大夫專之故也夏五月戊辰許世子止弒其君買世子止之弟斯立是為元公趙子常曰許悼公瘧飲世子止之藥卒則曷為書弒其君止進藥而藥殺也止非心乎弒者止進藥而藥殺則曷為加弒焉止自為藥也君父至尊也藥劑至危也止自為藥以進諸君而君卒則是止弒君矣君子曰藥劑所以致人死者非一端也止進藥而殺可不謂之弒哉止所以異于楚商臣蔡般者過與故爾然春秋之法一施之者以臣子于君父不可過也然則止奔晉曷為不書止誠無所逃其罪焉爾猶不使與君殺而佚賊者同文明止之非故也春秋于臣子之獄察矣己卯地震秋齊高發帥師伐莒發偃子此齊侯窺晉衰而為鄟陵爭伯之端也冬葬許悼公趙企明曰卒赴從外葬從內內會則書葬不然則否初不計討賊不討賊及實殺與否也而𫝊者鑿為是說蓋欲證其殺非實之說耳非義例也二十年春王正月孔氏正義云厯法十九年為一章章首之歲必周之正月朔旦冬至僖五年正月辛亥朔日南至是章首之歲年也計僖五年至往年合一百三十三年是為七章今年復為章首故云是歲朔旦冬至之歲也朔旦冬至謂正月之朔當言正月己丑朔日南至今傳乃云二月己丑日南至是錯名正月為二月也厯之正法往年十二月後宜置閏月即此年正月當是往年閏月此年二月乃是正月故朔日己丑日南至也時史失閏往年錯不置閏更在二月之後夏曹公孫會自鄸出奔宋會子臧之子曹卿也曹無大夫信乎自榖梁之為斯言也然成二年何以書公子首乎趙氏所謂國小不能從事大夫請命者少亦或無事不見于經不得云無一大夫公孫㑹自緣命卿故書名見也賢者之後善斯進之信乎自公羊之為斯言也胡氏實助其瀾然凡出奔皆罪辭會有何善乎春秋二百四十年之間其登名固多神靈之胄矣豈能緣其先世令名而脫罪籍乎夫父子兄弟罪不相及苑何忌尚能引康誥以辭齊賞况聖人乎彼所謂賞猶可也春秋治名實之書也而以名假人乎况如公羊又謂以其先世遂諱其惡乎以為觀書法焉與華向自宋南里出奔楚宋公之弟辰自蕭來奔無以異也然則㑹叛者乎自賈逵及公羊之為斯言也趙匡從而為之辭曰自鄸者先據以叛叛時不書不告且夫華向之奔經固先書入宋南里以叛宋辰之奔經亦先書入蕭以叛矣今公孫會經傳俱無據邑之文止以書法之同而蔽罪㑹無乃有辭乎然則劉原父待放之說然乎曰奔本急辭非待放矣孫明復云鄸會之邑言自鄸出奔以别從國而去是亦鄸有奉焉無所逃黨惡之罰者蓋強臣専邑資兵以自脫當兩治之矣秋盜殺衛侯之兄縶榖梁子曰盜賤也兄母兄也目衛侯纍也胡子以盜為宗魯而蔽罪是乎曰宗魯之罪不知學耳其謂以周事豹而歸死公孟乃若其情則可哀矣即兩治之亦當公其重輕今乃釋閎中執戈者而以受戈斷肱者麗法焉可乎據傳齊豹素狎于縶不應一奪司寇遽仇之至死且北宫喜褚師圃于縶何關遂與豹同惡相求而又挾子朝為亂則非縶一人之故而宣姜之殺子朝之奔經皆無文疑左氏所紀容有不實而衆亂殺縶莫得主名耳啖助曰稱盜者目罪人之賤盜殺衛侯之兄縶是也春秋凡盜殺者三鄭盜尉止之憤殺三卿儔皆賤者也陳盜殺夏區夫盜無傳不可知孟公之盜齊豹以失司冦例不得書習于穀梁而失之者耳至葉正則曰春秋書齊豹盜三叛人名獨此為改正舊史發明大義按趙伯循辨疑于黑肱以濫來奔詳矣正則何其考之不情哉趙企明曰責在衛侯不在盜故豹不必名然春秋之責有所書名者多矣亦不然矣冬十月宋華亥向寧華定出奔陳亥合比弟寧戍子定弱弟趙子常曰三大夫並出則何以月据後再自宋南里出奔楚不月以犯君出也宋元公惡華向華亥僞有疾以誘群公子殺之遂劫公取太子欒與母弟辰公子地以為質公亦取華亥向寧華定之子以為質公殺華向之質而攻之然後出奔故月以異之同于佚賊也十有一月辛卯蔡侯廬卒蔡平公廬卒子朱立二十有一年春王三月葬蔡平公夏晉侯使士鞅來聘許翰曰禮好不結而求財無度則聘義亡矣蓋自是聘不復志宋華亥向寧華定自陳入于宋南里以叛榖梁傳曰自陳陳有奉焉耳胡子曰凡書叛有入于戚者而不言衛有入于朝歌者而不言晉猶曰非自外也有入于蕭者而不言宋則自外入者也此自外入獨稱宋南里何也南里者宋國城內之里名也左氏傳曰華氏居廬門以南里叛宋城舊鄘及桑林之門而守之是華氏與宋分國而居矣故其入其出皆以南里繫之宋然謂司馬華貙叛而召亡人則非資陳之力與經不合而貙以司馬之貴經何以不登其名乎秋七月壬午朔日有食之授時推加時在晝交分二十六日八千七百九十四分入食限今先天新法推得壬午交分二十六日八千七百五六七七入食限八月乙亥叔輒卒杜元凱曰叔弓之子伯張冬蔡侯朱出奔楚成君不月遂失國也費無極取貨于東國怵蔡出朱而立東國朱訴于楚自是不反矣讒人之交亂甚哉公如晉至河乃復報士鞅之聘公亟如晉而晉辭焉晉人知有三家耳春秋傷魯之削也二十有二年春齊侯伐莒十九年高發伐莒矣至是景公親將伐之宋華亥向寧華定自宋南里奔楚此佚賊也自宋南里南里有奉焉耳趙企明曰傳載晉齊曹衛圍南里之事此則與圍彭城之事同固諸侯之善舉不宜不書今直書三叛臣奔楚學者信經足矣傳無取也大搜于昌間昌間啖叔佐曰魯地或曰鄒縣昌平山近邾之地夏四月乙丑天王崩六月叔鞅如京師葬景王鞅弓次子王室亂景王太子早夭諸子皆欲立劉子單子附王子猛者也尹氏召伯毛伯附王子朝者也猛長而貴朝幼而卑其為尊卑也微國人莫知王愛朝將立焉未及而崩諸大夫爭立君帥兵以相攻于是大亂劉原父曰王室亂者嫡庶並爭亂在宗室本不得言京師亂耳劉子單子以王猛居于皇劉子名卷一名蚠單子名旗皇即湟水名今河南府鞏縣以者挈乎人之辭未成尊者則施之苟成尊則否敬王居于狄泉是也故天王出入或有以之而不書者乎傳有之莊二十年鄭伯以王處于櫟昭二十三年單昭子以王如劉二十六年劉子以王出次于渠皆有其事而經沒之者也以為尊王諱書也劉單之以王猛不諱而猛稱名杜元凱以為未即位是也所在言居明其當得位也劉原父曰未逾年則以王繫名通謂之小子王生名之死亦名之尊未成也若是皆史法也何嫌于君前臣名之義哉劉單之失第不能早定其位倡大義一人心于正耳胡子乃謂其挾天子令諸侯吕仲木曰王室亂大臣有能左右天子者豈不可也胡子過矣劉絢曰景王在劉單不能格心則質夫近愚且當聽賔孟犧雞之言而田北山也微王疾殺劉單矣以為不諌亦非也秋劉子單子以王猛入于王城王城澗水東瀍水西惟洛食者是也今河南府城武王定鼎郟鄏處陳君舉曰居于皇言失京師也入于王城言始得京師也凡以非順辭也言前王室亂後言二子以王猛居于皇入于王城則二子有不得已焉者爾是故殺子朝于楚儋翩率子朝之徒以作亂敬王嘗處于姑猶逾年卒克之子朝不書殺天王不書出是豫劉單以復辟之誼也殺朝事在定五年冬十月王子猛卒母弟丐立是為敬王景王中月而渴葬不與其渴葬也故春秋于悼王猶以未葬稱名者治之天子未三年不稱王公羊子之文也未踰年之君雖嘗有諡猶不列于廟然嘗曰王猛矣而卒從其恆稱稱王猛者有子朝焉自命曰西王春秋治其名實别嫌明微顯正君臣之義也卒治以子先儒云禮所謂父子之倫也謂不書王則嫌于魯之子不書子則嫌于未君不書猛則嫌于群王故書王子猛前承王猛之文而下書王子猛則其卒非子虎之比矣文同而義異者春秋固多有之故春秋非聖人不能修也然則與王子朝奚異者曰尹氏有朝焉書子朝别嫌乎尹氏之朝也然上書天王則王子朝可得書天王不與王子敵也十有二月癸酉朔日有食之疏杜者以此月有庚戌上去癸酉三十七日不得癸酉為朔有庚戌也又傳十二月下有閏月晉箕遺云云又云辛丑伐京辛丑是壬寅之前日也二十三年傳曰正月壬寅朔二師圍郊則辛丑是閏月之晦日也又計明年正月之朔與今年十二月朔中有一閏相去當為五十九日此年十二月當為癸卯朔經書癸酉明是誤也故言長歷推校十一月小甲戌朔傳有乙酉十二日也又有己丑十六日也十二月大癸卯朔傳有庚戌八日也閏十二月癸酉朔傳有閏月辛丑二十九日也明年正月壬寅朔則上下符合矣此考于時月最密而授時歷課得癸酉朔交分十四日一千八百入食限反以杜注非是不可曉也今兩存之今先天厯新法推得癸酉交分十三日闕三闕三五四六入食限二十有三年春王正月叔孫舍如晉癸丑叔鞅卒子詣嗣晉人執我行人叔孫舍高抑崇曰晉雖以取邾師為罪而執行人其實則為士鞅來聘以魯為卑已故也與趙企明意同晉人圍郊郊者何周邑也而有子朝之黨不係之周土無二王以别異于諸侯也與圍溫一耳晉自交剛大夫帥師皆書此書人將卑師少也若籍談荀躒則當從其恆稱矣于是單旗告急于晉司徒醜以王師敗績于前城鄩肸之伐百工之叛僅勝之耳晉人始率九州之戎焦瑖溫原之師納猛王城而單旗劉蚠又敗于郊前城人敗陸渾于社子朝攻猛棘矣王猛卒敬王立晉始軍于隂于侯氏于溪泉次于社王師軍于汜于解次于任人晉人濟師取前城軍其東南王師伐京毁其西北踰年子朝立而後圍其所以討亂者不力矣聖人據實以書之胡子曰不係周不與伐天子殆亦不然也然以子朝在是而圖之也經不書圍子朝而直書圍天子之邑所謂圖勤王之績而得犯京師之名者矣夏六月蔡侯東國卒于楚弟申嗣是為昭公東國行貨得國者也不日卒于外也朱東國蔡侯二子朱出奔楚東國亦卒于楚必楚受朱訴而拘東國王父殺父見用身行貨而卒不免不能辨于義利以自強其禍豈小哉秋七月莒子庚輿來奔左氏曰庚輿虐而好劍苟鑄劍必試諸人國人患之又將叛齊烏存帥國人逐之庚輿來奔齊人納郊公戊辰吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧吳伐州來來楚與國故楚以六國奔命救之次于雞父雞父楚地也未陳而諼以取之曰敗頓胡沈夷也而躋之蔡陳許之上背盟即楚春秋一施之而已胡子謂以君大夫序叔孫舍曰列國之卿當小國之君况夷狄乎是春秋本狄之曰滅者身殱而國亡之稱雞父𨽻今夀州霍丘西南其地北與州來界故沈𨽻潁州夀潁北界君殺則國滅矣胡沈以身滅為文胡子所謂自取焉是也不言楚楚未接也左氏曰楚及諸侯之救州來吳人禦諸鍾離戰于雞父是雞父在鍾離東州來西吳師雖未至州來然禦在鍾離已入而戰在雞父也汪仲裕曰左傳記令尹卒楚師熸吳光設詐先犯胡沈與陳三國既敗又從其囚使奔許與蔡頓而許蔡頓之師亦奔六國敗奔之後然後楚師又奔則楚師未嘗與吳師相接明矣天王居于狄泉此敬王丐也君父一治之耳子猛卒已踰年不書出即位于狄泉非自內而出也狄泉洛陽城內太倉西南池水洛去王城二十五里爾王猛既入王城陸渾之戎雖還焦瑕溫原尚可資其力也不擁丐而定之位遲疑觀望單從阪道劉從尹道惟伐尹之為急自是王復如劉子朝乃得自卻入尹而入王城書之以見劉單之罪也尹氏立王子朝尹畿內采地尹氏子爵名周世卿本吉甫之後据莊十九年蘇子立子頺不書而書子朝以佚賊也朝之不名與衛人立晉不書公子異者于是尹氏有朝焉言王子别嫌乎尹氏之朝也立者不宜立者也立于王城而不書入劉單擁王出避則王城虛莫適主焉易辭也立而自尹氏猶曰獨尹氏所欲立也尹氏天子之卿也胡子曰王朝公卿書爵而變文稱氏者見世卿之擅權亂國為後戒也八月乙未地震萇𢎞曰周之亡也其三川震今西王之大臣亦震天棄之矣東王必大克按疏言丁酉南宫極震則周地始震周魯相去千里故震日不同夫陽伏而不出隂迫而不蒸于是有地震言乎其上下也氣升降同時豈以千里即差三日哉千里而差三日言乎其緯也然測其高深廣輪氣數年而始周矣疏家亦不考于周髀之數靈曜括地之文也哉冬公如晉至河有疾乃復二十有四年春王二月丙戌仲孫貜卒孟僖子也子何忌嗣與南宫敬叔師孔子叔孫舍至自晉按十四年意如至自晉不氏舍獨係之叔孫者衍文也左氏榖梁皆無此二字孫明復從之夏五月乙未朔日有食之授時推加時在晝交分二十六日三千八百三十九分入食限今先天厯新法推得乙未二十六日三千八百十九分九二入食限秋八月大雩初五月日食梓慎曰將水禆竈曰旱也日過分而陽猶不克克必甚能無旱乎陽不克莫將積聚也丁酉把伯郁釐卒子成嗣是為悼公冬吳滅巢葬把平公二十有五年春叔孫婼如宋春秋內大夫出者其私皆言故傳云為季氏逆婦非也非國君無代逆者逆無有以其僚友兄弟代者且意如見經至是十五年計其齒長矣又十三年而斯已代父專政斯豈宋女所出耶以是知傳誤矣夏叔詣會晉趙鞅宋樂大心衛北宫喜鄭遊吉曹人邾人滕人薛人小邾人于黃父詣鞅子趙鞅成子武孫大心祁黎族兄喜他子吉蠆子黃父張主一曰即黑壤晉地左氏傳曰謀王室也于是天王謂之東王子朝謂之西王晉侯使涖問周故期以明年而後為黃父之會諸侯不至但合諸大夫以謀之不于周而于晉地曰明年將納王春秋之書是會前不屬狄泉之居後不屬成周之入說者以為無益于天王是已是故又明年而荀躒趙鞅之師出天王書入而晉師克鞏不書不以討子朝豫晉也而胡子以為免于貶非矣有鸜鵒來巢邵氏按先天卦圖言天下將治則氣自北而南天下將亂則氣自南而北禽鳥飛類得氣之先周禮鸜鵒不踰濟而至魯則氣自南而北之驗也自此晉霸不競吳楚越皆以南夷迭主夏盟幾于改物則知鸜鵒之來不但巢居為異昭公出奔之祥特其一而已秋七月上辛大雩季辛又雩九月己亥公孫于齊次于陽州亟言之曰奔緩言之曰孫諱奔言孫而已孫于齊以求援次陽州待齊命也次不敢直前之辭儒者以為自莊以來未之有也陽州齊魯境上邑昭公入公果公賁之說于侍人僚柤欲伐季氏子家羈曰讒人以君徼幸事若不克君受其名不可為也舍民數世以求克事不可必也且政在焉其難圖也公退之已而公徒見伐與臧孫如墓謀遂行孫于齊胡子曰昭公不明乎消息盈虛之理正身率德擇任忠賢待時馴致不忍一朝之忿求逞其私欲而以群小謀之其及宜矣齊侯唁公于野井胡子曰唁者弔也生事曰唁死事曰弔齊侯唁公于野井以遇禮相見孔子曰其禮與其辭足觀矣言其無納公之實也趙企明乃以為迂夫禮始可以為國使景公赫然明于方伯之職正辭伐魯以討出孫之由則意如必受其咎高崔田氏何敢同惡相求哉冬十月戊辰叔孫舍卒公在外書日勢不得臨非恤典薄也十有一月己亥宋公佐卒于曲棘子奕嗣是為景公曲棘宋地今杞縣東北古外黃胡子云宋元意如外舅欲納公者以正倫恤患為心而不匿其私親之惡者也吕仲木曰知季氏之將逐君而嫁之女見季氏之已逐君而免其危于季氏且不得為賢舅豈有正倫恤患之心哉如有是心當其時則不妻也以為賢于當時諸侯者過矣吾謂吕氏曰精十有二月齊侯取鄆齊侯之取鄆為居昭公也為居昭公則曷言乎取以為伐季氏可勿取鄆取鄆是舍大而小是謀也為斯義者正矣然齊之取鄆公為之名耳徙于乾侯鄆遂入齊而不返迄定十年夾谷之會而後來歸書曰齊人來歸鄆歡龜隂田是矣故與宣元年之濟西哀八年之歡闡無異辭焉聖人固有以察其情矣或曰禮國亡大縣邑公卿大夫皆厭冠哭于太廟三日君不舉以其係乎我也故必書嘻末矣二十有六年春王正月葬宋元公三月公至自齊居于鄆公來居鄆曰至自齊則公蓋自野井入齊國都齊既取鄆而始來居耳若本未至齊則當書至自野井與至自乾侯同例矣穀梁傳曰齊侯之見公可以言至自齊非也王葆曰野井齊地可以言齊非也夏公圍成成者孟氏之私邑也三家皆有邑稱都矣成三都之一也季氏出君而攻孟氏之邑公在鄆與成近也方三家分魯孟氏有所賦于公未至如季氏也意如因公之孫乃有所劫耳公倘信子家而通內外感之以誠動之以禮成邑豈遽為意如所劫哉方是時何忌受學仲尼亦可責禮徒以在喪故未能治其私邑不修訓辭奮然而惟成之急圖而無序威䙝而堅三都之叛矣不稱公以齊師齊人受季氏賂其師不足用也戰于炊鼻不書者諱國惡胡子曰書公圍成則季氏之不臣昭公之不君齊侯不修方伯連帥之職其罪咸具矣秋公會齊侯莒子邾子杞伯盟于鄟陵鄟陵即成六年魯取之鄟在齊魯境上蓋晉不復能主盟矣參盟不月矯納公以盟邾莒杞也始齊人受季氏賂故圍成之師公子鉏從而師不足用蓋景公志不及逺集小國為參盟其爭霸之略止于此矣故不月以異之趙企明曰齊難于納公論勢之強弱不可虛議齊也趙氏豈惟不知春秋之義並其實而失之矣公至自會居于鄆家鉉翁氏曰自是每歲書至書居凡五見焉及鄆潰乃書公在乾侯皆所以存公而繫魯國臣民之望也九月庚申楚子居卒太子壬立改名軫是為昭王冬十月天王入于成周初四年子大叔謂范獻子嫠不恤緯憂宗周之隕也五年冬尹氏涉鞏焚東訾于是使單子如晉告急劉師敗于施谷劉子以王出次于􅉸晉知躒趙鞅以師至王起師于􅉸次尸晉克鞏召伯盈逐子朝逆王于尸及劉子單子盟王入于成周入難辭幸之也不書晉師以晉頃之所定周者怠也于成周非王都也武王遷九鼎于河南郟鄏周公營都焉曰王城遷殷民于雒陽下都成周也平東遷都王城子朝亂餘黨多在王城于是敬王畏之都成周至三十二年而諸侯之大夫始城之今曰成周者黍離而降不列于雅京師衆大之稱不可係入則亦非事實矣尹氏召伯毛伯以王子朝奔楚傳言召伯盈逐王子朝朝及召氏之族奔楚召伯逆王于尸與王入于成周則召氏族出奔召伯身不奔是傳之謬也劉原父以召伯既自歸敬王族必從之若召族自出法不書于毛伯之上尹族以圍故得書召族無為則卑不得書是不知傳謬強為解也季明德曰尹氏為卿卿本子爵而序于召伯毛伯之上則二伯乃大夫之字杜元凱謂伯為爵者非也不知子書伯上自緣職事高下畢命所紀可見宣公之簡毛伯序召伯之上蓋與今位次不同之證季氏之誤也子朝立為王矣而猶曰王子者國人不與為王也不言出者不從位出也趙企明曰天王既入子朝自出而自外奔耳與晉之先蔑同二十有七年春公如齊公至自齊居于鄆夏四月吳弒其君僚稱國以弒弒君者當國國人皆逆賊之黨故無能以名氏赴者春秋之常如欒盈是也吳公子光之弒僚則既異矣僚代父夷昧而立也據公羊史記光之有爭在夷昧方殁時何待十二年而後行事哉杜元凱謂僚亟戰罷民又伐楚喪庶乎得舉國畏惡之情第謂光乘間而動則亦惑于左氏不索何獲之語僚既以非次而立又國人之殺之必將致國於札畏惡而思息肩國人殺之也何與于光茍如楚䖍乾溪之事而不蔽獄于光則其視楚公子比何其輕重懸絶耶故吳僚之弒據經不必任傳可也趙子常曰不日以别于大臣之弒君而稱國者諸樊子光立是為闔閭楚殺其大夫郤宛此費無極諼而殺之聽之者囊瓦也以纍上書而不去其官則所謂關天下之故而後書者無極之言曰救潜之役吳可以得志子惡取賂焉是假國法以殺之也秋晉士鞅宋樂祁犂衛北宫喜曹人邾人滕人會于扈祁犂喜子大心族弟扈鄭地扈近成周左云謀戌成周是也以魯不至則云納公齊不至又何以言耶士鞅曰魯君守齊三年無成而齊景公于梁丘據欲以濟師卜天之棄魯君與否今若以納魯召齊寧有不至耶若今實謀納則明年如晉晉人止公何得云不使一人辱告寡君而即安甥舅耶疑左氏于此有附會者然戍周之㑹而諸侯不親竟託空言遂使成周之城五年而後效功假令戍周之言信行經必書之矣頃公韓起之伯業其不足觀也如此夫冬十月曹伯午卒史記弟野立是為聲公五年平公弟通弒聲公代立是為隱公四年聲公弟露弒隱公代立為靖公譙周云春秋無其事檢世本及春秋悼公卒弟露立諡靖公無聲公隱公蓋是彼文自疏也邾快來奔公如齊公至自齊居于鄆傳言仲孫何忌陽虎伐鄆公徒敗于且知先儒以為存公不書非也說者率謂定哀之際多微辭然辭微矣豈有盡沒其實者乎經文不見是本無其事也何忌孔子之徒豈以臣伐君乎二十有八年春王三月葬曹悼公諡曰悼則史謂囚死于宋者不無據矣公如晉次于乾侯至是公三如齊而不見恤也知晉以求容而晉人以其即安甥舅靳之乾侯今廣平成安縣古魏郡斥丘地在衛北狄地至是屬晉矣故次陽州猶魯齊之境次乾侯則進退維谷羈旅之人耳夏四月丙午鄭伯寧卒子蠆嗣是為獻公六月葬鄭定公秋七月癸巳滕子寧卒子結嗣是為頃公冬葬滕悼公二十有九年春公至自乾侯齊侯使高張來唁公張偃子記唁以誚公耳公至是怍而復如晉公如晉次于乾侯左氏記意如歸馬及公黜太子務人而立公衍汪仲裕辨其無有是也夏四月庚子叔詣卒秋七月冬十月鄆潰于是公如晉民迫于季氏不敢復寧公也而民不見德亡無愛徴并見矣三十年春王正月公在乾侯正月以存公也高抑崇曰鄆魯地曰居者公之所有乾侯晉地曰在者非公得而專也夏六月庚辰晉侯去疾卒秋八月葬晉頃公子午嗣是為定公冬十有二月吳滅徐徐子章羽奔楚傳者或曰先服而後奔故名春秋國滅君奔者三皆不名也或曰徐兩事吳楚以違吳人執亡公子之命而見滅楚出師救之無及也徐在僖公時為楚所虐尋已服于楚矣及楚既衰而徐為吳滅則章羽有奔楚而已不得與奔中國者比故特名以異之三十有一年春王正月公在乾侯季孫意如會晉荀躒于適歷躒盈子適歷晉地晉定初立有嗣霸之意將以師納公士鞅曰若召季孫而不來則信不臣矣然後伐之若何晉人召季鞅使私焉曰子必來我受其無咎于是意如待命于適歷而晉使荀躒出會䝉于詐謀而不知于是釋君助臣胡子所謂不能致討而寵以會禮者是己自是唁公乾侯公薨乾侯屬辭比事而晉人之罪著矣夏四月丁巳薛伯榖卒子定嗣是為宣公晉侯使荀躒唁公于乾侯會意如者躒也唁公者即躒也晉人入荀躒黨奸之說果釋君而助臣矣弔失國曰唁經之言唁以公之不得入示意者晉人之本㫖也而傳記躒之言曰意如不敢逃死君其入也蓋亦誣矣榖梁曰既為君言矣不可者意如也斯與經應矣秋葬薛獻公冬黑肱以濫來奔此與邾庶其以漆閭丘來奔同不書邾缺文也公榖傳皆云邾黑肱知肱邾臣也故啖趙纂例從左氏所引注文曰邾黑肱矣意如當國為逋逃主故快肱以類至而肱又以濫耳二傳鑿生異論公羊以為通濫于天下以賢叔術也濫何足通而叔術何足賢歟地固有通于天下者沙鹿崩梁山崩是也濫在滕東南古東海昌慮縣地何繫于天下而黑肱書名何足知其賢耶而榖梁曰不言邾黑肱别乎邾不言濫子非天子所封也且别封而不受王命者在春秋固有之郳邾之别封也蕭叔宋之别封也郳黎及蕭皆以地書而黑肱安得不書地假令黑肱實别封不受王命然地固王土春秋反正諸侯安得専封不還繫之邾者且既為别封則固已有國世安有挈國而奔者哉此皆不近人情矣闕文之云學者無疑焉爾十有二月辛亥朔日有食之授時推加時在晝交分二十六日六千一百二十六分入食限今先天新法推得辛亥交分二十六日六千一百八十四入食限史墨曰六年及此月也吳其入郢終亦弗克入郢必以庚辰日月在辰尾庚午之日日始有謫火勝金故弗克三十二年春王正月公在乾侯取闞取不言公蒙上也不躬取不言公闞今東平古須昌昭所葬地魯羣公墓隧之所在也公居鄆尚得以主行而祭鄆潰則無所寓其儀范鞅語意如曰子姑歸而祭是其事已或曰取之以寓孝思彼戚而有喜容又曷能思羣公哉習其儀而已內地而書取者何也逐于季氏雖內邑猶取之外也在乾之日取闞比之於取鄟取邿見公之不能外內也春秋明志録卷十
