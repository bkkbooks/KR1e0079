body:
  text: 春秋明志録卷十一明熊過撰定公名宋襄公之子昭公之弟在位十五年諡法安民大慮曰定元年春王起至四年五月公及諸侯盟于臯鼬止查原本係缺頁把伯成卒于㑹子乞嗣是為隱公七月其弟過弒隱公自立是為僖公六月葬陳惠公許遷于容城至是四遷矣而終滅國于是也故積輕之勢而不常厥居者真失䇿哉容城杜注地缺任公輔以為華容然楚都郢華容地在郢南游吉獲許男未必敢越楚國都罙入其阻疑非華容矣秋七月公至自㑹劉卷卒卷即召陵劉子也卒不稱子本闕文不日者喪不訃或言卷主會視尹氏主王喪為輕非也其書卒魯所私也劉原父曰王者之制內諸侯祿外諸侯嗣故生稱爵其祿也卒稱名從正也葬稱公主人之事也陳君舉曰王卿士不卒有關于天下之故則卒之于襄王之難有王子虎焉于敬王之難有劉子焉君子曰王室其庶幾乎而無救于周是故特卒之司馬遷于諸國世家多卒孔子蓋知此者也葬杞悼公楚人圍蔡晉士鞅衛孔圉帥師伐鮮虞許翰曰謀楚而不能討盟蔡而不能救唯中山是伐書卿帥師者著威令不行于强暴而行于小弱也葬劉文公李廉以為天子卿大夫有封為畿內諸侯者皆曰子溫子劉子單子尹子之類是也然周末畿內諸侯卒皆諡公如成肅公單平公皆然春秋因劉文公之葬特書以志其僣耳生稱劉子卒稱劉卷葬稱劉文公皆聖人謹嚴之筆也而何氏注公羊乃以其稱公之故而謂劉子本外諸侯入為天子大夫故上繫采邑下繫本爵其說無據不可從愚按劉本畿內采地今河南偃師古緱氏成王封王季子因為氏則本畿內諸侯非自外諸侯入為大夫明矣但諸侯僣公不止畿內意者周之末造死則以神明治之寵以隆階如今時增秩亦尚文之習與冬十有一月庚午蔡侯以吳子及楚人戰于柏舉楚師敗績楚囊瓦出奔鄭吳雖無憂中國之心然其臣曰蔡非有罪也楚人為無道君如有憂中國之心則若時可矣是亦蔡昭能自立以吳子也吳稱爵吳之强也楚人者圍蔡之人傳謂子常之卒非也子常囊瓦也瓦既為元帥孰非其卒而又别有私屬乎吳攻楚所必救故兵撤圍解蔡侯得去國而以吳子遇圍蔡之人于柏舉柏舉漢汝南西平縣楚地也戰不在蔡故不言救蔡據經囊瓦帥師禦吳及見圍蔡之師先敗瓦師遂至大奔瓦因懼誅而奔鄭矣左氏序十一月庚午二師陳于柏舉楚圍蔡之師及囊瓦之卒也而注者誤謂吳楚師緣下云子常之卒奔楚師亂可證為楚二師矣其傳者異辭遂失先後左氏妄有所紀應云圍蔡師奔子常卒亂乃合經耳庚辰吳入郢戰稱吳子矣入郢曷為稱吳一役而再有事從其恆稱也楚以羣蠻為國羣蠻盡惟郢存焉爾郢者楚之都也楚抗衡北方以陳蔡鄭許至于屏國皆蠻也隨叛則不得志于漢東庸濮叛則申息之門不啓吳以計疲楚滅巢滅徐滅州來以空其藩屏楚既自敗于長岸雞父又敗其六國之師定二年楚師伐吳而諸侯不來則其黨與盡矣入郢者直造其都無乎人之辭也齊履謙以為郢當依公榖作楚非也五年春王二月辛亥朔日有食之授時推加時在晝交分十四日三百三十四分入食限先天歷新法推得辛亥交分十四日二九五五入食限夏歸粟于蔡越陳宋二國而餽之畏吳也於越入吳趙子常曰於越勾吳皆蠻夷之號也春秋不曰勾吳而曰於越何也武王封太伯之後周章于吳則吳其國名也故得稱吳越雖禹苗裔而始封于會稽按汲冡竹書有東越於越則越非其封國故以其自號舉之也范寧氏曰於越越言也春秋則以其所以自稱者書之六月丙申季孫意如卒子斯嗣是為桓子胡子曰意如書卒見定公不討逐君之賊以為大夫全始終之禮也定雖受國于季氏苟有叔孫婼之見不賞私勞致辟意如以明君臣之義則三綱可正公室強矣秋七月壬子叔孫不敢卒婼之子成子也子州仇嗣為大夫是為武叔冬晉士鞅帥師圍鮮虞六年春王正月癸亥鄭游速帥師滅許以許男斯歸游速子太叔吉之子也滅國以君歸故異而日之哀之册復見許杜氏曰楚復存之此則當如蔡侯廬陳侯吳之書歸矣經無可據滅疑當作入也隱十一年公及齊侯鄭伯入許鄭不有其地以許東偏奉許叔而使其大夫獲處許西偏已而鄭亂許叔入許依楚矣齊伯叔常從伐楚其後從晉雖許二晉以楚故也于是晉楚俱弱矣鄭乘楚亂乃滅之李廉氏曰鄭入許而齊鄭合天下遂無王鄭滅許而齊鄭又合天下遂無晉春秋是以終世亦可感也已二月公侵鄭自宣季年魯無君將者八十一年矣至是意如死家臣又有公山不狃侯犯陽虎之奸以三桓專兵為口實欲因竊取其權定公復自將而侵其後侵齊會晉圍成皆以師行公至自侵鄭內侵伐不至此何以至豫公之為晉討也周儋翩率王子朝之徒因鄭人將以作亂于周鄭于是乎伐周六邑而晉使魯討之其興師非一國之私也蓋不至以為恆斯至以明義也夏季孫斯仲孫何忌如晉左氏傳曰季桓子如晉獻鄭俘也陽虎强使孟懿子往報夫人之幣晉人兼享之夫一卿將命可兼他事今每事一卿故纍數之見二卿為陽虎所制也于是陪臣執國命而三桓之子孫微矣魯自東門氏以後仲孫聘晉者三叔孫五季孫十有二說經者别之曰仲之事簡叔之情忠季主范荀借外權以逼公室耳春秋之義大夫非君命不越境其初聘問尚簡故不得外交其後寢繁而交始固于是始得借外權為內患宋樂祁主范鄭伯石主韓衛孫林父善晉大夫不獨魯三桓也然孰知天道好還陪臣執國命以叛之哉梁嬰父董安于叠見于春秋遂以是終矣秋晉人執宋行人樂祁犂祁犂如晉趙簡子逆而飲之酒獻楊楯六十于簡子范獻子怨其主于趙氏又有納焉乃譛諸晉侯而執之書曰行人使人也胡子曰稱人以執非伯討也使范趙方睦皆有獻焉則弗執之矣執異國行人出于列卿私意威福之柄移矣冬城中城趙企明曰魯既侵鄭聘晉而不與齊懼有齊警故城中城備齊也中城在海州海州齊境榖梁以為三家張蓋以中城為城之中疏矣季孫斯仲孫忌帥師圍鄆鄆自昭二十五年齊侯取之以居昭公三十年鄆潰遂二于齊今圍鄆圍于齊矣不書伐齊鄆本內邑也故以圍叛邑為文陽虎坐議季孫親行故也何忌受學仲尼不修文告至于用兵亦失也夫忌者何忌其遺何蓋缺文也公羊子曰譏二名二名非禮也或問不知夫謂何忌名乎忌又一名也乎曰何忌名也忌又一名也嗣是經無書忌者何也春秋無是也或曰謂二字乎疏所謂哀七年晉魏多之文乎將孔子作春秋改古禮為後王之法是故欲定一名而使天下易諱乎曰古之名聞諱山川日月之比矣一可也何譏焉吾觀三氏哀七年俱書魏曼多也不聞去曼以示譏也惟十三年公羊書魏多焉二傳無是也且古今之本不同耶雖然奚以不同論也且何忌書至是凡三見矣城成周者何忌定三年盟邾子于拔都者即又何忌也今夏同季孫斯如晉即又何忌也假孔子欲示譏乎城成周其始見也何故至此而後譏以為孔子之立法何故恕意如不敢責何忌之深也彼元凱之謂缺文者是也此義也關于春秋末矣讀公羊者疑焉附見之七年春王正月夏四月秋齊侯鄭伯盟于鹹鹹衛地是時齊鄭皆與魯為仇齊鄭盟鹹將致衛叛晉以危魯也陳君舉曰此特相盟也特相盟自齊桓以來未之有也是其再見何諸侯無主盟矣是故石門志諸侯之合也鹹志諸侯之叛也齊人執衛行人北宫結以侵衛齊侯衛侯盟于沙此齊衛合黨之始左氏曰衛侯欲叛晉諸大夫不可使北宫結如齊而私于齊侯曰執結以侵我齊侯從之乃盟于瑣即沙也陽平元城縣地許翰曰齊衛之盟叛晉也定之季鄭獻衛靈叛而從齊齊可以霸而景不足望也大雩齊國夏帥師伐我西鄙夏佐孫九月大雩冬十月八年春王正月公侵齊公至自侵齊二月公侵齊三月公至自侵齊趙子常曰內侵伐恆不至再侵齊何以至齊景公結諸侯以叛晉而魯未從故國夏伐我而公再侵齊以報之以其重于叛盟主非一國之私故皆書至以别之曹伯露卒子陽嗣夏齊國夏帥師伐我西鄙公會晉師于瓦公至自瓦定公因齊伐西鄙親至瓦以待晉師之救瓦本南燕地今衛輝府昨城縣其北近衛後蓋服屬于衛杜云衛地東郡燕縣東北是已魯大國也昭八年搜于紅革車千乘三家之師也是于禦齊何有哉晉政以賄成而乞師不怍公親出境以逆其師陪臣執國命而為謀之不審可罪也已將卑師衆稱師之意耳胡子用大衆則君與大夫皆以師為重而不敢輕也是故不書士鞅荀寅夫春秋之法晉有二帥而不得書視凡例亦少異也夫君之不可會大夫也君臣之義春秋之所嚴也不能自強結怨于齊乞援于晉至于國君下會諸侯之大夫君子于是乎有陵替之懼矣或曰禮卿不會公侯會伯子男可也審是則瓦之會其不書鞅明矣胡子以為重師恐無取于瓦之義秋七月戊辰陳侯柳卒子越嗣是為閔公晉士鞅帥師侵鄭遂侵衛遂者急于後事之辭晉既侵鄭則懼齊之救兵至衛也故侵以急辭書襄之三十三年齊始叛晉取朝歌去年鄭始叛晉盟齊于鹹衛始叛晉盟齊于魯于是侵鄭衛又明年及齊平魯亦叛晉晉伯之衰非細故矣汪仲裕曰于齊始伐盟主書伐衛遂伐晉于晉始討與國書侵鄭遂侵衛齊則伐而晉則侵見晉伯既衰之甚也葬曹靖公九月葬陳懷公季孫斯仲孫何忌帥師侵衛杜元凱曰為晉討衛也冬衛侯鄭伯盟于曲濮曲濮衛地趙鵬飛曰鄭衛雖受兵而叛晉益甚故為曲濮之盟不復事晉也從祀先公從祀抑季氏之攝也先公非一公杜元凱言正閔僖次位馮允南言昭公始得從祀太廟則皆有主名可專稱何得槩云先公乎且閔僖親盡時祭所不及經文書有大事何知有正于二公也且昭公之葬稱諡必已祔祭祖廟絶其兆域不同先君者墓而已並疑主未祔祭經傳無文蓋臆說耳故汪仲裕以從祀不稱昭公與禘于莊公書法為疑是矣昭公之出范鞅謂意如曰子姑歸而祭故季氏久假不歸至是陪臣執國命欲抑季氏為之名始具駿奔在廟從有司顯相而行事也定哀之微辭是類也夫盜竊寶玉大弓盜陽虎也虎列大夫矣孟子曰大夫有賜于士大夫虎也非微者矣而書盜何也陳君舉曰魯無人之辭也是故陪臣叛皆不書書陽虎是治陪臣也夫子之作春秋治至于陪臣斯極矣九年春王正月夏四月戊申鄭伯蠆卒子勝嗣是為聲公得寶玉大弓六月葬鄭獻公秋齊侯衛侯次于五氏謀晉也苟伐晉則當如哀元年稱伐矣左氏誣耳五氏晉地今廣平府邯鄲縣本狄地後為晉有而近于衛者也陳君舉曰齊始叛晉諸侯猶有盟主也前年鄭叛晉盟齊于鹹衛叛晉盟齊于沙明年及齊平魯亦叛晉則諸侯無盟主矣有盟主非美事也無盟主非細故也是故春秋重絶晉也秦伯卒孫惠公立冬葬秦哀公十年春王三月及齊平夏公㑹齊侯于夾谷魯始叛晉從齊也夾谷在濟南府淄川縣西南界左氏祝其實夾谷則今淮安贑榆矣其地逺疑非會所趙子常曰齊之所欲得者莫急于魯也齊不得魯則晉不可伐公至自夾谷公會諸侯嘗不致此其致之何以叛盟主而會齊侯故特書至以異之晉趙鞅帥師圍衛討五氏之次也然不討齊而圍衛晉固怯大而陵小也齊人來歸鄆歡龜隂田于是東諸侯之即晉者魯而已齊將代興已得鄭衛而難魯齊魯自臯鼬以來齊之伐魯西鄙者再魯之圍鄆者一侵齊者再齊急于得魯以為南主是桓公管仲之始謀也夾谷會齊齊蓋幸矣故亦率桓公之故反魯侵地鄆濟西田與范界齊常取以居昭歡汶陽田與棘界則陽虎所以挾而奔者龜山之隂是為龜隂鄆魯西南歡魯西北龜隂魯東北皆魯故地景不自度欲修桓之業為是來歸本非畏魯其歸田亦曰田反而齊師出竟魯以三百乘從矣季明德謂齊欲息爭亦非也是時魯卿方有陪臣之難陽虎雖奔而南蒯侯犯公山不狃猶張趙子常曰季孫之用孔子非為興魯齊人故知孔子于魯非有三年淹者故歸女樂以沮之則鄆歡龜隂之田不為孔子來歸明矣孔子見行可而仕季桓子行有適可而不保其往非期月而可之謂也學者欲以相會夾谷歸侵田實其言其知聖人微矣子常所指切蓋謂馬遷康侯等耶金氏有言三家于孔子非有土地甲兵之用至甲辰閲四年始攝相事聞國政則前此其權可知學者忿聖人失職而幸其用欲以是歸功不考于事實也近湯氏言齊畏三家益疏矣叔孫州仇仲孫何忌帥師圍郈秋叔孫州仇仲孫何忌帥師圍郈郈叔孫氏邑在今東平州東古無鹽縣故宿國也侯犯宰郈陽虎與為聲援虎既不安其位則郈自疑而叛再書二卿圍郈則其强可知矣何忌以兵助叔孫圍郈蓋同苦于陪臣者左氏記二子同齊侯圍郈經無其文且既同圍矣又云侯犯請易于齊齊有司觀郈將至既駟赤止而納魯人矣則郈非齊有而又云齊人致郈推原事勢去人情矣宋樂大心出奔曹左氏傳曰宋公使樂大心盟于晉辭僞有疾子明言于公曰右師不肯適晉將作亂也乃逐桐門右師宋公子地出奔陳地以寵弟貴卿處危疑之地抶君之寵臣而不忌其迹亦可疑矣故以自奔為文是有罪而見逐也冬齊侯衛侯鄭游速會于安甫安甫齊地無所憚于晉矣叔孫州仇如齊宋公之弟辰暨仲他石彄出奔陳弟為卿稱公子辰食祿已列于大夫稱弟他仲幾子彄禇師段子皆宋卿仲他石彄本無去志但辰以魋逼害之故脅使去國而他彄亦遂有憤激之言耳故併逐之書曰暨豈有二卿無罪肯隨公子出奔趙伯循疑其不近人情是矣宋公以嬖魋故而失二弟無親親之恩辰以兄故帥其大夫出奔無尊君之義仲他石彄見脅于辰同惡相求不能自立無大臣之節並見矣十有一年春宋公之弟辰反仲他石彄公子地自陳入于蕭以叛辰猶稱弟屬猶未絶也出奔稱暨辰強之入于蕭以叛則稱及辰主之也蕭宋邑莊十二年宋萬弒閔公蕭叔大心者宋蕭邑大夫也平宋亂立桓公宋人加之以蕭邑封叔為附庸宣十二年楚子滅之復為宋邑故辰等今入以叛胡子以為叛臣所食私邑非也夏四月秋宋樂大心自曹入于蕭胡子曰四卿在蕭以叛而大心自曹從之其叛可知矣故不書叛而曰入于蕭入逆詞也書自陳自曹者結鄰國以入叛陳與曹之罪亦著矣冬及鄭平叔還如鄭涖盟及鄭平者我欲之故鄭卿不來盟而我卿往涖盟也鐵山陳氏曰諸侯邦交大抵役于伯主輸平歸祊來盟隱桓之春秋也鄭方結齊而又致魯以從齊也子發來聘襄公之春秋也鄭欲結晉而藉魯以從晉也叔還如鄭定之春秋也鄭又結齊而魯反藉鄭以從齊也春秋之無王齊鄭之罪也而魯次之春秋之無伯齊鄭之罪也而魯次之十有二年春薛伯定卒子比嗣立無諡夏葬薛襄公叔孫州仇帥師墮郈墮毁也前年兩圍之而侯犯奔齊故叔孫帥師直墮之不假仲孫之力也衛公孟彄帥師伐曹彄孟縶子世族譜云孟縶無子靈公以其子彄為之後實公孫而不稱公孫縶字公孟而以公孟為氏高抑崇曰衛北伐曹曹不叛晉故也靈公志在軍旅之事而不知以禮為國故亟戰如此季孫斯仲孫何忌帥師墮費郈兩圍而後墮費直墮之圍郈何忌助之墮費何忌助之二卿同困于家臣而欲除其患不狃亦方欲召孔子而何忌孔子之徒素聞城雉甲兵之制得以其說通于其間子路為之宰故不俟圍而直墮之與左氏記不狃帥費人襲魯公與三子入季氏之宫按經斯何忌帥師墮費矣大師所臨又安得有竒兵襲國即兵襲國是時二卿方在行間又豈得與公同登武子之臺事與此經戾不足信也秋大雩冬十月癸亥公會齊侯盟于黃十有一月丙寅朔日有食之授時推加時在晝交分十四日二千六百二十二分入食限蓋失一閠今先天新法加一閏得丙寅交分十四日二千六百闕三四九入食限公至自黃十有二月公圍成公至自圍成公斂處父謂孟孫墮成齊人必至于北門此公義也謂孟氏之保障也無成是無孟氏也子僞不知我將不墮何忌惑其說公圍成弗克何忌之于義豈所謂日月至焉者乎趙企明謂費之墮無損于己則何忌助其墮成之圍害切于身則何忌避其怨以何忌為姦人之雄則過矣按魯世家攝相與聞國政歸女樂孔子行皆在此年則圍成者豈孔子行後事耶是離群索居之過也孔子世家乃以明年攝行相事至十四年然後行李廉以經文明年無更敗起廢之事築囿大搜不與墮都意侔明孔子不在其位斯得之也已十有三年春齊侯衛侯次于垂葭垂葭今兖州巨野界地與曹接是時曹晉睦故次以挾曹左氏謂伐晉非也夏築蛇淵囿歡田歸而築囿于其地見孔子去魯而君臣志荒矣大搜于北蒲衛公孟彄帥師伐曹高抑崇曰衛比伐曹曹不叛晉故也靈公志在軍旅之事而不知以禮為國故急戰如此秋晉趙鞅入于晉陽以叛晉陽今太原縣晉始封之地趙始封在今平陽府趙城而據有晉陽不可考其時也鞅欲以衛貢五百舍諸晉陽則晉陽鞅之私邑據世族譜鞅衰六世孫午夙六世孫而夙衰則昆弟也今黃東發記要稍異鞅欲自封植殺其五從昆弟而不之恤今邯鄲午不叛而鞅之罪惡所謂凡民罔不憝者也顧范中行氏不請于君為午伐之君為始禍耳遂入晉陽以叛晉陽天下精兵處也韓魏不得不為之請不得請則鞅倚晉陽之甲兵名清君側志豈可量哉左氏不言其叛迹與經背矣冬晉荀寅士吉射入于朝歌以叛寅吳子吉射鞅子朝歌今淇縣本衛地後削于晉荀封荀鄉鄭演仲云在絳州正平縣士氏封范漁仲云濮州范縣與朝歌逺二卿不據私邑而同保朝歌國人弗順逺奔少紓死且得結外援云爾荀躒言于晉侯三臣始禍而獨逐鞅刑已不均請皆逐之奉公伐二氏二氏伐公國人助公伐之則其叛在未奔之先亦與經背疑傳有誤也書此者可以見晉伯之衰晉刑之失而官之失德其由來逺矣晉趙鞅歸于晉寅吉射入朝歌則鞅歸晉蓋倚晉陽則士吉射不得不逐故書歸則見失刑矣陳君舉曰欒盈魚石猶言入至鞅而後言歸則晉君不得不復雖無韓魏誰能尼之然叛臣而歸則晉無人之辭韓趙魏分晉之本也薛弒其君比惠公夷立稱國以弒者啖叔佐曰目大臣也胡子因之而􅏺孫復之說然臣弒君凡在官者殺無赦古之教也復謂國者在官之辭猶所謂有國有家者爾豈謂民哉十有四年春衛公叔戌來奔衛趙陽出奔宋叔戌公叔文子之子陽趙黶孫義見下二月辛巳楚公子結陳公孫他人帥師滅頓以頓子牂歸趙子常曰頓嘗會諸侯于召陵故也凡滅國以其君歸日雖夷狄滅中國猶日据夷狄自相滅以君歸不月重其變也左氏傳曰頓子牂欲事晉背楚而絶陳好二月楚滅頓夏衛北宫結來奔按左氏衛侯始惡于公孫戌以其富也公孫戌又將去夫人之黨夫人訴之曰戌將為亂衛逐戌及其黨陽結亦戍黨因出奔衛靈沉耳于閨以奔其世臣又及其所與是以其國聽之也而三子不能從容匡導欲去其黨是亂之道也况戍本以富見乎故凡奔者皆罪辭也五月於越敗吳于檇李吳子光卒於越者勾踐也允常曰檇李今嘉興縣光即闔閭也趙子常曰國君戰而亡曰滅必死于陳者也非死于陳者亦必詳其所以吳子遏門于巢卒見其傷于門巢也於越敗吳于檇李吳子光卒亦可見其傷于檇李之敗也凡夷狄交相敗不書据襄十三年楚人敗吳師十四年楚伐吳吳人敗之類此為吳子光以敗卒而書吳越深謀報復而越卒亡吳于是始故詳之也外相敗恆日据僖三十三年晉及姜戎敗秦日此其不日何略夷狄也公會齊侯衛侯于牽公至自會今大名府濬縣古黎陽左氏傳曰晉人圍朝歌公會齊侯衛侯謀救范中行氏杜元凱曰齊魯叛晉故助范中行也秋齊侯宋公會于洮洮曹地至是宋從齊左氏傳曰范氏故也天王使石尚來歸脤石氏尚名王朝上士例書名賑爼實腥曰脤熟曰燔周禮行人歸脤以交諸侯之福李廉曰古者諸侯入朝入朝則各以其職來祭故天子祭宗廟有與諸侯共福之禮與之同其事必與之同其樂也周衰諸侯職貢不修祀事不相久矣廟中之賜諸侯何與于此哉衛世子蒯聵出奔宋奔世子者衛靈嬖南子之罪也世子奔者蒯聵操南子之罪也劉原父曰蒯聵所羞者以夫人名惡也如殺其母為惡愈甚反不知可羞乎且殺夫人蒯聵獨得全乎蓋蒯聵聞野人之歌而慚則以謂夫人夫人惡其斥己淫則言太子將殺豫以誣之耳又宋南子家也蒯聵欲殺南子而敢走其家乎觀原父之言則知左所記容有誣者矣衛公孟彄出奔鄭趙子常曰彄比歲帥師則衛之正卿是亦以為世子之黨見逐則大夫與其黨益得以自恣而無忌矣宋公之弟辰自蕭來奔大搜于比蒲比蒲魯近邾之地此公親搜也何以知其親搜屬事比辭邾子來會公知之也公親者必書于棠于即是也公政之在也此何以不書自三桓之張公家祭而已故昭八年紅搜之后沒公不見曰大搜而已重師而公有無不重矣邾子來會公杜元凱曰會公于比蒲也來而不用朝禮故曰會据莊二十三年蕭叔朝公城莒父及霄莒父霄陸淳皆以為魯地杜元凱曰公叛晉助范氏故懼而城二邑此年不書冬史闕文十有五年春王正月邾子來朝鼷鼠食郊牛牛死改卜牛二月辛丑楚子滅胡以胡子豹歸昭二十三年吳敗楚于雞父胡子髠滅耳胡未滅也至是楚滅之晉定伯衰也楚君之將自文十一年麋始楚君之滅諸侯自宣十一年蕭始皆無伯也滅國之罪重矣胡子責髠不死社稷乃曰此春秋名胡子而爵楚子之義若是則䕫子之歸楚又若以不名哉世有久近傳有詳略其義不係焉者矣夏五月辛亥郊曷為夏五月郊三卜之過時者也魯郊當在孟春今以改卜牛在滌三月卜以四月郊而不吉又卜五月必龜從而後郊也故但書改卜牛不書卜郊壬申公薨于高寢高寢有臺基而高蓋亦燕寢也在正寢後榖梁高寢非正也鄭罕達帥師伐宋逹虎孫杜元凱曰宋公子地奔鄭鄭人為之伐宋欲取地以處之哀十二年左氏傳曰宋平元之族自蕭奔鄭鄭人為之城嵒戈錫是也齊侯衛侯次于蕖蒣蕖蒣地缺欲救宋而不能也邾子來奔喪諸侯無奔諸侯之喪者邾子來奔喪何示服也秋七月壬申姒氏卒姒氏者定公之妾左氏云適夫人非也或曰定從夫諡而終定哀之世他無定夫人喪蓋襄母諡定豈亦從夫諡乎不稱夫人公羊家言哀未踰年尚未推尊姒氏猶仍妾禮是已僖宣襄昭四妾母群臣皆逢君而尊之定哀之母不成為夫人亦足見魯道之衰也已八月庚辰朔日有食之授時推加時在晝交分二十六日九千二百一分入食限今先天推得庚辰交分十三日七千六百七七二入食限九月滕子來會葬以大夫正也親會葬所以事王朝者一施之矣丁巳葬我君定公雨不克葬戊午日下昃乃克葬辛巳葬定姒據八月庚辰朔日食則九月不得有辛巳是上闕冬十月三字杜長厯定為十月三日是也公羊子曰有子則廟廟則書葬定衍文姒下缺氏字妄祔于姜祖姑不别立廟則襄之定姒正哀母姒氏祔故雖姒無諡然緣所祔稱定而人遂誤稱比其久則人疑定妾從夫諡益有所誤傳經之師不能復改耶不薨故葬亦不稱小君冬城漆杜元凱曰漆邾庶其邑張主一曰城漆謀伐邾也定公之喪邾子來奔事魯謹矣哀公初立魯人不務善鄰而以土地之故勞民啓怨二年取其田七年俘其君卒使吳人乘間以伐其國齊人問罪而取歡闡三家謀國不忠之罪也春秋明志録卷十一
