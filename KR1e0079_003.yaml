body:
  text: 春秋明志錄卷三明熊過撰荘公桓子名同母文姜在位三十二年諡法勝敵克亂曰荘元年春王正月不書即位見于先君之年也謂不誓于天丁而削之桓公豈禀命者乎縁桓公客死而有庻長故不待踰年而定之位榖梁傳曰繼弑君不言即位跡經以求桓之弑未明也三月夫人孫于齊夫人文姜也不稱姜氏魯方絶齊不與爲親也桓以乆淹而薨魯之臣子爲是讐齊也劉原父謂公薨于齊事起夫人徐而知之則共責譲夫人是已夫人而能守義乎必遂絶齊以自明何至復孫于齊乎春秋繫之夫人以魯人之意猶未絶乎文姜乃忘讐求助耻心自此遂亡故絶其氏以示義示義而不悛則有絶之而已故莊母伋妻義達于天下國家矣夏單伯逆王姬單伯者名也公榖曰吾之命大夫是也劉敞曰魯之孤故稱逆說左氏者以爲單地伯爵天子之卿也故稱逆今胡子則公谷之遺說也姓苑成王少子臻封于單鄭漁仲則云成王封蔑于單邑以爲氏周世卿單子之族以天子命仕魯耳伯名非字也按魯有單父故單伯魯大夫必以爲單子之族臆說也荘十四年單伯嘗㑹齊桓伐宋冬嘗㑹四國于鄄矣傳曰齊請師于周夏單伯㑹之取成于宋而還則單伯者請諸周而周所遣非天子之卿乎曰齊奉王命徵師而單伯行非周遣之也又十五年單伯如齊齊人執單伯亦以内辭書之王臣獨有單子无單伯單子見諸經成襄之年可考也然則單伯之逆禮乎天子置館同姓主之者必躬至京師受命焉無敢代行否則内諸侯主之也其諸侯親逆者有故不能越疆則使卿往而主嫁者以姑姊妹嫁大國之禮上卿送之可也今魯不親受命不親迎其卿又不代行主婚之臣逆至己國乆而後授之疑于非禮乃其忘讐輕䘮則傳義備矣秋築王姬之館于外館王姬于廟禮也于是齊侯要魯爲築館于外而後親迎也齊侯有所忌于魯不敢以親迎接于廟也王姬以夏至魯而秋方改築齊人之情見矣其曰在䘮故改築爲之辭者云爾然其義則傳備矣白虎通以館爲觀云築觀尊之築之禮于外非禮豈不字義俱乖哉冬十月乙亥陳侯林卒弟杵臼嗣是爲宣公王使榮叔來錫桓公命榮榮公采邑杜云鞏縣西榮鑄澗盖周畿内地也後爲氏趙子常曰錫命者䇿命之也來錫命者非禮也其言桓公追命也王不稱天疑闕文或曰異其事也桓公弑君而立天子不能討于是使魯爲王姬主昏乃追命其先君以寵之是無人紀也于失禮之中又甚焉故王不稱天則疑于錫命桓公王姬歸于齊齊師遷紀郱鄑郚郱今青州府臨朐縣古東莞鄑今平度州昌邑縣古北海郡都昌郚城今臨朐連界安丘東南古朱虚三邑紀東南近輔齊欲滅紀故徙民于他邑而取其邑不書其地趙子常云分背之非一處也公羊傳曰遷之者何取之也外取邑不書此何以書自是始滅也二年春王二月𦵏陳荘公夏公子慶父帥師伐於餘丘慶父者荘公之庻兄本庻孟時稱孟不欲先荘公故自稱仲若母弟然公羊遂指爲母弟也以其爲桓公子故列于三桓其後卒諡共爲共仲後凢舉謚加字如僖伯成季倣此不稱兄稱公子以爲卿也課其生年未踰弱冠以兄故而爲卿匪公選矣國而曰伐於餘丘杜謂小國孫明復羅泌路史以爲魯附庸國今鄒縣古南平陽也南界邾瑕慶父早得兵權以其通邾故伐之也其義胡氏備矣秋七月齊王姬卒禮檀弓齊告王姬之䘮魯荘公爲之服大功或曰由魯嫁故爲之服姊妹之服主昏修服非禮也杜元凱謂内女見其文而已或曰外祖母春秋有志外祖母之䘮者乎十一年王姬亦歸于齊比内女何不錄其終乎趙企明曰王姬歸齊八月而卒死之善惡不可得而詳也齊内不安疑魯問其故而赴之赴之而夫人遂㑹于禚是誠可疑矣不然王姬卒常事何以書哉冬十有二月夫人姜氏㑹齊侯于禚禚齊地荘公㓜故夫人得託國事出㑹其義胡氏備矣乙酉宋公馮卒子㨗嗣是爲閔公三年春王正月溺㑹齊師伐衛公羊傳曰溺吾大夫之未命者也孫氏發微朔在齊故溺㑹伐衛謀納朔也榖梁以爲㑹仇伐同姓是已然黔牟之立有天子之命矣二國不忌而㑹伐之是又有無君之心焉夏四月𦵏宋莊公五月𦵏桓王七年乃𦵏也㑹𦵏不書其人慢也自是魯成弔晉景定王不𦵏魯㐮送楚康靈王不𦵏矣春秋豈徒志𦵏哉榖梁傳曰或曰卻尸以求諸侯舉天下而𦵏一人危不得𦵏也秋紀季以酅入于齊紀季者紀侯之弟季字也入難辭􅈶今臨淄縣東界古東安平紀西鄙接齊臨淄者季以􅈶事齊諸侯五廟以存姑姊妹紀侯意也齊必欲盡得紀地季􅢖以地下敵齊猶難之見齊之貪也或曰賢季有難去兄入齊之心冬公次于滑次止舍之名凡師一宿爲舍再宿為信過信為次矣盖無成事則書之滑今大名府滑縣是杜氏所言陳㽞㐮邑西北地然則是衛南鄙非鄭地矣若滑國則自都費在河南緱氏縣左氏傳曰謀紀鄭伯辭以難厲公之失國魯豈不知而欲與共事且紀本魯東北而􅉸在魯西南何爲次滑以謀之哉必探齊以定朔不言所俟齊将期諸侯非魯所得知也四年春王二月夫人姜氏享齊侯于祝丘禮姑姊妹已嫁而反兄弟不與同席而坐兩君相見則設享禮于廟中享太牢以飲賓耳夫人也而用之又于魯地豈非行其私耶三月紀伯姬卒何劭公曰天子諸侯絶朞大夫絶緦天子惟女之適二王後者諸侯惟女之爲諸侯夫人者恩得伸故卒之内女卒日伯姬不日國将亡禮不備也宣公以後政在權臣凢魯君嫁女皆不得専而贈送之禮日益以薄春秋遂不錄其事矣惟送共姬以賢而書夏齊侯陳侯鄭伯遇于垂參以上非邦交之舊矣趙子常曰鄭要陳遇齊請存紀社稷然突方居櫟豈能謀紀高抑崇言齊結陳鄭之懽恐其救紀夫齊何畏于陳鄭陳鄭又去紀最逺亦何能救紀者而至于宋衛之間爲遇哉此疑鄭􅊳求釋援紀之怨于齊假陳以爲介紹也垂曹地見隠八年紀侯大去其國大去者徃年分酅與季紀國猶在紀入齊爲附庸得自立廟存姑姊妹至是以所都壽光委之而脱身于外寓則非滅矣又凡迫逐不得稱奔者若紀侯之失國庻幾有詞焉春秋特筆修之憫紀罪齊也程子以大爲名吳㓜清遂言紀侯去其國而紀亡故名之按十二年叔姬歸􅈶入齊杜云􅈶在東莞劇縣鄭樵謂遷劇號朐劇夫紀雖去尚能别邑于劇是紀尚未滅也何得云紀遂亡而名之乎又二十年降鄣公榖云紀遺邑盖紀侯去國二十七年矣而猶有遺邑是紀尚未滅又一証也若與其不争而去不與其去而不存則胡氏備矣六月乙丑齊侯𦵏紀伯姬孫明復曰甚齊侯之詐也胡氏曰葬伯姬似仁秋七月冬公及齊人狩于禚劉原父曰齊人齊之微者也其言公及之非公之去南靣而就齊将下與微者狩也自公榖以人爲齊君辛士隆遂以君㑹非微者齊将伐衛意者人其所選之徒與乃若忘親釋怨則不必諱齊侯然後爲貶也五年春王正月夏夫人姜氏如齊師書時者厯時而返不書地次止无常也秋郳黎來來朝郳曹姓出自邾始封君挾之後挾七世孫夷父顔有功于周封其次子友于郳爲附庸國今滕嶧二縣界是杜䟽及輿地廣記所云古昌慮及承地胡氏謂夷地附庸者非也董仲舒春秋繁露曰附庸字者方三十里名者方二十里穀梁傳黎來微國未爵命之君是矣冬公㑹齊人宋人陳人蔡人伐衛此齊㐮公欲納朔也齊宋陳蔡皆以微者徃而魯荘公獨親行者盖公爲齊甥而又善射故㐮公特以其事託之也逆王命黨有罪據事直書而義自見不待人他國之君也六年春王正月王人子突救衛此微者從其班故稱人稱字者所謂修春秋之特筆也季氏指􅊳王子之名與王子虎王子瑕同元士衍文稱人即曰王子矣又可以列從元士乎謂衍文稱人則非也五國伐衛以納朔子􅊳救衛欲固黔牟而拒朔也此春秋書救之始陳則通曰伯圖未興王室尚有可爲之㡬子􅊳救衛善于投㡬矣而沮之者齊諸兒之罪也救衛無功而後王命益不行于天下矣夏六月衛侯朔入于衛季明徳曰凢已絶而復者例應書復衛朔之入不稱復者陳君舉以爲未得國也則衛侯鄭之再歸其國已得而不稱復不可通矣劉原父以爲不與復也則衛侯衎之歸義非可與而稱復不可通矣至于魚石欒盈之復入義例皆有不合故胡康侯于鄭忽復歸之下特發一例曰諸侯失國出奔歸而稱復可也大夫失位出奔歸而稱復則不可古者諸侯世國大夫不世官是不以復爲紀實之辭而聖人可以抑揚其間所謂求其說而不得從而爲之辭也不知朔之出奔衛人實未立君所謂公子黔牟者必洩職以之權攝國事而實制于二卿者也夫衛君既未立則朔位固尚存也豈得同于已絶而復之例㦲此其所以不稱復也然則何以稱入乎洩職拒之于内則其入難矣五國同伐取俘先還實不成乎納朔也秋公至自伐衛螟冬齊人來歸衛俘七年春夫人姜氏㑹齊侯于防夏四月辛卯夜恒星不見夜中星隕如雨辛卯者杜長厯以爲五日夜謂辛卯之壬辰夜中辛卯壬辰之交恒星經星常宿以時列見者星之光魄隕者衆多氣消散也張主一曰王運将終伯統方作之祥自此堯舜禹湯文武之紀綱法度掃地盡矣王簡棲謂釋氏于是生王伯厚以長厯先瑞應經三日指爲傅㑹不知春秋言乎其隕也瑞應言乎其出也陋者之附㑹亦真不參考其異同也㦲秋大水無麥苖冬夫人姜氏㑹齊侯于榖榖今東平州東阿縣南二十里古濟北齊地八年春王正月師次于郎以俟陳人蔡人杜元凱曰期共伐郕陳蔡不至故駐師于郎以待之孔頴逹氏曰賈逵及說榖梁者皆曰陳蔡欲伐魯故待之然陳蔡于魯境絶路遥春秋以來未嘗搆怨榖梁家云伐魯不知所由郕濟西近國何休服䖍亦言欲共伐郕郎本今魚臺單父宋地近濟伐郕故俟之扵此是也甲午治兵胡氏曰此治兵于郎也譏黷武胡氏之義備矣夏師及齊師圍郕郕降于齊師郕小國介魯衛間隐五年衛入之十年齊鄭以其黨衛又伐之荘公五年㑹齊宋陳蔡伐衛而取其俘于齊因欲益孤衛黨故期陳蔡伐之而二國以逺不至乃約齊師圍所與同利之國也莊公素聽齊㐮之命故郕降齊魯師不敢争功書郕降于齊師見圍郕本魯志而不能服也秋師還郕在濮州雷澤東南距魯可三百里間耳夏觧圍而秋師還乆不收矣胡子曰無名黷武非義害人厯三時而後還不稱公重衆也然五年冬荘公伐衛納朔上抗王命其師至六年秋始還而經以公至爲文何以不重衆乎趙子常求而不得乃曰諱公爲仇人役變公而稱師然四年及齊狩禚則稱公九年伐齊納糾樹仇人之弟則稱公何以不諱乎比事以觀二氏者皆不逹矣獨趙伯循詳據經文曰當縁告廟故書木訥趙氏以爲無功而返何辭告廟則伯循之㫖益暢矣盖斯役也公耻而廢策勲飲至之禮春秋據實而書羙惡自見以爲重師諱仇豈經義㦲冬十有一月癸未齊無知弑其君諸兒無知公孫也不曰公孫未命也寵愛親屬而不急于尊賢胡氏是或一道已與糾争而小白立弑君者連稱管至父而専罪無知君弑而無知受之則賊不在二子矣春秋誅利心是故連稱管至父實弑齊㐮無知與聞故者也經世書曰無知以葵丘之戍卒入弑是情實之論也夫苟以爲利則千乗之國弑其君者必百乗之家矣九年春齊人殺無知公及齊大夫盟于蔇盟不月爲異也大夫何以不名非一人也蔇孫明復曰齊地杜以爲繒北蔇亭則今嶧縣北距魯三百里非魯齊通道矣此盖糾來奔魯故荘親至齊地盟其大夫而謀納焉荘輔不正而大夫之徇魯均可罪也糾非㐮公子不得爲忘讐之說爾夏公伐齊納糾不稱公子非爲卿也齋小白入于齊秋七月丁酉𦵏齊襄公魯方伐齊納糾猶不忘㑹其䘮殆文姜之私歟趙子常謂古人重䘮紀非也八月庚申及齊師戰于乾時我師敗績時水出臨淄縣西南二十五里岐流至嵩苑則爲乾時樂安博昌南界其地直出齊北魯兵至此盖出濟水之下流矣小白既定魯師不退厯時而戰則内爲志焉耳不言公趙子常曰一事再見蒙上文九月齊人取子糾殺之書人衆辭糾志欲篡兄倚魯爲亂國人之所欲殺也殺不地于魯也嗣君在䘮曰子糾僖之子諸兒弟也而稱之子者君父一道魯人以子治之也糾魯出小白衛出據荀卿史記謂糾兄者誤也禮庻均以長者趙子常顧曰魯女班貴貴曷據乎諸侯無二嫡以其媵之先後少長班容知魯女先媵貴于衛乎然公榖經納糾不書子殺糾乃稱子胡子以爲糾不當立取以爲証而公榖自以桓公爲簒義㫖不同荀卿傳公榖之學遂曰桓公殺兄矣獨薄昭與淮南書言桓公殺弟考經文良是而公榖之傳經自失之也葢蔇盟齊大夫然後伐而納之則糾必國人所不與者小白繫齊稱入見國逆之情則小白本兄明矣以爲後事不得䝉前事故更端而繫之齊者非也春秋名實之書據實書之而得失自見者也納而書糾以其不當納是時魯人以亡公子納糾計未定也既小白入而見拒魯人思正名以需事㑹固人心于是因盟蔇之後又以嗣君在䘮之名假之其積慮益巧矣故公榖之文得魯人之情而糾或子或不子非謂當立不當立也論語桓公殺公子糾謂公子糾者正也謂子糾者從魯人之詞皆實録也至于取糾殺之則千乗之國不能容一弟罪自顯著胡子止謂殺糾復稱子明其不當殺亦失于推見至隠哉冬浚洙水經洙出盍縣西北臨樂山西逕新泰張元徳謂洙水在魯北齊伐魯之道則公羊曰畏齊者是也十年春王正月公敗齊師于長勺長勺魯地經不書齊伐魯葢齊兵有涉魯地者魯人潜知而敗之古者車戰之法定日刻期兩陣而决之與此異矣胡氏謂責魯詐謀是也然欲修文告但當以假道問之謂敵加于己者非事實也二月公侵宋此書侵之始宋閔以荘二年嗣未嘗通魯惟五年以人從齊伐衛故趙子常言侵宋所以撓齊是也荘公得志于齊乗勝以掠宋境惡其不䖍徳量力矣内師加大國恒言侵隐桓之世未嘗有盖其事變故變文以譏之趙伯循曰凢書侵伐不書勝敗殺掠而還也兵之禍至此甚哉三月宋人遷宿此遷國之始也宿今宿州所遷在今宿遷杜氏謂無鹽者則北近齊境南逺于宋矣高抑崇曰宿界于宋魯之間屬于宋而親魯宋人以爲貳于魯而遷之是也榖梁以遷亡辭然則宋當坐滅人宿不能死社稷當絶也夏六月齊師宋師次于郎趙子常曰外次不書据襄元年晉侯衛侯次于滅之類是也必有關于天下之故而後書桓公既得國既圖伯宋既從次當服魯魯未服于是見伐春秋没其伐我而即之次特書之則有關于天下之故是矣然則胡氏謂深入報復非其情也伯圖難集是故齊次即楚次厥貉殆難之也晉次鄫復伯亦難哉公敗宋師于乗丘乗丘在今曹縣界内古濟隂乗氏鄭漁仲云郎在單州魚臺縣盖齊宋至此魯俟其分兵将歸誘而敗之則乗丘宜在今曹州近單父之地師古指泰山乗丘爲言漁仲因合蛇丘爲一皆誤矣趙子常曰桓公宿師于即将以求成于魯也而魯以子糾故不容遽絀于齊桓公不能釋魯以爲後圖而迫之已甚故畧其與宋戰而但書敗許翰曰桓公始入未撫其民而輕用之是以再不得志于魯晉文之入五年而後用其民葢監此也秋九月荆敗蔡師于莘以蔡侯獻舞歸此荆猾夏之始荆者楚始封國名芊姓顓頊之後成王封鬻熊曽孫繹于楚居丹陽今枝江十六傳至熊通稱武王經世表荘四年子貲嗣爲文王始居郢今江陵皆荆州府地府城北一十里即古郢杜氏謂紀南城也莘蔡地今南陽府裕州界楚師至蔡詐敗其師因蔡侯之降遂執以歸㽞九年而死于楚是以爲哀侯也非獲于行陣故不得稱獲趙子常言春秋謹華夷之辨故變獲言以歸則因公羊而誤也名蔡侯而書以歸胡氏謂絶蔡侯服爲臣虜是也然諸侯而被執亦自是始自是江漢之國深服扵楚春秋葢深懼矣冬十月齊師滅譚譚子奔莒譚子爵國今濟南歴城縣東界七十里譚城是古平陵其地處齊西界約三百里是齊所欲得也桓公再不得志于魯務廣土衆民姑爲攻瑕之䇿遂爲春秋滅國之始不能以義屬諸侯矣故君子以爲罪魁而曾西不爲管仲不然則仲之相桓或者在脱縛三年之後斯時得君尚未専歟其責譚子不死而不絶之胡氏義備矣十有一年春王正月夏五月戊寅公敗宋師于鄑鄑本齊所遷紀邑齊宋嘗合兵次即而宋敗乗丘故今将復合而兵在鄑杜氏以鄑爲魯邑非也趙子常曰其日甚之也再敗之爲已甚矣秋宋大水冬王姬歸于齊黄東發曰二王姬皆荘王女是也㐮桓本弟兄其曰姊妹爲婦姑非也季明徳以荘王爲平王孫是也謂二姬不可復稱平王孫不知詩之平王自指文王耳不書來逆不親迎也其明婦順則胡氏義備矣十有二年春王三月紀叔姬歸于􅈶紀侯去國卒于外而叔姬歸于􅈶以代終得從一之義故書其歸也胡氏義備矣文縁隱七年已歸于紀故繫之若内女始嫁則不系所適之國且嫁大夫者例不書近蜀湯氏欲定爲季妻不知叔姬得冠紀湯氏近誣也夏四月秋八月甲午宋萬弑其君㨗及其大夫仇牧萬乗丘之獲虜也歸爲大夫故書名于冊㨗閔公名凡國君死于境内非國中未有不地者左氏謂弑于蒙澤非也萬有南宫牛猛獲爲助而立子㳺則萬已有黨其弑閔公豈在博戯間㢤冬十月宋萬出奔陳奔而月佚賊也奔陳蔽罪于陳也或者言春秋幸宋知立桓以逐萬逾二月始奔見其强不易制非也十有三年春齊侯宋人陳人蔡人邾人㑹于北杏北杏齊地齊初主㑹也此謂衣裳之㑹古者四方諸侯各有長唐虞曰四岳殷周曰二伯加命于侯伯皆以公徳也桓非受命春秋權與之耳葢自是無特相㑹盟者矣書人微者也謂宋公邾子者非也胡謂大夫不名尊齊侯亦非也宋齊之近國魯衞曹不至宋陳蔡邾止以㣲者來圖伯固難矣或曰王風至荘王絶筆僖王立桓公伯皆是年也世運升降之機也可忽㦲夏六月齊人滅遂衆曰師微曰人齊自滅譚之後管仲以制用兵舍救邢無有大夫将而用大師者趙企明獨曰楚滅蔡凌中夏聖人将許齊圖伯故權以予之而稱師北杏之㑹伯業成矣不能安靖諸侯怙强因過而滅小國聖人復貶而穪人前予今奪是何言哉此罪繫于滅而不係于書将書人也遂子爵舜後國今濟南府肥城縣南界古濟北蛇丘北近齊而南界于魯讙田東北金履祥謂魯附庸或然也其西南鄰曹衞二國不㑹北杏故齊滅遂以威之滅國不書君奔不書以歸或國無君抑君匿不知所終耳公羊善其上下同力則春秋何不録之乎秋七月冬公㑹齊侯盟于柯始及齊平也趙企明曰桓信著乎天下自柯盟始其説是其事非也公羊曹子干盟齊歸汶陽經不書無足據至成二年鞍之戰而後能取耳故蘇氏謂是春秋後好事者之説經世表及李亷并信公羊則過矣惟納紏勺郎之憾釋而爲盟則桓心葢休然有容宜諸侯之心服也柯今東阿在魯北境是齊柯邑十有四年春齊人陳人曹人伐宋宋人背北杏之㑹也徃季氏謂北杏雖憂世道然諸侯不得専征禮樂征伐要惟出天子耳故曰敵國不相征諸侯欲専兵者惟門庭之㓂與弑逆之賊乃先發後聞耳否則不可擅爲㑹况専征乎故齊之伐宋摟諸侯之始事仁義不足而震之以威下威上脅聖門不道其功也夏單伯㑹伐宋單伯魯命大夫陳曹魯皆與宋鄰齊桓爲是發其兵不以勞逺人也于是齊以王命徴師而單伯行三國之兵未旋猶及于伐故不再舉三國與翬復㑹四國伐鄭異矣薄伐踰時修文告以待其服齊兵亦不迫也哉秋七月荆入蔡蔡侯在楚而蔡人㑹齊侯于北杏荆所以入蔡也蔡者中國之要樞楚不得蔡則楚不能以北向楚葢未嘗一日忘蔡也豈必息嬀之繩哉楚强甚矣而中國之勢未合蔡遂復從于楚自是終桓之世不與中國㑹盟此諸侯㑹大夫之始冬單伯㑹齊侯宋公衛侯鄭伯于鄄十有五年春齊侯宋公桓陳侯宣衛侯恵鄭伯厲㑹于鄄鄄衛地今濮州于是齊始自以方伯之禮㑹諸侯北杏諸國猶以大夫行耳謂冬單伯初致齊伯而春以伯禮㑹非也事不經見亦詎知單伯為周所遣哉趙企明謂再㑹懼諸侯之離齊伯當在十六年幽之盟趙子常謂與齊以伯于是始亦非也葢二十七年盟幽之後王使召伯錫齊侯命耳故曰鄄齊侯自以方伯之禮㑹諸侯也衛朔入國不通諸侯者九年鄭突自遇垂不通諸侯者十一年今之㑹齊伯畧定矣伯政不煩諸侯故陳蔡曹邾已歸齊者不復與㑹趙子常曰桓公假天子之命以統諸侯朝覲不歸訟獄不至朝覲㑹同天子之事也伯令曰諸侯十二嵗一同盟三嵗而聘五嵗而朝此何禮也桓公何爲用之如是而春秋不爲之變則春秋徒曰桓文而已矣荘王崩㑹于北杏之前年也僖王崩同盟于幽之次年也是王伯始終之際也春秋存冊書之大體而二王之崩不書以爲東周之大變也皆春秋所由作也許翰曰十三年十四年㑹至是又㑹三合諸侯而不盟以示慎重夏夫人姜氏如齊春㑹于鄄荘公爲羣臣不協不得與焉文姜如齊疑若爲之觧歟然自此不復如齊而遂再如莒意者齊噍故耶秋宋人齊人邾人伐郳郳魯附庸之國宋從齊而魯不㑹鄄故齊助宋爭郳以抑之也宋主兵故序齊上謂大夫自以其班非也謂未成乎伯亦非也其後至僖公請王進郳爲小邾子而仍𨽻魯焉以僖之睦也而伯者之心見矣鄭人侵宋趙子常曰背鄄之㑹也鄭厲公常自通于楚矣其入國也不告于楚而又不誠服于齊中立以觀釁也冬十月十有六年春王正月夏宋人齊人衛人伐鄭宋主兵故先齊許翰曰中國諸侯既爲之服郳又爲之報鄭宋盖自是與齊爲一宋親齊而中國諸侯定矣秋荆伐鄭齊楚伐鄭于是始荆患自蔡及鄭鄭自是又為南北之要樞矣冬十二月㑹齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽言㑹者魯㑹之不書其人微者也齊先宋㑹主也滑姬姓今河南偃師縣南二十里有古滑國在王畿之内與鄭鄰滕本屬魯以魯疑于從齊故爲宋桓公所致而自此亦遂屬于宋矣釋例班序譜自隐至荘十四年四十三嵗衛陳凢四㑹衛在陳上自荘十五盡僖凡三十五嵗八㑹陳在衛上又許男亦先滑伯公羊子曰其序則㑹主爲之自幽之後爲叛服盟稱同不爲叛服盟則不同周禮殷見曰同以施于天下之政王十二嵗一巡狩諸侯㑹于方岳之下設方明焉王乗龍旗出拜日于東門之外反祀方明諸侯因同盟于下方伯臨之以一諸侯尊天子是以爲同盟也幽之㑹王雖不在而桓公假殷同之禮行之故歴十二年而再盟于幽是桓以方伯自處矣幽宋地齊伯頼宋也盖自是無特相盟者而滑滕諸小國不復與齊㑹盟使附大國終春秋焉惟以事見誅責及不欲附人者親至耳邾子克卒克卒子𤨏嗣即檀弓所謂邾子𤨏是也克非儀父也杜氏謂齊桓請王命以爲諸侯亦非也邾之封在武王時矣十有七年春齊人執鄭詹齊稱人微者也鄭詹書名未賜族爲卿也不稱行人以伯令召也公羊以詹佞人趙氏定爲蔡仲之黨是也左氏執詹以鄭不朝豈有冬方㑹而春遂責其不朝耶其後逃而歸魯益知詹得罪于鄭宜執者也其失特以其不歸京師耳僖七年傳曰鄭有叔詹堵叔師叔先言詹葢最貴矣豈至是歸爲卿耶趙氏謂詹今去族爲罪不詳于始終矣夏齊人殱于遂齊以自殱爲文伸遂人之復仇而桓公以不仁見報義並見矣秋鄭詹自齊逃來詹見齊之始伯魯猶懐疑故逃來相托書自齊逃來罪魯不當叛齊以爲逋逃主也然伯國新令亦必有不即乎人心者矣其不及子服恵伯從恵之請而逃義茍免則胡氏義備矣冬多麋十有八年周僖王十七年崩孫恵王十八年立春王三月日有食之公羊云朔在後也榖梁云不言朔夜食也大衍推是嵗五月朔交分入食限三月不應食授時厯推五月壬子朔加時在晝交分入食限三月朔亦不入食限今先天厯新法推得十四日五十三刻五六七八入食限王伯厚言此年古今推算不入食法則亦非夜食矣然曰誤五爲三則何縁下方書夏耶是欲移夏字簒于春王之下而改三爲五耶元吳立夫以魏永安二年十月己酉日食地下宋淳熙十二年九月新厯楊忠輔言月食在晝慶元四年九月朔草澤陳大猷言曰食且在夜而証日之有夜食夫日則信有夜食矣其如此年之食不在三月何哉夏公追戎于濟西濟西近曹戎在其南而鄰魯追舉其時日乆之詞也自是而後魯伐戎終不能爲魯患公羊子大其不使戎邇于我謂是矣秋有蜮蜮魯所無也故以有書冬十月十有九年春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟公子結恵子而桓弟也媵者諸侯娶一國二國徃媵之陳人之婦陳侯娶衛女爲夫人魯以同姓故媵之不言夫人杜氏曰未入國畧言之鄄衛之東地故知其爲衛女也自胡氏叛公榖指陳人爲微者趙子常遂稱卿大夫娶同姓媵之禮夫媵有家者寜得行之哉或謂陳巨室娶結自以庻女媵之結何慕于巨室而爲是逺于人情哉然媵諸侯亦無卿行者卿行則亦失已矣先書地後書盟盟其地也齊宋不悦于魯之㑹幽又屬有鄭詹之隙適㑹于鄄欲謀伐魯結權事之宜去其本職不復送女至衛遂與二君㑹盟書鄄者明出境得専之非輕以失人也内大夫叅盟諸侯月而不月者魯背結之約故異之也季氏謂桓公降志招魯知結老臣送媵逺與宋公過從能委曲睦鄰矣夫人姜氏如苢冬齊人宋人陳人伐我西鄙此在鄄之師也結盟欲緩師而公不從故卒見伐也然將卑師少不及交兵書時以伐亦有節制矣然是時王室亂衛朔叛王與燕納頺齊侯不能勤王而唯魯之求失所先後矣糾合之難也宜哉二十年春王二月夫人姜氏如莒夏齊大災秋七月冬齊人伐戎齊始治戎也戎在魯西南爲患爲魯伐戎将以懐魯歟二十有一年春王正月夏五月辛酉鄭伯􅊳卒子㨗嗣是爲文公秋七月戊戌夫人姜氏薨冬十有二月𦵏鄭厲公二十有二年春王正月肆大眚肆之言緩也眚過也肆大𤯝猶言宥大過也周公之法乃有大罪非終乃惟眚災適爾既道極厥辜時乃不可殺胡子謂大眚皆肆則虧國典縱有罪非也或謂僣故書大如大雩大蒐而不知大肆𤯝與肆大眚文且不同矣至其故則不可知榖梁以下𦵏文姜爲嫌夫人之𦵏則孔趙之徒辨之明矣戴溪曰二百四十二年獨荘公書肆大眚葢春秋予之也癸丑𦵏我小君文姜陳人殺其公子御㓂人者衆詞胡氏曰國亂無政衆人擅殺而不出于其君是矣若以君父討而當罪雖専殺無議也必殺之非罪而後書今御㓂書人以殺與討亂同文又公子完爲其黨亦不書奔則是以討亂而非其罪者也左氏以御㓂爲太子則與晉申生宋痤同皆應直稱君殺世子若他人殺之如陳公子招殺陳世子偃師則不言其日公子也則如陳人殺公子過亦不言其日今陳人殺而日疑其下有大夫之闕文也是時陳從伯令數有㑹盟御貴卿從事或者國人不欲如蔡殺公子燮之類歟陳齊方睦而陳之貴卿見殺不聞齊人之見討也其爲伯圖亦未盡矣夏五月春秋凢月皆繫事不繫事而存月者必首時也五當作四不然則下必有脱事矣趙子常以爲其文則史孔子存之夫所謂文必有關于事者而豈謂四若五之類哉春秋無事以首時書者五十有九惟此書五月昭十年書十二月不誤則有脱焉非孔子故存之也秋七月丙申及齊高徯盟于防書日謹之也不書公微者也齊㐮魯仇羣臣必有不欲娶其女者雖微者徃然自是納幣矣故謹之也或曰不言公諱與大夫盟矣冬公如齊納幣杜元凱曰母䘮未再期而圖昏也其不使大夫而親納幣以聘齊㐮之女則胡氏義備矣二十有三年春公至自齊祭叔來聘叔字也天子之大夫稱字趙子常曰祭公之弟是也來聘爲祭公使也不稱使穀梁所謂不正其私交也自桓之中年王室無聘魯者於是祭叔私相爲好也夏公如齊觀社自榖梁有尸女之言而後程子疑于昏議既親納幣矣又何疑哉此齊致公欲以蒐威公也㐮二十四年齊社蒐軍實使客觀之葢齊俗誇詐之習故曹劌曰齊棄太公之法而觀民于社齊以社誇而後魯以楹旌故曰齊一變至于魯公至自齊荆人來聘荆稱人楚大夫猶稱人也荆始聘未能成禮不廟受故不稱君不言使自公榖以爲稱人進之故康侯曰稱人進之啖助曰若書荆來聘則似舉來聘故加人字以成文無他義也言者演之云荆楚入蔡伐鄭勢逼患滋至藉聘問以窺中國尤聖人所深憂也明堂國門之位周禮荒服世見之儀在夷狄則退之矣劉原父曰州國氏名字爵之别皆進退人君也如之何移用于其臣乎稱人者即其大夫之詞可謂犂然于名實之間而春秋之不與荆益明矣然原父亦豈知春秋之治名實本無所進退哉公及齊侯遇于榖魯雖納幣而齊女方待年于是齊桓約公至于齊地以遇禮㑹盖以相結也蕭叔朝公蕭子姓國今徐州蕭縣宋之附庸叔其字也附庸三十里以上者稱字時齊侯在榖蕭君來朝伯主因得朝公也葢宋欲爲齊餌故使蕭因齊朝之以旌伯威固婚好耳自榖梁以朝廟爲正而後胡氏有嘉禮野合之譏按趙伯循若于國中而不于廟乃爲非禮若于外如何求廟乎且諸侯朝四岳之下亦豈得求廟乎秋丹桓宫楹杜元凱曰楹柱也榖梁傳曰天子諸侯黝堊丹楹非禮也冬十有一月曹伯射姑卒曹荘公卒庻子赤逐其嫡子羈而立是爲僖公十有二月甲寅公㑹齊侯盟于扈扈孫氏以爲齊地然則杜氏云鄭扈者名偶同耳鄭扈于齊魯皆逺畧無縁盟于是也趙子常曰齊侯恐公志在得妻而不在于從伯故盟防而后許之納幣遇榖而後許之請期盟扈而后許之逆女齊不得魯則諸侯不親自長勺乘丘以來委曲調度十有餘年而卒致公于盟㑹桓公庻㡬有伯者之度矣桓盟不日此其日異之也葉少藴曰桓己伯矣復爲離盟則非諸侯之政也然則程子獨以要結姻好亦未盡齊侯之情矣二十有四年春王三月刻桓宫桷昏禮舅姑既沒則婦入三月乃奠菜此祭禰成婦之義也故因夫人将至而特飾桓宫榖梁傳曰禮天子之桷斵之礱之加宻石焉諸侯之桷斵之礱之大夫斵之士斵本刻桷非正也夫人所以崇廟也取非禮與非正而加之于宗廟以餙夫人非正也𦵏曹荘公夏公如齊逆女張元徳曰諸侯無越境逆女之禮是也趙子常謂非禮亦書存䇿書之大體者不然也秋公至自齊榖梁傳曰迎者行見諸舍見諸先至非正也然則其先至者葢謂欲有所調乎八月丁丑夫人姜氏入公羊傳曰其言入何難也其難奈何夫人不僂不可使入與公有所約然後入何休氏曰約逺媵妾也杜元凱曰葢以孟任故入不從公胡氏以爲失夫婦之正是矣然習榖梁以爲宗廟不受矣夫桓宫之丹刻其意豈以爲不可受哉季氏謂大夫不欲受彼方且圖以幣覿又誰不欲哉入之意公羊得之戊寅大夫宗婦覿用幣書戊寅志速也何休稱爲郊迎明日之禮非也而胡氏從之夫婦人三月廟見而後成婦未廟見豈得見羣臣哉宗婦者同姓大夫之婦張元徳曰夫人至大夫見于宗廟婦見于内禮也今未至宗廟而大夫與婦同見于内則爲私禮矣故以覿言劉原父曰公事見私事覿是矣夫人之始入而可以修其私哉凖士相見禮大夫始見于君執贄夫人與君同尊有見小君之禮其執大夫當用羔雁用幣惟附庸孤卿耳若大夫用幣則僣非禮况婦女本以棗栗腶脩告䖍者乎榖梁引禮大夫不見夫人趙企明遂譏男女俱見夫御孫以並覿同贄失男女之别者非譏其覿贄以爲並同之不可也胡氏傳義是矣大水冬戎侵曹據傳隐九年北戎侵鄭桓六年北戎伐齊皆以無伯不書自齊桓作而後凡其為列國患者始悉書之孔子嘆管仲之仁謂民受其賜此其志也曹羈出奔陳赤歸于曹此踰年矣則其名之何覊雖嫡長而衆莫戴杜以微弱不能自定得其辭不得其意矣不能自定者人豈君之哉此必曹大夫挾以令人實未常立故以其名赴耳赤出于戎女故戎自其國挾之侵曹曹遂逐出覊迎赤耳不書納非納也曹之臣子有餘罪焉是時齊方圖魯無暇及曹耳高抑崇曰戎制諸夏廢置人君亦以病齊桓也郭公鳥有名郭公者即摶黍布榖之異名或者紀異如螟蜮耶然爾雅釋鳥不見獨埤雅有其名今亦不敢定也春秋無郭國公榖多以虢作郭季明徳因疑爲東虢文王弟虢仲所封葢賈逵言仲封東虢叔封西虢誤之也東虢今滎陽有巖邑虢叔死焉則非仲封且其地乆已歸鄭在春秋前又安得復存韋昭不知國語註亡虢之叔爲虢仲後則有兩虢叔矣馬融言虢仲始封下陽本河東太陽界是爲西虢分地正合左氏而與賈反至僖二年乃滅耳經世表周荘王二十年秦滅小虢又在荘公七年即如明徳言制他邑未必同亡則疑是小虢譜二虢之亡其時甚明今不得改公作亡矣二十有五年春陳侯使女叔來聘諸侯初交聘齊桓爲之也女氏叔名榖梁子曰天子之命大夫也女汝同今南陽汝州周畿内大夫之采邑因氏女焉以天子命得仕于陳禮天子大夫當諸侯之卿故貴而不名也當是時陳有北杏鄄幽奨齊之功魯有媵婦之存而陳有西鄙之負今魯婚于齊故先諸侯通好雖然陳之通魯在諸侯之先其與魯絶亦在諸侯之先其通在桓伯之十二年而文公六年之後經不書報聘之文楚盛而陳貳中夏興衰之限也豈細故哉陳君舉曰諸侯私相爲好而非定制是謂亂初生也由僖而下朝聘皆之乎盟主天王狩于河陽公朝于王所天王使宰周公來聘公子遂如京師遂如晉吾未知其所終春秋所以作也夏五月癸丑衛侯朔卒子赤立是爲懿公六月辛未朔日有食之鼓用牲于社大衍推七月辛未朔交分入食限授時七月辛未朔加時在晝交分二十七日四百八十九分入食限先天厯推得二十七日空四八九八二入食限則六月者失閏也伐鼔于朝以助充陽氣也天子置五麾陳五兵五鼔諸侯三麾三鼔三兵左氏天子鼔諸侯用幣皆于社夫救日不在社在朝也而于社伐鼓何義乎何休曰社土地之主月土地之精上繫于天而犯日故鳴鼔攻之以脅其本吕大圭因謂天子尊可責神不明禮意故孔氏譏鼔社又用牲也然則用幣禮乎曰聞有陳救日月之弓矢矣未聞以幣從事者也此日而微不助一陽而惟隂之求是尚爲知類乎如主威之不震或以幣請諸權臣曰姑輯斂乎而不正言攻之不可以明禮矣伯姬歸于把伯姬荘公女也不書逆卿往逆君親受之境上者正也逆者非卿則名姓不登于策書歸以志其失有如胡所譏者矣秋大水鼓用牲于社于門門杜元凱曰國門也左氏傳天災有幣無牲非日月之眚不鼓唐孔氏遂言鼓與牲二事皆非夫日月之眚然後鼔是也古者雩禜祭水旱靡愛斯牲豈爲失哉社主土制水用牲可矣門非所效功亦非所獲罪也故鼔社可也用牲可也鼓而用牲于門二俱不可也鄭𤣥用少牢意必有受之者矣冬公子友如陳此内大夫出聘之始荘公母弟不稱弟相殺害則以示義嘉好之事非例所興或稱弟或稱公子杜氏謂仍舊史之文然舊史曷爲異文哉杜不知爲卿則稱公子也不然則齊年鄭語衛黑皆屬嘉好也奚獨稱弟哉季友之母出自陳桓公故使之徃報女叔季氏嘗言之予謂友既母弟同出文姜曷爲又舉陳㦲凡内外朝聘皆言如未成禮之詞或曰存周禮二十有六年春公伐戎曹故也許翰曰隠桓世有戎盟至于荘公戎始變渝是以有濟西之役于此伐戎義已勝矣齊魯伐戎而中國崇也夏公至自伐戎曹殺其大夫稱國以殺胡氏謂國君大夫與謀其事而擅殺之是也謂義繫于殺則止書其官非也此殺非一人之詞也古者諸侯大夫皆天子所置凡卿大夫之獄大司㓂以邦法斷之諸侯不得専殺也陳君舉曰荘公卒有戎難覊出奔陳赤于是簒曹而殺其大夫則必不義其君者曹以討罪告故稱國經不以君臣之禮治之故不名然赤入至是再踰年有不義其君者赤能乆稽誅殺至是乎陳氏失言矣春秋屬辭比事而義自見故抱遺經者不俟傳可究終始也赤挾戎逐覊奔陳原仲爲是來也而友報之義定而伐戎意者徴故焉赤殺其大夫恐魯人有詞于己也黄東發曰魯伐戎曹大夫之不與赤者預其謀故赤殺之然則殺無罪著明矣秋公㑹宋人齊人伐徐齊嘗列宋上然宋徐爲界視魯尤近志于伐徐故先宋以正名宋齊皆人而公㑹何也在禽父時徐戎並興間魯則是黨也魯侯春爲曹故伐戎而曹殺其大夫意戎必震其威矣故魯侯将而二國屬焉藉魯侯之威臨之耳二十八年伐鄭亦魯侯将而二國屬之以魯侯善兵也故經師謂桓公善用諸侯然其令㡬于改物矣冬十有二月癸亥朔日有食之授時推得加時在晝交分十四日三千五百五十一入食限先天得十四日三十五刻五一七六入食限二十有七年春公㑹把伯姬于洮把侯将朝而虞不敬故以伯姬先葢自貶之詞趙子常以爲始此陸淳曰公及伯姬皆失正參議云曹地當把魯之中杜自違其説又曰魯地非也左氏曰天子非展義不巡守諸侯非民事不舉卿非君命不越境夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽此齊初主盟陳鄭服也榖梁子謂于是而後授之諸侯視它盟爲愈也同盟者胡氏謂同欲之意秋公子友如陳𦵏原仲仲名也趙子常曰禮臣既卒不名夫君前臣名禮也榖梁子桓二年傳曰子既死父不忍稱其名臣既死君不忍稱其名今按禮玉藻士于君所言大夫沒矣則稱諡若字子蒲卒哭者呼滅子臯曰若是野哉哭者改之以諱事神之道知死生幽明之故不以貴有常尊治之矣然仲實名也此䇿書之常也或曰原在今懐慶濟源縣原城本周畿内大夫采邑仲以王命仕爲陳卿故不名夫天子三公比隆于諸侯春秋有名者矣冬把伯姬來譏以夫人與國事也婦人無外事故内言不出春公㑹杞姬于洮冬把伯來朝爲國不以禮而使婦人徃來其間非歸寜之義矣莒慶來逆叔姬公羊傳曰莒慶者莒大夫也莒無大夫此何以書譏爾大夫越境逆女非禮也劉侍讀曰内女雖親體不敵不書于策所以尊君也叔姬非適諸侯何以書之公之自主之則敵敵則書胡氏遂譏自主非禮夫大夫自逆不書歸政以國君不與大夫敵公不自爲主耳公羊謂使大夫同姓者主之是也書者譏卿自逆耳把伯來朝公㑹齊侯于城濮城濮衛地幽盟衛侯不至魯衛兄弟之國齊将使魯說之歸也葢齊桓之懐柔庻㡬不假力矣戴溪以爲謀伐衛夫伐則伐謀則謀何待三月而齊始伐衛乎二十有八年春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績衛不修命誥而急與齊戰齊稱人将卑師少也季明德曰按左氏衛嘗伐周立子頺至是王使召伯廖賜齊侯命且請伐衛以其立子頺耳如此則事關天下之故莫有大于此者伐衛之兵乃昭二十三年晉人圍郊之類而齊又莫能得大義者也然圍郊時有劉子單子子朝之亂經皆備書而此獨畧焉何所張本而見其討子頺之師哉且五大夫作亂因蘇氏奉子頺伐王不克冝如𦵏景王后王室亂之辭書亂蘇子奉子頺奔衛衛師伐周立子頺宜如尹氏立王子朝之辭書立鄭伯以王歸處櫟宜如敬王居于狄泉之書居虢叔謀納王而殺子頺及五大夫則勤王討賊而春秋之所僅見者也于法尤不可以不特書求之于經例皆不合而欲掇拾傳聞之説以附益之則不惟事失本真而亦自䧟于誣妄矣至謂齊侯取賂而還則桓公本爲圖伯興師非規規于利者是併伯者心事而不知也左氏之浮誇如此而謂可以盡信乎過按經世表鄭厲公及虢叔入王于成周殺頺及仲父及五大夫則邵子固亦信傳耳夏四月丁未邾子𤨏卒子籧篨嗣是爲文公秋荆伐鄭公㑹齊人宋人救鄭諸侯書救始此善之也趙子常曰齊侯以荘能師故請公自将以爲帥而齊人宋人屬焉桓公可謂善用諸侯者矣冬築郿郿邑在鄆城西北范縣界與秦臺近其地北近于齊南近于曹戎常出沒及之公榖作㣲㣲子封邑也齊履謙曰臺囿曰築郿字上下疑有闕文或謂郿邑之築本欲爲臺望逺築基以成而形勢未便志欲改圖因遂停工未畢故不言所築耳然他日定築秦臺葢實本于此矣大無麥禾服䖍曰隂陽不和土氣不養禾麥不成也臧孫辰告糴于齊公子彄食邑于臧因爲氏也辰僖伯曽孫何不言使魯臣出使據經皆不稱使公羊以爲辰之私行非也榖梁子曰諸侯無粟諸侯相歸粟正也臧孫辰告糴于齊告然後與之言内之無外交也信乎曰國有常經一夫不耕則有受其饑者矣周官倉人藏粟旅師聚粟遺人委積之政以待㐫者國各爲政可也他國之荒即欲歸粟勢亦烏能徧哉移民則有定域有成主移粟之策獨有通糴耳况天災流行國家代有豐年補敗而已若恵而費詎足爲常經也秦人汎舟之役亦從其乞糴耳按魯語文仲以鬯圭玉磬如齊告糴曰不腆先君之敝器敢告滯積以紓執事齊人歸其玉而與之糴此桓公之伯度故其申明天子之令曰無遏糴而已然則歸粟者可以爲美名而不可以為實事也若大臣治國之譏胡傳備矣急而告糴亦不可無故左氏曰禮也獨屬辭而觀築郿新廐前後列之而魯之應災䘏民者春秋有言外之㫖焉耳二十有九年春新延廐禮㐫年嵗不登馬不食穀荘公好武欲養馬焉而新延廐傳謂用民力爲已悉是矣左氏凢馬日中而出日中而入謂當秋治之祗得其一耳夏鄭人侵許趙子常以爲伯令按許前幽與盟與􅉸滕同以小國不煩于㑹非背齊也彊埸之故興師相侵豈關伯令哉後六年楚伐鄭則失許援故也謀國之道要在修徳睦鄰哉秋有蜚羅氏玉露曰負蠜今蜚盤蠱清旦集食稻花田家早作掇拾日出則散去其氣臭惡能熯稻使不繁春秋當由此書之按爾雅通志本草説皆如羅氏蜚字從虫從非盖古飛虫能飛者汪仲裕指爲山海經獸者非也冬十有二月紀叔姬卒趙子常曰内女卒日此何以不日降于夫人也非夫人何以書以恩録也國亡君死叔姬待盡于正也魯人弔其䘮㑹之䘮禮也明臣妾之道叔姬不以國亡而虧婦行推親親之義魯人不以紀滅而薄姑姊妹之恩見人道始終之爲也䇿書之體存而得失著矣城諸及防諸今青州諸城縣在莒北二百里而近莒西距五百里而遥通計之得七百里故季氏定爲齊所併邑或然也􅈶近齊叔姬卒無主守者齊人欲之諸近莒齊以逺難控制齊先使魯受諸以資紀䘮其實以􅈶諸相易也故以城諸屬辭姬卒之下以爲伯者假仁矣不稱齊歸魯徃受之魯不稱取非以力得也防魯故邑在鄆西邑亦近于莒乗齊善意因舊制新而諸不敢叛矣及者榖梁曰以大及小何休遂言諸君邑防臣邑非也别先後辭别新舊辭云爾三十年春王正月夏次于成齊令也齊将降鄣使為聲援成今寧陽境在兖州府北五十里去鄣逾百里其爲聲援逺矣秋七月齊人降鄣鄣紀遺邑古者四丘爲邑公榖皆曰紀遺邑受齊遷郱鄑郚之民于此其後紀去國遂依之無鹽鄣城者漢志以爲齊所降鄣杜氏因稱紀附庸謂遺邑可謂附庸不可羅氏不知誤以東鄆爲西鄆名記遂言􅈶本故榖城今東平東阿縣地季明徳縁唐孔氏以故紀相去爲疑又言紀不應尚有附庸皆非也紀侯卒叔􅈶歸鄣無成主然非威脅尚不降此亦稍知義矣以强臨弱則胡義是也八月癸亥𦵏紀叔姬九月而後克𦵏非夫人而日𦵏傳所謂賢而得書也九月庚午朔日有食之鼔用牲于社大衍推是嵗十月庚午朔九月無庚午授時十月庚午朔加時在晝去交分十四日四千六百九十六入食限先天得十四日四十六刻九六二三入食限此逆推法則是失于庚午而盈于辛未日固有夜食者而今復書之法比十八年異矣冬公及齊侯遇于魯濟魯濟今爲濟寜州鉅野縣之地魯濟之西謂之濟西而在東阿以北者即齊濟季氏言魯濟之西地近徐戎而三臺備戎議定于此或然也然則謀山戎非如左氏傳矣齊人伐山戎山戎東距遼北距燕今薊遵化至永平古孤竹國漢志古北平無終之地舜營州也山戎之役公羊子述司馬之言曰操之爲已蹙矣以是貶桓公云爾胡子之言曰桓不修徳而務勤兵是所爲書人以志貶也二氏之以爲貶也皆以爲是齊桓而書人胡子且援獻俘而証矣夫将卑師少例稱人安知夫伐山戎者自齊人而命獻俘者自齊侯乎獻俘之失伐戎之功自不相掩也孔子嘗有微管之嘆而今乃責其伐山戎也是不過矣乎夫召公之後周之分子也縱其戕賊以失王貢此何異出其愛子與賊而曰吾姑修徳云爾斯亦不近人情哉狄嘗伐邢矣桓公救邢胡子美之夫狄戎醜徳而燕邢並國也戎之害燕胡子乃責其勤兵乎或曰史齊世家桓公救燕遂伐山戎至于孤竹則實桓公矣奈何曰史舉齊事出桓公之年則曰桓公猶言周宣之北伐非親行也三十有一年春築臺于郎季氏曰戎在魯南界其南爲宋其西爲曹其東則逺合于徐之道也郎近宋齊在西近曹薛在東近徐皆相屬于魯之南鄙者也三臺築而可以察戎之出沒矣此䇿必自魯濟受于齊桓者然徒恃崇侈以防虞而不修德政此豈爲國之本哉夏四月薛伯卒築臺于薛薛于是降侯稱伯矣伯何以不日卒不赴也不同盟不可求其名也而書之魯徃弔者将有末故先至其本薛附宋乆魯重其䘮将築其臺也其爲弔或諸示恩乎或諸以爲覘乎春秋謹而志之觀屬辭者可以知義矣六月齊侯來獻戎㨗桓公所頼以服諸侯而成伯功者莫親于魯親來獻㨗與魯爲好也㨿春秋來奔䘮㑹𦵏不月獻㨗月異其事也左氏傳曰非禮也凡諸侯有四夷之功則獻于王王以警于夷中國則否諸侯不相遺俘秋築臺于秦杜元凱東平范縣西北有秦亭在魯西境葢濟西地也冬不雨三十有二年春城小榖説左氏者爲管仲城小榖齊邑也濟北榖城縣中有管仲井因曰大都以名通者不繫國于是取申無宇城榖寘管仲以實之春秋有城外邑而書者乎榖城别是齊之榖邑魯與齊㐮曽㑹其地而蕭叔就朝焉不名小榖又可改小榖爲榖城乎尊王發微謂曲阜西北有小榖則小榖魯地也元吳立夫曰明復魯人考此當矣豈有伯主自城其邑而可出令役諸侯者哉孫氏前范寗已謂魯邑是明徴也夏宋公齊侯遇于梁丘于是齊請㑹于諸侯謀爲鄭報楚宋公請先見于齊侯夏遇于梁丘梁丘宋地榖梁傳曰梁丘在魯邾之間去齊八百里今兖州金鄉縣界内古昌邑西南即宋緍邑之西界也張主一曰齊侯不以伯主自居梁丘近宋而先之也秋七月癸巳公子牙卒牙慶父同母弟荘公庻弟也爲卿故稱公子曰卒𦵏其以恤典也左氏公羊謂季子殺之或謂汪仲裕曰牙乃叔孫氏之祖距公薨時尚一月茍以是誅牙則慶父何爲尚執國柄且書法全不寓微意牙實自卒按成公刺公子偃以國法殺有罪也今曰爲季子諱殺不從其例可也楚公子棄疾殺公子比仗義殺之可以立例今若殺而書卒没其實矣何以見友之善處牙耶且慶父掌兵三十餘年牙将黨而立焉是其同惡相濟友亦詎得而殺之持酖而飲之恐以無后去人情逺矣牙果以酖死慶父之變亦豈待與子般而後著哉八月癸亥公薨于路寢榖梁傳曰路寝正寝也寝疾居正寝正也男子不絶于婦人之手以齊終也趙伯循曰公必薨于正寝以就公卿也大位奸之窺也危病邪之伺也若蔽于隠是使小人女子得行其志也冬十月己未子般卒杜氏謂子般荘公太子也唐孔氏曰傳稱公疾問後于叔牙若已有太子則不應須問當問之時似未有太子也季友以死奉般酖殺叔牙葢于爾時始命爲太子左氏又以子般爲孟任所生亦非古者諸侯夫人無子則先立右媵子又無子乃立左媵子以次而降若孟任生子般則不得比于諸媵尚未知與僖公等否焉得先閔公乎超閔僖而立何以服慶父之心哉子般雖非慶父所欲立然于次不敢輙亂之故季友欲以死奉般耳魯殺未逾年之君者卒輒不日在文公時子卒其例也子般與子野同日何以明其殺頃季明徳亦同疑此但不信公羊既𦵏不名之説主齊履謙子卒不名者爲闕文以文㐮即位在僖成未𦵏時而不名不知卒可書子某即位不可稱子某也而經無微文哉然則慶父使圉人犖賊子般考經亦不足信矣公子慶父如齊于是慶父如齊欲謀自立也閔公哀姜之姊叔姜之子故齊人立之是時桓公主伯茍慶父而實使人弑子般焉敢如齊哉哀姜預聞子弑猶不敢奔齊卒因討而縊况慶父乎然則子般之卒非殺也狄伐邢此狄入伐之始狄在今真定縣以南古中山連亘順徳府平鄉縣在衛之北邢又當其東北二靣之衝邢姬姓侯爵周公庻子所封國今順徳邢臺縣古㐮國春秋明志録卷三
