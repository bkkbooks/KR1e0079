  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0079_WYG_004-1a, image: WYG0168/WYG0168-0078c.png}
body:
  text: 春秋明志録卷四明熊過撰閔公莊公庶子名啓方九嵗即位二年諡法在國遭難曰閔元年春王正月慶父欲伐子般哀姜疑預謀矣如齊以請魯之大臣亦必有聞焉者閔本叔姜之子法應次立遂擁之以絶慶父之望事在先君之年故逾年正月不書即位左氏以為亂是也胡氏以周官大宗伯職喪所掌定不書即位之意非春秋據事直書之㫖矣齊人救邢據外救不悉書書救邢豫伯者以救中國也狄伐邢至是踰時以疆埸相鄰故兵連不解救邢以從簡書蓋管仲之意也或謂齊不急邢欲道衛疆歆以能畏鄰戒過矣夏六月辛酉葬我君莊公秋八月公及齊侯盟于落姑公始受盟于伯主也凡受盟伯主恆稱及避外辭也落姑齊地齊人既立其所出乃使魯人以其意請復季友閔公親至齊地受盟而後使召諸陳以慶父在也胡氏謂國人思得季子而公為落姑之盟以請于齊夫慶父主兵威行於國季子之復若非齊桓風㫖閔亦豈能自請于齊哉季子來歸大夫出入非罪不書則其曰季子何稱季子所以别有罪魯人之情其文則史也以是為宜歸也公羊傳曰其稱季子何賢也其言來歸何喜之也季子欲歸慶父夫人之亂未已俄而殺閔公于是以僖公適邾則國人何賢乎季子微季子則慶父夫人之篡成而莊公之統絶謂成風事季友左氏之誣也而朱先生誤信之豈魯人不名季子之義乎冬齊仲孫來慶父叔牙之弟也于次為仲孫去年十月如齊未歸係之齊魯人見桓公容隱竒邪不為除害在齊已久視之若齊人不曰來歸曰來惡其人懼其歸也若仲孫湫則何以不稱使胡子曰略其君臣之常辭見桓公使人不以禮仲孫事君不以忠也夫春秋之使臣者于天王得十有一于列國得三十有四豈盡軌于忠禮者而何以書也趙子常曰吾君幼不以賔禮接季子以兩臣相見故不言使且不名夫不以賔禮接吾事也何與于齊而遂沒其使且不名乎或曰仲孫之來比于無上事者猶曰不知何故而至也則幾乎窺垣之盜而不知仲孫之為慶父也其曰不去慶父魯難未已是也左氏附為齊欲取魯而覘之既不知桓公又不察事實之不可行也二年春王正月齊人遷陽世本無陽國不知何姓杜氏族譜土地名缺不知所在趙企明謂今沂州當齊魯之間魯附庸也按今沂州北境沂水流其東南者漢置陽都謂古陽國東踰沂水為中丘南為費西為蒙隂北為蓋在齊穆陵關南東南即魯防邑則陽都四面皆魯地矣唐孔氏以與宋人遷宿文同然宿介于宋魯魯侵宋宋疑宿附魯故遷之今齊間魯亂不假疆場之事遷人附庸以自封殖異乎宋之自遷附庸者矣夏五月乙酉吉禘于莊公書吉者非吉而以為吉也魯人之喪莊公也既葬而絰不入庫門士大夫既卒哭而麻不入則閔之元年已吉服矣以為未三年者皆是也禘者禘始祖自出之帝以東向而始祖配合食其前焉禮也禘義有二今茲之禘范杜以為新者入廟故當祧矣合祭以審禘其昭穆是矣于莊公者逸禮有禘于太廟篇名則禘必于太廟以合焉王者所自出無廟則宜于太廟追配魯頌言皇祖后稷且有閟宫文王廟焉止應始祖周公禽父配以所出之周公也禽父封魯周公拜乎前魯公拜乎後故周公魯所自出是諸侯之宗國魯之有廟也文雖稱受命而終為追王之王禽父以始封立四親廟以諸侯而祖諸侯非若鄭祖厲王也羣公合食是禮兼禘祫以之名禘固已失實不但僭也又禘于祔廟而不于太廟則以尊就卑益非道矣不稱宫就祀祔主非宫廟也然則禘可乎魯之禘非禮也諸侯祫于太廟及其無廟之主耳無所自出也非無所自出不敢宗天子也趙企明言諸侯不得郊禘而得祫禘譏諸儒不稽其義而惑其名企明蓋不精於五年殷祭之說也魯之禘非禮也蓋不可勝書書其失之失者以見義耳或曰吉禘莊公者是時慶父以桓公庶子有覬覦之心焉而閔公本莊公之子子般之弟于次應立故率羣臣特舉此禘以示莊公功德足以上配文王周公宜及其子孫欲以杜慶父之奸萌也秋八月辛丑公薨公羊傳曰公斃何以不地隱之也何隱爾弒也孰弒之慶父也九月夫人姜氏孫于邾不日與弒也于是季友以僖公適邾姜氏懼討故與慶父俱出奔也公子慶父出奔莒不日與弒也慶父弒君本欲代立其出奔莒為魯人所逼也譏失賊胡氏備矣冬齊髙子來盟髙傒稱子傒城魯魯以為美談曰猶望髙子魯史不名故曰其文則史髙子不稱使何也公羊子曰我無君也趙匡難之曰既與魯盟即是致命劉氏又言慶父出奔則僖公已立髙子稱來盟則僖公之盟公羊說非也榖梁子曰不以齊侯使髙子劉敞難之曰尊有功之臣不使繫其君非春秋之義也而胡子尚仍公羊之陋曰權在髙子以為賢之是何以語大易無成有終之㫖哉然則奈何曰春秋之詞微而婉則髙子嫌于專故不書使以成之主人習其讀是亦髙子有罪焉髙子之罪奈何不能先决乎桓公也髙子可謂賢矣而抑之抑髙子為後世防也十有二月狄入衛左氏言滅按經文止書入耳若實伐而戰戰而後入書法雖舉其重亦應少别况實未滅乎趙子常謂衛人立戴公以廬于漕齊侯使公子無虧戍之故不言滅非也詩載馳歸唁衛侯弔其失國而已非滅也而曰言至于漕則衛侯在漕按衛女泉水之詩亦曰思須與漕漕衛邑近者在今滑之白馬故詩擊鼓以土國城漕并言夫避狄不踰其境安得為滅乎顧以懿公敗不知其終戴公又殁兵喪相仍未能繕完城邑其曰芃芃其麥者遂歷辰卯之月尚野處耳齊桓方以攘夷為志而曰控于大邦誰因誰極者衛素不親齊而齊又有城邢之役故雖戍之然伯度亦少隘矣經不書戍略之也鄭棄其師鄭衛鄰而界河髙克將兵備敵師久不還亦以狄故然有逃亡潰散者春秋書棄其師謂其輕用大衆也左氏以為鄭惡髙克久而不召公榖亦謂棄師為惡其將今觀清人之詩亦未見其為惡克也清本近在衛南地連牧野而彭消軸皆衛邑在河北者清人因狄入衛而南避于近河之邑未見追出則狄尚未能渡河至鄭也防河者更畨偵伺以候發可也何必盡討軍實濱河野次使之翺翔逍遙旋抽作好逾時不召非棄師之道乎是時楚方患鄭連至不忌疑得以搗虛矣然則聖人所書之意豈其為髙克哉詩序察理不精亦本左氏為說鄭𤣥因之遂謂髙克之師清邑所賦而水經指為中牟清陽亭則髙克所帥乃一邑之人耳邑不過四井三十二家經文曷為以師言而屬之鄭耶鄭師不過四百乘而輕棄之如此鄭文之暗也春秋明志録卷四
